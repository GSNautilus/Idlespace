<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IdleSpace — Card Builder</title>
<link rel="stylesheet" href="ui/colors_and_type.css">
<link rel="stylesheet" href="ui/chrome.css">
<link rel="stylesheet" href="ui/ship-card.css">
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #050508;
  color: #c8d0e0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  background: #08090f;
  border-bottom: 1px solid #111828;
  flex-shrink: 0;
}
#header h1 { font-size: 16px; font-weight: 600; color: #8090b0; }
#header h1 span { color: #4a7ac0; }
#header-actions { display: flex; gap: 8px; align-items: center; }
#live-link-status {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 4px 8px;
  margin-right: 4px;
  background: linear-gradient(135deg, #3a2a10, #503a15);
  border: 1px solid #c0a020;
  border-radius: 4px;
  color: #ffe8a0;
  font-size: 11px;
  font-weight: 600;
}
#live-link-status.visible { display: flex; }
#live-link-status .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #ffd040;
  box-shadow: 0 0 5px #ffd040;
  animation: live-dot-pulse 1.8s ease-in-out infinite;
}
@keyframes live-dot-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
#live-link-status .clear-link {
  background: transparent; border: none; color: #ffe8a0;
  cursor: pointer; font-size: 11px; text-decoration: underline;
  padding: 0 0 0 2px;
}
#live-link-status .clear-link:hover { color: #ffbb40; }
.header-btn-apply {
  background: linear-gradient(135deg, #402a10, #604010) !important;
  border-color: #c0a020 !important;
  color: #ffe8a0 !important;
}
.header-btn-apply:hover { background: linear-gradient(135deg, #503818, #704818) !important; }
#new-card-btn, .header-btn {
  padding: 8px 20px;
  background: linear-gradient(135deg, #2a4080, #3a5ab0);
  border: 1px solid #4060c0;
  color: #fff;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
#new-card-btn:hover, .header-btn:hover { background: linear-gradient(135deg, #3050a0, #4a6ac0); }
.header-btn-subtle {
  background: linear-gradient(135deg, #1a2540, #243060);
  border-color: #2a3a60;
}
.header-btn-subtle:hover { background: linear-gradient(135deg, #243060, #2e4080) !important; }

/* ── 3-Panel Layout ── */
#panels {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Left Panel: Catalog ── */
#catalog {
  width: 240px;
  flex-shrink: 0;
  background: #06080c;
  border-right: 1px solid #111828;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#catalog-filters {
  padding: 12px;
  border-bottom: 1px solid #111828;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
#catalog-filters label { font-size: 10px; color: #384868; text-transform: uppercase; letter-spacing: 1px; }
#catalog-filters select {
  width: 100%;
  padding: 6px 8px;
  background: #0c0e18;
  border: 1px solid #151c30;
  color: #c8d0e0;
  border-radius: 4px;
  font-size: 12px;
}
#catalog-count {
  padding: 8px 12px;
  font-size: 11px;
  color: #384868;
  border-bottom: 1px solid #0c0e18;
}
#catalog-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
.catalog-item {
  padding: 8px 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.1s;
  font-size: 13px;
}
.catalog-item:hover { background: #0a0d16; }
.catalog-item.active { background: #0d1020; }
.catalog-item-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.catalog-item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.catalog-item-cat { font-size: 10px; color: #384868; text-transform: uppercase; }

/* ── Center Panel: Preview ── */
#preview-panel {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #050508;
  min-width: 280px;
  position: relative;
  overflow: auto;
}
#zoom-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  padding: 6px 12px;
  background: #0c0e18;
  border: 1px solid #151c30;
  color: #506888;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  z-index: 5;
  transition: all 0.15s;
}
#zoom-btn:hover { border-color: #4060c0; color: #c0d0f0; }
.card-preview.zoomed {
  transform: scale(3);
  transform-origin: center center;
}

/* ── Card Preview (larger version) ── */
.card-preview {
  width: 220px;
  height: 320px;
  border-radius: 10px;
  padding: 0;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.card-preview::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 10px;
  padding: 3px;
  background: var(--rarity-color);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}
.card-preview .card-bg {
  position: absolute;
  inset: 3px;
  border-radius: 7px;
  background: #141a30;
  z-index: 0;
}
.card-preview > * { position: relative; z-index: 1; }

/* Header row: name + cost badge */
.card-preview .card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 7px 8px 4px 8px;
}
.card-preview .card-name {
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  flex: 1;
  min-height: 16px;
  line-height: 1.2;
}
.card-preview .card-cost-badge {
  position: absolute;
  top: 7px;
  right: 8px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  padding: 2px 4px;
  border: 1px solid #2a3460;
  border-radius: 3px;
  background: rgba(15,20,40,0.85);
  min-width: 30px;
  align-items: flex-end;
  z-index: 3;
}
.card-preview .card-cost-badge:empty { display: none; }
.card-preview .cost-badge-row {
  display: flex;
  align-items: center;
  gap: 2px;
  font-size: 9px;
}
.cost-badge-icon { font-size: 9px; }
.cost-badge-val { color: #e09060; font-weight: 600; font-size: 10px; }

/* Image — 1024x872 input, displayed at 205x175 */
.card-preview .card-image {
  width: 205px;
  height: 175px;
  border-radius: 4px;
  background: #1a2040;
  margin: 0 auto 4px auto;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2a3460;
  font-size: 11px;
  flex-shrink: 0;
}
.card-preview .card-image img {
  width: 205px;
  height: 175px;
}

/* Stats row — compact, icon-only. Grows when no special text */
.card-preview .card-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 3px 8px;
  padding: 2px 8px;
  justify-content: center;
  align-items: center;
  align-content: center;
}
.card-preview .card-stats.expanded {
  flex: 1;
  gap: 4px 12px;
}
.card-preview .card-stat {
  display: flex;
  align-items: center;
  gap: 2px;
  font-size: 11px;
}
.card-preview .card-stats.expanded .card-stat { font-size: 13px; }
.card-preview .card-stat-icon { font-size: 12px; }
.card-preview .card-stats.expanded .card-stat-icon { font-size: 15px; }
.card-preview .card-stat-value { font-weight: 600; color: #fff; }
.card-preview .card-stat-value.zero { color: #2a3460; }
/* Ship card layout */
.ship-stat-row {
  display: flex;
  gap: 6px;
  justify-content: center;
  align-items: center;
  padding: 1px 0;
}
.ship-stat-row.ship-utils {
  margin-top: 2px;
  padding-top: 3px;
  border-top: 1px solid rgba(100,130,180,0.15);
}
.ship-weapons {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 3px 8px;
  margin-top: 2px;
  border-top: 1px solid rgba(100,130,180,0.15);
}
.ship-weapon-row {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
}
.ship-weapon-row .card-stat-icon { font-size: 12px; }
.ship-weapon-row .card-stat-value { font-weight: 600; }
.ship-range-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 0 4px;
  border-radius: 3px;
  margin-left: auto;
  letter-spacing: 0.5px;
}

/* Special ability */
.card-preview .card-special {
  font-size: 11px;
  color: #a0b0d0;
  text-align: center;
  margin: 2px 7px 0 7px;
  padding: 3px 4px;
  background: rgba(40,60,120,0.2);
  border-radius: 3px;
  line-height: 1.2;
}

/* Flavor text */
.card-preview .card-flavor {
  font-size: 10px;
  color: #4a5a7b;
  font-style: italic;
  text-align: center;
  padding: 2px 8px 7px 8px;
  line-height: 1.3;
  margin-top: auto;
}

/* Category watermark — centered in bottom 1/3 area behind stats/text */
.card-preview .card-watermark {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 60px;
  opacity: 0.08;
  z-index: 1;
  pointer-events: none;
  line-height: 1;
}

/* Rarity colors */
.card-preview.common    { --rarity-color: #6a7a9b; }
.card-preview.uncommon  { --rarity-color: #4a9b5a; }
.card-preview.rare      { --rarity-color: #4a7ac0; }
.card-preview.epic      { --rarity-color: #8a4ac0; }
.card-preview.legendary { --rarity-color: #c0a020; }

/* ── Right Panel: Editor ── */
#editor {
  width: 320px;
  flex-shrink: 0;
  background: #06080c;
  border-left: 1px solid #111828;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.editor-section {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.editor-label {
  font-size: 10px;
  color: #384868;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.editor-input {
  width: 100%;
  padding: 8px 10px;
  background: #0c0e18;
  border: 1px solid #151c30;
  color: #c8d0e0;
  border-radius: 4px;
  font-size: 13px;
  font-family: inherit;
}
.editor-input:focus { outline: none; border-color: #4060c0; }
textarea.editor-input { resize: vertical; min-height: 48px; }
select.editor-input { cursor: pointer; }

/* Stats / Cost rows */
.stat-rows { display: flex; flex-direction: column; gap: 4px; }
.stat-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.stat-row .stat-key {
  flex: 1;
  padding: 5px 8px;
  background: #0c0e18;
  border: 1px solid #151c30;
  color: #8090b0;
  border-radius: 4px;
  font-size: 12px;
}
.stat-row .stat-key.default { background: #151a30; color: #506888; border-color: #111828; }
.stat-row .stat-val {
  width: 70px;
  padding: 5px 8px;
  background: #0c0e18;
  border: 1px solid #151c30;
  color: #c8d0e0;
  border-radius: 4px;
  font-size: 12px;
  text-align: right;
}
.stat-row .stat-val:focus { outline: none; border-color: #4060c0; }
.stat-row .remove-btn {
  width: 24px;
  height: 24px;
  background: transparent;
  border: 1px solid #2a2030;
  color: #6a4050;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
}
.stat-row .remove-btn:hover { background: #2a1020; color: #c04060; border-color: #4a2040; }
.add-row-btn {
  padding: 5px 10px;
  background: transparent;
  border: 1px dashed #151c30;
  color: #384868;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  transition: all 0.1s;
  align-self: flex-start;
}
.add-row-btn:hover { border-color: #4060c0; color: #6a8ac0; }

/* Image upload */
#image-upload-area {
  display: flex;
  align-items: center;
  gap: 10px;
}
#image-thumb {
  width: 60px;
  height: 60px;
  border-radius: 4px;
  background: #0c0e18;
  border: 1px solid #151c30;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #151c30;
  font-size: 10px;
}
#image-thumb img { width: 100%; height: 100%; object-fit: cover; }
#image-upload-btn {
  padding: 6px 14px;
  background: #0c0e18;
  border: 1px solid #151c30;
  color: #8090b0;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.1s;
}
#image-upload-btn:hover { border-color: #4060c0; color: #c0d0f0; }
#image-clear-btn {
  padding: 6px 10px;
  background: transparent;
  border: 1px solid #2a2030;
  color: #6a4050;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  display: none;
}
#image-clear-btn:hover { background: #2a1020; color: #c04060; }

/* Tags */
#tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  background: #0c0e18;
  border: 1px solid #151c30;
  border-radius: 12px;
  font-size: 11px;
  color: #8090b0;
}
.tag .tag-remove {
  background: none;
  border: none;
  color: #384868;
  cursor: pointer;
  font-size: 13px;
  padding: 0 0 0 2px;
  line-height: 1;
}
.tag .tag-remove:hover { color: #c04060; }
#search-autocomplete {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: #0c0e18;
  border: 1px solid #151c30;
  border-top: none;
  border-radius: 0 0 4px 4px;
  max-height: 180px;
  overflow-y: auto;
  z-index: 10;
  display: none;
}
#search-autocomplete .search-option {
  padding: 5px 8px;
  font-size: 12px;
  color: #8090b0;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
#search-autocomplete .search-option:hover,
#search-autocomplete .search-option.selected {
  background: #101525;
  color: #c0d0f0;
}
#search-autocomplete .search-option .search-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
#search-autocomplete .search-option .search-cat {
  font-size: 9px;
  color: #384868;
  margin-left: auto;
  text-transform: uppercase;
}
#tag-input-row {
  display: flex;
  gap: 4px;
  margin-top: 4px;
  position: relative;
}
#tag-input {
  flex: 1;
  padding: 5px 8px;
  background: #0c0e18;
  border: 1px solid #151c30;
  color: #c8d0e0;
  border-radius: 4px;
  font-size: 12px;
}
#tag-input:focus { outline: none; border-color: #4060c0; }
#tag-autocomplete {
  position: absolute;
  top: 100%;
  left: 0;
  right: 40px;
  background: #0c0e18;
  border: 1px solid #151c30;
  border-top: none;
  border-radius: 0 0 4px 4px;
  max-height: 120px;
  overflow-y: auto;
  z-index: 10;
  display: none;
}
#tag-autocomplete .tag-option {
  padding: 5px 8px;
  font-size: 12px;
  color: #8090b0;
  cursor: pointer;
}
#tag-autocomplete .tag-option:hover,
#tag-autocomplete .tag-option.selected {
  background: #101525;
  color: #c0d0f0;
}
#add-tag-btn {
  padding: 5px 10px;
  background: #0c0e18;
  border: 1px solid #151c30;
  color: #8090b0;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
}
#add-tag-btn:hover { border-color: #4060c0; color: #c0d0f0; }

/* Catalog tag pills */
.catalog-item-tags {
  display: flex;
  gap: 2px;
  flex-wrap: wrap;
  margin-top: 2px;
}
.catalog-tag {
  font-size: 9px;
  padding: 1px 5px;
  background: #0c0e18;
  border-radius: 8px;
  color: #384868;
}

/* Action buttons */
#editor-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  padding-top: 12px;
  border-top: 1px solid #111828;
}
#save-btn {
  flex: 1;
  padding: 10px;
  background: linear-gradient(135deg, #2a6040, #3a8060);
  border: 1px solid #40a060;
  color: #fff;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
#save-btn:hover { background: linear-gradient(135deg, #3a7050, #4a9070); }
#delete-btn {
  padding: 10px 16px;
  background: transparent;
  border: 1px solid #4a2030;
  color: #a04050;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
#delete-btn:hover { background: #2a1020; color: #d06070; }
#delete-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Toast notification */
#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  padding: 10px 24px;
  background: #2a6040;
  border: 1px solid #40a060;
  color: #fff;
  border-radius: 6px;
  font-size: 13px;
  transition: transform 0.3s ease;
  z-index: 100;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #151c30; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #1c2840; }

/* Hidden file input */
#image-file-input { display: none; }
</style>
</head>
<body>

<!-- SVG icon sprite (hidden, injected synchronously so <use href="#i-..."/> resolves immediately) -->
<div id="ui-sprite-slot" style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true"></div>
<script>
(function loadSprite(){
  try {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', 'ui/icons.html', false);
    xhr.send();
    document.getElementById('ui-sprite-slot').innerHTML = xhr.responseText;
  } catch(e) {
    fetch('ui/icons.html').then(r => r.text())
      .then(t => { document.getElementById('ui-sprite-slot').innerHTML = t; });
  }
})();
</script>

<!-- Header -->
<div id="header">
  <h1><span>IdleSpace</span> Card Builder</h1>
  <div id="header-actions">
    <div id="live-link-status">
      <span class="dot"></span>
      <span>Live-linked to game</span>
      <button class="clear-link" id="clear-override-btn" title="Remove override; game reverts to data/game-cards.json">clear</button>
    </div>
    <button id="import-btn" class="header-btn header-btn-subtle">Import JSON</button>
    <button id="export-btn" class="header-btn header-btn-subtle">Export JSON</button>
    <button id="export-bundle-btn" class="header-btn header-btn-subtle">Export Bundle</button>
    <button id="apply-live-btn" class="header-btn header-btn-apply" title="Push current catalog to any open starmap as a live override">Apply to Live</button>
    <button id="new-card-btn">+ New Card</button>
  </div>
  <input type="file" id="import-file" accept=".json" style="display:none">
</div>

<!-- 3 Panels -->
<div id="panels">

  <!-- Left: Catalog -->
  <div id="catalog">
    <div id="catalog-filters">
      <div style="position:relative">
        <label>Search</label>
        <input type="text" id="card-search" class="editor-input" placeholder="Search by name..." style="padding:6px 8px; font-size:12px;">
        <div id="search-autocomplete"></div>
      </div>
      <div>
        <label>Category</label>
        <select id="filter-category">
          <option value="all">All Categories</option>
          <option value="building">Building</option>
          <option value="leader">Leader</option>
          <option value="ship">Ship</option>
          <option value="admiral">Admiral</option>
          <option value="star">Star</option>
          <option value="planet">Planet</option>
          <option value="pirate">Pirate</option>
        </select>
      </div>
      <div>
        <label>Rarity</label>
        <select id="filter-rarity">
          <option value="all">All Rarities</option>
          <option value="common">Common</option>
          <option value="uncommon">Uncommon</option>
          <option value="rare">Rare</option>
          <option value="epic">Epic</option>
          <option value="legendary">Legendary</option>
        </select>
      </div>
      <div>
        <label>Tag</label>
        <select id="filter-tag">

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const RARITY_COLORS = {
  common:    "#506888",
  uncommon:  "#4a9b5a",
  rare:      "#4a7ac0",
  epic:      "#8a4ac0",
  legendary: "#c0a020",
};

const CATEGORY_DEFAULT_STATS = {
  building: [],
  ship:     ["shields","armor","speed","sensorRange","energyDmg","energyRange","kineticDmg","kineticRange","missileDmg","missileRange","stealth","pointDefense"],
  leader:   [],
  admiral:  ["commandBonus","maxFleetSize"],
  star:     [],
  planet:   [],
  pirate:   ["shields","armor","speed","sensorRange","energyDmg","energyRange","kineticDmg","kineticRange","missileDmg","missileRange","stealth","pointDefense"],
};

// Stats that use a dropdown instead of a number input
const DROPDOWN_STATS = {
  energyRange:  ["short","medium","long"],
  kineticRange: ["short","medium","long"],
  missileRange: ["short","medium","long"],
};

const STORAGE_KEY = "idlespace_cards";
const SCHEMA_VERSION = 1;
// Shared with starmap.html — must match CARDS_OVERRIDE_KEY there.
const CARDS_OVERRIDE_KEY = "idlespace_gameCards_override";
const CARDS_BROADCAST = (typeof BroadcastChannel !== "undefined")
  ? new BroadcastChannel("idlespace-cards")
  : null;

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let catalog = loadCatalog();
let editingCardId = null; // null = new card

// ═══════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════
// Storage format: { version, cards: [...] } — matches game's data/game-cards.json.
// Accepts legacy flat-array localStorage too (pre-Phase 2 catalogs).
function loadCatalog() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!raw) return [];
    if (Array.isArray(raw)) return raw;                    // legacy
    if (Array.isArray(raw.cards)) return raw.cards;         // { version, cards }
    return [];
  } catch { return []; }
}

function saveCatalog() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ version: SCHEMA_VERSION, cards: catalog }));
}

// ═══════════════════════════════════════════
//  EDITOR STATE HELPERS
// ═══════════════════════════════════════════
// Read key/value rows from a container. Numeric unless the key is in
// DROPDOWN_STATS or forceString is set.
function readKvRows(containerId, { forceString = false } = {}) {
  const out = {};
  document.querySelectorAll(`#${containerId} .stat-row`).forEach(row => {
    const key = row.querySelector(".stat-key").value.trim().toLowerCase().replace(/\s+/g, "_");
    if (!key) return;
    const valEl = row.querySelector(".stat-val");
    let val;
    if (forceString) val = valEl.value.trim();
    else if (DROPDOWN_STATS[key]) val = valEl.value;
    else val = parseFloat(valEl.value) || 0;
    out[key] = val;
  });
  return out;
}

function readPlanetGen() {
  const minV = parseInt(document.getElementById("edit-pg-count-min").value);
  const maxV = parseInt(document.getElementById("edit-pg-count-max").value);
  const bonus = parseInt(document.getElementById("edit-pg-bonus").value) || 0;
  const gRaw = document.getElementById("edit-pg-guaranteed").value.trim();
  const guaranteed = gRaw ? gRaw.split(",").map(s => s.trim().toLowerCase()).filter(Boolean) : [];
  if (Number.isNaN(minV) && Number.isNaN(maxV) && !bonus && guaranteed.length === 0) return null;
  return {
    count: [Number.isNaN(minV) ? 0 : minV, Number.isNaN(maxV) ? (Number.isNaN(minV) ? 0 : minV) : maxV],
    guaranteed,
    bonus,
  };
}

function getEditorData() {
  const category = document.getElementById("edit-category").value;
  const statsOrBonuses = readKvRows("stat-rows");
  const cost = readKvRows("cost-rows");
  const upkeep = readKvRows("upkeep-rows");
  const attributes = readKvRows("attr-rows", { forceString: true });

  // Category-specific data lives under categoryData.
  const categoryData = {};
  if (category === "star") {
    const pg = readPlanetGen();
    if (pg) categoryData.planetGen = pg;
  } else if (category === "planet") {
    if (Object.keys(statsOrBonuses).length > 0) categoryData.bonuses = statsOrBonuses;
  }

  // Planets store their values in categoryData.bonuses, not stats.
  const stats = (category === "planet") ? {} : statsOrBonuses;

  const weight = parseFloat(document.getElementById("edit-weight").value);

  return {
    name: document.getElementById("edit-name").value.trim(),
    category,
    rarity: document.getElementById("edit-rarity").value,
    weight: Number.isFinite(weight) ? weight : 1,
    image: currentImage,
    stats,
    cost,
    upkeep,
    special: document.getElementById("edit-special").value.trim(),
    flavor: document.getElementById("edit-flavor").value.trim(),
    notes: document.getElementById("edit-notes").value.trim(),
    tags: [...currentTags],
    attributes,
    categoryData,
  };
}

function loadCardIntoEditor(card) {
  editingCardId = card.id;
  document.getElementById("edit-name").value = card.name;
  document.getElementById("edit-category").value = card.category;
  document.getElementById("edit-rarity").value = card.rarity;
  document.getElementById("edit-weight").value = (typeof card.weight === "number") ? card.weight : 1;
  document.getElementById("edit-special").value = card.special || "";
  document.getElementById("edit-flavor").value = card.flavor || "";
  document.getElementById("edit-notes").value = card.notes || "";

  currentImage = card.image || null;
  updateImageUI();

  currentTags = [...(card.tags || [])];
  renderTags();

  applyCategoryLayout(card.category);

  // Stats / bonuses: planets store in categoryData.bonuses; fall back to legacy stats
  // so pre-Phase-2 planet catalogs keep their values visible.
  const bonuses = card.categoryData && card.categoryData.bonuses;
  const statSource = (card.category === "planet")
    ? (bonuses || card.stats || {})
    : (card.stats || {});
  const defaultStats = CATEGORY_DEFAULT_STATS[card.category] || [];
  const allStatKeys = [...new Set([...defaultStats, ...Object.keys(statSource)])];
  buildStatRows("stat-rows", allStatKeys, statSource, defaultStats);

  // Cost / upkeep
  buildCostRows(card.cost || {});
  buildKvRowsGeneric("upkeep-rows", card.upkeep || {});

  // Attributes (string values)
  buildKvRowsGeneric("attr-rows", card.attributes || {}, { stringValues: true });

  // Planet generation (star-only)
  const pg = (card.categoryData && card.categoryData.planetGen) || {};
  const [pgMin, pgMax] = Array.isArray(pg.count) ? pg.count : [1, 3];
  document.getElementById("edit-pg-count-min").value = pgMin ?? 1;
  document.getElementById("edit-pg-count-max").value = pgMax ?? 3;
  document.getElementById("edit-pg-bonus").value = pg.bonus ?? 0;
  document.getElementById("edit-pg-guaranteed").value = Array.isArray(pg.guaranteed) ? pg.guaranteed.join(", ") : "";

  document.getElementById("delete-btn").disabled = false;
  updatePreview();
  highlightCatalogItem(card.id);
}

// Show/hide category-dependent editor sections and relabel the stats section.
function applyCategoryLayout(category) {
  const statsSec = document.getElementById("stats-section");
  const statsLabel = document.getElementById("stats-label");
  const pgSec = document.getElementById("planetgen-section");
  if (category === "star") {
    statsSec.style.display = "none";
    pgSec.style.display = "";
  } else if (category === "planet") {
    statsSec.style.display = "";
    statsLabel.textContent = "Resource Bonuses (%)";
    pgSec.style.display = "none";
  } else {
    statsSec.style.display = "";
    statsLabel.textContent = "Stats";
    pgSec.style.display = "none";
  }
}

function resetEditor() {
  editingCardId = null;
  document.getElementById("edit-name").value = "";
  document.getElementById("edit-category").value = "building";
  document.getElementById("edit-rarity").value = "common";
  document.getElementById("edit-weight").value = 1;
  document.getElementById("edit-special").value = "";
  document.getElementById("edit-flavor").value = "";
  document.getElementById("edit-notes").value = "";

  currentImage = null;
  updateImageUI();

  currentTags = [];
  renderTags();

  applyCategoryLayout("building");

  const defaultStats = CATEGORY_DEFAULT_STATS["building"];
  buildStatRows("stat-rows", defaultStats, {}, defaultStats);
  buildCostRows({});
  buildKvRowsGeneric("upkeep-rows", {});
  buildKvRowsGeneric("attr-rows", {}, { stringValues: true });

  document.getElementById("edit-pg-count-min").value = 1;
  document.getElementById("edit-pg-count-max").value = 3;
  document.getElementById("edit-pg-bonus").value = 0;
  document.getElementById("edit-pg-guaranteed").value = "";

  document.getElementById("delete-btn").disabled = true;
  updatePreview();
  highlightCatalogItem(null);
}

// ═══════════════════════════════════════════
//  STAT / COST ROW BUILDERS
// ═══════════════════════════════════════════
function buildStatRows(containerId, keys, values, defaultKeys) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  for (const key of keys) {
    addStatRow(container, key, values[key] || 0, defaultKeys.includes(key));
  }
}

function buildCostRows(costObj) {
  buildKvRowsGeneric("cost-rows", costObj);
}

// Generic key/value row builder. Use { stringValues: true } for attributes etc.
function buildKvRowsGeneric(containerId, obj, opts = {}) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  for (const [key, val] of Object.entries(obj)) {
    addStatRow(container, key, val, false, opts);
  }
}

function addStatRow(container, key, value, isDefault, opts = {}) {
  const { stringValues = false } = opts;
  const row = document.createElement("div");
  row.className = "stat-row";

  const keyInput = document.createElement("input");
  keyInput.className = `stat-key${isDefault ? " default" : ""}`;
  keyInput.type = "text";
  keyInput.value = key;
  keyInput.placeholder = stringValues ? "name..." : "resource...";
  if (isDefault) keyInput.readOnly = true;
  keyInput.addEventListener("input", updatePreview);

  let valEl;
  if (!stringValues && DROPDOWN_STATS[key]) {
    valEl = document.createElement("select");
    valEl.className = "stat-val";
    for (const opt of DROPDOWN_STATS[key]) {
      const option = document.createElement("option");
      option.value = opt;
      option.textContent = opt;
      if (opt === value) option.selected = true;
      valEl.appendChild(option);
    }
    valEl.addEventListener("change", updatePreview);
  } else {
    valEl = document.createElement("input");
    valEl.className = "stat-val";
    valEl.type = stringValues ? "text" : "number";
    valEl.value = value;
    valEl.placeholder = stringValues ? "value" : "0";
    valEl.addEventListener("input", updatePreview);
  }

  const removeBtn = document.createElement("button");
  removeBtn.className = "remove-btn";
  removeBtn.textContent = "×";
  removeBtn.addEventListener("click", () => { row.remove(); updatePreview(); });

  row.append(keyInput, valEl, removeBtn);
  container.appendChild(row);
}

// ═══════════════════════════════════════════
//  IMAGE HANDLING
// ═══════════════════════════════════════════
let currentImage = null;
let currentTags = [];

function updateImageUI() {
  const thumb = document.getElementById("image-thumb");
  const clearBtn = document.getElementById("image-clear-btn");
  if (currentImage) {
    thumb.innerHTML = `<img src="${currentImage}" alt="card image">`;
    clearBtn.style.display = "block";
  } else {
    thumb.innerHTML = "None";
    clearBtn.style.display = "none";
  }
}

document.getElementById("image-upload-btn").addEventListener("click", () => {
  document.getElementById("image-file-input").click();
});

document.getElementById("image-file-input").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    currentImage = ev.target.result;
    updateImageUI();
    updatePreview();
  };
  reader.readAsDataURL(file);
  e.target.value = ""; // allow re-upload of same file
});

document.getElementById("image-clear-btn").addEventListener("click", () => {
  currentImage = null;
  updateImageUI();
  updatePreview();
});

// ═══════════════════════════════════════════
//  TAGS
// ═══════════════════════════════════════════
function renderTags() {
  const list = document.getElementById("tag-list");
  list.innerHTML = "";
  for (const tag of currentTags) {
    const el = document.createElement("span");
    el.className = "tag";
    el.innerHTML = `${tag}<button class="tag-remove">×</button>`;
    el.querySelector(".tag-remove").addEventListener("click", () => {
      currentTags = currentTags.filter(t => t !== tag);
      renderTags();
    });
    list.appendChild(el);
  }
}

function getAllKnownTags() {
  return [...new Set(catalog.flatMap(c => c.tags || []))].sort();
}

function addTags() {
  const input = document.getElementById("tag-input");
  const raw = input.value;
  const tags = raw.split(",").map(t => t.trim().toLowerCase().replace(/\s+/g, "-")).filter(Boolean);
  for (const tag of tags) {
    if (!currentTags.includes(tag)) {
      currentTags.push(tag);
    }
  }
  input.value = "";
  hideAutocomplete();
  renderTags();
}

// Autocomplete
let acSelectedIdx = -1;

function showAutocomplete() {
  const input = document.getElementById("tag-input");
  const ac = document.getElementById("tag-autocomplete");
  // Get the current fragment (after last comma)
  const parts = input.value.split(",");
  const fragment = parts[parts.length - 1].trim().toLowerCase();

  if (!fragment) { hideAutocomplete(); return; }

  const known = getAllKnownTags().filter(t =>
    t.includes(fragment) && !currentTags.includes(t)
  );

  if (known.length === 0) { hideAutocomplete(); return; }

  acSelectedIdx = -1;
  ac.innerHTML = known.map((t, i) =>
    `<div class="tag-option" data-idx="${i}" data-tag="${t}">${t}</div>`
  ).join("");
  ac.style.display = "block";

  ac.querySelectorAll(".tag-option").forEach(opt => {
    opt.addEventListener("mousedown", (e) => {
      e.preventDefault();
      pickAutocomplete(opt.dataset.tag);
    });
  });
}

function hideAutocomplete() {
  const ac = document.getElementById("tag-autocomplete");
  ac.style.display = "none";
  ac.innerHTML = "";
  acSelectedIdx = -1;
}

function pickAutocomplete(tag) {
  const input = document.getElementById("tag-input");
  const parts = input.value.split(",");
  parts[parts.length - 1] = " " + tag;
  input.value = parts.join(",").replace(/^[\s,]+/, "") + ", ";
  hideAutocomplete();
  input.focus();
}

function navigateAutocomplete(dir) {
  const options = document.querySelectorAll("#tag-autocomplete .tag-option");
  if (options.length === 0) return false;
  options.forEach(o => o.classList.remove("selected"));
  acSelectedIdx += dir;
  if (acSelectedIdx < 0) acSelectedIdx = options.length - 1;
  if (acSelectedIdx >= options.length) acSelectedIdx = 0;
  options[acSelectedIdx].classList.add("selected");
  options[acSelectedIdx].scrollIntoView({ block: "nearest" });
  return true;
}

document.getElementById("add-tag-btn").addEventListener("click", addTags);
document.getElementById("tag-input").addEventListener("input", showAutocomplete);
document.getElementById("tag-input").addEventListener("blur", () => {
  setTimeout(hideAutocomplete, 150);
});
document.getElementById("tag-input").addEventListener("keydown", (e) => {
  const ac = document.getElementById("tag-autocomplete");
  if (e.key === "ArrowDown" && ac.style.display === "block") {
    e.preventDefault(); navigateAutocomplete(1);
  } else if (e.key === "ArrowUp" && ac.style.display === "block") {
    e.preventDefault(); navigateAutocomplete(-1);
  } else if (e.key === "Tab" && ac.style.display === "block") {
    e.preventDefault();
    const sel = document.querySelector("#tag-autocomplete .tag-option.selected");
    if (sel) pickAutocomplete(sel.dataset.tag);
    else if (document.querySelector("#tag-autocomplete .tag-option")) {
      pickAutocomplete(document.querySelector("#tag-autocomplete .tag-option").dataset.tag);
    }
  } else if (e.key === "Enter") {
    e.preventDefault();
    const sel = document.querySelector("#tag-autocomplete .tag-option.selected");
    if (sel) { pickAutocomplete(sel.dataset.tag); }
    else { addTags(); }
  }
});

// ═══════════════════════════════════════════
//  LIVE PREVIEW
// ═══════════════════════════════════════════
// Category watermark icons
const CATEGORY_ICONS = {

  luminosity: "☀️", stability: "⚖️", planets_max: "🪐",

const RANGE_LABELS = { short: "S", medium: "M", long: "L" };
const RANGE_COLORS = { short: "#e0a040", medium: "#a0c0e0", long: "#60d060" };

// SVG sprite ids for resource keys — used by the ship card renderer below.
const RES_ICON_BY_KEY = {
  credits: "i-credits", energy: "i-energy", minerals: "i-minerals",
  research: "i-research", food: "i-food",
};

// Original inner HTML of #card-preview. Saved here so we can restore the
// legacy preview DOM when switching back from ship to a non-ship category
// (ship rendering replaces the container's innerHTML wholesale).
const LEGACY_PREVIEW_HTML = `
      <div class="card-bg"></div>
      <div class="card-cost-badge" id="preview-cost"></div>
      <div class="card-header">
        <div class="card-name" id="preview-name">New Card</div>
      </div>
      <div class="card-image" id="preview-image">No image</div>
      <div class="card-stats" id="preview-stats"></div>
      <div class="card-special" id="preview-special" style="display:none"></div>
      <div class="card-flavor" id="preview-flavor"></div>
      <div class="card-watermark" id="preview-watermark"></div>`;

// Abbreviate big numbers: 500 → "500", 1200 → "1.2K", 5000 → "5K", 16000 → "16K".
// Mirrors formatResourceValue in starmap.html.
function formatResourceValue(val) {
  const v = Math.floor(val);
  const strip = (s) => s.replace(/\.0$/, "");
  if (v >= 1e12) return strip((v / 1e12).toFixed(1)) + "T";
  if (v >= 1e9)  return strip((v / 1e9).toFixed(1))  + "B";
  if (v >= 1e6)  return strip((v / 1e6).toFixed(1))  + "M";
  if (v >= 1e4)  return Math.round(v / 1e3) + "K";
  if (v >= 1e3)  return strip((v / 1e3).toFixed(1))  + "K";
  return v.toString();
}

// readKvRows() lowercases every stat key, so a ship card coming from the
// editor has s.sensorrange / s.energydmg etc — but the data file (and the
// starmap renderer) use camelCase. This map restores the camelCase names
// our template expects.
const SHIP_STAT_KEY_ALIASES = {
  sensorrange: "sensorRange",
  pointdefense: "pointDefense",
  energydmg: "energyDmg",   energyrange: "energyRange",
  kineticdmg: "kineticDmg", kineticrange: "kineticRange",
  missiledmg: "missileDmg", missilerange: "missileRange",
};
function normalizeShipStats(raw) {
  const out = {};
  for (const [k, v] of Object.entries(raw || {})) {
    out[SHIP_STAT_KEY_ALIASES[k] || k] = v;
  }
  return out;
}

// Ship/pirate card — returns INNER HTML for the #card-preview container.
// Mirrors buildShipCardHtml in starmap.html; kept in sync manually.
// See CARDS_STYLING_GUIDE.md for what each section does.
function buildShipCardHtml(data) {
  const s = normalizeShipStats(data.stats);
  const subLabel = `${data.rarity || "common"} · ${data.category === "pirate" ? "Pirate" : "Ship"}`;

  let costHtml = "";
  if (data.cost && Object.keys(data.cost).length > 0) {
    const parts = Object.entries(data.cost).map(([key, val]) => {
      const iconId = RES_ICON_BY_KEY[key];
      const icon = iconId ? `<svg class="ico ${key}"><use href="#${iconId}"/></svg>` : "";
      return `<span class="cost-part">${icon}${formatResourceValue(val)}</span>`;
    });
    costHtml = `<div class="cost">${parts.join("")}</div>`;
  }

  const defenseDefs = [
    { key: "shields", icon: "i-shield", cls: "shield" },
    { key: "armor",   icon: "i-armor",  cls: "armor" },
    { key: "speed",   icon: "i-speed",  cls: "speed" },
  ].filter(d => s[d.key] != null);
  const defenseRow = defenseDefs.length === 0 ? "" :
    `<div class="row">${defenseDefs.map(d =>
      `<div class="stat"><svg class="ico ${d.cls}"><use href="#${d.icon}"/></svg><span class="sv">${formatResourceValue(s[d.key] || 0)}</span></div>`
    ).join("")}</div>`;

  const weaponDefs = [
    { dmg: "energyDmg",  range: "energyRange",  cls: "energy",  icon: "i-beam",    cvar: "var(--wpn-energy)" },
    { dmg: "kineticDmg", range: "kineticRange", cls: "kinetic", icon: "i-kinetic", cvar: "var(--wpn-kinetic)" },
    { dmg: "missileDmg", range: "missileRange", cls: "missile", icon: "i-missile", cvar: "var(--wpn-missile)" },
  ].filter(w => s[w.dmg] && s[w.dmg] > 0);
  const weaponsHtml = weaponDefs.length === 0 ? "" :
    `<div class="weap">${weaponDefs.map(w => {
      const range = s[w.range] || "medium";
      const rBadge = range === "short" ? "S" : range === "long" ? "L" : "M";
      return `<div class="wr" style="--wr-c:${w.cvar}"><svg class="ico ${w.cls}"><use href="#${w.icon}"/></svg><span class="sv">${formatResourceValue(s[w.dmg])}</span><span class="rb ${rBadge}">${rBadge}</span></div>`;
    }).join("")}</div>`;

  const utilDefs = [
    { key: "sensorRange",  icon: "i-sensor",  cls: "sensor" },
    { key: "pointDefense", icon: "i-pd",      cls: "pd" },
    { key: "stealth",      icon: "i-stealth", cls: "stealth" },
  ].filter(u => s[u.key]);
  const utilRow = utilDefs.length === 0 ? "" :
    `<div class="row u">${utilDefs.map(u =>
      `<div class="stat"><svg class="ico ${u.cls}"><use href="#${u.icon}"/></svg><span class="sv">${formatResourceValue(s[u.key])}</span></div>`
    ).join("")}</div>`;

  const specialHtml = (data.special && data.special.length > 0)
    ? `<div class="special"><span class="sn">Special</span>${data.special}</div>` : "";
  const flavorHtml = data.flavor ? `<div class="flv">${data.flavor}</div>` : "";

  const imgSrc = data.image || "assets/ships/rustfang_corsair.png";
  const imageHtml = `<div class="img"><img src="${imgSrc}" alt="${data.name || ''}"></div>`;

  return `
      <div class="bg"></div>
      <div class="frame-corners"><span class="fc-tr"></span><span class="fc-bl"></span></div>
      <div class="c">
        ${costHtml}
        <div class="hdr"><span class="hdr-name">${data.name || "New Card"}</span></div>
        ${imageHtml}
        <div class="subtype">${subLabel}</div>
        ${defenseRow}
        ${weaponsHtml}
        ${utilRow}
        ${specialHtml}
        ${flavorHtml}
        <div class="wm"><svg viewBox="0 0 24 24"><use href="#i-solo-ship"/></svg></div>
      </div>`;
}

function getStatIcon(key) {
  return STAT_ICONS[key] || "◆";
}

function updatePreview() {
  const data = getEditorData();
  const preview = document.getElementById("card-preview");
  const isZoomed = preview.classList.contains("zoomed");
  const zoomedClass = isZoomed ? " zoomed" : "";

  // Ships/pirates use the metallic Rustfang template (ui/ship-card.css).
  // Replaces the container innerHTML wholesale — legacy DOM restored below
  // when switching back to a non-ship category.
  if (data.category === "ship" || data.category === "pirate") {
    preview.className = `card-preview is-ship ${data.rarity}${zoomedClass}`;
    preview.innerHTML = buildShipCardHtml(data);
    return;
  }

  // Non-ship: restore legacy DOM if we were just in ship mode
  preview.className = `card-preview ${data.rarity}${zoomedClass}`;
  if (!document.getElementById("preview-name")) {
    preview.innerHTML = LEGACY_PREVIEW_HTML;
  }

  // Name
  document.getElementById("preview-name").textContent = data.name || "New Card";

  // Image
  const imgEl = document.getElementById("preview-image");
  if (data.image) {
    imgEl.innerHTML = `<img src="${data.image}" alt="card">`;
  } else {
    imgEl.innerHTML = "No image";
  }

  // Cost badge (top-right)
  const costEl = document.getElementById("preview-cost");
  const costEntries = Object.entries(data.cost);
  if (costEntries.length > 0) {
    costEl.innerHTML = costEntries.map(([key, val]) =>
      `<div class="cost-badge-row"><span class="cost-badge-icon">${getStatIcon(key)}</span><span class="cost-badge-val">${val}</span></div>`
    ).join("");
  } else {
    costEl.innerHTML = "";
  }

  // Special (check first so we know whether to expand stats)
  const specialEl = document.getElementById("preview-special");
  const hasSpecial = !!data.special;
  if (hasSpecial) {
    specialEl.style.display = "block";
    specialEl.textContent = data.special;
  } else {
    specialEl.style.display = "none";
  }

  // Stats — ship cards get combat layout, others get generic. Planets read from
  // categoryData.bonuses, stars show a planetGen summary.
  const statsEl = document.getElementById("preview-stats");
  statsEl.innerHTML = "";
  const isShip = data.category === "ship";
  const isAdmiral = data.category === "admiral";
  const isPlanet = data.category === "planet";
  const isStar = data.category === "star";
  statsEl.className = `card-stats${(!hasSpecial && !isShip && !isAdmiral) ? " expanded" : ""}`;

  // Planets: render bonuses from categoryData.bonuses as percent modifiers
  const previewStats = isPlanet
    ? (data.categoryData && data.categoryData.bonuses) || {}
    : data.stats;

  if (isAdmiral) {
    const s = data.stats;
    // Command row: command bonus + fleet size
    let html = `<div class="ship-stat-row">`;
    html += `<div class="card-stat"><span class="card-stat-icon">⭐</span><span class="card-stat-value" style="color:#f0d060">+${s.commandBonus || 0}%</span></div>`;
    html += `<div class="card-stat"><span class="card-stat-icon">⚓</span><span class="card-stat-value">${s.maxFleetSize || 0}</span></div>`;
    html += `</div>`;
    // Stat bonuses
    const bonusKeys = Object.keys(s).filter(k => k !== "commandBonus" && k !== "maxFleetSize");
    if (bonusKeys.length > 0) {
      html += `<div class="ship-stat-row ship-utils">`;
      for (const key of bonusKeys) {
        html += `<div class="card-stat"><span class="card-stat-icon">${getStatIcon(key)}</span><span class="card-stat-value" style="color:#8ac0ff">+${s[key]}%</span></div>`;
      }
      html += `</div>`;
    }
    statsEl.innerHTML = html;
  } else if (isShip) {
    const s = data.stats;
    // Defense row
    let defHtml = `<div class="ship-stat-row">`;
    defHtml += `<div class="card-stat"><span class="card-stat-icon">🔷</span><span class="card-stat-value">${s.shields || 0}</span></div>`;
    defHtml += `<div class="card-stat"><span class="card-stat-icon">🛡️</span><span class="card-stat-value">${s.armor || 0}</span></div>`;
    defHtml += `<div class="card-stat"><span class="card-stat-icon">💨</span><span class="card-stat-value">${s.speed || 0}</span></div>`;
    defHtml += `</div>`;
    // Weapons
    const weapons = [
      { key:"energyDmg", rangeKey:"energyRange", icon:"⚡" },
      { key:"kineticDmg", rangeKey:"kineticRange", icon:"💥" },
      { key:"missileDmg", rangeKey:"missileRange", icon:"🚀" },
    ];
    const active = weapons.filter(w => s[w.key] && s[w.key] > 0);
    let weapHtml = "";
    if (active.length > 0) {
      weapHtml = `<div class="ship-weapons">`;
      for (const w of active) {
        const range = s[w.rangeKey] || "medium";
        const rl = RANGE_LABELS[range];
        const rc = RANGE_COLORS[range];
        weapHtml += `<div class="ship-weapon-row"><span class="card-stat-icon">${w.icon}</span><span class="card-stat-value">${s[w.key]}</span><span class="ship-range-badge" style="background:${rc}20;color:${rc};border:1px solid ${rc}40">${rl}</span></div>`;
      }
      weapHtml += `</div>`;
    }
    // Utility row
    const utils = [];
    if (s.sensorRange) utils.push({ icon:"📡", val:s.sensorRange });
    if (s.pointDefense) utils.push({ icon:"🎯", val:s.pointDefense });
    if (s.stealth) utils.push({ icon:"👁️", val:s.stealth });
    let utilHtml = "";
    if (utils.length > 0) {
      utilHtml = `<div class="ship-stat-row ship-utils">`;
      for (const u of utils) utilHtml += `<div class="card-stat"><span class="card-stat-icon">${u.icon}</span><span class="card-stat-value">${u.val}</span></div>`;
      utilHtml += `</div>`;
    }
    statsEl.innerHTML = defHtml + weapHtml + utilHtml;
  } else if (isStar) {
    // Summarize planet generation on the card face.
    const pg = (data.categoryData && data.categoryData.planetGen) || {};
    const [cMin, cMax] = Array.isArray(pg.count) ? pg.count : [0, 0];
    const range = (cMin === cMax) ? `${cMin}` : `${cMin}-${cMax}`;
    const guaranteed = Array.isArray(pg.guaranteed) && pg.guaranteed.length > 0
      ? `${pg.guaranteed.length}× ${pg.guaranteed.join("/")}`
      : "—";
    statsEl.innerHTML = `
      <div class="card-stat"><span class="card-stat-icon">🪐</span><span class="card-stat-value">${range}</span></div>
      <div class="card-stat" style="font-size:9px;color:#506888"><span>guaranteed: ${guaranteed}</span></div>
      ${pg.bonus ? `<div class="card-stat" style="font-size:9px;color:#c0a020"><span>+${pg.bonus} rarity bias</span></div>` : ""}
    `;
  } else {
    for (const [key, val] of Object.entries(previewStats)) {
      const div = document.createElement("div");
      div.className = "card-stat";
      const display = isPlanet ? `+${val}%` : val;
      div.innerHTML = `<span class="card-stat-icon">${getStatIcon(key)}</span><span class="card-stat-value ${val === 0 ? "zero" : ""}">${display}</span>`;
      statsEl.appendChild(div);
    }
  }

  // Flavor
  document.getElementById("preview-flavor").textContent = data.flavor;

  // Category watermark
  document.getElementById("preview-watermark").textContent = CATEGORY_ICONS[data.category] || "";
}

// ═══════════════════════════════════════════
//  CATALOG RENDERING
// ═══════════════════════════════════════════
function rebuildTagFilter() {
  const tagSelect = document.getElementById("filter-tag");
  const currentVal = tagSelect.value;
  const allTags = [...new Set(catalog.flatMap(c => c.tags || []))].sort();
  tagSelect.innerHTML = '<option value="all">All Tags</option>'
    + allTags.map(t => `<option value="${t}"${t === currentVal ? " selected" : ""}>${t}</option>`).join("");
}

function renderCatalog() {
  rebuildTagFilter();
  const catFilter = document.getElementById("filter-category").value;
  const rarFilter = document.getElementById("filter-rarity").value;
  const tagFilter = document.getElementById("filter-tag").value;

  let filtered = catalog;
  if (catFilter !== "all") filtered = filtered.filter(c => c.category === catFilter);
  if (rarFilter !== "all") filtered = filtered.filter(c => c.rarity === rarFilter);
  if (tagFilter !== "all") filtered = filtered.filter(c => (c.tags || []).includes(tagFilter));

  // Sort by category then name
  filtered.sort((a, b) => a.category.localeCompare(b.category) || a.name.localeCompare(b.name));

  document.getElementById("catalog-count").textContent = `${filtered.length} card${filtered.length !== 1 ? "s" : ""}`;

  const listEl = document.getElementById("catalog-list");
  listEl.innerHTML = "";
  for (const card of filtered) {
    const item = document.createElement("div");
    item.className = `catalog-item${card.id === editingCardId ? " active" : ""}`;
    const tagsHtml = (card.tags || []).map(t => `<span class="catalog-tag">${t}</span>`).join("");
    item.innerHTML = `
      <span class="catalog-item-dot" style="background:${RARITY_COLORS[card.rarity]}"></span>
      <span class="catalog-item-name">${card.name || "Unnamed"}${tagsHtml ? `<div class="catalog-item-tags">${tagsHtml}</div>` : ""}</span>
      <span class="catalog-item-cat">${card.category}</span>
    `;
    item.addEventListener("click", () => loadCardIntoEditor(card));
    listEl.appendChild(item);
  }
}

function highlightCatalogItem(id) {
  document.querySelectorAll(".catalog-item").forEach(el => el.classList.remove("active"));
  if (!id) return;
  // Re-render to update active state
  renderCatalog();
}

// ═══════════════════════════════════════════
//  SAVE / DELETE
// ═══════════════════════════════════════════
// Known categoryData sub-keys per category. Used to ensure editor values
// for these keys take precedence over the previously-stored value (including
// clearing them), while still preserving any *unknown* sub-keys for
// forward-compatibility.
const CATEGORY_DATA_KEYS = { star: ["planetGen"], planet: ["bonuses"] };

function mergeCategoryData(existing, fresh, category) {
  const result = { ...(existing || {}) };
  for (const k of (CATEGORY_DATA_KEYS[category] || [])) delete result[k];
  return { ...result, ...(fresh || {}) };
}

function saveCard() {
  const data = getEditorData();
  if (!data.name) { showToast("Card needs a name!"); return; }

  const now = new Date().toISOString();
  if (editingCardId) {
    const idx = catalog.findIndex(c => c.id === editingCardId);
    if (idx !== -1) {
      const existing = catalog[idx];
      const merged = { ...existing, ...data, updatedAt: now };
      merged.categoryData = mergeCategoryData(existing.categoryData, data.categoryData, data.category);
      catalog[idx] = merged;
    }
  } else {
    const card = {
      id: crypto.randomUUID(),
      ...data,
      createdAt: now,
      updatedAt: now,
    };
    catalog.push(card);
    editingCardId = card.id;
    document.getElementById("delete-btn").disabled = false;
  }

  saveCatalog();
  renderCatalog();
  showToast("Card saved!");
}

function deleteCard() {
  if (!editingCardId) return;
  if (!confirm("Delete this card? This cannot be undone.")) return;

  catalog = catalog.filter(c => c.id !== editingCardId);
  saveCatalog();
  resetEditor();
  renderCatalog();
  showToast("Card deleted.");
}

  const toast = document.getElementById("toast");

}

// Category change → swap layout, rebuild default stats, preserve custom entries
document.getElementById("edit-category").addEventListener("change", () => {
  const cat = document.getElementById("edit-category").value;
  const defaultStats = CATEGORY_DEFAULT_STATS[cat] || [];

  // Preserve custom (non-default) stat rows from the current category.
  const currentCustom = {};
  const oldCat = editingCardId
    ? (catalog.find(c => c.id === editingCardId)?.category || "building")
    : "building";
  const oldDefaults = CATEGORY_DEFAULT_STATS[oldCat] || [];
  document.querySelectorAll("#stat-rows .stat-row").forEach(row => {
    const key = row.querySelector(".stat-key").value.trim().toLowerCase().replace(/\s+/g, "_");
    const valEl = row.querySelector(".stat-val");
    const val = DROPDOWN_STATS[key] ? valEl.value : (parseFloat(valEl.value) || 0);
    if (key && !oldDefaults.includes(key)) {
      currentCustom[key] = val;
    }
  });

  applyCategoryLayout(cat);

  const allKeys = [...defaultStats, ...Object.keys(currentCustom)];
  const values = { ...currentCustom };
  buildStatRows("stat-rows", allKeys, values, defaultStats);
  updatePreview();
});

// Card search with autocomplete
let searchSelectedIdx = -1;

function showSearchAutocomplete() {
  const input = document.getElementById("card-search");
  const ac = document.getElementById("search-autocomplete");
  const query = input.value.trim().toLowerCase();

  if (!query) { hideSearchAutocomplete(); renderCatalog(); return; }

  const matches = catalog.filter(c =>
    c.name.toLowerCase().includes(query)
  ).slice(0, 15);

  if (matches.length === 0) { hideSearchAutocomplete(); renderCatalog(); return; }

  searchSelectedIdx = -1;
  ac.innerHTML = matches.map((c, i) =>
    `<div class="search-option" data-idx="${i}" data-id="${c.id}">` +
    `<span class="search-dot" style="background:${RARITY_COLORS[c.rarity]}"></span>` +
    `${c.name}<span class="search-cat">${c.category}</span></div>`
  ).join("");
  ac.style.display = "block";

  ac.querySelectorAll(".search-option").forEach(opt => {
    opt.addEventListener("mousedown", (e) => {
      e.preventDefault();
      pickSearchResult(opt.dataset.id);
    });
  });
}

function hideSearchAutocomplete() {
  const ac = document.getElementById("search-autocomplete");
  ac.style.display = "none";
  ac.innerHTML = "";
  searchSelectedIdx = -1;
}

function pickSearchResult(cardId) {
  const card = catalog.find(c => c.id === cardId);
  if (card) {
    document.getElementById("card-search").value = "";
    hideSearchAutocomplete();
    loadCardIntoEditor(card);
  }
}

document.getElementById("card-search").addEventListener("input", showSearchAutocomplete);
document.getElementById("card-search").addEventListener("blur", () => {
  setTimeout(hideSearchAutocomplete, 150);
});
document.getElementById("card-search").addEventListener("keydown", (e) => {
  const ac = document.getElementById("search-autocomplete");
  const options = ac.querySelectorAll(".search-option");
  if (e.key === "ArrowDown" && ac.style.display === "block") {
    e.preventDefault();
    options.forEach(o => o.classList.remove("selected"));
    searchSelectedIdx = (searchSelectedIdx + 1) % options.length;
    options[searchSelectedIdx].classList.add("selected");
    options[searchSelectedIdx].scrollIntoView({ block: "nearest" });
  } else if (e.key === "ArrowUp" && ac.style.display === "block") {
    e.preventDefault();
    options.forEach(o => o.classList.remove("selected"));
    searchSelectedIdx = searchSelectedIdx <= 0 ? options.length - 1 : searchSelectedIdx - 1;
    options[searchSelectedIdx].classList.add("selected");
    options[searchSelectedIdx].scrollIntoView({ block: "nearest" });
  } else if (e.key === "Enter") {
    e.preventDefault();
    const sel = ac.querySelector(".search-option.selected");
    if (sel) { pickSearchResult(sel.dataset.id); }
    else if (options.length > 0) { pickSearchResult(options[0].dataset.id); }
  } else if (e.key === "Escape") {
    hideSearchAutocomplete();
  }
});

document.getElementById("export-btn").addEventListener("click", () => {
  const bundle = { version: SCHEMA_VERSION, cards: catalog };

// ═══════════════════════════════════════════
//  BUNDLE EXPORT (.zip with game-cards.json + sidecar PNGs)
// ═══════════════════════════════════════════
// Produces an archive laid out so unzipping at the repo root drops
// data/game-cards.json plus assets/cards/<category>/<id>.<ext> files
// in place. Base64 card images become sidecar files; the JSON's image
// field is rewritten to reference the path. Already-pathed images pass
// through untouched (the files are expected to already exist in the repo).

const CRC32_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[i] = c >>> 0;
  }
  return t;
})();

function crc32(bytes) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i++) c = CRC32_TABLE[(c ^ bytes[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}

function dosDateTime(d) {
  const time = ((d.getHours() & 31) << 11) | ((d.getMinutes() & 63) << 5) | ((d.getSeconds() >> 1) & 31);
  const date = (((d.getFullYear() - 1980) & 127) << 9) | (((d.getMonth() + 1) & 15) << 5) | (d.getDate() & 31);
  return { time: time & 0xFFFF, date: date & 0xFFFF };
}

// Minimal STORE-only zip writer. PNGs are already compressed; DEFLATE is
// not worth the dependency.
function buildZip(files) {
  const parts = [];
  const central = [];
  let offset = 0;
  const { time, date } = dosDateTime(new Date());

  for (const f of files) {
    const name = new TextEncoder().encode(f.path);
    const crc = crc32(f.bytes);
    const size = f.bytes.length;

    const lfh = new Uint8Array(30 + name.length);
    const lv = new DataView(lfh.buffer);
    lv.setUint32(0, 0x04034B50, true);
    lv.setUint16(4, 20, true);
    lv.setUint16(6, 0, true);
    lv.setUint16(8, 0, true);           // method = STORE
    lv.setUint16(10, time, true);
    lv.setUint16(12, date, true);
    lv.setUint32(14, crc, true);
    lv.setUint32(18, size, true);
    lv.setUint32(22, size, true);
    lv.setUint16(26, name.length, true);
    lv.setUint16(28, 0, true);
    lfh.set(name, 30);
    parts.push(lfh, f.bytes);

    const cdh = new Uint8Array(46 + name.length);
    const cv = new DataView(cdh.buffer);
    cv.setUint32(0, 0x02014B50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint16(8, 0, true);
    cv.setUint16(10, 0, true);
    cv.setUint16(12, time, true);
    cv.setUint16(14, date, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, size, true);
    cv.setUint32(24, size, true);
    cv.setUint16(28, name.length, true);
    cv.setUint16(30, 0, true); cv.setUint16(32, 0, true);
    cv.setUint16(34, 0, true); cv.setUint16(36, 0, true);
    cv.setUint32(38, 0, true);
    cv.setUint32(42, offset, true);
    cdh.set(name, 46);
    central.push(cdh);

    offset += lfh.length + size;
  }

  const cdStart = offset;
  let cdSize = 0;
  for (const c of central) { parts.push(c); cdSize += c.length; }

  const eocd = new Uint8Array(22);
  const ev = new DataView(eocd.buffer);
  ev.setUint32(0, 0x06054B50, true);
  ev.setUint16(4, 0, true); ev.setUint16(6, 0, true);
  ev.setUint16(8, files.length, true);
  ev.setUint16(10, files.length, true);
  ev.setUint32(12, cdSize, true);
  ev.setUint32(16, cdStart, true);
  ev.setUint16(20, 0, true);
  parts.push(eocd);

  let total = 0;
  for (const p of parts) total += p.length;
  const out = new Uint8Array(total);
  let pos = 0;
  for (const p of parts) { out.set(p, pos); pos += p.length; }
  return out;
}

function dataUrlToBytes(url) {
  const comma = url.indexOf(",");
  if (comma === -1) return null;
  const header = url.slice(0, comma);
  if (!header.includes("base64")) return null;
  const bin = atob(url.slice(comma + 1));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

function extFromDataUrl(url) {
  const m = /^data:image\/([a-z0-9+]+)/i.exec(url || "");
  if (!m) return "png";
  const raw = m[1].toLowerCase();
  return raw === "jpeg" ? "jpg" : (raw === "svg+xml" ? "svg" : raw);
}

// ═══════════════════════════════════════════
//  LIVE LINK — localStorage override + BroadcastChannel
// ═══════════════════════════════════════════
// Apply the current catalog as a live override. Any open starmap tab sees
// the BroadcastChannel message and hot-reloads; a newly-opened starmap reads
// the override from localStorage at boot. This is the edit loop between
// card-builder and the game without a rebuild/commit step.

function isOverrideActive() {
  try { return !!localStorage.getItem(CARDS_OVERRIDE_KEY); }
  catch { return false; }
}

function updateLiveLinkStatus() {
  const el = document.getElementById("live-link-status");
  if (!el) return;
  el.classList.toggle("visible", isOverrideActive());
}

function applyToLiveGame() {
  try {
    const bundle = { version: SCHEMA_VERSION, cards: catalog };
    localStorage.setItem(CARDS_OVERRIDE_KEY, JSON.stringify(bundle));
  } catch (e) {
    showToast("Apply failed: " + e.message);
    return;
  }
  if (CARDS_BROADCAST) CARDS_BROADCAST.postMessage({ type: "cards-updated" });
  updateLiveLinkStatus();
  showToast(`Applied to live game · ${catalog.length} cards`);
}

function clearLiveOverride() {
  try { localStorage.removeItem(CARDS_OVERRIDE_KEY); } catch (_) {}
  if (CARDS_BROADCAST) CARDS_BROADCAST.postMessage({ type: "override-cleared" });
  updateLiveLinkStatus();
  showToast("Live override cleared — game reverts to shipped cards");
}

document.getElementById("apply-live-btn").addEventListener("click", applyToLiveGame);
document.getElementById("clear-override-btn").addEventListener("click", clearLiveOverride);

// Sync status if the other tab clears the override.
if (CARDS_BROADCAST) {
  CARDS_BROADCAST.onmessage = (ev) => {
    const msg = ev && ev.data;
    if (msg && msg.type === "override-cleared") updateLiveLinkStatus();
  };
}
// Also react to another tab writing the storage directly.
window.addEventListener("storage", (e) => {
  if (e.key === CARDS_OVERRIDE_KEY) updateLiveLinkStatus();
});

document.getElementById("export-bundle-btn").addEventListener("click", () => {
  const files = [];
  const outCards = [];
  let imageCount = 0;
  let passThroughPaths = 0;

  for (const card of catalog) {
    const copy = { ...card };
    if (copy.image && typeof copy.image === "string" && copy.image.startsWith("data:")) {
      const bytes = dataUrlToBytes(copy.image);
      if (bytes) {
        const ext = extFromDataUrl(copy.image);
        const path = `assets/cards/${copy.category}/${copy.id}.${ext}`;
        files.push({ path, bytes });
        copy.image = path;
        imageCount++;
      }
    } else if (copy.image && typeof copy.image === "string" && copy.image.startsWith("assets/")) {
      passThroughPaths++;
    }
    outCards.push(copy);
  }

  const bundle = { version: SCHEMA_VERSION, cards: outCards };
  const jsonBytes = new TextEncoder().encode(JSON.stringify(bundle, null, 2));
  // JSON first so it's easy to inspect at the top of an archive listing.
  files.unshift({ path: "data/game-cards.json", bytes: jsonBytes });

  const zipBytes = buildZip(files);
  const blob = new Blob([zipBytes], { type: "application/zip" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "idlespace-cards-bundle.zip";
  a.click();
  URL.revokeObjectURL(url);

  const parts = [`${catalog.length} cards`, `${imageCount} image${imageCount === 1 ? "" : "s"} bundled`];
  if (passThroughPaths > 0) parts.push(`${passThroughPaths} pass-through path${passThroughPaths === 1 ? "" : "s"}`);
  showToast("Bundle exported — " + parts.join(" · "));
});

const importFileInput = document.getElementById("import-file");
document.getElementById("import-btn").addEventListener("click", () => importFileInput.click());
importFileInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      // Accept { version, cards } or legacy flat array.
      let incoming;
      if (Array.isArray(parsed)) incoming = parsed;
      else if (parsed && Array.isArray(parsed.cards)) incoming = parsed.cards;
      else { alert("Invalid format: expected a JSON array or { version, cards }."); return; }

      const now = new Date().toISOString();
      let added = 0, updated = 0;
      for (const card of incoming) {
        if (!card || typeof card !== "object") continue;
        if (!card.name || !card.category || !card.rarity) continue;
        if (!card.id) card.id = crypto.randomUUID();
        if (!card.createdAt) card.createdAt = now;
        card.updatedAt = now;
        // Schema defaults — only fill if missing, preserve unknown fields.
        if (!card.tags) card.tags = [];
        if (!card.stats) card.stats = {};
        if (!card.cost) card.cost = {};
        if (!card.upkeep) card.upkeep = {};
        if (!card.attributes) card.attributes = {};
        if (!card.categoryData) card.categoryData = {};
        if (typeof card.weight !== "number") card.weight = 1;
        if (!card.special) card.special = "";
        if (!card.flavor) card.flavor = "";
        if (!card.image) card.image = "";

        const existing = catalog.findIndex(c => c.id === card.id);
        if (existing >= 0) { catalog[existing] = card; updated++; }
        else { catalog.push(card); added++; }
      }
      saveCatalog();
      renderCatalog();
      resetEditor();
      alert(`Import complete: ${added} added, ${updated} updated.`);
    } catch (err) {
      alert("Failed to parse JSON: " + err.message);
    }
  };
  reader.readAsText(file);
  importFileInput.value = "";
});

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
resetEditor();
renderCatalog();
updateLiveLinkStatus();
</script>
