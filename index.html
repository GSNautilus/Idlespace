<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IdleSpace</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0a0e1a;
  color: #c8d0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  user-select: none;
}

/* ── Top Bar: Resources + Speed ── */
#top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  background: #111628;
  border-bottom: 1px solid #1e2744;
}
#resources {
  display: flex;
  gap: 24px;
}
.resource {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 80px;
}
.resource-icon { font-size: 20px; }
.resource-value { font-size: 18px; font-weight: 700; color: #fff; }
.resource-rate { font-size: 11px; color: #6a7a9b; }
.resource-label { font-size: 10px; color: #4a5a7b; text-transform: uppercase; letter-spacing: 1px; }

#speed-controls {
  display: flex;
  gap: 4px;
  align-items: center;
}
#speed-controls button {
  background: #1a2040;
  border: 1px solid #2a3460;
  color: #8090b0;
  padding: 6px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}
#speed-controls button:hover { background: #252f55; color: #c0d0f0; }
#speed-controls button.active {
  background: #2a4080;
  border-color: #4060c0;
  color: #fff;
}

/* ── Main Area ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 16px 20px;
  gap: 16px;
  overflow: hidden;
}

/* ── Deck Area ── */
#deck-area {
  display: flex;
  align-items: center;
  gap: 16px;
}
#deck-visual {
  width: 100px;
  height: 140px;
  background: #1a2040;
  border: 2px solid #2a3460;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: #6a7a9b;
}
#deck-count { font-size: 28px; font-weight: 700; color: #8090b0; }
#draw-btn {
  padding: 12px 28px;
  background: linear-gradient(135deg, #2a4080, #3a5ab0);
  border: 1px solid #4060c0;
  color: #fff;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
#draw-btn:hover:not(:disabled) { background: linear-gradient(135deg, #3050a0, #4a6ac0); transform: translateY(-1px); }
#draw-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Play Area ── */
#play-area-label { font-size: 12px; color: #4a5a7b; text-transform: uppercase; letter-spacing: 1px; }
#play-area {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.play-slot {
  width: 140px;
  height: 196px;
  border: 2px dashed #1e2744;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2a3460;
  font-size: 12px;
  transition: border-color 0.2s;
}
.play-slot.occupied { border: none; }
.play-slot:not(.occupied):hover { border-color: #3a4a70; }

/* ── Hand ── */
#hand-label { font-size: 12px; color: #4a5a7b; text-transform: uppercase; letter-spacing: 1px; margin-top: auto; }
#hand {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  min-height: 196px;
  padding: 8px 0;
}

/* ── Card ── */
.card {
  width: 140px;
  height: 196px;
  border-radius: 8px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 8px;
  padding: 2px;
  background: var(--rarity-color);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}
.card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.card .card-bg {
  position: absolute;
  inset: 2px;
  border-radius: 6px;
  background: #141a30;
  z-index: 0;
}
.card > * { position: relative; z-index: 1; }

.card-name {
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  text-align: center;
  margin-bottom: 2px;
}
.card-rarity {
  font-size: 9px;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--rarity-color);
  margin-bottom: 8px;
}
.card-stats {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.card-stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
}
.card-stat-icon { font-size: 13px; }
.card-stat-value { font-weight: 600; color: #fff; }
.card-stat-value.zero { color: #2a3460; }
.card-flavor {
  font-size: 9px;
  color: #4a5a7b;
  font-style: italic;
  text-align: center;
  margin-top: 6px;
  line-height: 1.3;
}

/* Rarity colors */
.card.common    { --rarity-color: #6a7a9b; }
.card.uncommon  { --rarity-color: #4a9b5a; }
.card.rare      { --rarity-color: #4a7ac0; }
.card.epic      { --rarity-color: #8a4ac0; }
.card.legendary { --rarity-color: #c0a020; }

/* Card in hand glow on hover */
#hand .card:hover { box-shadow: 0 0 20px rgba(var(--rarity-rgb, 100,120,160), 0.3); }
</style>
</head>
<body>

<!-- Top Bar -->
<div id="top-bar">
  <div id="resources">
    <div class="resource">
      <span class="resource-icon">⚡</span>
      <span class="resource-value" id="res-energy">0</span>
      <span class="resource-rate" id="rate-energy">+0/s</span>
      <span class="resource-label">Energy</span>
    </div>
    <div class="resource">
      <span class="resource-icon">⛏️</span>
      <span class="resource-value" id="res-minerals">0</span>
      <span class="resource-rate" id="rate-minerals">+0/s</span>
      <span class="resource-label">Minerals</span>
    </div>
    <div class="resource">
      <span class="resource-icon">🔬</span>
      <span class="resource-value" id="res-research">0</span>
      <span class="resource-rate" id="rate-research">+0/s</span>
      <span class="resource-label">Research</span>
    </div>
    <div class="resource">
      <span class="resource-icon">🌾</span>
      <span class="resource-value" id="res-food">0</span>
      <span class="resource-rate" id="rate-food">+0/s</span>
      <span class="resource-label">Food</span>
    </div>
  </div>
  <div id="speed-controls">
    <button data-speed="0">⏸</button>
    <button data-speed="0.25">¼×</button>
    <button data-speed="0.5">½×</button>
    <button data-speed="1" class="active">1×</button>
    <button data-speed="2">2×</button>
    <button data-speed="4">4×</button>
  </div>
</div>

<!-- Main Area -->
<div id="main">
  <!-- Deck -->
  <div id="deck-area">
    <div id="deck-visual">
      <span id="deck-count">20</span>
      <span>cards</span>
    </div>
    <button id="draw-btn">Draw Card</button>
  </div>

  <!-- Play Area -->
  <div id="play-area-label">Play Area — Building Slots</div>
  <div id="play-area">
    <div class="play-slot">empty</div>
    <div class="play-slot">empty</div>
    <div class="play-slot">empty</div>
    <div class="play-slot">empty</div>
    <div class="play-slot">empty</div>
    <div class="play-slot">empty</div>
  </div>

  <!-- Hand -->
  <div id="hand-label">Hand</div>
  <div id="hand"></div>
</div>

<script>
// ═══════════════════════════════════════════
//  CARD TEMPLATES
// ═══════════════════════════════════════════
const CARD_TEMPLATES = [
  { name: "Solar Array",      primary: "energy",    flavor: "Harnessing the light of distant suns." },
  { name: "Mining Outpost",   primary: "minerals",  flavor: "Deep core extractors never rest." },
  { name: "Research Lab",     primary: "research",  flavor: "Knowledge is the ultimate resource." },
  { name: "Hydroponics Bay",  primary: "food",      flavor: "Life finds a way, even in the void." },
  { name: "Fusion Reactor",   primary: "energy",    flavor: "Atoms split, power flows." },
  { name: "Ore Refinery",     primary: "minerals",  flavor: "Raw stone becomes refined wealth." },
  { name: "Data Archive",     primary: "research",  flavor: "Every discovery preserved for eternity." },
  { name: "Bio Dome",         primary: "food",      flavor: "A garden among the stars." },
];

const RARITIES = [
  { name: "common",    weight: 50, statMult: 1.0 },
  { name: "uncommon",  weight: 28, statMult: 1.5 },
  { name: "rare",      weight: 14, statMult: 2.2 },
  { name: "epic",      weight: 6,  statMult: 3.5 },
  { name: "legendary", weight: 2,  statMult: 5.0 },
];

const RESOURCE_TYPES = ["energy", "minerals", "research", "food"];

// ═══════════════════════════════════════════
//  CARD GENERATION
// ═══════════════════════════════════════════
let nextCardId = 1;

function rollRarity() {
  const totalWeight = RARITIES.reduce((s, r) => s + r.weight, 0);
  let roll = Math.random() * totalWeight;
  for (const r of RARITIES) {
    roll -= r.weight;
    if (roll <= 0) return r;
  }
  return RARITIES[0];
}

function generateCard(template) {
  const rarity = rollRarity();
  const stats = {};
  for (const res of RESOURCE_TYPES) {
    if (res === template.primary) {
      // Primary stat: base 2-4, scaled by rarity
      stats[res] = Math.round((2 + Math.random() * 2) * rarity.statMult);
    } else {
      // Secondary stats: 30% chance of getting 1-2 base, scaled by rarity
      stats[res] = Math.random() < 0.3
        ? Math.round((1 + Math.random()) * rarity.statMult)
        : 0;
    }
  }
  return {
    id: `bld_${nextCardId++}`,
    name: template.name,
    type: "building",
    rarity: rarity.name,
    stats,
    flavor: template.flavor,
  };
}

// ═══════════════════════════════════════════
//  DECK
// ═══════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function createDeck(size = 20) {
  const cards = [];
  for (let i = 0; i < size; i++) {
    const template = CARD_TEMPLATES[Math.floor(Math.random() * CARD_TEMPLATES.length)];
    cards.push(generateCard(template));
  }
  return shuffle(cards);
}

// ═══════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════
const state = {
  deck: createDeck(20),
  hand: [],         // max 7
  playArea: [null, null, null, null, null, null], // 6 slots
  resources: { energy: 0, minerals: 0, research: 0, food: 0 },
  gameSpeed: 1,
  maxHand: 7,
};

// ═══════════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════════
const RESOURCE_ICONS = { energy: "⚡", minerals: "⛏️", research: "🔬", food: "🌾" };

function renderCard(card) {
  const el = document.createElement("div");
  el.className = `card ${card.rarity}`;
  el.dataset.cardId = card.id;

  const statsHtml = RESOURCE_TYPES.map(res => {
    const val = card.stats[res];
    return `<div class="card-stat">
      <span class="card-stat-icon">${RESOURCE_ICONS[res]}</span>
      <span class="card-stat-value ${val === 0 ? 'zero' : ''}">+${val}</span>
    </div>`;
  }).join("");

  el.innerHTML = `
    <div class="card-bg"></div>
    <div class="card-name">${card.name}</div>
    <div class="card-rarity">${card.rarity}</div>
    <div class="card-stats">${statsHtml}</div>
    <div class="card-flavor">${card.flavor}</div>
  `;
  return el;
}

function renderHand() {
  const handEl = document.getElementById("hand");
  handEl.innerHTML = "";
  for (const card of state.hand) {
    const el = renderCard(card);
    el.addEventListener("click", () => playCard(card));
    handEl.appendChild(el);
  }
}

function renderPlayArea() {
  const playEl = document.getElementById("play-area");
  playEl.innerHTML = "";
  for (let i = 0; i < state.playArea.length; i++) {
    const card = state.playArea[i];
    if (card) {
      const el = renderCard(card);
      el.style.cursor = "default";
      const slot = document.createElement("div");
      slot.className = "play-slot occupied";
      slot.appendChild(el);
      playEl.appendChild(slot);
    } else {
      const slot = document.createElement("div");
      slot.className = "play-slot";
      slot.textContent = "empty";
      playEl.appendChild(slot);
    }
  }
}

function renderDeck() {
  document.getElementById("deck-count").textContent = state.deck.length;
  document.getElementById("draw-btn").disabled = state.deck.length === 0 || state.hand.length >= state.maxHand;
}

function renderResources() {
  const rates = getTickRates();
  for (const res of RESOURCE_TYPES) {
    document.getElementById(`res-${res}`).textContent = Math.floor(state.resources[res]).toLocaleString();
    const ratePerSec = rates[res] * state.gameSpeed;
    document.getElementById(`rate-${res}`).textContent = `+${ratePerSec.toFixed(1)}/s`;
  }
}

function renderAll() {
  renderDeck();
  renderHand();
  renderPlayArea();
  renderResources();
}

// ═══════════════════════════════════════════
//  GAME ACTIONS
// ═══════════════════════════════════════════
function drawCard() {
  if (state.deck.length === 0 || state.hand.length >= state.maxHand) return;
  state.hand.push(state.deck.pop());
  renderDeck();
  renderHand();
}

function playCard(card) {
  const slotIdx = state.playArea.indexOf(null);
  if (slotIdx === -1) return; // no open slots
  state.hand = state.hand.filter(c => c.id !== card.id);
  state.playArea[slotIdx] = card;
  renderHand();
  renderPlayArea();
  renderDeck(); // re-check draw button state
  renderResources(); // update rates
}

// ═══════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════
const TICK_MS = 1000; // 1 tick = 1 second at 1x
let lastTime = performance.now();
let accumulator = 0;

function getTickRates() {
  const rates = { energy: 0, minerals: 0, research: 0, food: 0 };
  for (const card of state.playArea) {
    if (!card) continue;
    for (const res of RESOURCE_TYPES) {
      rates[res] += card.stats[res];
    }
  }
  return rates;
}

function processTick() {
  const rates = getTickRates();
  for (const res of RESOURCE_TYPES) {
    state.resources[res] += rates[res];
  }
}

function gameLoop(now) {
  const dt = now - lastTime;
  lastTime = now;
  accumulator += dt * state.gameSpeed;

  while (accumulator >= TICK_MS) {
    processTick();
    accumulator -= TICK_MS;
  }

  renderResources();
  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════
//  EVENT WIRING
// ═══════════════════════════════════════════
document.getElementById("draw-btn").addEventListener("click", drawCard);

// Speed controls
document.querySelectorAll("#speed-controls button").forEach(btn => {
  btn.addEventListener("click", () => {
    state.gameSpeed = parseFloat(btn.dataset.speed);
    document.querySelectorAll("#speed-controls button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderResources(); // update rate display immediately
  });
});

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
renderAll();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
