// ═══════════════════════════════════════════
//  COLONIZATION & COLONY SCREEN
// ═══════════════════════════════════════════
// ═══════════════════════════════════════════
//  GLOBAL RESOURCES & ECONOMY
// ═══════════════════════════════════════════
const RESOURCE_DEFS = [
  { id: "credits",  name: "Credits",  icon: "💰", color: "#d4af37", category: "base" },
  { id: "energy",   name: "Energy",   icon: "⚡", color: "#f0c040", category: "base" },
  { id: "minerals", name: "Minerals", icon: "⛏️", color: "#8ab4f8", category: "base" },
  { id: "research", name: "Research", icon: "🔬", color: "#a4e4a4", category: "base" },
  { id: "food",     name: "Food",     icon: "🌾", color: "#e8c06a", category: "base" },
];
const RESOURCE_IDS = RESOURCE_DEFS.map(r => r.id);
const resources = {};
for (const r of RESOURCE_DEFS) resources[r.id] = r.id === "credits" ? 500 : 5000;
let gameSpeed = 1;
let lastTickTime = 0;
let tickAccumulator = 0;

// Card draw cost escalation
const DRAW_BASE_COST = 10;
let drawCostMultiplier = 1;
const DRAW_COST_DECAY_HALF_LIFE = 60; // seconds to halve multiplier back toward 1

// Colony upkeep
const COLONY_UPKEEP_BASE = 25;
const COLONY_UPKEEP_EXPONENT = 2.2;

// Population system
const POP_LEVELS = [
  { level: 1,  label: "100K", people: 100000,            foodMaint: 1 },
  { level: 2,  label: "1M",   people: 1000000,           foodMaint: 3 },
  { level: 3,  label: "10M",  people: 10000000,          foodMaint: 6 },
  { level: 4,  label: "100M", people: 100000000,         foodMaint: 10 },
  { level: 5,  label: "500M", people: 500000000,         foodMaint: 15 },
  { level: 6,  label: "1B",   people: 1000000000,        foodMaint: 22 },
  { level: 7,  label: "5B",   people: 5000000000,        foodMaint: 30 },
  { level: 8,  label: "50B",  people: 50000000000,       foodMaint: 42 },
  { level: 9,  label: "200B", people: 200000000000,      foodMaint: 58 },
  { level: 10, label: "1T",   people: 1000000000000,     foodMaint: 80 },
];

function getPopLabel(pop) {
  const entry = POP_LEVELS[Math.min(pop, POP_LEVELS.length) - 1];
  return entry ? entry.label : pop.toString();
}

function getFoodMaintenance(pop) {
  const entry = POP_LEVELS[Math.min(pop, POP_LEVELS.length) - 1];
  return entry ? entry.foodMaint : 0;
}

function getGrowthThreshold(nextLevel) {
  return Math.ceil(150 * Math.pow(2.5, nextLevel - 1));
}

function getPopGrowthCost(nextLevel) {
  return {
    credits: Math.ceil(200 * Math.pow(3.5, nextLevel - 1)),
    food:    Math.ceil(100 * Math.pow(3.0, nextLevel - 1)),
  };
}

function buyPopulation() {
  const col = getActiveColony();
  if (!col || col.population >= col.maxPopulation) return;
  const cost = getPopGrowthCost(col.population + 1);
  if (!canAfford(cost)) {
    const btn = document.getElementById("buy-pop-btn");
    if (btn) showCostTooltip(btn, cost);
    return;
  }
  deductCost(cost);
  col.population = Math.min(col.population + 1, col.maxPopulation);
  col.growthProgress = 0;
  colonyDirty = true;
  refreshColonyScreen();
}

// Research system — category-based with escalating cost and random card reveal
const RESEARCH_BASE_COST = 50;
const RESEARCH_COST_MULTIPLIER = 2.8;
const RESEARCH_SPEND_RATE = 5; // max points consumed per game-second
const researchCounts = { building: 0, ship: 0, captain: 0, leader: 0 };
const researchedCards = new Set(); // card IDs that have been researched
let activeResearch = null;         // { category, cost, progress }

// All 4 card categories require research (stars/planets discovered via exploration)
const RESEARCH_GATED_CATEGORIES = ["building", "ship", "captain", "leader"];

function getResearchCost(category) {
  const count = researchCounts[category] || 0;
  return Math.ceil(RESEARCH_BASE_COST * Math.pow(RESEARCH_COST_MULTIPLIER, count));
}

function startResearch(category) {
  if (activeResearch) return;
  const cost = getResearchCost(category);
  activeResearch = { category, cost, progress: 0 };
  refreshResearchPanel();
}

function rollResearchResult(category) {
  const pool = CATEGORY_TEMPLATES[category];
  if (!pool) return null;
  const candidates = pool.filter(t => !researchedCards.has(t.id) && t.rarity !== "common");
  if (candidates.length === 0) return null;
  // Legendaries astronomically rare
  const weights = { uncommon:50, rare:25, epic:8, legendary:1 };
  let totalWeight = 0;
  const weighted = candidates.map(t => {
    const w = weights[t.rarity] || 10;
    totalWeight += w;
    return { template: t, weight: w };
  });
  let roll = Math.random() * totalWeight;
  for (const entry of weighted) {
    roll -= entry.weight;
    if (roll <= 0) return entry.template;
  }
  return candidates[candidates.length - 1];
}

function initResearch() {
  // Auto-unlock all common cards across all gated categories
  for (const catName of RESEARCH_GATED_CATEGORIES) {
    const templates = CATEGORY_TEMPLATES[catName];
    if (!templates) continue;
    for (const t of templates) {
      if (t.rarity === "common") {
        researchedCards.add(t.id);
      }
    }
  }
  // Stars and planets are never gated
  for (const t of (CATEGORY_TEMPLATES["star"] || [])) researchedCards.add(t.id);
  for (const t of (CATEGORY_TEMPLATES["planet"] || [])) researchedCards.add(t.id);
}

function getDrawCost() {
  return Math.ceil(DRAW_BASE_COST * drawCostMultiplier);
}

function getColonyUpkeep() {
  let total = 0;
  for (let i = 0; i < colonies.length; i++) {
    if (i === 0) continue; // first colony is free
    total += COLONY_UPKEEP_BASE * Math.pow(i + 1, COLONY_UPKEEP_EXPONENT);
  }
  return Math.ceil(total);
}

function getTradeIncome(colony) {
  if (!colony.activeAction || colony.activeAction !== "trade") return 0;
  return colony.population * 50;
}

function getColonyOutput(colony) {
  const out = {};
  for (const id of RESOURCE_IDS) out[id] = 0;
  // Only count buildings in unlocked slots (up to population)
  for (let i = 0; i < colony.population; i++) {
    const b = colony.buildings[i];
    if (b && b.stats) {
      for (const id of RESOURCE_IDS) out[id] += (b.stats[id] || 0);
    }
    if (b && b.upkeep) {
      for (const id of RESOURCE_IDS) out[id] -= (b.upkeep[id] || 0);
    }
  }
  for (const l of colony.leaders) {
    if (l && l.stats) {
      for (const id of RESOURCE_IDS) out[id] += (l.stats[id] || 0);
    }
    if (l && l.upkeep) {
      for (const id of RESOURCE_IDS) out[id] -= (l.upkeep[id] || 0);
    }
  }
  // Food maintenance for population
  out.food -= getFoodMaintenance(colony.population);
  return out;
}

function tickEconomy(dt) {
  if (gameSpeed === 0) return;
  const scaledDt = dt * gameSpeed;
  tickAccumulator += scaledDt;

  // Draw cost multiplier decay (halves every DRAW_COST_DECAY_HALF_LIFE seconds)
  if (drawCostMultiplier > 1.01) {
    const decayRate = Math.log(2) / DRAW_COST_DECAY_HALF_LIFE;
    drawCostMultiplier = 1 + (drawCostMultiplier - 1) * Math.exp(-decayRate * scaledDt);
    if (drawCostMultiplier < 1.01) drawCostMultiplier = 1;
  }

  // Card generation timers (every colony with activeAction, except Trade)
  for (const c of colonies) {
    const col = c.planet.colony;
    if (!col || !col.activeAction) continue;
    if (col.activeAction === "trade") continue; // Trade generates credits, not cards
    const deckSize = col.deck.length;
    const genInterval = 10 * Math.pow(3, deckSize); // exponential: 10s, 30s, 90s, 270s...
    col.genTimer += scaledDt;
    if (col.genTimer >= genInterval) {
      col.genTimer -= genInterval;
      const cat = ACTION_TO_CATEGORY[col.activeAction];
      if (cat) col.deck.push({ category: cat, faceDown: true });
    }
  }

  // Resource ticks (1 second of game time each)
  while (tickAccumulator >= 1) {
    tickAccumulator -= 1;
    for (const c of colonies) {
      const col = c.planet.colony;
      if (!col) continue;
      const out = getColonyOutput(col);
      for (const id of RESOURCE_IDS) resources[id] += (out[id] || 0);
      // Trade income
      resources.credits += getTradeIncome(col);
      // Population growth / starvation
      const foodRate = out.food; // net food including maintenance
      if (foodRate >= 0 && col.population < col.maxPopulation) {
        col.growthProgress += foodRate;
        const threshold = getGrowthThreshold(col.population + 1);
        if (col.growthProgress >= threshold) {
          col.growthProgress = 0;
          col.population = Math.min(col.population + 1, col.maxPopulation);
          colonyDirty = true;
        }
        col.starvationTimer = 0;
      } else if (foodRate < 0) {
        col.growthProgress = 0;
        col.starvationTimer += 1;
        if (col.starvationTimer >= 30 && col.population > 1) {
          col.population -= 1;
          col.starvationTimer = 0;
          // If a building is in a now-locked slot, return it to queue
          for (let si = col.population; si < col.buildings.length; si++) {
            if (col.buildings[si]) {
              col.queue.push(col.buildings[si]);
              col.buildings[si] = null;
            }
          }
          colonyDirty = true;
        }
      }
    }
    // Colony upkeep (credits drain)
    resources.credits -= getColonyUpkeep();

    // Research spending — capped rate per game-second so research takes real time
    if (activeResearch && resources.research > 0) {
      const spend = Math.min(RESEARCH_SPEND_RATE, resources.research, activeResearch.cost - activeResearch.progress);
      if (spend > 0) {
        resources.research -= spend;
        activeResearch.progress += spend;
        if (activeResearch.progress >= activeResearch.cost) {
          // Roll a random card from the researched category — the "card pack opening" moment
          const cat = activeResearch.category;
          const result = rollResearchResult(cat);
          if (result) {
            researchedCards.add(result.id);
            researchCounts[cat] = (researchCounts[cat] || 0) + 1;
            showResearchReveal(result, cat);
          }
          activeResearch = null;
          // Refresh research panel if visible
          if (document.getElementById("research-overlay").classList.contains("visible")) {
            refreshResearchPanel();
          }
        }
      }
    }
  }

  // Update top bar
  updateResourceDisplay();
}

function updateResourceDisplay() {
  const totalOut = {};
  for (const id of RESOURCE_IDS) totalOut[id] = 0;
  for (const c of colonies) {
    const col = c.planet.colony;
    if (!col) continue;
    const out = getColonyOutput(col);
    for (const id of RESOURCE_IDS) totalOut[id] += (out[id] || 0);
    totalOut.credits += getTradeIncome(col);
  }
  totalOut.credits -= getColonyUpkeep();
  for (const id of RESOURCE_IDS) {
    const valEl = document.getElementById(`res-${id}`);
    const rateEl = document.getElementById(`rate-${id}`);
    if (valEl) valEl.textContent = formatResourceValue(resources[id]);
    if (rateEl) {
      const rate = totalOut[id];
      const rateStr = rate < 0 ? "-" + formatResourceValue(Math.abs(rate)) : "+" + formatResourceValue(rate);
      rateEl.textContent = `${rateStr}/s`;
      rateEl.style.color = rate < 0 ? "#e05050" : "";
    }
  }
}

function canAfford(cost) {
  if (!cost) return true;
  for (const [k, v] of Object.entries(cost)) {
    if ((resources[k] || 0) < v) return false;
  }
  return true;
}

function deductCost(cost) {
  if (!cost) return;
  for (const [k, v] of Object.entries(cost)) {
    resources[k] = (resources[k] || 0) - v;
  }
  flashResourceCost(cost);
}

function flashResourceCost(cost) {
  for (const k of Object.keys(cost)) {
    const el = document.getElementById(`res-${k}`);
    if (el) {
      el.style.color = "#e05050";
      el.style.transition = "color 0.3s";
      setTimeout(() => { el.style.color = ""; }, 600);
    }
  }
}

function showCostTooltip(anchorEl, cost) {
  const msg = getAffordabilityTooltip(cost);
  if (!msg) return;
  const tip = document.createElement("div");
  tip.textContent = msg;
  tip.style.cssText = "position:absolute;background:#1a0000;color:#e05050;border:1px solid #e05050;padding:6px 12px;border-radius:6px;font-size:12px;z-index:9999;pointer-events:none;white-space:nowrap;";
  const rect = anchorEl.getBoundingClientRect();
  tip.style.left = rect.left + "px";
  tip.style.top = (rect.top - 30) + "px";
  document.body.appendChild(tip);
  setTimeout(() => tip.remove(), 2000);
}

function getAffordabilityTooltip(cost) {
  const missing = [];
  for (const [k, v] of Object.entries(cost)) {
    const have = resources[k] || 0;
    if (have < v) {
      const def = RESOURCE_DEFS.find(r => r.id === k);
      missing.push(`${def ? def.icon : ""} ${Math.ceil(v - have)} more ${k}`);
    }
  }
  return missing.length ? "Need " + missing.join(", ") : "";
}

function updateColonyResourceDisplay(out) {
  for (const id of RESOURCE_IDS) {
    const valEl = document.getElementById(`col-${id}`);
    const rateEl = document.getElementById(`col-rate-${id}`);
    const rate = out[id] || 0;
    if (valEl) valEl.textContent = formatResourceValue(Math.abs(rate));
    if (rateEl) {
      const rateStr = rate < 0 ? "-" + formatResourceValue(Math.abs(rate)) : "+" + formatResourceValue(rate);
      rateEl.textContent = `${rateStr}/s`;
      rateEl.style.color = rate < 0 ? "#e05050" : "";
    }
  }
}

function formatResourceValue(val) {
  const v = Math.floor(val);
  if (v >= 1e12) return (v / 1e12).toFixed(1) + "T";
  if (v >= 1e9) return (v / 1e9).toFixed(1) + "B";
  if (v >= 1e6) return (v / 1e6).toFixed(1) + "M";
  if (v >= 1e4) return (v / 1e3).toFixed(1) + "K";
  return v.toString();
}

const colonies = []; // array of { starId, planetIdx, planet } references

function getColonizationCost(colonyCount) {
  if (colonyCount === 0) return {}; // first colony is free
  return {
    credits:  Math.ceil(500 * Math.pow(4, colonyCount)),
    minerals: Math.ceil(200 * Math.pow(3, colonyCount)),
    food:     Math.ceil(100 * Math.pow(3, colonyCount)),
  };
}

function colonizePlanet(star, planetIdx) {
  const planet = star.planets[planetIdx];
  if (planet.colony) return; // already colonized
  const cost = getColonizationCost(colonies.length);
  if (!canAfford(cost)) {
    const btn = document.getElementById("planet-action-btn");
    if (btn) showCostTooltip(btn, cost);
    return;
  }
  if (Object.keys(cost).length > 0) deductCost(cost);
  planet.colony = {
    population: 1,                        // starts at pop 1 (100K people, 1 building slot)
    maxPopulation: 10,
    buildings: new Array(10).fill(null),   // 10 slots max, but only `population` are unlocked
    leaders: [],                          // leader slot (max 1)
    deck: [],                             // face-down cards awaiting selection
    queue: [],                            // face-up selected cards awaiting placement
    activeAction: null,                   // "trade"|"buildings"|"captains"|"leaders"|"ships"
    genTimer: 0,                          // seconds toward next card
    growthProgress: 0,                    // food accumulated toward next pop level
    starvationTimer: 0,                   // seconds of sustained food deficit
  };
  colonies.push({ starId: star.id, planetIdx, planet });
  // Refresh the planet card to show "Manage Colony" instead of "Colonize"
  showPlanetCard(planet);
}

function showPlanetCard(planet) {
  const slot = document.getElementById("planet-card-slot");
  slot.innerHTML = buildCardHtml(planet.card, "🪐");
  // Place button as sibling after the card slot, before the close button
  let existingBtn = document.getElementById("planet-action-btn");
  if (existingBtn) existingBtn.remove();
  const btn = document.createElement("button");
  btn.id = "planet-action-btn";
  btn.className = "card-action-btn";
  if (planet.colony) {
    btn.textContent = "Manage Colony";
    btn.onclick = () => openColonyFromSystem();
  } else {
    const cost = getColonizationCost(colonies.length);
    const costKeys = Object.keys(cost);
    if (costKeys.length > 0) {
      const costStr = Object.entries(cost).map(([k,v]) => {
        const icon = STAT_ICONS[k] || "";
        return `${icon}${formatResourceValue(v)}`;
      }).join(" ");
      btn.textContent = `Colonize (${costStr})`;
    } else {
      btn.textContent = "Colonize";
    }
    btn.onclick = () => colonizeFromSystem();
  }
  const container = document.getElementById("system-planet-card");
  container.insertBefore(btn, document.getElementById("planet-card-close"));
  container.classList.add("visible");
}

function colonizeFromSystem() {
  if (!systemViewStar || selectedPlanetIdx == null) return;
  colonizePlanet(systemViewStar, selectedPlanetIdx);
}

function openColonyFromSystem() {
  if (!systemViewStar || selectedPlanetIdx == null) return;
  const planet = systemViewStar.planets[selectedPlanetIdx];
  if (!planet.colony) return;
  showColonyScreen(systemViewStar, selectedPlanetIdx);
}

function hideColoniesList() {

// ── Colony Screen ──
let colonyViewStar = null;
let colonyViewPlanetIdx = null;
let draggedCard = null; // { source:"queue"|"building"|"leader", index, card }
let colonyDirty = false; // set true when colony state changes, cleared after refresh
let lastDeckCount = -1; // track deck size changes for minimal refresh

function getActiveColony() {
  if (!colonyViewStar || colonyViewPlanetIdx == null) return null;
  return colonyViewStar.planets[colonyViewPlanetIdx].colony;
}

function showColonyScreen(star, planetIdx) {
  const planet = star.planets[planetIdx];
  if (!planet.colony) return;
  colonyViewStar = star;
  colonyViewPlanetIdx = planetIdx;

  // Set active action button state
  document.querySelectorAll(".colony-action-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.action === planet.colony.activeAction);
  });

  lastDeckCount = -1; // force refresh
  // Hide system view cards behind colony screen
  document.getElementById("system-star-card").style.display = "none";
  document.getElementById("system-planet-card").style.display = "none";

  const backdrop = document.getElementById("colony-backdrop");
  const overlay = document.getElementById("colony-overlay");
  backdrop.classList.add("visible");
  overlay.style.display = "flex";
  requestAnimationFrame(() => overlay.classList.add("visible", "fade-in"));

  refreshColonyScreen();
}

function hideColonyScreen() {
  dismissMagnifiedCard();
  colonyViewStar = null;
  colonyViewPlanetIdx = null;
  const overlay = document.getElementById("colony-overlay");
  const backdrop = document.getElementById("colony-backdrop");
  overlay.classList.remove("visible", "fade-in");
  backdrop.classList.remove("visible");
  setTimeout(() => { overlay.style.display = "none"; }, 300);
  // Restore system view cards
  document.getElementById("system-star-card").style.display = "";
  document.getElementById("system-planet-card").style.display = "";
}

function refreshDeckDisplay(col) {
  const deckEl = document.getElementById("colony-deck");
  if (!deckEl) return;
  if (col.deck.length === 0) {
    deckEl.innerHTML = `<div class="deck-empty">${col.activeAction ? "Generating..." : "Select an action"}</div>`;
  } else {
    const maxShow = Math.min(col.deck.length, 5);
    let html = `<div class="deck-pile">`;
    for (let i = 0; i < maxShow; i++) {
      html += `<div class="deck-card-back" style="top:${i * 2}px;left:${i}px"><div class="deck-logo">Idle<br><span>Space</span></div></div>`;
    }
    html += `<div class="deck-count">${col.deck.length}</div>`;
    html += `<div class="deck-draw-cost">💰 ${getDrawCost()}</div></div>`;
    deckEl.innerHTML = html;
  }
}

function refreshColonyScreen() {
  const col = getActiveColony();
  if (!col) return;
  const planet = colonyViewStar.planets[colonyViewPlanetIdx];

  document.getElementById("colony-name").textContent = planet.card.name;
  // Population display with growth progress + buy button
  const popLabel = getPopLabel(col.population);
  let popHtml = `👤 ${popLabel} (${col.population}/${col.maxPopulation})`;
  if (col.population < col.maxPopulation) {
    const threshold = getGrowthThreshold(col.population + 1);
    const pct = Math.floor((col.growthProgress / threshold) * 100);
    popHtml += ` — Growth: ${pct}%`;
    const growCost = getPopGrowthCost(col.population + 1);
    const affordable = canAfford(growCost);
    popHtml += ` <button id="buy-pop-btn" onclick="buyPopulation()" style="margin-left:8px;padding:2px 8px;font-size:10px;border-radius:4px;cursor:pointer;border:1px solid ${affordable ? '#4a9b5a' : '#3a3a5a'};background:${affordable ? 'rgba(74,155,90,0.2)' : 'rgba(30,30,50,0.5)'};color:${affordable ? '#4a9b5a' : '#3a3a5a'}">+ Grow (💰${growCost.credits} 🌾${growCost.food})</button>`;
  }
  const out2 = getColonyOutput(col);
  if (out2.food < 0) {
    const starvSecs = 30 - col.starvationTimer;
    popHtml += ` <span style="color:#e05050">⚠️ Starving (${starvSecs}s)</span>`;
  }
  document.getElementById("colony-pop").innerHTML = popHtml;

  // Colony resource output
  const out = getColonyOutput(col);
  updateColonyResourceDisplay(out);

  // ── Building slots ──
  const slotsEl = document.getElementById("building-slots");
  slotsEl.innerHTML = "";
  for (let i = 0; i < col.buildings.length; i++) {
    const slot = document.createElement("div");
    const isLocked = i >= col.population;
    const card = col.buildings[i];
    if (isLocked) {
      slot.className = "building-slot locked";
      slot.innerHTML = `<span style="color:#3a3a5a;font-size:18px">🔒</span><span style="color:#3a3a5a;font-size:9px">Pop ${i+1}</span>`;
      slot.style.opacity = "0.4";
      slot.style.cursor = "not-allowed";
    } else if (card) {
      slot.className = "building-slot occupied";
      slot.innerHTML = buildCardHtml(card, CATEGORY_WATERMARKS[card.category] || "🏗️");
      slot.draggable = true;
      slot.addEventListener("dragstart", (e) => {
        draggedCard = { source: "building", index: i, card };
        e.dataTransfer.effectAllowed = "move";
        slot.classList.add("dragging");
      });
      slot.addEventListener("dragend", () => { slot.classList.remove("dragging"); draggedCard = null; });
      // Click to magnify with return-to-queue option
      slot.addEventListener("click", (e) => {
        e.stopPropagation();
        showSlotMagnifiedCard(card, "building", i, slot);
      });
    } else {
      slot.className = "building-slot";
      slot.textContent = "+";
    }
    // Drop target
    slot.addEventListener("dragover", (e) => {
      if (!draggedCard || isLocked) return;
      if (draggedCard.card.category === "building" && !col.buildings[i]) {
        e.preventDefault();
        slot.classList.add("drag-over");
      }
    });
    slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"));
    slot.addEventListener("drop", (e) => {
      e.preventDefault();
      slot.classList.remove("drag-over");
      if (!draggedCard || draggedCard.card.category !== "building" || col.buildings[i]) return;
      // Cost check (only when placing from queue, not rearranging from another slot)
      if (draggedCard.source === "queue" && draggedCard.card.cost) {
        if (!canAfford(draggedCard.card.cost)) {
          showCostTooltip(slot, draggedCard.card.cost);
          return;
        }
        deductCost(draggedCard.card.cost);
      }
      // Place card
      if (draggedCard.source === "queue") {
        col.queue.splice(draggedCard.index, 1);
      } else if (draggedCard.source === "building") {
        col.buildings[draggedCard.index] = null;
      }
      col.buildings[i] = draggedCard.card;
      draggedCard = null;
      refreshColonyScreen();
    });
    slotsEl.appendChild(slot);
  }

  // ── Leader slot (replace element to avoid listener accumulation) ──
  const oldLeader = document.getElementById("leader-slot");
  const leaderEl = oldLeader.cloneNode(false);
  leaderEl.id = "leader-slot";
  oldLeader.parentNode.replaceChild(leaderEl, oldLeader);

  const currentLeader = col.leaders[0] || null;
  if (currentLeader) {
    leaderEl.className = "occupied";
    leaderEl.innerHTML = buildCardHtml(currentLeader, "👑");
    leaderEl.draggable = true;
    leaderEl.addEventListener("dragstart", (e) => {
      draggedCard = { source: "leader", index: 0, card: currentLeader };
      e.dataTransfer.effectAllowed = "move";
    });
    leaderEl.addEventListener("click", (e) => {
      e.stopPropagation();
      showSlotMagnifiedCard(currentLeader, "leader", 0, leaderEl);
    });
  } else {
    leaderEl.className = "";
    leaderEl.innerHTML = "No Leader";
    leaderEl.draggable = false;
  }
  // Leader drop target
  leaderEl.addEventListener("dragover", (e) => {
    if (!draggedCard || draggedCard.card.category !== "leader" || col.leaders.length > 0) return;
    e.preventDefault();
    leaderEl.classList.add("drag-over");
  });
  leaderEl.addEventListener("dragleave", () => leaderEl.classList.remove("drag-over"));
  leaderEl.addEventListener("drop", (e) => {
    e.preventDefault();
    leaderEl.classList.remove("drag-over");
    if (!draggedCard || draggedCard.card.category !== "leader" || col.leaders.length > 0) return;
    // Cost check (only from queue)
    if (draggedCard.source === "queue" && draggedCard.card.cost) {
      if (!canAfford(draggedCard.card.cost)) {
        showCostTooltip(leaderEl, draggedCard.card.cost);
        return;
      }
      deductCost(draggedCard.card.cost);
    }
    if (draggedCard.source === "queue") col.queue.splice(draggedCard.index, 1);
    col.leaders.push(draggedCard.card);
    draggedCard = null;
    refreshColonyScreen();
  });

  // ── Deck pile ──
  refreshDeckDisplay(col);

  // ── Queue (replace element to avoid listener accumulation) ──
  const oldQueue = document.getElementById("colony-queue");
  const queueEl = document.createElement("div");
  queueEl.id = "colony-queue";
  oldQueue.parentNode.replaceChild(queueEl, oldQueue);

  col.queue.forEach((card, qi) => {
    const wrap = document.createElement("div");
    wrap.className = "queue-card";
    wrap.innerHTML = buildCardHtml(card, CATEGORY_WATERMARKS[card.category] || "🏗️");
    wrap.draggable = true;
    wrap.addEventListener("dragstart", (e) => {
      dismissMagnifiedCard();
      draggedCard = { source: "queue", index: qi, card };
      e.dataTransfer.effectAllowed = "move";
      wrap.classList.add("dragging");
    });
    wrap.addEventListener("dragend", () => { wrap.classList.remove("dragging"); draggedCard = null; });
    wrap.addEventListener("click", (e) => {
      e.stopPropagation();
      showMagnifiedCard(card, qi, wrap);
    });
    queueEl.appendChild(wrap);
  });

  // Queue as drop target (return cards here)
  queueEl.addEventListener("dragover", (e) => {
    if (!draggedCard) return;
    if (draggedCard.source === "building" || draggedCard.source === "leader") {
      e.preventDefault();
      queueEl.classList.add("drag-over");
    }
  });
  queueEl.addEventListener("dragleave", () => queueEl.classList.remove("drag-over"));
  queueEl.addEventListener("drop", (e) => {
    e.preventDefault();
    queueEl.classList.remove("drag-over");
    if (!draggedCard) return;
    if (draggedCard.source === "building") {
      col.queue.push(draggedCard.card);
      col.buildings[draggedCard.index] = null;
    } else if (draggedCard.source === "leader") {
      col.queue.push(draggedCard.card);
      col.leaders.splice(draggedCard.index, 1);
    }
    draggedCard = null;
    refreshColonyScreen();
  });

  // Scale cards to fill their slots after layout
  requestAnimationFrame(() => {
    document.querySelectorAll(".building-slot.occupied .card-preview").forEach(cp => {
      const slot = cp.closest(".building-slot");
      if (!slot) return;
      const s = Math.min(slot.clientWidth / 220, slot.clientHeight / 320);
      cp.style.transform = `scale(${s})`;
    });
    const leaderCP = document.querySelector("#leader-slot.occupied .card-preview");
    if (leaderCP) {
      const ls = document.getElementById("leader-slot");
      const s = Math.min(ls.clientWidth / 220, ls.clientHeight / 320);
      leaderCP.style.transform = `scale(${s})`;
    }
  });
}

// ── Deck click → Card Selection ──
document.getElementById("colony-deck").addEventListener("click", () => {
  const col = getActiveColony();
  if (!col || col.deck.length === 0) return;
  // Check draw cost
  const drawCost = getDrawCost();
  if (resources.credits < drawCost) {
    const deckEl = document.getElementById("colony-deck");
    showCostTooltip(deckEl, { credits: drawCost });
    return;
  }
  // Pay draw cost and escalate multiplier
  resources.credits -= drawCost;
  drawCostMultiplier *= 1.5;
  flashResourceCost({ credits: drawCost });
  const faceDown = col.deck[0];
  const cat = faceDown.category;
  // Roll 3 cards
  const choices = [rollCardFromCategory(cat), rollCardFromCategory(cat), rollCardFromCategory(cat)];
  const optionsEl = document.getElementById("card-select-options");
  optionsEl.innerHTML = "";
  choices.forEach((card, i) => {
    const wrap = document.createElement("div");
    wrap.className = "card-select-option";
    wrap.innerHTML = buildCardHtml(card, CATEGORY_WATERMARKS[cat] || "🏗️");
    wrap.addEventListener("click", () => {
      col.deck.shift(); // remove one face-down card
      col.queue.push(card);
      hideCardSelect();
      refreshColonyScreen();
    });
    optionsEl.appendChild(wrap);
  });
  document.getElementById("card-select-backdrop").classList.add("visible");
});

function hideCardSelect() {
  document.getElementById("card-select-backdrop").classList.remove("visible");
}
document.getElementById("card-select-discard-all").addEventListener("click", () => {
  const col = getActiveColony();

    col.deck.shift(); // remove the face-down card being drawn
  }
  hideCardSelect();
  refreshColonyScreen();
});
document.getElementById("card-select-backdrop").addEventListener("click", (e) => {

// ── Magnified card popup (click queue card to inspect + discard) ──
let magnifiedEl = null;

function showMagnifiedCard(card, queueIndex, anchorEl) {
  dismissMagnifiedCard();
  const col = getActiveColony();
  if (!col) return;

  const mag = document.createElement("div");
  mag.className = "queue-card-magnified";
  mag.innerHTML = buildCardHtml(card, CATEGORY_WATERMARKS[card.category] || "🏗️") +
    `<div class="magnify-actions">
      <button class="magnify-discard-btn">Discard</button>
      <button class="magnify-close-btn">Close</button>
    </div>`;

  mag.querySelector(".magnify-discard-btn").addEventListener("click", () => {
    col.queue.splice(queueIndex, 1);

  });
  mag.querySelector(".magnify-close-btn").addEventListener("click", () => {
    dismissMagnifiedCard();
  });

function showSlotMagnifiedCard(card, slotType, slotIndex, anchorEl) {
  dismissMagnifiedCard();
  const col = getActiveColony();
  if (!col) return;

  const mag = document.createElement("div");
  mag.className = "queue-card-magnified";
  mag.innerHTML = buildCardHtml(card, CATEGORY_WATERMARKS[card.category] || "🏗️") +
    `<div class="magnify-actions">
      <button class="magnify-discard-btn" style="background:#4a7ac0;">Return to Queue</button>
      <button class="magnify-close-btn">Close</button>
    </div>`;

  mag.querySelector(".magnify-discard-btn").addEventListener("click", () => {
    if (slotType === "building") {
      col.queue.push(col.buildings[slotIndex]);
      col.buildings[slotIndex] = null;
    } else if (slotType === "leader") {
      col.queue.push(col.leaders.shift());
    }
    dismissMagnifiedCard();
    refreshColonyScreen();
  });
  mag.querySelector(".magnify-close-btn").addEventListener("click", () => {
    dismissMagnifiedCard();
  });

  document.body.appendChild(mag);
  magnifiedEl = mag;
}

function dismissMagnifiedCard() {
  if (magnifiedEl) { magnifiedEl.remove(); magnifiedEl = null; }
}

// Dismiss magnified card on click outside
document.getElementById("colony-overlay").addEventListener("click", (e) => {
  if (magnifiedEl && !e.target.closest(".queue-card-magnified") && !e.target.closest(".queue-card") && !e.target.closest(".building-slot.occupied") && !e.target.closest("#colony-leader")) {
    dismissMagnifiedCard();
  }
});

document.getElementById("colony-close").addEventListener("click", hideColonyScreen);
document.getElementById("colony-backdrop").addEventListener("click", hideColonyScreen);

// Action button wiring — sets activeAction on colony
document.querySelectorAll(".colony-action-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const col = getActiveColony();
    if (!col) return;
    const action = btn.dataset.action;
    const isActive = ["buildings", "captains", "leaders", "ships", "trade"].includes(action);
    if (col.activeAction === action) {
      // Deactivate
      col.activeAction = null;
      col.genTimer = 0;
      btn.classList.remove("active");
    } else {
      document.querySelectorAll(".colony-action-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      if (isActive) {
        col.activeAction = action;
        col.genTimer = 0;
      } else {
        col.activeAction = null;
        col.genTimer = 0;
      }
    }
    refreshColonyScreen();
  });
});

// Double-click planet in system view to open colony screen
systemCanvas.addEventListener("dblclick", (e) => {
  if (!systemViewStar || !systemViewStar.planets) return;
  const rect = systemCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const cx = systemCanvas.width / 2;
  const cy = systemCanvas.height / 2;
  const time = animTime;

  for (let i = 0; i < systemViewStar.planets.length; i++) {
    const planet = systemViewStar.planets[i];
    const pos = getPlanetScreenPos(planet, cx, cy, time);
    const r = getPlanetScreenRadius(planet);
    const dx = mx - pos.x;
    const dy = my - pos.y;
    if (dx * dx + dy * dy < (r + 6) * (r + 6)) {
      if (planet.colony) {
        showColonyScreen(systemViewStar, i);
      }
      return;
    }
  }
});

// Speed controls
document.querySelectorAll("#speed-controls button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#speed-controls button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    gameSpeed = parseFloat(btn.dataset.speed);
  });
});

// ═══════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════
function gameLoop(timestamp) {
  const now = timestamp / 1000;
  const dt = lastTickTime > 0 ? Math.min(now - lastTickTime, 0.1) : 0;
  lastTickTime = now;
  animTime = now;
  tickEconomy(dt);
  tickEntities(dt * gameSpeed);
  // Lightweight updates when colony screen is open (no full DOM rebuild)
  if (colonyViewStar && colonyViewPlanetIdx != null) {
    const col = getActiveColony();
    if (col) {
      if (col.deck.length !== lastDeckCount) {
        lastDeckCount = col.deck.length;
        refreshDeckDisplay(col);
      }
      // Update colony resource header without full refresh
      const out = getColonyOutput(col);
      updateColonyResourceDisplay(out);
    }
    if (colonyDirty) {
      colonyDirty = false;
      refreshColonyScreen();
    }
  }
  render();
  requestAnimationFrame(gameLoop);
}

function showResearchPanel() {
  document.getElementById("research-backdrop").classList.add("visible");
  refreshResearchPanel();
}

function hideResearchPanel() {
  document.getElementById("research-backdrop").classList.remove("visible");
}

function refreshResearchPanel() {
  // Active research display
  const activeEl = document.getElementById("research-active");
  if (activeResearch) {
    const pct = Math.floor((activeResearch.progress / activeResearch.cost) * 100);
    const catLabel = activeResearch.category.charAt(0).toUpperCase() + activeResearch.category.slice(1);
    activeEl.innerHTML = `
      <div style="color:#c0d0e0;font-size:14px;margin-bottom:6px">
        Researching: <strong>${catLabel}s</strong>
        <span style="color:#6a7a9b">(${CATEGORY_WATERMARKS[activeResearch.category] || ""})</span>
      </div>
      <div style="color:#a4e4a4;font-size:12px">${formatResourceValue(Math.floor(activeResearch.progress))} / ${formatResourceValue(activeResearch.cost)} 🔬 (${pct}%)</div>
      <div class="research-progress"><div class="research-progress-bar" style="width:${pct}%"></div></div>
      <button onclick="activeResearch=null;refreshResearchPanel()" style="margin-top:8px;background:#1a2040;border:1px solid #2a3460;color:#8090b0;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:11px">Cancel</button>
    `;
  } else {
    activeEl.innerHTML = `<div style="color:#6a7a9b;font-size:13px">Choose a category to research. A random card will be revealed!</div>`;
  }

  // Research categories — show 4 category buttons with costs
  const listEl = document.getElementById("research-list");
  listEl.innerHTML = "";

  const researchableCategories = ["building", "ship", "captain", "leader"];
  for (const cat of researchableCategories) {
    const pool = CATEGORY_TEMPLATES[cat];
    if (!pool) continue;
    const researchedCount = pool.filter(t => researchedCards.has(t.id)).length;
    const remaining = pool.filter(t => !researchedCards.has(t.id) && t.rarity !== "common");
    const count = researchCounts[cat] || 0;
    const cost = getResearchCost(cat);
    const allDone = remaining.length === 0;
    const catLabel = cat.charAt(0).toUpperCase() + cat.slice(1) + "s";
    const icon = CATEGORY_WATERMARKS[cat] || "";
    const isActive = activeResearch && activeResearch.category === cat;

    const item = document.createElement("div");
    item.className = "research-item" + (allDone ? " researched" : "") + (isActive ? " active" : "");
    item.style.cssText = "cursor:" + (allDone || activeResearch ? "default" : "pointer") + ";padding:10px 12px;";

    item.innerHTML = `
      <span class="ri-category" style="font-size:18px">${icon}</span>
      <span class="ri-name" style="flex:1">${catLabel}</span>
      <span class="ri-rarity" style="background:rgba(100,130,180,0.15);color:#8090b0;border:1px solid rgba(100,130,180,0.3);font-size:10px;padding:2px 6px;border-radius:3px">${researchedCount}/${pool.length} unlocked</span>
      <span class="ri-cost" style="min-width:80px;text-align:right">${allDone ? "✓ Complete" : `🔬 ${formatResourceValue(cost)}`}</span>
    `;

    if (!allDone && !activeResearch) {
      item.addEventListener("click", () => startResearch(cat));
      item.addEventListener("mouseenter", () => { item.style.background = "rgba(100,130,180,0.1)"; });
      item.addEventListener("mouseleave", () => { item.style.background = ""; });
    }
    listEl.appendChild(item);

    // Show researched cards as sub-list
    const researched = pool.filter(t => researchedCards.has(t.id));
    if (researched.length > 0) {
      const subList = document.createElement("div");
      subList.style.cssText = "padding:2px 0 6px 32px;";
      for (const t of researched) {
        const rarityColor = RARITY_COLORS[t.rarity] || "#6a7a9b";
        const pill = document.createElement("span");
        pill.style.cssText = `display:inline-block;margin:2px 4px;padding:1px 8px;border-radius:10px;font-size:10px;background:${rarityColor}20;color:${rarityColor};border:1px solid ${rarityColor}40;`;
        pill.textContent = t.name;
        subList.appendChild(pill);
      }
      listEl.appendChild(subList);
    }
  }
}

// Research reveal — "card pack opening" moment
function showResearchReveal(template, category) {
  // Remove existing reveal if any
  let existing = document.getElementById("research-reveal-backdrop");
  if (existing) existing.remove();

  const rarityColor = RARITY_COLORS[template.rarity] || "#6a7a9b";
  const catLabel = category.charAt(0).toUpperCase() + category.slice(1);
  const icon = CATEGORY_WATERMARKS[category] || "";

  const backdrop = document.createElement("div");
  backdrop.id = "research-reveal-backdrop";
  backdrop.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;`;

  // Rarity glow
  const glow = document.createElement("div");
  glow.style.cssText = `position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(ellipse,${rarityColor}30 0%,transparent 70%);pointer-events:none;animation:revealGlow 2s ease-out;`;

  // Card container with flip animation
  const cardSlot = document.createElement("div");
  cardSlot.style.cssText = "animation:revealFlip 0.8s ease-out forwards;transform-origin:center;";
  cardSlot.innerHTML = buildCardHtml(template, icon);

  // Label
  const label = document.createElement("div");
  label.style.cssText = `margin-top:20px;font-size:18px;font-weight:bold;color:${rarityColor};text-transform:uppercase;letter-spacing:2px;animation:revealFadeIn 0.5s ease-out 0.6s both;`;
  label.textContent = `New ${template.rarity} ${catLabel} discovered!`;

  // Dismiss button
  const btn = document.createElement("button");
  btn.style.cssText = "margin-top:16px;padding:8px 24px;background:#1a2040;border:1px solid #2a3460;color:#c0d0e0;border-radius:6px;cursor:pointer;font-size:14px;animation:revealFadeIn 0.5s ease-out 0.8s both;";
  btn.textContent = "Continue";
  btn.onclick = () => {
    backdrop.remove();
    if (document.getElementById("research-overlay").classList.contains("visible")) {
      refreshResearchPanel();
    }
  };

  backdrop.appendChild(glow);
  backdrop.appendChild(cardSlot);
  backdrop.appendChild(label);
  backdrop.appendChild(btn);
  document.body.appendChild(backdrop);

  // Click backdrop outside card to dismiss
  backdrop.addEventListener("click", (e) => {
    if (e.target === backdrop) btn.click();
  });
}

createProbe(homeStar.x + 25, homeStar.y - 20);
createProbe(homeStar.x - 25, homeStar.y + 20);
camera.x = homeStar.x;
camera.y = homeStar.y;
updateResourceDisplay();
requestAnimationFrame(gameLoop);
</script>
