function showResearchPanel() {
  document.getElementById("research-backdrop").classList.add("visible");
  refreshResearchPanel();
}

function hideResearchPanel() {
  document.getElementById("research-backdrop").classList.remove("visible");
}

function refreshResearchPanel() {
  // Active research display
  const activeEl = document.getElementById("research-active");
  if (activeResearch) {
    const pct = Math.floor((activeResearch.progress / activeResearch.cost) * 100);
    const catLabel = activeResearch.category.charAt(0).toUpperCase() + activeResearch.category.slice(1);
    const activeIcon = CATEGORY_WATERMARK_IDS[activeResearch.category];
    activeEl.innerHTML = `
      <div style="color:#c0d0e0;font-size:14px;margin-bottom:6px;display:flex;align-items:center;gap:6px">
        ${activeIcon ? ico(activeIcon) : ""}
        <span>Researching: <strong>${catLabel}s</strong></span>
      </div>
      <div style="color:#a4e4a4;font-size:12px;display:flex;align-items:center;gap:4px">
        <span id="research-progress-numeric">${formatResourceValue(Math.floor(activeResearch.progress))} / ${formatResourceValue(activeResearch.cost)}</span>
        ${ico("i-research", "sm research")} <span id="research-progress-pct">(${pct}%)</span>
      </div>
      <div class="research-progress"><div id="research-progress-bar-fill" class="research-progress-bar" style="width:${pct}%"></div></div>
      <button onclick="activeResearch=null;refreshResearchPanel()" style="margin-top:8px;background:#1a2040;border:1px solid #2a3460;color:#8090b0;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:11px">Cancel</button>
    `;
  } else {
    activeEl.innerHTML = `<div style="color:#6a7a9b;font-size:13px">Choose a category to research. A random card will be revealed!</div>`;
  }

  // Research categories — show 4 category buttons with costs
  const listEl = document.getElementById("research-list");
  listEl.innerHTML = "";

  const researchableCategories = ["building", "ship", "admiral", "leader"];
  for (const cat of researchableCategories) {
    const pool = getTemplates(cat);
    if (pool.length === 0) continue;
    const researchedCount = pool.filter(t => researchedCards.has(t.id)).length;
    const remaining = pool.filter(t => !researchedCards.has(t.id));
    const count = researchCounts[cat] || 0;
    const cost = getResearchCost(cat);
    const allDone = remaining.length === 0;
    const catLabel = cat.charAt(0).toUpperCase() + cat.slice(1) + "s";
    const catIcon = CATEGORY_WATERMARK_IDS[cat];
    const isActive = activeResearch && activeResearch.category === cat;

    const item = document.createElement("div");
    item.className = "research-item" + (allDone ? " researched" : "") + (isActive ? " active" : "");
    item.style.cssText = "cursor:" + (allDone || activeResearch ? "default" : "pointer") + ";padding:10px 12px;";

    const costDisplay = allDone
      ? `${ico("i-check")} <span>Complete</span>`
      : `${ico("i-research", "sm research")} <span>${formatResourceValue(cost)}</span>`;
    item.innerHTML = `
      <span class="ri-category" style="font-size:18px;display:inline-flex;align-items:center">${catIcon ? ico(catIcon, "lg") : ""}</span>
      <span class="ri-name" style="flex:1">${catLabel}</span>
      <span class="ri-rarity" style="background:rgba(100,130,180,0.15);color:#8090b0;border:1px solid rgba(100,130,180,0.3);font-size:10px;padding:2px 6px;border-radius:3px">${researchedCount}/${pool.length} unlocked</span>
      <span class="ri-cost" style="min-width:80px;text-align:right;display:inline-flex;align-items:center;justify-content:flex-end;gap:4px">${costDisplay}</span>
    `;

    if (!allDone && !activeResearch) {
      item.addEventListener("click", () => startResearch(cat));
      item.addEventListener("mouseenter", () => { item.style.background = "rgba(100,130,180,0.1)"; });
      item.addEventListener("mouseleave", () => { item.style.background = ""; });
    }
    listEl.appendChild(item);

    // Show researched cards as sub-list
    const researched = pool.filter(t => researchedCards.has(t.id));
    if (researched.length > 0) {
      const subList = document.createElement("div");
      subList.style.cssText = "padding:2px 0 6px 32px;";
      for (const t of researched) {
        const rarityColor = RARITY_COLORS[t.rarity] || "#6a7a9b";
        const pill = document.createElement("span");
        pill.style.cssText = `display:inline-block;margin:2px 4px;padding:1px 8px;border-radius:10px;font-size:10px;background:${rarityColor}20;color:${rarityColor};border:1px solid ${rarityColor}40;`;
        pill.textContent = t.name;
        subList.appendChild(pill);
      }
      listEl.appendChild(subList);
    }
  }
}

// Salvage screen — shown after a winning fight against a pirate fleet.
// Cards flip in first (loot-box flair), then resources list, then a single
// Continue button. Dismisses on Continue or Escape.
function showSalvageScreen(loot) {
  // Tear down any existing salvage modal (e.g. back-to-back wins).
  const existing = document.getElementById("salvage-backdrop");
  if (existing) existing.remove();

  const backdrop = document.createElement("div");
  backdrop.id = "salvage-backdrop";

  const title = document.createElement("div");
  title.id = "salvage-title";
  title.textContent = "Victory";

  const subtitle = document.createElement("div");
  subtitle.id = "salvage-subtitle";
  subtitle.textContent = loot.cards.length > 0
    ? "Salvage recovered from the wreckage"
    : "Salvage recovered";

  const cardsRow = document.createElement("div");
  cardsRow.id = "salvage-cards";
  loot.cards.forEach((card, i) => {
    const cell = document.createElement("div");
    cell.className = "salvage-card-cell";
    cell.style.animationDelay = `${0.1 + i * 0.18}s`;
    const rarityColor = (typeof RARITY_COLORS !== "undefined" && RARITY_COLORS[card.rarity]) || "#c04040";
    cell.style.setProperty("--rc", rarityColor);
    cell.innerHTML = `<div class="salvage-card-glow"></div>` + buildCardHtml(card);
    cardsRow.appendChild(cell);
  });

  const resRow = document.createElement("div");
  resRow.id = "salvage-resources";
  for (const k of Object.keys(loot.resources)) {
    const v = loot.resources[k];
    if (!v) continue;
    const pill = document.createElement("div");
    pill.className = "salvage-res-pill";
    const iconId = (typeof RES_ICON_BY_KEY !== "undefined" && RES_ICON_BY_KEY[k]) || null;
    const iconHtml = iconId ? `<svg class="ico ${k}"><use href="#${iconId}"/></svg>` : "";
    pill.innerHTML = `${iconHtml}<span>+${formatResourceValue(v)}</span>`;
    resRow.appendChild(pill);
  }

  const btn = document.createElement("button");
  btn.id = "salvage-continue";
  btn.textContent = "Continue";
  const dismiss = () => {
    backdrop.remove();
    document.removeEventListener("keydown", onKey);
  };
  const onKey = (e) => { if (e.key === "Escape" || e.key === "Enter") dismiss(); };
  btn.addEventListener("click", dismiss);
  document.addEventListener("keydown", onKey);

  backdrop.appendChild(title);
  backdrop.appendChild(subtitle);
  if (loot.cards.length > 0) backdrop.appendChild(cardsRow);
  if (resRow.childNodes.length > 0) backdrop.appendChild(resRow);
  backdrop.appendChild(btn);
  document.body.appendChild(backdrop);

  // Force the .visible class in the next frame so the CSS transition fires.
  requestAnimationFrame(() => backdrop.classList.add("visible"));
}

// Research reveal — "card pack opening" moment
function showResearchReveal(template, category) {
  markCardSeen(template);
  // Remove existing reveal if any
  let existing = document.getElementById("research-reveal-backdrop");
  if (existing) existing.remove();

  const rarityColor = RARITY_COLORS[template.rarity] || "#6a7a9b";
  const catLabel = category.charAt(0).toUpperCase() + category.slice(1);

  const backdrop = document.createElement("div");
  backdrop.id = "research-reveal-backdrop";
  backdrop.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;`;

  // Rarity glow
  const glow = document.createElement("div");
  glow.style.cssText = `position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(ellipse,${rarityColor}30 0%,transparent 70%);pointer-events:none;animation:revealGlow 2s ease-out;`;

  // Card container with flip animation
  const cardSlot = document.createElement("div");
  cardSlot.style.cssText = "animation:revealFlip 0.8s ease-out forwards;transform-origin:center;";
  cardSlot.innerHTML = buildCardHtml(template);

  // Label
  const label = document.createElement("div");
  label.style.cssText = `margin-top:20px;font-size:18px;font-weight:bold;color:${rarityColor};text-transform:uppercase;letter-spacing:2px;animation:revealFadeIn 0.5s ease-out 0.6s both;`;
  label.textContent = `New ${template.rarity} ${catLabel} discovered!`;

  // Dismiss button
  const btn = document.createElement("button");
  btn.style.cssText = "margin-top:16px;padding:8px 24px;background:#1a2040;border:1px solid #2a3460;color:#c0d0e0;border-radius:6px;cursor:pointer;font-size:14px;animation:revealFadeIn 0.5s ease-out 0.8s both;";
  btn.textContent = "Continue";
  btn.onclick = () => {
    backdrop.remove();
    if (document.getElementById("research-backdrop").classList.contains("visible")) {
      refreshResearchPanel();
    }
  };

  backdrop.appendChild(glow);
  backdrop.appendChild(cardSlot);
  backdrop.appendChild(label);
  backdrop.appendChild(btn);
  document.body.appendChild(backdrop);
  // No click-outside-to-dismiss — the player has to acknowledge with the
  // Continue button so the reveal isn't accidentally clicked away while
  // they're doing something else on the map.
}

// ═══════════════════════════════════════════
//  SAVE / LOAD
// ═══════════════════════════════════════════
const SAVE_VERSION = 1;
const AUTOSAVE_KEY = "idlespace_autosave_v1";
const AUTOSAVE_INTERVAL_MS = 60000; // every 60 real seconds
let lastSaveStatus = "";

// ── Card reference serialization ──
// Cards are stored in saves as { id, ...instanceState }. The template (name,
// cost, upkeep, flavor, base stats, etc.) is re-resolved from the active
// card file at load time. This lets us rebalance a card without invalidating
// running saves — the save is the source of truth for *instance* state
// (rolled values, drawn names, HP, planet slot rolls); the card file is the
// source of truth for *definition*. Missing IDs drop with a warning.
//
// Legacy full-card shapes (pre-Phase-4) also hydrate cleanly: full cards
// already carry an `id` from the template spread, and the same instance
// fields live at the top level.
const CARD_INSTANCE_FIELDS = ["stats", "statRanges", "bonuses", "bonusRanges", "planetSlots", "name"];

function serializeCardRef(card) {
  if (!card) return null;
  if (!card.id || !getCardById(card.id)) {
    // Unknown / untracked card — store opaque. Shouldn't happen for player cards.
    return { ...card };
  }
  const out = { id: card.id };
  for (const k of CARD_INSTANCE_FIELDS) {
    if (card[k] !== undefined) out[k] = card[k];
  }
  return out;
}

function hydrateCardRef(ref) {
  if (!ref) return null;
  if (!ref.id) return ref; // legacy full card without a resolvable id
  const template = getCardById(ref.id);
  if (!template) {
    console.warn("[save] dropping card with unknown id:", ref.id, ref.name || "(no name)");
    return null;
  }
  const c = { ...template };
  for (const k of CARD_INSTANCE_FIELDS) {
    if (ref[k] !== undefined) c[k] = ref[k];
  }
  // Stars/planets require .type == template.name for STAR_VISUALS / PLANET_VISUALS
  // lookups (see rollStarCard and generatePlanets which set this at runtime).
  if (c.category === "star" || c.category === "planet") {
    c.type = template.name;
  }
  return c;
}

function serializePlanet(p) {
  return {
    card: serializeCardRef(p.card),
    orbitRadius: p.orbitRadius,
    orbitSpeed: p.orbitSpeed,
    orbitPhase: p.orbitPhase,
    colony: p.colony ? serializeColony(p.colony) : null,
  };
}

function serializeColony(col) {
  return {
    population: col.population,
    maxPopulation: col.maxPopulation,
    buildings: col.buildings.map(b => b ? serializeCardRef(b) : null),
    leaders: col.leaders.map(serializeCardRef).filter(Boolean),
    deck: col.deck.map(d => ({ ...d })), // already thin: { category, faceDown }
    queue: col.queue.map(serializeCardRef).filter(Boolean),
    activeAction: col.activeAction,
    genTimer: col.genTimer,
    growthProgress: col.growthProgress,
    starvationTimer: col.starvationTimer,
    pendingDraw: col.pendingDraw ? {
      category: col.pendingDraw.category,
      choices: col.pendingDraw.choices.map(serializeCardRef),
    } : null,
  };
}

function hydratePlanet(p) {
  const card = hydrateCardRef(p.card);
  if (!card) return null; // unknown planet template, drop the planet
  const planet = {
    card,
    orbitRadius: p.orbitRadius,
    orbitSpeed: p.orbitSpeed,
    orbitPhase: p.orbitPhase,
    colony: p.colony ? hydrateColony(p.colony) : null,
  };
  return planet;
}

function hydrateColony(col) {
  let pendingDraw = null;
  if (col.pendingDraw && Array.isArray(col.pendingDraw.choices)) {
    const choices = col.pendingDraw.choices.map(hydrateCardRef).filter(Boolean);
    if (choices.length === 3) {
      pendingDraw = { category: col.pendingDraw.category, choices };
    }
  }
  return {
    population: col.population,
    maxPopulation: col.maxPopulation,
    buildings: (col.buildings || []).map(b => b ? hydrateCardRef(b) : null),
    leaders: (col.leaders || []).map(hydrateCardRef).filter(Boolean),
    deck: (col.deck || []).map(d => ({ ...d })),
    queue: (col.queue || []).map(hydrateCardRef).filter(Boolean),
    activeAction: col.activeAction ?? null,
    genTimer: col.genTimer || 0,
    growthProgress: col.growthProgress || 0,
    starvationTimer: col.starvationTimer || 0,
    pendingDraw,
  };
}

function serializeGame() {
  const entityIdx = new Map();
  mapEntities.forEach((e, i) => entityIdx.set(e, i));

  return {
    version: SAVE_VERSION,
    savedAt: Date.now(),
    gameTime: animTime,

    stars: [...stars.values()].map(s => ({
      id: s.id, x: s.x, y: s.y, visibility: s.visibility,
      card: serializeCardRef(s.card),
      planets: s.planets ? s.planets.map(serializePlanet) : null,
    })),
    generatedChunks: [...generatedChunks.keys()],
    chunkSeenBits: [...chunkSeenBits.entries()],
    nextStarId,
    nextStarNameIdx: _nextStarNameIdx,
    shuffledStarNames: [..._shuffledStarNames],

    mapEntities: mapEntities.map(e => ({
      type: e.type, owner: e.owner, stance: e.stance,
      x: e.x, y: e.y, destX: e.destX, destY: e.destY,
      speed: e.speed, sensorRange: e.sensorRange, stealth: e.stealth,
      label: e.label, inCombat: e.inCombat,
      card: e.card ? serializeCardRef(e.card) : null,
      ships: e.ships ? e.ships.map(serializeCardRef).filter(Boolean) : null,
      admiral: e.admiral ? serializeCardRef(e.admiral) : null,
    })),
    selectedEntityIdx,

    activeCombats: activeCombats.map(c => serializeCombat(c, entityIdx)),
    nextCombatId,

    resources: { ...resources },
    gameSpeed,

    researchCounts: { ...researchCounts },
    researchedCards: [...researchedCards],
    seenCards:       [...seenCards],
    pirateLoot:      { ...pirateLoot },
    activeResearch: activeResearch ? { ...activeResearch } : null,

    camera: { x: camera.x, y: camera.y, zoom: camera.zoom },
  };
}

function serializeCombat(c, entityIdx) {
  return {
    id: c.id, phase: c.phase,
    sideA: serializeSide(c.sideA, entityIdx),
    sideB: serializeSide(c.sideB, entityIdx),
    distance: c.distance,
    initialDistance: c.initialDistance,
    shotTimer: c.shotTimer,
    turnIndex: c.turnIndex,
    roundNumber: c.roundNumber,
    log: c.log || [],
    gameTime: c.gameTime,
  };
}

function serializeSide(side, entityIdx) {
  const eIdx = entityIdx.get(side.entity);
  const ent = side.entity;
  const ships = side.ships.map(s => {
    let shipIdx = -1;
    if (ent.type === "ship") shipIdx = 0;
    else if (ent.type === "fleet") shipIdx = ent.ships.indexOf(s.card);
    return {
      shipIdx,
      currentShields: s.currentShields,
      currentArmor: s.currentArmor,
      alive: s.alive,
    };
  });
  return { entityIdx: eIdx, ships };
}

function clearGameState() {
  // Close any open overlays so we don't hold stale refs
  if (typeof hideSystemOverlay === "function") hideSystemOverlay();
  if (typeof hideColonyScreen === "function") hideColonyScreen();
  if (typeof hideCombatOverlay === "function") hideCombatOverlay();
  if (typeof hideColoniesList === "function") hideColoniesList();
  if (typeof hideResearchPanel === "function") hideResearchPanel();
  if (typeof hideSelectPanel === "function") hideSelectPanel();

  stars.clear();
  generatedChunks.clear();
  chunkSeenBits.clear();
  nextStarId = 1;
  _nextStarNameIdx = 0;
  mapEntities.length = 0;
  selectedEntityIdx = null;
  hoveredStarId = null;
  selectedStarId = null;
  activeCombats.length = 0;
  nextCombatId = 1;
  viewedCombat = null;
  colonies.length = 0;
  combatParticles.length = 0;
  for (const k of Object.keys(resources)) delete resources[k];
  for (const k of Object.keys(researchCounts)) researchCounts[k] = 0;
  researchedCards.clear();
  seenCards.clear();
  for (const k of Object.keys(pirateLoot)) delete pirateLoot[k];
  activeResearch = null;
}

function deserializeGame(data) {
  if (!data || typeof data !== "object") throw new Error("Save data is not an object.");
  if (data.version !== SAVE_VERSION) {
    throw new Error(`Incompatible save version ${data.version} (expected ${SAVE_VERSION}).`);
  }
  // Minimal shape check before clobbering live state
  if (!Array.isArray(data.stars) || !Array.isArray(data.mapEntities)) {
    throw new Error("Save file is missing required fields.");
  }

  clearGameState();

  for (const s of data.stars) {
    const card = hydrateCardRef(s.card);
    if (!card) continue; // unknown star template — drop the star rather than corrupt state
    const star = { id: s.id, x: s.x, y: s.y, visibility: s.visibility, card };
    if (s.planets) {
      star.planets = s.planets.map(hydratePlanet).filter(Boolean);
    }
    stars.set(s.id, star);
  }
  nextStarId = data.nextStarId || 1;
  _nextStarNameIdx = data.nextStarNameIdx || 0;
  if (Array.isArray(data.shuffledStarNames) && data.shuffledStarNames.length > 0) {
    _shuffledStarNames.length = 0;
    for (const n of data.shuffledStarNames) _shuffledStarNames.push(n);
  }

  for (const key of (data.generatedChunks || [])) generatedChunks.set(key, true);
  for (const [key, bits] of (data.chunkSeenBits || [])) chunkSeenBits.set(key, bits);

  for (const e of data.mapEntities) {
    // Preserve mapEntities order: activeCombats reference entities by index
    // via entityIdx, so dropping entities here would corrupt combat. If a
    // card ref can't resolve, we keep the raw ref as a degraded card and warn.
    const ent = {
      type: e.type, owner: e.owner, stance: e.stance,
      x: e.x, y: e.y, destX: e.destX, destY: e.destY,
      speed: e.speed, sensorRange: e.sensorRange, stealth: e.stealth,
      label: e.label, inCombat: e.inCombat,
    };
    if (e.card) ent.card = hydrateCardRef(e.card) || e.card;
    if (e.ships) ent.ships = e.ships.map(s => hydrateCardRef(s) || s);
    if (e.admiral) ent.admiral = hydrateCardRef(e.admiral) || e.admiral;
    mapEntities.push(ent);
  }
  selectedEntityIdx = data.selectedEntityIdx ?? null;

  for (const c of (data.activeCombats || [])) {
    activeCombats.push(deserializeCombat(c));
  }
  nextCombatId = data.nextCombatId || 1;

  for (const k of Object.keys(data.resources || {})) resources[k] = data.resources[k];
  // Fill in any missing resource defs with 0 (forward-compat)
  for (const r of RESOURCE_DEFS) if (resources[r.id] == null) resources[r.id] = 0;

  gameSpeed = data.gameSpeed != null ? data.gameSpeed : 1;

  for (const k of Object.keys(data.researchCounts || {})) researchCounts[k] = data.researchCounts[k];
  for (const id of (data.researchedCards || [])) researchedCards.add(id);
  for (const id of (data.seenCards || [])) seenCards.add(id);
  for (const k of Object.keys(data.pirateLoot || {})) pirateLoot[k] = data.pirateLoot[k];
  activeResearch = data.activeResearch || null;

  if (data.camera) {
    camera.x = data.camera.x;
    camera.y = data.camera.y;
    camera.zoom = data.camera.zoom;
  }

  // Rebuild colonies[] from star.planets
  for (const star of stars.values()) {
    if (!star.planets) continue;
    star.planets.forEach((p, i) => {
      if (p.colony) colonies.push({ starId: star.id, planetIdx: i, planet: p });
    });
  }

  updateSpeedControlActive();
  updateResourceDisplay();
}

function deserializeCombat(c) {
  const sideA = deserializeSide(c.sideA);
  const sideB = deserializeSide(c.sideB);
  const combat = {
    id: c.id, phase: c.phase,
    sideA, sideB,
    distance: c.distance,
    initialDistance: c.initialDistance,
    shotTimer: c.shotTimer,
    turnOrder: [],
    turnIndex: c.turnIndex || 0,
    roundNumber: c.roundNumber || 0,
    log: c.log || [],
    gameTime: c.gameTime || 0,
    _screenMidX: 0, _screenMidY: 0, _screenRadius: 0,
  };
  combat.turnOrder = buildTurnOrder(sideA, sideB);
  if (combat.turnOrder.length === 0) combat.turnIndex = 0;
  else if (combat.turnIndex >= combat.turnOrder.length) combat.turnIndex = 0;
  return combat;
}

function deserializeSide(s) {
  const entity = mapEntities[s.entityIdx];
  if (!entity) throw new Error("Combat references missing entity.");
  const ships = [];
  for (const ss of s.ships) {
    const card = entity.type === "ship" ? entity.card : entity.ships[ss.shipIdx];
    if (!card) continue; // ship was already removed at save time — skip stale state
    ships.push({
      card,
      currentShields: ss.currentShields,
      currentArmor: ss.currentArmor,
      alive: ss.alive,
    });
  }
  return { entity, ships };
}

function updateSpeedControlActive() {
  document.querySelectorAll("#speed-controls button").forEach(b => {
    b.classList.toggle("active", parseFloat(b.dataset.speed) === gameSpeed);
  });
}

// ── File export / import ──
function exportSaveFile() {
  try {
    const data = serializeGame();
    const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const ts = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
    const a = document.createElement("a");
    a.href = url;
    a.download = `idlespace-${ts}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setSaveStatus(`Exported idlespace-${ts}.json`, "ok");
  } catch (e) {
    console.error(e);
    setSaveStatus(`Export failed: ${e.message}`, "err");
  }
}

function readSaveFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      try { resolve(JSON.parse(reader.result)); }
      catch (e) { reject(new Error("Save file is not valid JSON.")); }
    };
    reader.onerror = () => reject(new Error("Could not read file."));
    reader.readAsText(file);
  });
}

// ── Autosave ──
function doAutosave() {
  try {
    const data = serializeGame();
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(data));
    return true;
  } catch (e) {
    console.warn("Autosave failed:", e);
    return false;
  }
}

function loadAutosaveData() {
  const raw = localStorage.getItem(AUTOSAVE_KEY);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch (e) { return null; }
}

function deleteAutosave() {
  localStorage.removeItem(AUTOSAVE_KEY);
}

function getSaveSummary(data) {
  let colonyCount = 0;
  for (const s of (data.stars || [])) {
    if (!s.planets) continue;
    for (const p of s.planets) if (p.colony) colonyCount++;
  }
  const fleetCount = (data.mapEntities || []).filter(e => e.owner === "player").length;
  return {
    savedAt: new Date(data.savedAt).toLocaleString(),
    colonyCount,
    fleetCount,
    starsKnown: (data.stars || []).length,
    credits: Math.floor((data.resources && data.resources.credits) || 0),
  };
}

// ── Save menu UI ──
function showSaveMenu() {
  // Pause the game while the menu is open so the player can read metadata
  document.getElementById("save-menu-backdrop").classList.add("visible");
  renderSaveMenu();
}

function hideSaveMenu() {
  document.getElementById("save-menu-backdrop").classList.remove("visible");
  lastSaveStatus = "";
}

function setSaveStatus(msg, cls) {
  lastSaveStatus = msg;
  const el = document.getElementById("save-status");
  if (el) {
    el.textContent = msg;
    el.className = "save-status" + (cls ? " " + cls : "");
  }
}

function renderSaveMenu() {
  const menu = document.getElementById("save-menu");
  const autosave = loadAutosaveData();
  let autosaveBlock = "";
  if (autosave) {
    try {
      const s = getSaveSummary(autosave);
      autosaveBlock = `
        <div class="save-meta">
          <div class="meta-title">Autosave</div>
          <div>${s.savedAt}</div>
          <div>${s.colonyCount} colonies · ${s.fleetCount} player fleets · ${s.starsKnown} stars known</div>
        </div>
        <button class="menu-btn" onclick="confirmLoadAutosave()">${ico("i-refresh", "sm")} Load autosave</button>
        <button class="menu-btn danger" onclick="confirmDeleteAutosave()">${ico("i-trash", "sm")} Delete autosave</button>
      `;
    } catch (e) {
      autosaveBlock = `<div class="save-meta">Autosave exists but could not be read.</div>`;
    }
  } else {
    autosaveBlock = `<div class="save-meta">No autosave yet. One will be written every ${AUTOSAVE_INTERVAL_MS/1000}s and on page close.</div>`;
  }

  const overrideActive = CARD_SOURCE === "override";
  const cardsBlock = `
    <div class="save-meta">
      <div class="meta-title">Cards</div>
      <div>Loaded from <b style="color:${overrideActive ? '#ffd060' : '#a4e4a4'}">${
        overrideActive ? 'live builder override' : (CARD_SOURCE === 'file' ? 'data/game-cards.json' : CARD_SOURCE)
      }</b> · ${CARD_INDEX.size} cards</div>
    </div>
    <a class="menu-btn" href="card-builder.html" target="_blank" rel="noopener" style="text-decoration:none;text-align:center;">${ico("i-tool", "sm")} Open Card Builder</a>
    ${overrideActive ? `<button class="menu-btn danger" onclick="revertCardOverride();hideSaveMenu()">${ico("i-close", "sm")} Revert to shipped cards</button>` : ""}
  `;

  menu.innerHTML = `
    <h2>Save &amp; Load</h2>
    <button class="menu-btn" onclick="exportSaveFile()">${ico("i-download", "sm")} Export save to file…</button>
    <button class="menu-btn" onclick="document.getElementById('save-file-input').click()">${ico("i-upload", "sm")} Import save from file…</button>
    ${autosaveBlock}
    ${cardsBlock}
    <div id="save-status" class="save-status${lastSaveStatus ? "" : ""}">${lastSaveStatus || ""}</div>
    <button class="menu-btn secondary" onclick="hideSaveMenu()">Close</button>
  `;
}

function confirmLoadAutosave() {
  const data = loadAutosaveData();
  if (!data) { setSaveStatus("No autosave available.", "err"); return; }
  confirmLoadSave(data, "autosave");
}

function confirmDeleteAutosave() {
  if (!confirm("Delete the autosave? The current game stays running; this only clears the saved slot.")) return;
  deleteAutosave();
  setSaveStatus("Autosave deleted.", "ok");
  renderSaveMenu();
}

function confirmLoadSave(data, sourceLabel) {
  let summary;
  try { summary = getSaveSummary(data); }
  catch (e) { setSaveStatus("Save metadata unreadable.", "err"); return; }
  const msg =
    `Load this save?\n\n` +
    `Saved: ${summary.savedAt}\n` +
    `${summary.colonyCount} colonies · ${summary.fleetCount} player fleets\n` +
    `${summary.starsKnown} stars known · ${summary.credits.toLocaleString()} credits\n\n` +
    `Your current game will be replaced.`;
  if (!confirm(msg)) return;
  try {
    const prevSpeed = gameSpeed;
    gameSpeed = 0; // pause during load
    deserializeGame(data);
    gameSpeed = 0; // stay paused after load — user can resume explicitly
    updateSpeedControlActive();
    setSaveStatus(`Loaded ${sourceLabel || "save"}. Game paused.`, "ok");
    hideSaveMenu();
  } catch (e) {
    console.error(e);
    setSaveStatus(`Load failed: ${e.message}`, "err");
  }
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
// Boot is async so card data (data/game-cards.json or localStorage override)
// finishes loading before anything that touches templates runs.
(async function boot() {
await loadCardData();
updateCardSourceBadge();
initResearch();
// Compute global UI scale (see body CSS). The UI fits natively at 1920px, so
// only screens narrower than that get scaled — desktops (and any window on
// them, including half-windows) keep the original layout untouched.
const DESIGN_W = 1920;
function applyUiScale() {
  const screenW = window.screen.width;
  const scale = Math.min(screenW / DESIGN_W, 1);
  if (scale >= 1) {
    document.body.classList.remove('scaled');
    document.body.style.height = '';
    document.documentElement.style.removeProperty('--ui-scale');
  } else {
    document.body.classList.add('scaled');
    document.documentElement.style.setProperty('--ui-scale', scale);
    document.body.style.height = (window.innerHeight / scale) + 'px';
  }
  resizeCanvas();
  if (document.getElementById("system-overlay")?.classList.contains("visible")) {
    resizeSystemCanvas();
  }
}
applyUiScale();
window.addEventListener("resize", applyUiScale);
const homeStar = generateGalaxy();
// Helper to clone a ship template by id
function cloneShip(id, nameOverride) {
  const t = getCardById(id);
  const c = { ...t, stats: { ...t.stats } };
  if (nameOverride) c.name = nameOverride;
  return c;
}
function cloneAdmiral(id) {
  const t = getCardById(id);
  return { ...t, stats: { ...t.stats } };
}
// Start with 2 admiral-led fleets: one carries the player's only Colony
// Ship (gates the first colonization), the other is pure combat escort.
const starterFleets = [
  { admiral: cloneAdmiral("adm_002"), ships: [  // Patrol Commander — settler escort
    cloneShip("shp_001"),            // Scout Corvette (energy/short)
    cloneShip("shp_002"),            // Patrol Frigate (kinetic/medium)
    cloneShip("shp_003"),            // Missile Corvette (missile/long)
    cloneShip("shp_018"),            // Colony Ship — required to colonize
  ]},
  { admiral: cloneAdmiral("adm_001"), ships: [  // Ensign Hale — combat patrol
    cloneShip("shp_001", "Scout Corvette II"),
    cloneShip("shp_002", "Patrol Frigate II"),
    cloneShip("shp_004"),            // Gunboat (kinetic/short)
    cloneShip("shp_005"),            // Picket Ship (PD + energy)
  ]},
];
starterFleets.forEach((f, i) => {
  const angle = (i / starterFleets.length) * Math.PI * 2 - Math.PI / 2;
  createFleet(f.admiral, f.ships, homeStar.x + Math.cos(angle) * 40, homeStar.y + Math.sin(angle) * 40);
  markCardSeen(f.admiral);
  for (const s of f.ships) markCardSeen(s);
});
// Home star and any pre-explored star/planet cards count as seen too.
markCardSeen(homeStar.card);
for (const p of homeStar.planets || []) markCardSeen(p && p.card);
camera.x = homeStar.x;
camera.y = homeStar.y;
updateResourceDisplay();

// ── Save / Load wiring ──
document.getElementById("save-file-input").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  e.target.value = ""; // allow re-selecting the same file later
  if (!file) return;
  try {
    const data = await readSaveFile(file);
    confirmLoadSave(data, "file");
  } catch (err) {
    setSaveStatus(err.message, "err");
  }
});

// Clicking outside the save menu closes it (but not clicks on the menu itself)
document.getElementById("save-menu-backdrop").addEventListener("click", (e) => {
  if (e.target.id === "save-menu-backdrop") hideSaveMenu();
});

// Periodic autosave + save on page close
setInterval(doAutosave, AUTOSAVE_INTERVAL_MS);
window.addEventListener("beforeunload", doAutosave);

// Offer to resume autosave on startup
(function offerAutosaveResume() {
  const data = loadAutosaveData();
  if (!data) return;
  // Defer slightly so the canvas has painted before the confirm dialog blocks
  setTimeout(() => {
    let summary;
    try { summary = getSaveSummary(data); } catch (e) { return; }
    const msg =
      `Resume previous game?\n\n` +
      `Autosaved: ${summary.savedAt}\n` +
      `${summary.colonyCount} colonies · ${summary.fleetCount} player fleets\n` +
      `${summary.starsKnown} stars known · ${summary.credits.toLocaleString()} credits\n\n` +
      `Cancel to start a fresh game (autosave is kept either way).`;
    if (confirm(msg)) {
      try {
        deserializeGame(data);
        gameSpeed = 0;
        updateSpeedControlActive();
      } catch (e) {
        console.error("Failed to resume autosave:", e);
        alert("Could not load autosave: " + e.message);
      }
    }
  }, 50);
})();

requestAnimationFrame(gameLoop);
})();
</script>
</body>
