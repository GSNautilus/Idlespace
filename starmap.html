  return Math.random() > evasionChance;
}

function startCombat(entityA, entityB) {
  const combat = createCombat(entityA, entityB);
  entityA.inCombat = combat.id;
  entityB.inCombat = combat.id;
  // Combat exposes every ship card on both sides — mark them seen so the
  // Collection overlay knows the player has encountered them.
  for (const ent of [entityA, entityB]) {
    if (ent.type === "ship" && ent.card) markCardSeen(ent.card);
    if (ent.ships) for (const s of ent.ships) markCardSeen(s);
    if (ent.admiral) markCardSeen(ent.admiral);
  }
  // Abandon any prior travel destination — otherwise drawEntities keeps
  // re-reading it and overwrites the combat-facing heading every frame,
  // so ships keep pointing at the old waypoint instead of the enemy.
  entityA.destX = null; entityA.destY = null;
  entityB.destX = null; entityB.destY = null;
  // Face each other immediately so the first rendered frame is correct.
  const dx = entityB.x - entityA.x;
  const dy = entityB.y - entityA.y;
  if (dx !== 0 || dy !== 0) {
    entityA.lastHeadingAngle = Math.atan2(dy, dx);
    entityB.lastHeadingAngle = Math.atan2(-dy, -dx);
  }
  activeCombats.push(combat);
}

function checkCombatEngagements() {
  for (let i = 0; i < mapEntities.length; i++) {
    const a = mapEntities[i];
    if (a.inCombat) continue;
    for (let j = i + 1; j < mapEntities.length; j++) {
      const b = mapEntities[j];
      if (b.inCombat) continue;
      if (a.owner === b.owner) continue;

      const dist = Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
      const aDetectRange = a.sensorRange * 50 - (b.stealth || 0) * 100;
      const bDetectRange = b.sensorRange * 50 - (a.stealth || 0) * 100;
      const aDetects = aDetectRange > dist;
      const bDetects = bDetectRange > dist;

      if (!aDetects && !bDetects) continue;
      if (shouldEngage(a, b, aDetects, bDetects)) {
        startCombat(a, b);
        break; // entity a is now in combat, skip to next
      }
    }
  }
}

// ═══════════════════════════════════════════
//  COMBAT SYSTEM
// ═══════════════════════════════════════════

function makeShipCombatState(card) {
  const maxShields = (card.stats.shields || 0) * COMBAT_HP_SCALE;
  const maxArmor = (card.stats.armor || 0) * COMBAT_HP_SCALE;
  return {
    card,
    currentShields: card._combatShields != null ? Math.min(card._combatShields, maxShields) : maxShields,
    currentArmor: card._combatArmor != null ? Math.min(card._combatArmor, maxArmor) : maxArmor,
    alive: true,
  };
}

function buildShipStates(entity) {
  if (entity.type === "ship") return [makeShipCombatState(entity.card)];
  return entity.ships.map(c => makeShipCombatState(c));
}

function buildTurnOrder(sideA, sideB) {
  const aShips = sideA.ships.filter(s => s.alive);
  const bShips = sideB.ships.filter(s => s.alive);
  const order = [];
  const maxLen = Math.max(aShips.length, bShips.length);
  for (let i = 0; i < maxLen; i++) {
    if (i < aShips.length) order.push({ ship: aShips[i], side: "a", enemySide: sideB });
    if (i < bShips.length) order.push({ ship: bShips[i], side: "b", enemySide: sideA });
  }
  return order;
}

function createCombat(entityA, entityB) {
  const combat = {
    id: nextCombatId++,
    phase: "closing",
    sideA: { entity: entityA, ships: buildShipStates(entityA) },
    sideB: { entity: entityB, ships: buildShipStates(entityB) },
    distance: Math.sqrt((entityA.x - entityB.x) ** 2 + (entityA.y - entityB.y) ** 2),
    initialDistance: Math.sqrt((entityA.x - entityB.x) ** 2 + (entityA.y - entityB.y) ** 2),
    shotTimer: SHOT_INTERVAL,
    turnOrder: [],
    turnIndex: 0,
    roundNumber: 0,
    log: [],
    gameTime: 0,
    // Screen-space hit detection (updated during render)
    _screenMidX: 0, _screenMidY: 0, _screenRadius: 0,
  };
  combat.turnOrder = buildTurnOrder(combat.sideA, combat.sideB);
  combat.log.push({ time: 0, text: `${entityA.label} engages ${entityB.label}!`, type: "engage" });
  return combat;
}

function calcHitChance(attackerCard, defenderCard) {
  let chance = 0.70;
  chance += Math.min(0.15, (attackerCard.stats.sensorRange || 0) * 0.01);
  chance -= (defenderCard.stats.stealth || 0) * 0.05;
  chance -= (defenderCard.stats.speed || 0) * 0.005;
  return Math.max(0.10, Math.min(0.95, chance));
}

function calcPDInterceptChance(defendingSide) {
  let totalPD = 0;
  for (const s of defendingSide.ships) {
    if (s.alive) totalPD += (s.card.stats.pointDefense || 0);
  }
  return Math.min(0.80, totalPD * 0.02);
}

function pickRandomAlive(ships) {
  const alive = ships.filter(s => s.alive);
  return alive.length > 0 ? alive[Math.floor(Math.random() * alive.length)] : null;
}

function applyDamage(target, weaponType, baseDmg) {
  const mult = COMBAT_TRIANGLE[weaponType];
  let dmg = baseDmg;
  if (target.currentShields > 0) {
    const shieldDmg = dmg * mult.vsShields;
    const absorbed = Math.min(target.currentShields, shieldDmg);
    target.currentShields -= absorbed;
    dmg -= absorbed / mult.vsShields;
  }
  if (dmg > 0 && target.alive) {
    const armorDmg = dmg * mult.vsArmor;
    target.currentArmor -= armorDmg;
    if (target.currentArmor <= 0) {
      target.currentArmor = 0;
      target.alive = false;
    }
  }
}

function getWeaponInfo(card) {
  const weapons = [];
  if (card.stats.energyDmg)  weapons.push({ type: "energy",  dmg: card.stats.energyDmg,  range: card.stats.energyRange  });
  if (card.stats.kineticDmg) weapons.push({ type: "kinetic", dmg: card.stats.kineticDmg, range: card.stats.kineticRange });
  if (card.stats.missileDmg) weapons.push({ type: "missile", dmg: card.stats.missileDmg, range: card.stats.missileRange });
  return weapons;
}

function fireShot(combat, turnEntry) {
  const ship = turnEntry.ship;
  if (!ship.alive) return;
  const enemySide = turnEntry.enemySide;

  const weapons = getWeaponInfo(ship.card);
  if (weapons.length === 0) return;

  // Every weapon whose range covers the current distance fires this volley.
  const inRange = weapons.filter(w => combat.distance <= (RANGE_THRESHOLDS[w.range] ?? 0));
  if (inRange.length === 0) {
    combat.log.push({ time: combat.gameTime, text: `${ship.card.name} — out of range`, type: "range" });
    return;
  }

  const attackerSide = turnEntry.side === "a" ? combat.sideA : combat.sideB;
  const attackerEnt  = attackerSide.entity;
  const defenderEnt  = enemySide.entity;
  const firerIdx  = Math.max(0, attackerSide.ships.indexOf(ship));
  const firerPos  = getShipWorldPos(attackerEnt, firerIdx, 0);

  for (const firedWeapon of inRange) {
    // Re-pick target per weapon so a kill mid-volley redirects remaining fire.
    const target = pickRandomAlive(enemySide.ships);
    if (!target) return;

    const targetIdx = Math.max(0, enemySide.ships.indexOf(target));
    const targetPos = getShipWorldPos(defenderEnt, targetIdx, 0);
    const midPx = (firerPos.x + targetPos.x) / 2;
    const midPy = (firerPos.y + targetPos.y) / 2;

    const hitChance = calcHitChance(ship.card, target.card);
    if (Math.random() > hitChance) {
      spawnWeaponVisual(firerPos.x, firerPos.y, targetPos.x, targetPos.y, firedWeapon.type);
      spawnCombatParticle(midPx, midPy, firedWeapon.type, false);
      combat.log.push({ time: combat.gameTime, text: `${ship.card.name} fires ${firedWeapon.type} at ${target.card.name} — MISS`, type: "miss" });
      continue;
    }

    if (firedWeapon.type === "missile") {
      const pdChance = calcPDInterceptChance(enemySide);
      if (Math.random() < pdChance) {
        spawnWeaponVisual(firerPos.x, firerPos.y, targetPos.x, targetPos.y, firedWeapon.type);
        spawnCombatParticle(midPx, midPy, firedWeapon.type, false);
        combat.log.push({ time: combat.gameTime, text: `${ship.card.name} fires missile at ${target.card.name} — INTERCEPTED`, type: "intercept" });
        continue;
      }
    }

    applyDamage(target, firedWeapon.type, firedWeapon.dmg);
    const killText = target.alive ? "" : " — DESTROYED";
    spawnWeaponVisual(firerPos.x, firerPos.y, targetPos.x, targetPos.y, firedWeapon.type);
    spawnCombatParticle(targetPos.x, targetPos.y, firedWeapon.type, true);
    combat.log.push({
      time: combat.gameTime,
      text: `${ship.card.name} fires ${firedWeapon.type} at ${target.card.name} — HIT ${firedWeapon.dmg} dmg${killText}`,
      type: target.alive ? "hit" : "kill",
    });
  }
}

function checkCombatEnd(combat) {
  const aAlive = combat.sideA.ships.some(s => s.alive);
  const bAlive = combat.sideB.ships.some(s => s.alive);
  if (!aAlive || !bAlive) {
    combat.phase = "resolved";
    const winner = aAlive ? combat.sideA : combat.sideB;
    const loser = aAlive ? combat.sideB : combat.sideA;
    combat.log.push({ time: combat.gameTime,
      text: `${winner.entity.label} victorious! ${loser.entity.label} destroyed.`, type: "resolve" });
  }
}

function syncSurvivorState(side) {
  const ent = side.entity;
  if (ent.type === "fleet") {
    const aliveCards = side.ships.filter(s => s.alive).map(s => {
      s.card._combatShields = s.currentShields;
      s.card._combatArmor = s.currentArmor;
      return s.card;
    });
    ent.ships = aliveCards;
    if (ent.ships.length > 0) recalcFleetStats(ent);
  } else if (ent.type === "ship") {
    const state = side.ships[0];
    if (state.alive) {
      state.card._combatShields = state.currentShields;
      state.card._combatArmor = state.currentArmor;
    }
  }
}

// Per-rarity credits-equivalent ranges for combat salvage.
// Tuned to roughly 30-100% of a same-rarity ship's placement cost so wiping
// pirates is meaningful but not the most efficient resource source.
const LOOT_VALUE_RANGES = {
  common:    [50,        150],
  uncommon:  [600,       1800],
  rare:      [12000,     36000],
  epic:      [240000,    720000],
  legendary: [5000000,   15000000],
};
// Inverse of cost weights — used to convert a rolled cred-equivalent into a
// concrete resource amount. Mirrors the rebase script's WEIGHTS table.
const LOOT_RESOURCE_WEIGHTS = { credits: 1, food: 1, minerals: 2, energy: 2 };
const LOOT_RESOURCE_TYPES   = ["credits", "minerals", "energy", "food"];
const LOOT_CARD_DROP_CHANCE = 0.05; // independent roll per defeated ship

// Roll resources + (rarely) a pirate card from each destroyed enemy ship.
// Returns null if no loot fired (player wipe, friendly-on-friendly, etc.).
function rollCombatLoot(winner, loser) {
  if (!winner || !loser) return null;
  if (winner.entity.owner !== "player") return null;
  if (loser.entity.owner !== "npc") return null;
  if (!winner.ships.some(s => s.alive)) return null; // mutual destruction → no loot
  const resources = {};
  const cards = [];
  for (const shipState of loser.ships) {
    const card = shipState.card;
    if (!card) continue;
    const rarity = card.rarity || "common";
    const range = LOOT_VALUE_RANGES[rarity] || LOOT_VALUE_RANGES.common;
    const credEquiv = range[0] + Math.random() * (range[1] - range[0]);
    const resType = LOOT_RESOURCE_TYPES[Math.floor(Math.random() * LOOT_RESOURCE_TYPES.length)];
    const weight = LOOT_RESOURCE_WEIGHTS[resType] || 1;
    const amount = Math.max(1, Math.round(credEquiv / weight));
    resources[resType] = (resources[resType] || 0) + amount;
    if (Math.random() < LOOT_CARD_DROP_CHANCE) cards.push(card);
  }
  return { resources, cards };
}

function cleanupCombat(combat, arrayIndex) {
  const aAlive = combat.sideA.ships.some(s => s.alive);
  const winner = aAlive ? combat.sideA : combat.sideB;
  const loser = aAlive ? combat.sideB : combat.sideA;

  // Roll salvage BEFORE removing the loser entity so loser.ships is intact.
  const loot = rollCombatLoot(winner, loser);

  // Remove destroyed entity
  const loserIdx = mapEntities.indexOf(loser.entity);
  if (loserIdx >= 0) {
    mapEntities.splice(loserIdx, 1);
    if (selectedEntityIdx === loserIdx) selectedEntityIdx = null;
    else if (selectedEntityIdx !== null && selectedEntityIdx > loserIdx) selectedEntityIdx--;
  }

  // Update winner
  syncSurvivorState(winner);
  winner.entity.inCombat = null;

  activeCombats.splice(arrayIndex, 1);

  // Apply loot + show salvage screen. Resources go into the global pool now;
  // any dropped cards land in the pirateLoot inventory and are marked seen.
  if (loot) {
    for (const k of Object.keys(loot.resources)) {
      resources[k] = (resources[k] || 0) + loot.resources[k];
    }
    for (const card of loot.cards) {
      pirateLoot[card.id] = (pirateLoot[card.id] || 0) + 1;
      markCardSeen(card);
    }
    if (Object.keys(loot.resources).length > 0 || loot.cards.length > 0) {
      showSalvageScreen(loot);
    }
  }
}

function tryDisengage(combat) {
  for (const side of [combat.sideA, combat.sideB]) {
    if (side.entity.stance !== "evasive") continue;
    if (!side.ships.some(s => s.alive)) continue;
    const other = side === combat.sideA ? combat.sideB : combat.sideA;
    const speedRatio = Math.max(0, (side.entity.speed - other.entity.speed) / Math.max(1, side.entity.speed));
    // 5% base per game-second, boosted by speed advantage
    const chance = 0.05 * (1 + speedRatio * 2);
    if (Math.random() < chance) {
      combat.phase = "resolved";
      combat.log.push({ time: combat.gameTime, text: `${side.entity.label} disengages!`, type: "disengage" });
      // Both survive — unlock both
      syncSurvivorState(combat.sideA);
      syncSurvivorState(combat.sideB);
      combat.sideA.entity.inCombat = null;
      combat.sideB.entity.inCombat = null;
    }
  }
}

function tickCombats(rawDt) {
  const dt = rawDt * COMBAT_TIME_SCALE;
  for (let ci = activeCombats.length - 1; ci >= 0; ci--) {
    const combat = activeCombats[ci];
    if (combat.phase === "resolved") {
      cleanupCombat(combat, ci);
      continue;
    }

    combat.gameTime += dt;

    // Move entities toward each other at full speed
    const entA = combat.sideA.entity;
    const entB = combat.sideB.entity;
    const dx = entB.x - entA.x;
    const dy = entB.y - entA.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    combat.distance = dist;

    // Face each other throughout the engagement (ships would otherwise
    // keep their pre-combat heading from lastHeadingAngle).
    if (dx !== 0 || dy !== 0) {
      entA.lastHeadingAngle = Math.atan2(dy, dx);
      entB.lastHeadingAngle = Math.atan2(-dy, -dx);
    }

    if (dist > ENGAGED_DISTANCE) {
      const nx = dx / dist;
      const ny = dy / dist;
      entA.x += nx * entA.speed * dt;
      entA.y += ny * entA.speed * dt;
      entB.x -= nx * entB.speed * dt;
      entB.y -= ny * entB.speed * dt;
    } else if (combat.phase === "closing") {
      combat.phase = "engaged";
      combat.log.push({ time: combat.gameTime, text: "Fleets at close range!", type: "engage" });
    }

    // Check disengagement attempts
    if (combat.sideA.entity.stance === "evasive" || combat.sideB.entity.stance === "evasive") {
      tryDisengage(combat);
      if (combat.phase === "resolved") continue;
    }

    // Shot timer
    combat.shotTimer -= dt;
    while (combat.shotTimer <= 0 && combat.phase !== "resolved") {
      // Fire current shot
      if (combat.turnIndex < combat.turnOrder.length) {
        fireShot(combat, combat.turnOrder[combat.turnIndex]);
        combat.turnIndex++;
      }

      // Round complete?
      if (combat.turnIndex >= combat.turnOrder.length) {
        combat.roundNumber++;
        combat.turnOrder = buildTurnOrder(combat.sideA, combat.sideB);
        combat.turnIndex = 0;
      }

      // Check if combat ended this shot
      checkCombatEnd(combat);
      if (combat.phase === "resolved") break;

      combat.shotTimer += SHOT_INTERVAL;
    }
  }
}

// ── Pictographic ship silhouettes ──
// Path geometry is normalized to ~size=1.0 (extents roughly within ±12 units
// for legendary, smaller for lower rarities). Callers scale by the existing
// per-rarity MINI_SHIP_SIZES knob so the size hierarchy in formations is
// preserved. Paths point "up" (negative Y); rotate the context to heading
// before calling. Caller is responsible for fillStyle/strokeStyle.
//
// At low zoom, drawShipSilhouette would melt into a smudge — we keep the
// existing tiny triangle (now factored into drawShipGlyph) for far zoom and
// crossfade between the two using SHIP_SILHOUETTE_FADE.
const SHIP_SILHOUETTE_FADE = { in: 0.85, out: 1.30 }; // zoom band where silhouette fades from 0→1

function shipSilhouetteAlpha(zoom) {
  const { in: a, out: b } = SHIP_SILHOUETTE_FADE;
  if (zoom <= a) return 0;
  if (zoom >= b) return 1;
  const t = (zoom - a) / (b - a);
  return t * t * (3 - 2 * t); // smoothstep
}

function drawShipSilhouette(ctx, rarity) {
  // Geometry from the v2 design exploration — five rarity-distinct shapes.
  // Each path is closed; caller fills + strokes inside its own save/restore.
  ctx.beginPath();
  if (rarity === "legendary") {
    // Capital dreadnought — long hull with twin wing arrays
    ctx.moveTo(0, -12);
    ctx.lineTo(2, -6); ctx.lineTo(4, -4); ctx.lineTo(7, -2); ctx.lineTo(7, 1);
    ctx.lineTo(4, 2);  ctx.lineTo(3, 6);  ctx.lineTo(-3, 6); ctx.lineTo(-4, 2);
    ctx.lineTo(-7, 1); ctx.lineTo(-7, -2); ctx.lineTo(-4, -4); ctx.lineTo(-2, -6);
  } else if (rarity === "epic") {
    // Cruiser — sleek twin-hull
    ctx.moveTo(0, -10);
    ctx.lineTo(3, -4);  ctx.lineTo(5, -2);  ctx.lineTo(5, 3);   ctx.lineTo(2, 4);
    ctx.lineTo(-2, 4);  ctx.lineTo(-5, 3);  ctx.lineTo(-5, -2); ctx.lineTo(-3, -4);
  } else if (rarity === "rare") {
    // Heavy frigate — angular pentagonal hull
    ctx.moveTo(0, -8);
    ctx.lineTo(4, -2); ctx.lineTo(4, 4); ctx.lineTo(-4, 4); ctx.lineTo(-4, -2);
  } else if (rarity === "uncommon") {
    // Corvette — slim arrow with swept stern
    ctx.moveTo(0, -7);
    ctx.lineTo(3, 2); ctx.lineTo(2, 4); ctx.lineTo(-2, 4); ctx.lineTo(-3, 2);
  } else {
    // Common — simple triangular scout
    ctx.moveTo(0, -6);
    ctx.lineTo(3, 3); ctx.lineTo(-3, 3);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}

// Tiny abstract glyph used at far zoom (where the detailed silhouette would
// just be a smudge). Same coordinate frame as the silhouettes — caller sets
// fill/stroke and rotation.
function drawShipGlyph(ctx, isFleet) {
  ctx.beginPath();
  if (isFleet) {
    ctx.moveTo(0, -1.0); ctx.lineTo(0.85, 0.6); ctx.lineTo(0, 0.15); ctx.lineTo(-0.85, 0.6);
  } else {
    ctx.moveTo(0, -1.0); ctx.lineTo(0.7, 0.6); ctx.lineTo(-0.7, 0.6);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}

// NPC entities (pirates) are only rendered when actively detected: in a
// player sensor zone, OR currently engaged in combat with a player ship.
// Memory fog reveals stationary terrain (stars), but mobile units must be
// visible only while a scout/colony actively sees them.
function isEntityVisibleToPlayer(ent) {
  if (!ent || ent.owner !== "npc") return true;
  if (ent.inCombat) return true;
  return isInPlayerSensorRange(ent.x, ent.y);
}

function drawEntities(ctx, time) {
  for (let i = 0; i < mapEntities.length; i++) {
    const ent = mapEntities[i];
    if (!isEntityVisibleToPlayer(ent)) continue;
    const pos = worldToScreen(ent.x, ent.y);
    const isSelected = selectedEntityIdx === i;

    // Draw travel line to destination
    if (ent.destX !== null && ent.destY !== null) {
      const destPos = worldToScreen(ent.destX, ent.destY);
      ctx.save();
      ctx.strokeStyle = "rgba(74, 122, 192, 0.4)";
      ctx.lineWidth = 1.5 * camera.zoom;
      ctx.setLineDash([8 * camera.zoom, 5 * camera.zoom]);
      // Animate dash in movement direction
      ctx.lineDashOffset = -time * 40;
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      ctx.lineTo(destPos.x, destPos.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();

      // Small dot at destination
      ctx.fillStyle = "rgba(74, 122, 192, 0.3)";
      ctx.beginPath();
      ctx.arc(destPos.x, destPos.y, 3 * camera.zoom, 0, Math.PI * 2);
      ctx.fill();
    }

    // Entity icon
    const isFleet = ent.type === "fleet";
    const size = (isFleet ? 8 : 6) * camera.zoom;
    const rarityColor = ent.owner === "npc" ? "#c04040"
      : ent.type === "ship"
      ? (RARITY_COLORS[ent.card.rarity] || "#4a7ac0")
      : (ent.admiral ? (RARITY_COLORS[ent.admiral.rarity] || "#4a7ac0") : "#6a7a9b");
    ctx.save();
    ctx.translate(pos.x, pos.y);

    // Selection highlight
    if (isSelected) {
      // Sensor-range halo — soft outer ring at the entity's actual detect
      // boundary (ent.sensorRange * 50 world units, matching the fog
      // renderer). Pulses gently so it reads as a "scanning" effect rather
      // than a hard border. Skipped if the radius would be smaller than
      // the entity icon (degenerate case).
      const sensorR = (ent.sensorRange || 0) * 50 * camera.zoom;
      if (sensorR > size + 2) {
        const pulse = 0.32 + 0.12 * Math.sin(time * 2);
        ctx.save();
        ctx.strokeStyle = `rgba(170,210,240,${pulse.toFixed(3)})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(0, 0, sensorR, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
      // Close selection dash around the icon itself.
      ctx.strokeStyle = rarityColor;
      ctx.lineWidth = 2;
      ctx.setLineDash([3 * camera.zoom, 2 * camera.zoom]);
      ctx.lineDashOffset = -time * 20;
      ctx.beginPath();
      ctx.arc(0, 0, size + 4 * camera.zoom, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    if (isFleet) {
      // Main fleet mark — mostly transparent, glowy. Layered:
      //   outer halo → thin ring → inner core glow → count text.
      // Subtle shimmer animation ties alpha to animTime.
      const r = parseInt(rarityColor.slice(1,3), 16);
      const g = parseInt(rarityColor.slice(3,5), 16);
      const b = parseInt(rarityColor.slice(5,7), 16);
      const col = `${r},${g},${b}`;
      const shimmer = 0.85 + 0.15 * Math.sin(time * 2.2 + ent.x * 0.01);

      // Outer halo
      const haloR = size * 3.2;
      const halo = ctx.createRadialGradient(0, 0, 0, 0, 0, haloR);
      halo.addColorStop(0.0,  `rgba(${col},${(0.32 * shimmer).toFixed(3)})`);
      halo.addColorStop(0.35, `rgba(${col},${(0.12 * shimmer).toFixed(3)})`);
      halo.addColorStop(1.0,  `rgba(${col},0)`);
      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(0, 0, haloR, 0, Math.PI * 2);
      ctx.fill();

      // Thin ring
      ctx.strokeStyle = `rgba(${col},${(0.75 * shimmer).toFixed(3)})`;
      ctx.lineWidth = Math.max(1, 1.4 * camera.zoom);
      ctx.beginPath();
      ctx.arc(0, 0, size * 1.1, 0, Math.PI * 2);
      ctx.stroke();

      // Inner core — bright white center fading to rarity color
      const coreR = size * 0.55;
      const core = ctx.createRadialGradient(0, 0, 0, 0, 0, coreR);
      core.addColorStop(0.0, `rgba(255,255,255,${(0.55 * shimmer).toFixed(3)})`);
      core.addColorStop(0.5, `rgba(${col},${(0.45 * shimmer).toFixed(3)})`);
      core.addColorStop(1.0, `rgba(${col},0)`);
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.arc(0, 0, coreR, 0, Math.PI * 2);
      ctx.fill();

      // Ship count — glowing white over the core
      if (camera.zoom > 0.4) {
        const countText = `${ent.ships.length}`;
        ctx.font = `bold ${Math.max(7, 8 * camera.zoom)}px 'Segoe UI', system-ui, sans-serif`;
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = `rgba(${col},0.9)`;
        ctx.shadowBlur = 4;
        ctx.fillText(countText, 0, 0);
        ctx.shadowBlur = 0;
      }

      // Miniature ship triangles around the main mark, one per ship,
      // sized & colored by ship rarity. Hidden at very low zoom to keep
      // the starmap readable; first ring only at medium zoom.
      //
      // When the fleet is traveling, each ship:
      //   - rotates to point along the fleet's heading (with a light per-
      //     ship wobble so rotations don't lock-step)
      //   - gets a perpendicular sway added to its formation slot so its
      //     individual trajectory curves instead of running a rigid rail
      // When stationary, ships point radially outward from the fleet
      // center, suggesting the formation "facing out".
      if (ent.ships.length > 0 && camera.zoom > 0.45) {
        const formation = getFormation(ent);
        const shipCap = camera.zoom < 1.0 ? 6 : 18;
        const visibleShips = Math.min(ent.ships.length, shipCap);

        const moving = (ent.destX !== null && ent.destY !== null);
        let currentHeading = null;
        if (moving) {
          const dxh = ent.destX - ent.x;
          const dyh = ent.destY - ent.y;
          if (dxh !== 0 || dyh !== 0) currentHeading = Math.atan2(dyh, dxh);
        }
        // Remember the last heading so ships retain their facing after stopping.
        if (currentHeading !== null) ent.lastHeadingAngle = currentHeading;
        // Perpendicular unit vector to CURRENT heading (used for sway — only
        // while actually moving, so stationary ships don't drift sideways).
        let perpX = 0, perpY = 0;
        if (currentHeading !== null) {
          perpX = -Math.sin(currentHeading);
          perpY =  Math.cos(currentHeading);
        }

        for (let si = 0; si < visibleShips; si++) {
          const ship = ent.ships[si];
          const slot = formation[si];
          if (!slot) continue;
          const phase = si * 1.31;  // prime-ish spacing so ships don't sync

          // Formation offset (world units) with sway only while actually moving.
          let offWX = Math.cos(slot.angle) * slot.radius;
          let offWY = Math.sin(slot.angle) * slot.radius;
          if (currentHeading !== null) {
            const sway = Math.sin(time * 1.4 + phase) * 3.5;  // world units
            offWX += perpX * sway;
            offWY += perpY * sway;
          }
          const fx = offWX * camera.zoom;
          const fy = offWY * camera.zoom;

          // Orientation: last known heading if available (persists after
          // stopping), else radial-outward default for brand-new formations.
          // Wobble only while actively moving.
          let triAngle;
          if (ent.lastHeadingAngle !== undefined) {
            const wobble = (currentHeading !== null)
              ? Math.sin(time * 2.1 + phase * 0.7) * 0.12
              : 0;
            triAngle = ent.lastHeadingAngle + Math.PI / 2 + wobble;
          } else {
            triAngle = slot.angle + Math.PI / 2;
          }

          const shipRarity = ship.rarity || "common";
          const shipCol = ent.owner === "npc"
            ? "#c04040"
            : (RARITY_COLORS[shipRarity] || "#4a7ac0");
          const ts = (MINI_SHIP_SIZES[shipRarity] || 3.5) * camera.zoom;
          // Crossfade: tiny chevron glyph at far zoom, detailed silhouette
          // close in. Old triangle's vertical extent was `ts` — silhouettes
          // are normalized to ~6 units up, so divide by 6 to match.
          const silAlpha = shipSilhouetteAlpha(camera.zoom);
          const glyphAlpha = 1 - silAlpha;
          ctx.save();
          ctx.translate(fx, fy);
          ctx.rotate(triAngle);
          ctx.fillStyle = shipCol;
          ctx.strokeStyle = "rgba(0,0,0,0.45)";
          ctx.lineWidth = Math.max(0.5, 0.6 * camera.zoom);
          if (glyphAlpha > 0.04) {
            ctx.save();
            ctx.scale(ts, ts);
            ctx.globalAlpha = glyphAlpha;
            // Per-ship glyph in a fleet still uses the solo "triangle" form;
            // the bigger fleet-chevron mark is the parent fleet icon.
            drawShipGlyph(ctx, false);
            ctx.restore();
          }
          if (silAlpha > 0.04) {
            ctx.save();
            ctx.scale(ts / 6, ts / 6);
            ctx.globalAlpha = silAlpha;
            drawShipSilhouette(ctx, shipRarity);
            ctx.restore();
          }
          ctx.restore();
        }
      }
    } else {
      // Solo ship icon — silhouette rotated to heading, with chevron glyph
      // at far zoom for legibility. Retains its last heading after stopping;
      // defaults to "up" only if it's never moved.
      if (ent.destX !== null && ent.destY !== null) {
        const dxh = ent.destX - ent.x;
        const dyh = ent.destY - ent.y;
        if (dxh !== 0 || dyh !== 0) ent.lastHeadingAngle = Math.atan2(dyh, dxh);
      }
      const soloAngle = (ent.lastHeadingAngle !== undefined)
        ? ent.lastHeadingAngle + Math.PI / 2
        : 0;
      const soloRarity = ent.rarity || "common";
      const soloFill = isSelected ? lightenColor(rarityColor, 30) : rarityColor;
      const silAlpha = shipSilhouetteAlpha(camera.zoom);
      const glyphAlpha = 1 - silAlpha;
      ctx.save();
      ctx.rotate(soloAngle);
      ctx.fillStyle = soloFill;
      ctx.strokeStyle = "rgba(0,0,0,0.5)";
      ctx.lineWidth = Math.max(0.5, 0.7 * camera.zoom);
      if (glyphAlpha > 0.04) {
        ctx.save();
        ctx.scale(size, size);
        ctx.globalAlpha = glyphAlpha;
        drawShipGlyph(ctx, false);
        ctx.restore();
      }
      if (silAlpha > 0.04) {
        ctx.save();
        // size = 6 * camera.zoom; silhouettes are ~6 units tall → scale = camera.zoom.
        ctx.scale(camera.zoom, camera.zoom);
        ctx.globalAlpha = silAlpha;
        drawShipSilhouette(ctx, soloRarity);
        ctx.restore();
      }
      // Bright cockpit core — small white dot, scaled with zoom.
      ctx.globalAlpha = 1;
      ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Stance indicator badge
    if (camera.zoom > 0.5) {
      const stanceChar = ent.stance === "aggressive" ? "A" : "E";
      const stanceColor = ent.stance === "aggressive" ? "#e05050" : "#50a0e0";
      ctx.font = `bold ${Math.max(6, 7 * camera.zoom)}px 'Segoe UI', system-ui, sans-serif`;
      ctx.fillStyle = stanceColor;
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(stanceChar, size + 2 * camera.zoom, 0);
    }

    ctx.restore();

    // Label
    if (camera.zoom > 0.5) {
      ctx.fillStyle = isSelected ? "rgba(200,210,230,0.9)" : "rgba(200,210,230,0.6)";
      ctx.font = `${Math.max(8, 10 * camera.zoom)}px 'Segoe UI', system-ui, sans-serif`;
      ctx.textAlign = "center";
      ctx.fillText(ent.label, pos.x, pos.y + size + 12 * camera.zoom);
      // ETA below label for traveling entities
      if (ent.destX !== null && ent.destY !== null && ent.speed > 0) {
        const dist = Math.sqrt((ent.destX - ent.x) ** 2 + (ent.destY - ent.y) ** 2);
        ctx.fillStyle = "rgba(160,160,210,0.5)";
        ctx.font = `${Math.max(7, 9 * camera.zoom)}px 'Segoe UI', system-ui, sans-serif`;
        ctx.fillText(formatETA(entityETARealSec(ent, dist)), pos.x, pos.y + size + 22 * camera.zoom);
      }
    }
  }
}

// ── Combat particles ──
const combatParticles = [];
const WEAPON_PARTICLE_COLORS = {
  energy:  { r: 80, g: 160, b: 255 },   // blue
  kinetic: { r: 255, g: 180, b: 60 },   // orange
  missile: { r: 255, g: 60, b: 40 },    // red
};

function spawnCombatParticle(worldX, worldY, weaponType, isHit) {
  const col = WEAPON_PARTICLE_COLORS[weaponType] || WEAPON_PARTICLE_COLORS.energy;
  const count = isHit ? 8 : 3;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 20 + Math.random() * 40;
    combatParticles.push({
      x: worldX + (Math.random() - 0.5) * 10,
      y: worldY + (Math.random() - 0.5) * 10,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.6 + Math.random() * 0.4,
      maxLife: 0.6 + Math.random() * 0.4,
      r: col.r, g: col.g, b: col.b,
      size: isHit ? 2 + Math.random() * 2 : 1 + Math.random(),
    });
  }
}

function tickParticles(dt) {
  for (let i = combatParticles.length - 1; i >= 0; i--) {
    const p = combatParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.life -= dt;
    if (p.life <= 0) combatParticles.splice(i, 1);
  }
}

function drawCombatParticles(ctx) {
  for (const p of combatParticles) {
    const pos = worldToScreen(p.x, p.y);
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${alpha.toFixed(2)})`;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, p.size * camera.zoom, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── Weapon visuals (volley shots) ──
// A separate, short-lived visual system for the actual shot rendering —
// beams for energy, projectile swarms for kinetic, glowing missiles for
// missile. Impact particles (spawnCombatParticle) still render on top for
// the hit/miss flash. Each visual stores firer + target WORLD positions
// so camera pan / zoom don't disturb them.
const weaponVisuals = [];

function spawnWeaponVisual(fwx, fwy, twx, twy, weaponType) {
  // Weapon visuals tick on scaledDt * VISUAL_DT_FACTOR while combat runs on
  // scaledDt * COMBAT_TIME_SCALE. One combat-time SHOT_INTERVAL is therefore
  // SHOT_INTERVAL * VISUAL_DT_FACTOR / COMBAT_TIME_SCALE visual-tick-seconds —
  // the "volley window" each shot event gets to fill with visual activity.
  const VOLLEY = SHOT_INTERVAL * VISUAL_DT_FACTOR / COMBAT_TIME_SCALE;

  if (weaponType === "energy") {
    // One continuous beam covering ~90% of the window.
    weaponVisuals.push({
      kind: "beam", fx: fwx, fy: fwy, tx: twx, ty: twy,
      life: VOLLEY * 0.9, maxLife: VOLLEY * 0.9,
      continuous: true,
    });
  } else if (weaponType === "kinetic") {
    // 3 bursts of 4 projectiles each, spaced across the window.
    const bursts = 3;
    const perBurst = 4;
    for (let b = 0; b < bursts; b++) {
      const burstDelay = b * (VOLLEY / bursts) + Math.random() * 0.4;
      for (let i = 0; i < perBurst; i++) {
        const spread = (Math.random() - 0.5) * 18;
        const travel = 0.55 + Math.random() * 0.15;
        weaponVisuals.push({
          kind: "kinetic", fx: fwx, fy: fwy, tx: twx, ty: twy,
          spread,
          delay: burstDelay,
          life: travel, maxLife: travel,
        });
      }
    }
  } else if (weaponType === "missile") {
    // 2-3 missiles launching at random moments within the window.
    const count = 2 + Math.floor(Math.random() * 2);
    const travel = 1.05;
    for (let i = 0; i < count; i++) {
      const delay = Math.random() * (VOLLEY - travel);
      weaponVisuals.push({
        kind: "missile", fx: fwx, fy: fwy, tx: twx, ty: twy,
        delay,
        life: travel, maxLife: travel,
      });
    }
  }
}

function tickWeaponVisuals(dt) {
  for (let i = weaponVisuals.length - 1; i >= 0; i--) {
    const v = weaponVisuals[i];
    if (v.delay !== undefined && v.delay > 0) {
      v.delay -= dt;
      continue;
    }
    v.life -= dt;
    if (v.life <= 0) weaponVisuals.splice(i, 1);
  }
}

function drawWeaponVisuals(ctx) {
  for (const v of weaponVisuals) {
    if (v.delay !== undefined && v.delay > 0) continue;  // queued, not yet firing
    const progress = 1 - (v.life / v.maxLife);   // 0..1 over lifetime
    // Alpha stays near-full until the last ~35% of life, then fades.
    // Continuous beams hold alpha longer (fade only in last 12%).
    const fadePoint = v.continuous ? 0.12 : 0.35;
    const alpha = v.life > v.maxLife * fadePoint
      ? 1
      : Math.max(0, v.life / (v.maxLife * fadePoint));

    if (v.kind === "beam") {
      // Energy — full-length beam from firer to target, gradient fade.
      const pf = worldToScreen(v.fx, v.fy);
      const pt = worldToScreen(v.tx, v.ty);
      ctx.save();
      ctx.shadowColor = "#80c0ff";
      ctx.shadowBlur = Math.max(6, 10 * camera.zoom);
      const grad = ctx.createLinearGradient(pf.x, pf.y, pt.x, pt.y);
      grad.addColorStop(0.00, `rgba(220,240,255,${(0.95 * alpha).toFixed(3)})`);
      grad.addColorStop(0.25, `rgba(120,200,255,${(0.90 * alpha).toFixed(3)})`);
      grad.addColorStop(1.00, `rgba(80,160,255,${(0.65 * alpha).toFixed(3)})`);
      ctx.strokeStyle = grad;
      ctx.lineWidth = Math.max(1.6, 2.4 * camera.zoom);
      ctx.beginPath();
      ctx.moveTo(pf.x, pf.y);
      ctx.lineTo(pt.x, pt.y);
      ctx.stroke();
      ctx.restore();
    } else if (v.kind === "kinetic") {
      // Projectile advances along the vector. `spread` is a perpendicular
      // offset in world units so multi-projectile volleys fan slightly.
      const dxw = v.tx - v.fx;
      const dyw = v.ty - v.fy;
      const len = Math.hypot(dxw, dyw) || 1;
      const px = -dyw / len, py = dxw / len;
      const wx = v.fx + dxw * progress + px * v.spread;
      const wy = v.fy + dyw * progress + py * v.spread;
      const pos = worldToScreen(wx, wy);
      ctx.save();
      ctx.shadowColor = "#ffc040";
      ctx.shadowBlur = Math.max(3, 5 * camera.zoom);
      ctx.fillStyle = `rgba(255,220,90,${alpha.toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, Math.max(1.2, 2 * camera.zoom), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    } else if (v.kind === "missile") {
      // Head advances firer→target over life. Short glowing trail behind
      // it: white-hot front, orange plume.
      const dxw = v.tx - v.fx;
      const dyw = v.ty - v.fy;
      const hwx = v.fx + dxw * progress;
      const hwy = v.fy + dyw * progress;
      const trail = Math.max(0, progress - 0.18);
      const twxT = v.fx + dxw * trail;
      const twyT = v.fy + dyw * trail;
      const phead = worldToScreen(hwx, hwy);
      const ptail = worldToScreen(twxT, twyT);
      ctx.save();
      ctx.shadowColor = "#ff8040";
      ctx.shadowBlur = Math.max(4, 7 * camera.zoom);
      const grad = ctx.createLinearGradient(ptail.x, ptail.y, phead.x, phead.y);
      grad.addColorStop(0.0, `rgba(255,100,30,0)`);
      grad.addColorStop(0.5, `rgba(255,150,60,${(0.85 * alpha).toFixed(3)})`);
      grad.addColorStop(1.0, `rgba(255,245,220,${alpha.toFixed(3)})`);
      ctx.strokeStyle = grad;
      ctx.lineWidth = Math.max(1.5, 2.2 * camera.zoom);
      ctx.beginPath();
      ctx.moveTo(ptail.x, ptail.y);
      ctx.lineTo(phead.x, phead.y);
      ctx.stroke();
      ctx.restore();
    }
  }
}

function drawCombatIndicators(ctx, time) {
  for (const combat of activeCombats) {
    if (combat.phase === "resolved") continue;
    const entA = combat.sideA.entity;
    const entB = combat.sideB.entity;

    // Use actual entity positions (they move toward each other in tickCombats)
    const posA = worldToScreen(entA.x, entA.y);
    const posB = worldToScreen(entB.x, entB.y);

    // Red glowing line
    ctx.save();
    ctx.shadowColor = "#ff3030";
    ctx.shadowBlur = 12 * camera.zoom;
    ctx.strokeStyle = "rgba(255, 48, 48, 0.6)";
    ctx.lineWidth = 2 * camera.zoom;
    ctx.beginPath();
    ctx.moveTo(posA.x, posA.y);
    ctx.lineTo(posB.x, posB.y);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();

    // Crossed swords icon at midpoint
    const mx = (posA.x + posB.x) / 2;
    const my = (posA.y + posB.y) / 2;
    const iconSize = Math.max(10, 14 * camera.zoom);
    const pulse = 0.7 + 0.3 * Math.sin(time * 4);

    ctx.fillStyle = `rgba(180, 30, 30, ${0.4 * pulse})`;
    ctx.beginPath();
    ctx.arc(mx, my, iconSize, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = `rgba(255, 200, 200, ${pulse})`;
    ctx.font = `${iconSize * 1.2}px 'Segoe UI Emoji', 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("\u2694", mx, my);

    // Store screen coords for click hit testing
    combat._screenMidX = mx;
    combat._screenMidY = my;
    combat._screenRadius = iconSize;
  }
}

function getCombatAtScreen(sx, sy) {
  for (const combat of activeCombats) {
    if (combat.phase === "resolved") continue;
    if (combat._screenMidX === undefined) continue;
    const d = Math.sqrt((sx - combat._screenMidX) ** 2 + (sy - combat._screenMidY) ** 2);
    if (d < combat._screenRadius + 5) return combat;
  }
  return null;
}

// ── Combat Overlay UI ──
let viewedCombat = null;
let lastLogLength = 0;

function showCombatOverlay(combat) {
  viewedCombat = combat;
  lastLogLength = 0;
  // Rebuild full log from start
  const logEl = document.getElementById("combat-log");
  logEl.innerHTML = "";
  document.getElementById("combat-backdrop").classList.add("visible");
  const overlay = document.getElementById("combat-overlay");
  overlay.style.display = "flex";
  requestAnimationFrame(() => overlay.classList.add("visible"));
  refreshCombatOverlay();
}

function hideCombatOverlay() {
  viewedCombat = null;
  const overlay = document.getElementById("combat-overlay");
  const backdrop = document.getElementById("combat-backdrop");
  overlay.classList.remove("visible");
  backdrop.classList.remove("visible");
  setTimeout(() => { overlay.style.display = "none"; }, 300);
}

function renderCombatSide(container, side, label, sideKey) {
  const aCount = side.ships.filter(s => s.alive).length;
  const tCount = side.ships.length;
  let html = `<h3>${label} (${aCount}/${tCount})</h3>`;
  for (let i = 0; i < side.ships.length; i++) {
    const s = side.ships[i];
    const maxS = (s.card.stats.shields || 0) * COMBAT_HP_SCALE;
    const maxA = (s.card.stats.armor || 0) * COMBAT_HP_SCALE;
    const totalMax = maxS + maxA;
    const sPct = totalMax > 0 ? (s.currentShields / totalMax * 100) : 0;
    const aPct = totalMax > 0 ? (s.currentArmor / totalMax * 100) : 0;
    const rarityCol = RARITY_COLORS[s.card.rarity] || "#6a7a9b";
    const deadClass = s.alive ? "" : " dead";
    html += `<div class="combat-ship-tile${deadClass}" onclick="showCombatCardMagnified('${sideKey}', ${i})">
      <div class="combat-ship-tile-stripe" style="background:${rarityCol}"></div>
      <div class="combat-ship-tile-body">
        <div class="combat-ship-tile-head">
          <span class="combat-ship-tile-name">${s.card.name}</span>
          <span class="combat-ship-tile-hp">${Math.ceil(s.currentShields)}s ${Math.ceil(s.currentArmor)}a</span>
        </div>
        <div class="combat-hp-bar">
          <div class="combat-hp-shields" style="width:${sPct}%"></div>
          <div class="combat-hp-armor" style="width:${aPct}%"></div>
        </div>
      </div>
    </div>`;
  }
  container.innerHTML = html;
}

function refreshCombatOverlay() {
  if (!viewedCombat) return;
  const c = viewedCombat;

  renderCombatSide(document.getElementById("combat-side-a"), c.sideA, c.sideA.entity.label, "a");
  renderCombatSide(document.getElementById("combat-side-b"), c.sideB, c.sideB.entity.label, "b");

  // Status
  const phaseNames = { closing: "Closing...", engaged: "Engaged!", resolved: "Resolved" };
  document.getElementById("combat-phase").textContent = phaseNames[c.phase] || c.phase;
  const distPct = c.initialDistance > 0 ? (c.distance / c.initialDistance) * 100 : 0;
  document.getElementById("combat-distance-fill").style.width = distPct + "%";
  document.getElementById("combat-round").textContent = `Round ${c.roundNumber}`;
  // c.shotTimer is in combat-time-seconds. Real-seconds = combat-sec divided
  // by the chain BASE_GAME_SPEED * gameSpeed * COMBAT_TIME_SCALE. Fall back
  // to 1x when paused so the display stays meaningful instead of "Infinity".
  const speedFactor = BASE_GAME_SPEED * (gameSpeed > 0 ? gameSpeed : 1) * COMBAT_TIME_SCALE;
  const nextVolleyReal = Math.max(0, c.shotTimer) / Math.max(speedFactor, 1e-9);
  const pausedNote = gameSpeed === 0 ? " (at 1x)" : "";
  document.getElementById("combat-next-volley").textContent = c.phase === "resolved" ? "" : `Next volley: ${nextVolleyReal.toFixed(1)}s${pausedNote}`;

  // Log — only append new entries
  const logEl = document.getElementById("combat-log");
  for (let i = lastLogLength; i < c.log.length; i++) {
    const entry = c.log[i];
    const div = document.createElement("div");
    div.className = `log-${entry.type || "hit"}`;
    div.textContent = `[${entry.time.toFixed(1)}s] ${entry.text}`;
    logEl.appendChild(div);
  }
  lastLogLength = c.log.length;
  logEl.scrollTop = logEl.scrollHeight;
}

document.getElementById("combat-close").addEventListener("click", hideCombatOverlay);
document.getElementById("combat-backdrop").addEventListener("click", hideCombatOverlay);

function getEntityAtScreen(sx, sy) {
  const world = screenToWorld(sx, sy);
  const hitRadius = 15 / camera.zoom;  // generous click target
  for (let i = 0; i < mapEntities.length; i++) {
    const ent = mapEntities[i];
    if (!isEntityVisibleToPlayer(ent)) continue; // can't click what you can't see
    const d = Math.sqrt((world.x - ent.x) ** 2 + (world.y - ent.y) ** 2);
    if (d < hitRadius) return i;
  }
  return null;
}

// ═══════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════
const camera = {
  x: 0, y: 0,       // world offset (center of view)
  zoom: 1.0,
  minZoom: 0.1,
  maxZoom: 3.0,
};

function worldToScreen(wx, wy) {
  const canvas = document.getElementById("starmap");
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  return {
    x: (wx - camera.x) * camera.zoom + cx,
    y: (wy - camera.y) * camera.zoom + cy,
  };
}

function screenToWorld(sx, sy) {
  const canvas = document.getElementById("starmap");
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  return {
    x: (sx - cx) / camera.zoom + camera.x,
    y: (sy - cy) / camera.zoom + camera.y,
  };
}

// ═══════════════════════════════════════════
//  BACKGROUND STAR FIELD
// ═══════════════════════════════════════════
const BG_STARS = [];
function initBgStars(count = 400) {
  for (let i = 0; i < count; i++) {
    BG_STARS.push({
      x: Math.random() * 4000 - 2000,
      y: Math.random() * 4000 - 2000,
      size: Math.random() * 1.2 + 0.3,
      brightness: Math.random() * 0.4 + 0.1,
    });
  }
}
initBgStars();

// ═══════════════════════════════════════════
//  NEBULAE
// ═══════════════════════════════════════════
// Soft Gaussian-blurred gas clouds drawn in world-space between the deep-space
// fill and the bg-star parallax layer. Each nebula is prerendered once into
// its own offscreen canvas (multi-octave radial-noise procedural mask) and
// blitted with drawImage every frame, so per-frame cost is just N textured
// blits regardless of how detailed the textures are.
//
// Color rules: cool brand range (cobalt/violet/magenta) dominates, with the
// occasional warm rust-orange "relic-zone" pocket per the design direction.
const NEBULAE = [];
const NEBULA_PALETTE_COOL = [
  { r:  60, g: 110, b: 220 }, // cobalt
  { r: 120, g:  80, b: 220 }, // violet
  { r: 200, g:  90, b: 200 }, // magenta
  { r:  50, g: 140, b: 200 }, // ice-blue
  { r: 150, g: 100, b: 230 }, // periwinkle
];
const NEBULA_PALETTE_WARM = [
  { r: 220, g: 110, b:  60 }, // rust
  { r: 230, g: 140, b:  70 }, // amber-rust
];

// Tiny seedable RNG so nebula layout is stable across reloads.
function nebulaRand(seed) {
  let s = seed | 0;
  return function() {
    s = (s * 1664525 + 1013904223) | 0;
    return ((s >>> 0) % 100000) / 100000;
  };
}

// 2D value noise — cheap, smooth, good enough for a soft mask.
function makeNoise2D(rand) {
  const SIZE = 64;
  const grid = new Float32Array(SIZE * SIZE);
  for (let i = 0; i < grid.length; i++) grid[i] = rand();
  function smooth(t) { return t * t * (3 - 2 * t); }
  return function(x, y) {
    const xi = Math.floor(x), yi = Math.floor(y);
    const xf = x - xi, yf = y - yi;
    const x0 = ((xi % SIZE) + SIZE) % SIZE;
    const y0 = ((yi % SIZE) + SIZE) % SIZE;
    const x1 = (x0 + 1) % SIZE;
    const y1 = (y0 + 1) % SIZE;
    const v00 = grid[y0 * SIZE + x0];
    const v10 = grid[y0 * SIZE + x1];
    const v01 = grid[y1 * SIZE + x0];
    const v11 = grid[y1 * SIZE + x1];
    const sx = smooth(xf), sy = smooth(yf);
    const a = v00 + (v10 - v00) * sx;
    const b = v01 + (v11 - v01) * sx;
    return a + (b - a) * sy;
  };
}

// Bake one nebula's pixel data into an offscreen canvas. The mask is a sum of
// 4 noise octaves multiplied by a radial falloff so the cloud fades cleanly
// at the edges instead of clipping on the canvas border.
function bakeNebula(rand, palette) {
  const SIZE = 256;
  const cv = document.createElement("canvas");
  cv.width = SIZE;
  cv.height = SIZE;
  const c = cv.getContext("2d");
  const img = c.createImageData(SIZE, SIZE);
  const noise = makeNoise2D(rand);
  // Pick a base color and a secondary tint for inner highlights, both from
  // the same palette so the cloud feels like one body of gas.
  const base = palette[Math.floor(rand() * palette.length)];
  const tint = palette[Math.floor(rand() * palette.length)];
  // Octave frequencies — broad shape, then progressively finer detail.
  const freqs = [1.5, 3.2, 6.8, 13.5];
  const amps  = [0.55, 0.28, 0.13, 0.08];
  const phaseX = rand() * 100, phaseY = rand() * 100;
  // Edge falloff softness — higher = harder edge, lower = wispy.
  const falloffPow = 1.6 + rand() * 1.2;
  // Inner brightness boost (rare bright pockets inside the cloud).
  const corePow = 2.5 + rand() * 1.5;
  const cx = SIZE / 2, cy = SIZE / 2;
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      // Multi-octave value noise normalized to 0..1.
      let n = 0;
      for (let i = 0; i < freqs.length; i++) {
        n += noise(phaseX + x / SIZE * freqs[i] * 8,
                   phaseY + y / SIZE * freqs[i] * 8) * amps[i];
      }
      // Radial falloff: 1 at center → 0 at edge of inscribed circle.
      const dx = (x - cx) / cx, dy = (y - cy) / cy;
      const d = Math.min(1, Math.sqrt(dx * dx + dy * dy));
      const radial = Math.pow(1 - d, falloffPow);
      const density = Math.max(0, Math.min(1, n)) * radial;
      // Inner-core tint mix (brighter pockets bias toward the tint color).
      const coreMix = Math.pow(density, corePow);
      const r = base.r * (1 - coreMix) + tint.r * coreMix;
      const g = base.g * (1 - coreMix) + tint.g * coreMix;
      const b = base.b * (1 - coreMix) + tint.b * coreMix;
      const idx = (y * SIZE + x) * 4;
      img.data[idx]     = r;
      img.data[idx + 1] = g;
      img.data[idx + 2] = b;
      // Alpha gates everything — most of the cloud is sparse, so a low
      // ceiling keeps it atmospheric instead of opaque.
      img.data[idx + 3] = Math.min(255, density * 220);
    }
  }
  c.putImageData(img, 0, 0);
  return cv;
}

function initNebulae() {
  // Seeded layout so the nebula field doesn't reshuffle between reloads.
  const rand = nebulaRand(0xC0FFEE);
  // World-space spread — covers a wide region so nebulae are visible at
  // typical zoom levels without obvious tiling.
  const SPREAD = 6000;
  const COUNT = 14;
  const WARM_RATIO = 0.18; // ~1 in 5 is a warm relic pocket
  for (let i = 0; i < COUNT; i++) {
    const palette = rand() < WARM_RATIO
      ? NEBULA_PALETTE_WARM
      : NEBULA_PALETTE_COOL;
    const tex = bakeNebula(rand, palette);
    NEBULAE.push({
      x: (rand() - 0.5) * SPREAD * 2,
      y: (rand() - 0.5) * SPREAD * 2,
      // World-space radius; texture is square so we draw it 2*radius wide.
      // Mix of large background drifts and smaller dense pockets.
      radius: 700 + rand() * 1400,
      rotation: rand() * Math.PI * 2,
      tex,
      // Per-cloud opacity so some recede and others pop.
      alpha: 0.55 + rand() * 0.35,
    });
  }
}
initNebulae();

function drawNebulae(ctx) {
  if (NEBULAE.length === 0) return;
  const canvas = ctx.canvas;
  // Slight parallax — nebulae move just a hair slower than the main star
  // layer so they feel "deeper" without breaking the world-anchored feel.
  const parallax = 0.85;
  ctx.save();
  // Additive-ish blend: "lighter" makes overlapping clouds bloom into each
  // other instead of stacking flatly, which sells the gas-cloud feel.
  ctx.globalCompositeOperation = "lighter";
  for (const neb of NEBULAE) {
    const sx = (neb.x - camera.x * parallax) * camera.zoom + canvas.width / 2;
    const sy = (neb.y - camera.y * parallax) * camera.zoom + canvas.height / 2;
    const screenR = neb.radius * camera.zoom;
    // Cull anything entirely off-screen (cheap AABB check).
    if (sx + screenR < 0 || sx - screenR > canvas.width ||
        sy + screenR < 0 || sy - screenR > canvas.height) continue;
    ctx.globalAlpha = neb.alpha;
    ctx.translate(sx, sy);
    ctx.rotate(neb.rotation);
    ctx.drawImage(neb.tex, -screenR, -screenR, screenR * 2, screenR * 2);
    ctx.rotate(-neb.rotation);
    ctx.translate(-sx, -sy);
  }
  ctx.restore();
}

// ═══════════════════════════════════════════
//  CANVAS RENDERING
// ═══════════════════════════════════════════
let animTime = 0;
let selectedStarId = null;
let hoveredStarId = null;

function resizeCanvas() {
  const canvas = document.getElementById("starmap");
  const container = document.getElementById("map-container");
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
}

// Convert a pointer event's viewport-pixel position into the canvas's internal
// coord system. Required because the body transform (see applyUiScale) makes
// the canvas's displayed size diverge from its internal pixel buffer:
// rect.width = canvas.width * uiScale. The kx/ky multipliers undo that, and
// also serve as 1/uiScale for placing tooltips inside the scaled body.
function pointerToCanvas(canvas, clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const kx = canvas.width / rect.width;
  const ky = canvas.height / rect.height;
  return {
    x: (clientX - rect.left) * kx,
    y: (clientY - rect.top) * ky,
    rect, kx, ky,
  };
}

function drawBgStars(ctx) {
  const canvas = ctx.canvas;
  const parallax = 0.15; // moves slower than main layer
  for (const bg of BG_STARS) {
    const sx = (bg.x - camera.x * parallax) * camera.zoom + canvas.width / 2;
    const sy = (bg.y - camera.y * parallax) * camera.zoom + canvas.height / 2;
    // Wrap around
    const wx = ((sx % canvas.width) + canvas.width) % canvas.width;
    const wy = ((sy % canvas.height) + canvas.height) % canvas.height;
    ctx.fillStyle = `rgba(180,200,240,${bg.brightness})`;
    ctx.fillRect(wx, wy, bg.size, bg.size);
  }
}


function drawStar(ctx, star, time) {
  const isExplored = star.visibility === "explored";
  const isDetected = star.visibility === "detected";
  if (star.visibility === "unknown") return;

  const visual = isExplored ? (STAR_VISUALS[star.card.type] || DETECTED_VISUAL) : DETECTED_VISUAL;
  const lum = isExplored ? (STAR_RENDER_LUMINOSITY[star.card.rarity] || 3) : 2;
  const baseRadius = visual.baseSize * (1 + lum * 0.08);

  // Pulse animation
  const pulse = 1 + Math.sin(time * 3 + star.x * 0.01 + star.y * 0.01) * 0.08;
  const radius = baseRadius * pulse * camera.zoom;

  const pos = worldToScreen(star.x, star.y);

  // Rarity aura for epic/legendary explored stars
  if (isExplored && (star.card.rarity === "epic" || star.card.rarity === "legendary")) {
    const auraColor = RARITY_COLORS[star.card.rarity];
    const auraRadius = radius * 3;
    const aura = ctx.createRadialGradient(pos.x, pos.y, radius, pos.x, pos.y, auraRadius);
    aura.addColorStop(0, auraColor + "40");
    aura.addColorStop(1, auraColor + "00");
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, auraRadius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Glow
  const glowRadius = radius * 2.5;
  const glow = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, glowRadius);
  glow.addColorStop(0, visual.glowColor);
  glow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, glowRadius, 0, Math.PI * 2);
  ctx.fill();

  // Star body
  ctx.fillStyle = visual.color;
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
  ctx.fill();

  // Bright core
  if (isExplored) {
    const coreGrad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, radius);
    coreGrad.addColorStop(0, "rgba(255,255,255,0.6)");
    coreGrad.addColorStop(0.3, "rgba(255,255,255,0.15)");
    coreGrad.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Binary system: draw second smaller star offset
  if (isExplored && star.card.type === "Binary System") {
    const offset = radius * 1.2;
    const angle2 = time * 0.5 + star.x;
    const bx = pos.x + Math.cos(angle2) * offset;
    const by = pos.y + Math.sin(angle2) * offset;
    ctx.fillStyle = "#90d0f0";
    ctx.beginPath();
    ctx.arc(bx, by, radius * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Trinary system: draw two extra stars
  if (isExplored && star.card.type === "Trinary System") {
    for (let i = 0; i < 2; i++) {
      const offset = radius * 1.3;
      const angle2 = time * 0.4 + star.x + i * Math.PI * 0.67;
      const bx = pos.x + Math.cos(angle2) * offset;
      const by = pos.y + Math.sin(angle2) * offset;
      ctx.fillStyle = i === 0 ? "#f0c060" : "#e09050";
      ctx.beginPath();
      ctx.arc(bx, by, radius * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Pulsar beams
  if (isExplored && star.card.type === "Pulsar") {
    const beamAngle = time * 2;
    ctx.save();
    ctx.translate(pos.x, pos.y);
    ctx.rotate(beamAngle);
    const beamLen = radius * 5;
    const beamGrad = ctx.createLinearGradient(0, 0, beamLen, 0);
    beamGrad.addColorStop(0, "rgba(128,224,224,0.4)");
    beamGrad.addColorStop(1, "rgba(128,224,224,0)");
    ctx.fillStyle = beamGrad;
    ctx.fillRect(0, -radius * 0.3, beamLen, radius * 0.6);
    ctx.rotate(Math.PI);
    ctx.fillRect(0, -radius * 0.3, beamLen, radius * 0.6);
    ctx.restore();
  }

  // Colonized star highlight (green glow if any planet colonized)
  if (isExplored && star.planets && star.planets.some(p => p.colony)) {
    const colR = radius + 8 * camera.zoom;
    const colGlow = ctx.createRadialGradient(pos.x, pos.y, radius, pos.x, pos.y, colR + 6 * camera.zoom);
    colGlow.addColorStop(0, "rgba(74,155,90,0.35)");
    colGlow.addColorStop(1, "rgba(74,155,90,0)");
    ctx.fillStyle = colGlow;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, colR + 6 * camera.zoom, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(74,155,90,0.5)";
    ctx.lineWidth = 2 * camera.zoom;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, colR, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Hover highlight
  if (hoveredStarId === star.id) {
    ctx.strokeStyle = "rgba(200,220,255,0.3)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, radius + 4 * camera.zoom, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Selection ring
  if (selectedStarId === star.id) {
    const ringRadius = radius + 6 * camera.zoom;
    const dashOffset = time * 30;
    ctx.strokeStyle = "#4a7ac0";
    ctx.lineWidth = 2;
    ctx.setLineDash([4 * camera.zoom, 3 * camera.zoom]);
    ctx.lineDashOffset = -dashOffset;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, ringRadius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.lineDashOffset = 0;
  }

  // Name label (explored only)
  if (isExplored && camera.zoom > 0.5) {
    ctx.fillStyle = "rgba(200,210,230,0.7)";
    ctx.font = `${Math.max(9, 11 * camera.zoom)}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = "center";
    ctx.fillText(star.card.name, pos.x, pos.y + radius + 14 * camera.zoom);
  }
}

// Offscreen canvas for territory body/outline passes — created once, resized as needed.
let territoryCanvas = null;
let territoryCtx = null;

function drawTerritoryContour(ctx) {
  // Collect screen positions of all colonized stars.
  const colonizedPos = [];
  for (const star of stars.values()) {
    if (star.visibility === "explored" && star.planets && star.planets.some(p => p.colony)) {
      colonizedPos.push(worldToScreen(star.x, star.y));
    }
  }
  if (colonizedPos.length === 0) return;

  // World-space padding around each colony; scaled with zoom so the territory
  // feels the same size regardless of camera.
  const pad = 140 * camera.zoom;
  // Darker blue + 25% more transparent than the previous tuning.
  const FILL_RGB = "rgb(40,80,180)";
  const OUTLINE_RGB = "rgb(70,120,200)";
  const FILL_ALPHA = 0.06;     // was 0.08
  const OUTLINE_ALPHA = 0.34;  // was 0.45

  // Single colony: pulsing disc with thin outline.
  if (colonizedPos.length === 1) {
    const p = colonizedPos[0];
    const r = pad + Math.sin(animTime * 2) * 4 * camera.zoom;
    ctx.save();
    ctx.fillStyle = `rgba(40,80,180,${FILL_ALPHA})`;
    ctx.strokeStyle = `rgba(70,120,200,${OUTLINE_ALPHA})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
    return;
  }

  // 2+ colonies: take the convex hull and build a curvy path where each edge
  // becomes a quadratic bulge outward. Stroking this curvy path with width
  // pad*2 and lineJoin=round inflates it into the territory shape, and the
  // bulged centerline makes the outer boundary curve instead of running
  // straight between corners.
  const hull = colonizedPos.length === 2 ? colonizedPos : convexHull(colonizedPos);
  const cx0 = hull.reduce((s, p) => s + p.x, 0) / hull.length;
  const cy0 = hull.reduce((s, p) => s + p.y, 0) / hull.length;
  const bulge = pad * 1;

  const curvyPath = (c) => {
    c.beginPath();
    if (hull.length === 2) {
      c.moveTo(hull[0].x, hull[0].y);
      c.lineTo(hull[1].x, hull[1].y);
      return;
    }
    c.moveTo(hull[0].x, hull[0].y);
    for (let i = 0; i < hull.length; i++) {
      const a = hull[i];
      const b = hull[(i + 1) % hull.length];
      const mx = (a.x + b.x) / 2;
      const my = (a.y + b.y) / 2;
      // Edge normal pointing away from centroid.
      let nx = -(b.y - a.y), ny = b.x - a.x;
      const nlen = Math.hypot(nx, ny) || 1;
      nx /= nlen; ny /= nlen;
      if ((mx - cx0) * nx + (my - cy0) * ny < 0) { nx = -nx; ny = -ny; }
      c.quadraticCurveTo(mx + nx * bulge, my + ny * bulge, b.x, b.y);
    }
    c.closePath();
  };

  // Offscreen canvas used for both body and outline passes. Rendering at full
  // opacity here and blitting with globalAlpha avoids the fill-vs-stroke
  // alpha-stacking seam that otherwise appears just inside the hull.
  const w = ctx.canvas.width, h = ctx.canvas.height;
  if (!territoryCanvas || territoryCanvas.width !== w || territoryCanvas.height !== h) {
    territoryCanvas = document.createElement("canvas");
    territoryCanvas.width = w;
    territoryCanvas.height = h;
    territoryCtx = territoryCanvas.getContext("2d");
  }
  const tctx = territoryCtx;
  tctx.lineJoin = "round";
  tctx.lineCap = "round";

  // ── BODY ── fill + thick stroke at solid opacity; blit at FILL_ALPHA.
  tctx.clearRect(0, 0, w, h);
  tctx.fillStyle = FILL_RGB;
  tctx.strokeStyle = FILL_RGB;
  tctx.lineWidth = pad * 2;
  curvyPath(tctx);
  if (hull.length > 2) tctx.fill();
  tctx.stroke();
  ctx.save();
  ctx.globalAlpha = FILL_ALPHA;
  ctx.drawImage(territoryCanvas, 0, 0);
  ctx.restore();

  // ── OUTLINE RING ── outer stroke at (pad*2+3), then destination-out a
  // slightly narrower fill+stroke to carve the interior, leaving just a ring
  // along the outer boundary. Blit at OUTLINE_ALPHA.
  tctx.clearRect(0, 0, w, h);
  tctx.strokeStyle = OUTLINE_RGB;
  tctx.lineWidth = pad * 2 + 3;
  curvyPath(tctx);
  tctx.stroke();
  tctx.globalCompositeOperation = "destination-out";
  tctx.fillStyle = "#000";
  tctx.strokeStyle = "#000";
  tctx.lineWidth = pad * 2 - 1;
  curvyPath(tctx);
  if (hull.length > 2) tctx.fill();
  tctx.stroke();
  tctx.globalCompositeOperation = "source-over";
  ctx.save();
  ctx.globalAlpha = OUTLINE_ALPHA;
  ctx.drawImage(territoryCanvas, 0, 0);
  ctx.restore();
}

function convexHull(points) {
  const pts = [...points].sort((a, b) => a.x - b.x || a.y - b.y);
  if (pts.length <= 2) return pts;
  const cross = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
  const lower = [];
  for (const p of pts) {
    while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
    lower.push(p);
  }
  const upper = [];
  for (let i = pts.length - 1; i >= 0; i--) {
    const p = pts[i];
    while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
    upper.push(p);
  }
  upper.pop();
  lower.pop();
  return lower.concat(upper);
}

// Offscreen canvas for fog — created once, resized as needed
let fogCanvas = null;
let fogCtx = null;
let memoryMaskCanvas = null;
let memoryMaskCtx = null;

// Alpha of fog left over in "seen but no active sight" tiles. 0 = fully cleared,
// 1 = fully fogged. ~0.55 gives a visible memory-trail that's still clearly
// distinct from both active sight (clear) and unknown space (black).
const MEMORY_FOG_ALPHA = 0.55;

function drawFogOfWar(ctx) {
  const w = ctx.canvas.width, h = ctx.canvas.height;

  // Create or resize offscreen canvases
  if (!fogCanvas || fogCanvas.width !== w || fogCanvas.height !== h) {
    fogCanvas = document.createElement("canvas");
    fogCanvas.width = w;
    fogCanvas.height = h;
    fogCtx = fogCanvas.getContext("2d");
    memoryMaskCanvas = document.createElement("canvas");
    memoryMaskCanvas.width = w;
    memoryMaskCanvas.height = h;
    memoryMaskCtx = memoryMaskCanvas.getContext("2d");
  }

  // Fill fog canvas fully opaque black.
  fogCtx.clearRect(0, 0, w, h);
  fogCtx.fillStyle = "#000";
  fogCtx.fillRect(0, 0, w, h);

  // ── PASS 1: MEMORY MASK ──────────────────────────────────────────────
  // Build a smooth silhouette of all on-screen seen tiles on the offscreen
  // mask canvas, then use it to partially carve fog. Each tile renders as a
  // radial gradient (center α=1 → edge α=0) with "lighter" compositing, so
  // overlapping tiles sum their alpha (clamped at 1) — this gives solid
  // coverage in the interior of marked regions AND smooth, feathered edges
  // where marks thin out, rather than a union of visible hard circles.
  memoryMaskCtx.clearRect(0, 0, w, h);
  memoryMaskCtx.globalCompositeOperation = "lighter";
  const viewTopLeft = screenToWorld(0, 0);
  const viewBotRight = screenToWorld(w, h);
  const minCx = Math.floor(viewTopLeft.x / CHUNK_SIZE) - 1;
  const maxCx = Math.floor(viewBotRight.x / CHUNK_SIZE) + 1;
  const minCy = Math.floor(viewTopLeft.y / CHUNK_SIZE) - 1;
  const maxCy = Math.floor(viewBotRight.y / CHUNK_SIZE) + 1;
  // Gradient radius well larger than a tile so neighbors' falloffs overlap
  // and sum to ~1 across the interior.
  const tileRadius = TILE_SIZE * 1.3 * camera.zoom;
  for (let cx = minCx; cx <= maxCx; cx++) {
    for (let cy = minCy; cy <= maxCy; cy++) {
      const bits = chunkSeenBits.get(`${cx},${cy}`);
      if (!bits) continue;
      for (let ty = 0; ty < TILES_PER_CHUNK; ty++) {
        for (let tx = 0; tx < TILES_PER_CHUNK; tx++) {
          if (!(bits & (1 << (ty * TILES_PER_CHUNK + tx)))) continue;
          const wx = cx * CHUNK_SIZE + (tx + 0.5) * TILE_SIZE;
          const wy = cy * CHUNK_SIZE + (ty + 0.5) * TILE_SIZE;
          const pos = worldToScreen(wx, wy);
          const grad = memoryMaskCtx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, tileRadius);
          grad.addColorStop(0, "rgba(255,255,255,1)");
          grad.addColorStop(1, "rgba(255,255,255,0)");
          memoryMaskCtx.fillStyle = grad;
          memoryMaskCtx.beginPath();
          memoryMaskCtx.arc(pos.x, pos.y, tileRadius, 0, Math.PI * 2);
          memoryMaskCtx.fill();
        }
      }
    }
  }
  memoryMaskCtx.globalCompositeOperation = "source-over";
  // Apply mask: remove (1 - MEMORY_FOG_ALPHA) of fog wherever mask is opaque.
  fogCtx.save();
  fogCtx.globalCompositeOperation = "destination-out";
  fogCtx.globalAlpha = 1 - MEMORY_FOG_ALPHA;
  fogCtx.drawImage(memoryMaskCanvas, 0, 0);
  fogCtx.restore();

  // ── PASS 2: ACTIVE SIGHT ──────────────────────────────────────────────
  // Full-clear holes from colonies, detected-star peeks, and entities.
  const activeZones = [];
  for (const star of stars.values()) {
    const hasColony = star.planets && star.planets.some(p => p.colony);
    if (hasColony) {
      activeZones.push({ wx: star.x, wy: star.y, range: BASE_SENSOR_RANGE });
    } else if (star.visibility === "detected") {
      activeZones.push({ wx: star.x, wy: star.y, range: 30 });
    }
  }
  for (const ent of mapEntities) {
    if (ent.owner === "npc") continue;
    activeZones.push({ wx: ent.x, wy: ent.y, range: ent.sensorRange * 50 });
  }

  fogCtx.globalCompositeOperation = "destination-out";
  for (const zone of activeZones) {
    const pos = worldToScreen(zone.wx, zone.wy);
    const radius = zone.range * camera.zoom;
    const grad = fogCtx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, radius);
    grad.addColorStop(0, "rgba(0, 0, 0, 1)");
    grad.addColorStop(0.7, "rgba(0, 0, 0, 1)");
    grad.addColorStop(1, "rgba(0, 0, 0, 0)");
    fogCtx.fillStyle = grad;
    fogCtx.beginPath();
    fogCtx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
    fogCtx.fill();
  }
  fogCtx.globalCompositeOperation = "source-over";

  // Blit fog onto main canvas.
  ctx.save();
  ctx.globalAlpha = 0.88;
  ctx.drawImage(fogCanvas, 0, 0);
  ctx.globalAlpha = 1;
  ctx.restore();
}

function render() {
  const canvas = document.getElementById("starmap");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = "#050508";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Nebulae sit between the deep-space fill and the bg-star parallax layer
  // so distant stars (and everything above) read cleanly through the gas.
  drawNebulae(ctx);

  drawBgStars(ctx);

  // Draw stars (detected first, then explored so they're on top)
  const detectedStars = [];
  const exploredStars = [];
  for (const star of stars.values()) {
    if (star.visibility === "detected") detectedStars.push(star);
    else if (star.visibility === "explored") exploredStars.push(star);
  }
  for (const star of detectedStars) drawStar(ctx, star, animTime);
  for (const star of exploredStars) drawStar(ctx, star, animTime);

  // Probes/fleets drawn above stars but below fog
  drawEntities(ctx, animTime);
  drawCombatIndicators(ctx, animTime);
  drawWeaponVisuals(ctx);
  drawCombatParticles(ctx);

  // Fog of war on top — covers unexplored areas, detected stars peek through
  drawFogOfWar(ctx);

  // Empire territory contour renders above fog so the boundary is always
  // visible, but it draws no stars — revealed space is still star-based.
  drawTerritoryContour(ctx);
}

// ═══════════════════════════════════════════
//  CARD PREVIEW RENDERERS
//  All six card categories render through the metallic
//  "Rustfang" template. Chrome (frame, halo, img slot,
//  header, cost pill, special, flavor, watermark) lives
//  in ui/card-chrome.css; each renderer only owns the
//  middle content unique to its category.
//  Router: buildCardHtml(card) below.
// ═══════════════════════════════════════════
const RESOURCE_LABELS = {
  credits: "Credits", energy: "Energy", minerals: "Minerals",
  research: "Research", food: "Food",
};
const RANGE_NAMES = { short: "Short", medium: "Medium", long: "Long" };

// Friendly names for stat-key tooltips. RESOURCE_LABELS already covers the
// 5 base resources; this fills in ship / admiral / leader attributes.
const STAT_LABELS = {
  shields: "Shields", armor: "Armor", speed: "Speed",
  sensorRange: "Sensor range", stealth: "Stealth", pointDefense: "Point defense",
  energyDmg: "Energy damage", kineticDmg: "Kinetic damage", missileDmg: "Missile damage",
  commandBonus: "Command bonus", maxFleetSize: "Max fleet size",
  efficiency: "Efficiency", morale: "Morale", engineering: "Engineering",
  charisma: "Charisma", logistics: "Logistics", diplomacy: "Diplomacy",
  tactics: "Tactics", growth: "Growth",
  research_bonus: "Research bonus",
  attack: "Attack", defense: "Defense", hull: "Hull",
};
function statLabelFor(key) {
  return STAT_LABELS[key] || RESOURCE_LABELS[key] || (key[0].toUpperCase() + key.slice(1));
}

// Picks a biome sprite id for a planet card based on its name. Falls back to
// the generic globe glyph when nothing matches.
function planetBiomeIconId(name) {
  const n = (name || "").toLowerCase();
  if (/volcan|magma|fire/.test(n))                        return "i-planet-fire";
  if (/froz|tundra|\bice\b/.test(n))                      return "i-planet-ice";
  if (/ocean|water/.test(n))                              return "i-planet-ocean";
  if (/gaia|jungle|verdant|temperate|forest/.test(n))     return "i-planet-verdant";
  if (/desert|arid/.test(n))                              return "i-planet-desert";
  if (/\bgas\b|giant/.test(n))                            return "i-planet-gas";
  if (/crystal/.test(n))                                  return "i-planet-crystal";
  if (/barren|rock|moon\b/.test(n))                       return "i-planet-barren";
  return "i-planet";
}

// ── Shared body fragments ───────────────────────────────────────────
function buildCostPillHtml(cost) {
  if (!cost || Object.keys(cost).length === 0) return "";
  const parts = Object.entries(cost).map(([key, val]) => {
    const iconId = RES_ICON_BY_KEY[key];
    const icon = iconId ? `<svg class="ico ${key}"><use href="#${iconId}"/></svg>` : "";
    const label = RESOURCE_LABELS[key] || key;
    return `<span class="cost-part" style="--cost-c: var(--res-${key})" title="${label}: ${formatResourceValue(val)}">${icon}${formatResourceValue(val)}</span>`;
  });
  return `<div class="cost">${parts.join("")}</div>`;
}
// Registry of special abilities. The card's `special` field stores a stable
// system key (e.g. "colonize"); game logic compares against the key directly.
// The renderer looks up player-facing text here. Adding a new ability =
// adding an entry with { label, ... }; legacy cards whose `special` is free
// prose still render fine because unknown keys fall back to the raw string.
const SPECIAL_ABILITIES = {
  colonize: { label: "Can colonize planets" },
};

function getSpecialDisplay(card) {
  if (!card || !card.special) return "";
  const ability = SPECIAL_ABILITIES[card.special];
  return ability ? ability.label : card.special;
}

function buildSpecialHtml(text)  { return text ? `<div class="special"><span class="sn">Special</span>${text}</div>` : ""; }
function buildFlavorHtml(text)   { return text ? `<div class="flv">${text}</div>` : ""; }
function buildWatermarkHtml(id)  { return `<div class="wm"><svg viewBox="0 0 24 24"><use href="#${id}"/></svg></div>`; }

// Inline SVG icon helper for non-card UI (buttons, headers, tooltips).
// Pass extra classes like "sm" for 11px or "lg" for 18px, or a resource key
// (credits/energy/minerals/research/food) to pick up that color.
function ico(id, classes = "") {
  return `<svg class="ico${classes ? " " + classes : ""}"><use href="#${id}"/></svg>`;
}

// Returns ` style="color:<quality>"` when the card carries a per-stat range,
// so rolled values show a gold/purple/blue/green/gray tint by percentile.
// Empty string otherwise — the chrome's default white takes over. Pass a
// `defaultColor` to tint chips that lack ranges (e.g. green for planet bonuses).
function statColorStyle(card, rangesField, key, val, defaultColor) {
  const ranges = card[rangesField];
  if (ranges && ranges[key]) {
    return ` style="color:${getStatQualityColor(val, ranges[key][0], ranges[key][1])}"`;
  }
  return defaultColor ? ` style="color:${defaultColor}"` : "";
}
function buildArtImageHtml(src, subLabel, alt) {
  return `<div class="img"><img src="${src}" alt="${alt || ""}" loading="lazy" decoding="async"><div class="subtype">${subLabel}</div></div>`;
}
function buildGlyphImageHtml(glyphId, subLabel) {
  return `<div class="img"><div class="glyph"><svg viewBox="0 0 24 24"><use href="#${glyphId}"/></svg></div><div class="subtype">${subLabel}</div></div>`;
}

function buildShipCardHtml(card) {
  const s = card.stats || {};
  const qc = (key, val) => card.statRanges && card.statRanges[key]
    ? getStatQualityColor(val, card.statRanges[key][0], card.statRanges[key][1]) : null;
  const colored = (color) => color ? ` style="color:${color}"` : "";

  const subLabel = `${card.rarity || "common"} · ${card.category === "pirate" ? "Pirate" : "Ship"}`;

  let costHtml = "";
  if (card.cost && Object.keys(card.cost).length > 0) {
    const parts = Object.entries(card.cost).map(([key, val]) => {
      const iconId = RES_ICON_BY_KEY[key];
      const icon = iconId ? `<svg class="ico ${key}"><use href="#${iconId}"/></svg>` : "";
      const label = RESOURCE_LABELS[key] || key;
      return `<span class="cost-part" style="--cost-c: var(--res-${key})" title="${label}: ${formatResourceValue(val)}">${icon}${formatResourceValue(val)}</span>`;
    });
    costHtml = `<div class="cost">${parts.join("")}</div>`;
  }

  const defenseDefs = [
    { key: "shields", icon: "i-shield", cls: "shield", label: "Shields" },
    { key: "armor",   icon: "i-armor",  cls: "armor",  label: "Armor" },
    { key: "speed",   icon: "i-speed",  cls: "speed",  label: "Speed" },
  ].filter(d => s[d.key] != null);
  const defenseRow = defenseDefs.length === 0 ? "" :
    `<div class="row">${defenseDefs.map(d =>
      `<div class="stat" title="${d.label}: ${formatResourceValue(s[d.key])}"><svg class="ico ${d.cls}"><use href="#${d.icon}"/></svg><span class="sv"${colored(qc(d.key, s[d.key]))}>${formatResourceValue(s[d.key])}</span></div>`
    ).join("")}</div>`;

  const weaponDefs = [
    { dmg: "energyDmg",  range: "energyRange",  cls: "energy",  icon: "i-beam",    cvar: "var(--wpn-energy)",  name: "Energy" },
    { dmg: "kineticDmg", range: "kineticRange", cls: "kinetic", icon: "i-kinetic", cvar: "var(--wpn-kinetic)", name: "Kinetic" },
    { dmg: "missileDmg", range: "missileRange", cls: "missile", icon: "i-missile", cvar: "var(--wpn-missile)", name: "Missile" },
  ].filter(w => s[w.dmg] && s[w.dmg] > 0);
  const weaponsHtml = weaponDefs.length === 0 ? "" :
    `<div class="weap">${weaponDefs.map(w => {
      const range = s[w.range] || "medium";
      const rBadge = range === "short" ? "S" : range === "long" ? "L" : "M";
      const title = `${w.name} weapon · ${RANGE_NAMES[range]} range · ${formatResourceValue(s[w.dmg])} dmg`;
      return `<div class="wr" style="--wr-c:${w.cvar}" title="${title}"><svg class="ico ${w.cls}"><use href="#${w.icon}"/></svg><span class="sv"${colored(qc(w.dmg, s[w.dmg]))}>${formatResourceValue(s[w.dmg])}</span><span class="rb ${rBadge}">${rBadge}</span></div>`;
    }).join("")}</div>`;

  const utilDefs = [
    { key: "sensorRange",  icon: "i-sensor",  cls: "sensor",  label: "Sensor range" },
    { key: "pointDefense", icon: "i-pd",      cls: "pd",      label: "Point defense" },
    { key: "stealth",      icon: "i-stealth", cls: "stealth", label: "Stealth" },
  ].filter(u => s[u.key]);
  const utilRow = utilDefs.length === 0 ? "" :
    `<div class="row u">${utilDefs.map(u =>
      `<div class="stat" title="${u.label}: ${formatResourceValue(s[u.key])}"><svg class="ico ${u.cls}"><use href="#${u.icon}"/></svg><span class="sv"${colored(qc(u.key, s[u.key]))}>${formatResourceValue(s[u.key])}</span></div>`
    ).join("")}</div>`;

  const specialDisplay = getSpecialDisplay(card);
  const specialHtml = specialDisplay
    ? `<div class="special"><span class="sn">Special</span>${specialDisplay}</div>` : "";
  const flavorHtml = card.flavor ? `<div class="flv">${card.flavor}</div>` : "";

  // Placeholder portrait until ship-specific art is authored per card.
  // Subtype label is overlaid on the image (bottom-left) via ui/ship-card.css.
  const imgSrc = card.image || "assets/ships/rustfang_corsair.png";
  const imageHtml = `<div class="img">`
    + `<img src="${imgSrc}" alt="${card.name || ''}">`
    + `<div class="subtype">${subLabel}</div>`
    + `</div>`;

  return `
    <div class="card-preview tpl-metal is-ship ${card.rarity || "common"}">
      <div class="bg"></div>
