      <div class="frame-corners"><span class="fc-tr"></span><span class="fc-bl"></span></div>
      <div class="c">
        ${costHtml}
        <div class="hdr"><span class="hdr-name">${card.name || ""}</span></div>
        ${imageHtml}
        ${defenseRow}
        ${weaponsHtml}
        ${utilRow}
        ${specialHtml}
        ${flavorHtml}
        <div class="wm"><svg viewBox="0 0 24 24"><use href="#i-solo-ship"/></svg></div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
//  STAR CARD — actual planet slots when rolled, template spec otherwise
// ═══════════════════════════════════════════
function buildStarCardHtml(card) {
  const rarity = card.rarity || "common";
  const subLabel = `${rarity} · Star`;

  // In-game instances carry `planetSlots` (an array of rarities, one per rolled
  // planet). Prefer that. Templates / card-builder previews only have the
  // planetGen spec, which we summarise instead.
  let mainRow = "", pipsHtml = "";
  if (Array.isArray(card.planetSlots)) {
    const slots = card.planetSlots;
    const n = slots.length;
    const countChip = `<div class="stat" title="${n} planet${n === 1 ? "" : "s"} in this system">`
      + `<svg class="ico planet"><use href="#i-planet"/></svg>`
      + `<span class="sv">${n}</span></div>`;
    mainRow = `<div class="row">${countChip}</div>`;
    pipsHtml = n === 0 ? "" :
      `<div class="pip-row" data-label="PLANETS">${slots.map(r =>
        `<span class="pip ${r}" title="${r} planet"></span>`
      ).join("")}</div>`;
  } else {
    const gen = (card.categoryData && card.categoryData.planetGen) || {};
    const count = gen.count || [0, 0];
    const guaranteed = gen.guaranteed || [];
    const bonus = gen.bonus || 0;
    const countLabel = count[0] === count[1] ? `${count[0]}` : `${count[0]}–${count[1]}`;
    const countChip = `<div class="stat" title="Planets generated: ${count[0]}–${count[1]}">`
      + `<svg class="ico planet"><use href="#i-planet"/></svg>`
      + `<span class="sv">${countLabel}</span></div>`;
    const bonusChip = bonus > 0
      ? `<div class="stat" title="Rarity bonus: +${bonus} tier${bonus > 1 ? "s" : ""}">`
        + `<svg class="ico"><use href="#i-spark"/></svg>`
        + `<span class="sv">+${bonus}</span></div>`
      : "";
    mainRow = `<div class="row">${countChip}${bonusChip}</div>`;
    pipsHtml = guaranteed.length === 0 ? "" :
      `<div class="pip-row" data-label="GUARANTEED">${guaranteed.map(r =>
        `<span class="pip ${r}" title="Guaranteed ${r} planet"></span>`
      ).join("")}</div>`;
  }

  const imageHtml = card.image
    ? buildArtImageHtml(card.image, subLabel, card.name)
    : buildGlyphImageHtml("i-star", subLabel);

  return `
    <div class="card-preview tpl-metal is-star ${rarity}">
      <div class="bg"></div>
      <div class="frame-corners"><span class="fc-tr"></span><span class="fc-bl"></span></div>
      <div class="c">
        <div class="hdr"><span class="hdr-name">${card.name || ""}</span></div>
        ${imageHtml}
        ${mainRow}
        ${pipsHtml}
        ${buildSpecialHtml(getSpecialDisplay(card))}
        ${buildFlavorHtml(card.flavor)}
        ${buildWatermarkHtml("i-star")}
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
//  PLANET CARD — resource-bonus chips
// ═══════════════════════════════════════════
function buildPlanetCardHtml(card) {
  const rarity = card.rarity || "common";
  const subLabel = `${rarity} · Planet`;
  const bonuses = (card.categoryData && card.categoryData.bonuses) || card.bonuses || {};
  const entries = Object.entries(bonuses);
  const bonusRow = entries.length === 0 ? "" :
    `<div class="row">${entries.map(([key, val]) => {
      const iconId = STAT_ICON_IDS[key] || "i-spark";
      const label = statLabelFor(key);
      const colorStyle = statColorStyle(card, "bonusRanges", key, val, "var(--success-fg)");
      return `<div class="stat" title="${label}: +${val}%">`
        + `<svg class="ico ${key}"><use href="#${iconId}"/></svg>`
        + `<span class="sv"${colorStyle}>+${val}%</span></div>`;
    }).join("")}</div>`;

  const glyphId = planetBiomeIconId(card.name);
  const imageHtml = card.image
    ? buildArtImageHtml(card.image, subLabel, card.name)
    : buildGlyphImageHtml(glyphId, subLabel);

  return `
    <div class="card-preview tpl-metal is-planet ${rarity}">
      <div class="bg"></div>
      <div class="frame-corners"><span class="fc-tr"></span><span class="fc-bl"></span></div>
      <div class="c">
        <div class="hdr"><span class="hdr-name">${card.name || ""}</span></div>
        ${imageHtml}
        ${bonusRow}
        ${buildSpecialHtml(getSpecialDisplay(card))}
        ${buildFlavorHtml(card.flavor)}
        ${buildWatermarkHtml("i-planet")}
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
//  BUILDING CARD — production + upkeep rows
// ═══════════════════════════════════════════
function buildBuildingCardHtml(card) {
  const rarity = card.rarity || "common";
  const subLabel = `${rarity} · Building`;

  const prodEntries = Object.entries(card.stats || {});
  const prodRow = prodEntries.length === 0 ? "" :
    `<div class="row">${prodEntries.map(([key, val]) => {
      const iconId = STAT_ICON_IDS[key] || "i-spark";
      const label = statLabelFor(key);
      const colorStyle = statColorStyle(card, "statRanges", key, val);
      return `<div class="stat" title="${label} produced: +${formatResourceValue(val)}/tick">`
        + `<svg class="ico ${key}"><use href="#${iconId}"/></svg>`
        + `<span class="sv"${colorStyle}>+${formatResourceValue(val)}</span></div>`;
    }).join("")}</div>`;

  // Upkeep is always bad — don't color by roll quality, keep it uniformly red (via CSS).
  const upkeepEntries = Object.entries(card.upkeep || {});
  const upkeepRow = upkeepEntries.length === 0 ? "" :
    `<div class="row u">${upkeepEntries.map(([key, val]) => {
      const iconId = STAT_ICON_IDS[key] || "i-spark";
      const label = statLabelFor(key);
      return `<div class="stat" title="${label} upkeep: -${formatResourceValue(val)}/tick">`
        + `<svg class="ico ${key}"><use href="#${iconId}"/></svg>`
        + `<span class="sv">-${formatResourceValue(val)}</span></div>`;
    }).join("")}</div>`;

  const imageHtml = card.image
    ? buildArtImageHtml(card.image, subLabel, card.name)
    : buildGlyphImageHtml("i-building", subLabel);

  return `
    <div class="card-preview tpl-metal is-building ${rarity}">
      <div class="bg"></div>
      <div class="frame-corners"><span class="fc-tr"></span><span class="fc-bl"></span></div>
      <div class="c">
        ${buildCostPillHtml(card.cost)}
        <div class="hdr"><span class="hdr-name">${card.name || ""}</span></div>
        ${imageHtml}
        ${prodRow}
        ${upkeepRow}
        ${buildSpecialHtml(getSpecialDisplay(card))}
        ${buildFlavorHtml(card.flavor)}
        ${buildWatermarkHtml("i-building")}
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
//  ADMIRAL CARD — command hero row + ship-stat bonuses
// ═══════════════════════════════════════════
function buildAdmiralCardHtml(card) {
  const rarity = card.rarity || "common";
  const subLabel = `${rarity} · Admiral`;
  const s = card.stats || {};
  const cmd = s.commandBonus || 0;
  const cap = s.maxFleetSize || 0;

  const heroRow = `<div class="row hero">`
    + `<div class="stat" title="Command bonus: +${cmd}%">`
    + `<svg class="ico command"><use href="#i-command"/></svg>`
    + `<span class="sv">+${cmd}%</span></div>`
    + `<div class="stat" title="Max fleet size: ${cap}">`
    + `<svg class="ico fleet-cap"><use href="#i-fleet-cap"/></svg>`
    + `<span class="sv">${cap}</span></div>`
    + `</div>`;

  // Map ship-stat keys to the existing .ico color classes in ship/admiral CSS.
  const SHIP_ICO_CLS = {
    shields: "shield", armor: "armor", sensorRange: "sensor",
    kineticDmg: "kinetic", missileDmg: "missile", energyDmg: "energy",
  };
  const bonusKeys = Object.keys(s).filter(k => k !== "commandBonus" && k !== "maxFleetSize");
  const bonusRow = bonusKeys.length === 0 ? "" :
    `<div class="row u bonuses">${bonusKeys.map(key => {
      const iconId = STAT_ICON_IDS[key] || "i-spark";
      const cls = SHIP_ICO_CLS[key] || "";
      const label = statLabelFor(key);
      return `<div class="stat" title="${label}: +${formatResourceValue(s[key])}">`
        + `<svg class="ico ${cls}"><use href="#${iconId}"/></svg>`
        + `<span class="sv">+${formatResourceValue(s[key])}</span></div>`;
    }).join("")}</div>`;

  const imageHtml = card.image
    ? buildArtImageHtml(card.image, subLabel, card.name)
    : buildGlyphImageHtml("i-admiral", subLabel);

  return `
    <div class="card-preview tpl-metal is-admiral ${rarity}">
      <div class="bg"></div>
      <div class="frame-corners"><span class="fc-tr"></span><span class="fc-bl"></span></div>
      <div class="c">
        ${buildCostPillHtml(card.cost)}
        <div class="hdr"><span class="hdr-name">${card.name || ""}</span></div>
        ${imageHtml}
        ${heroRow}
        ${bonusRow}
        ${buildSpecialHtml(getSpecialDisplay(card))}
        ${buildFlavorHtml(card.flavor)}
        ${buildWatermarkHtml("i-admiral")}
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
//  ROUTER — dispatches on card.category
//  (the old `watermark` 2nd arg is ignored; kept
//  in the signature so existing call sites still compile)
// ═══════════════════════════════════════════
function buildCardHtml(card /* , watermark */) {
  switch (card.category) {
    case "ship":
    case "pirate":   return buildShipCardHtml(card);
    case "star":     return buildStarCardHtml(card);
    case "planet":   return buildPlanetCardHtml(card);
    case "building": return buildBuildingCardHtml(card);
    case "leader":   return buildLeaderCardHtml(card);
    case "admiral":  return buildAdmiralCardHtml(card);
    default:         return buildShipCardHtml(card);
  }
}

// ═══════════════════════════════════════════
//  SYSTEM VIEW OVERLAY
// ═══════════════════════════════════════════
let systemAnimFrame = null;
let systemViewStar = null;
let hoveredPlanetIdx = null;
let selectedPlanetIdx = null;

function resizeSystemCanvas() {
  const canvas = document.getElementById("system-canvas");
  const overlay = document.getElementById("system-overlay");
  // Use offsetWidth/Height since the overlay is now a sized box, not fullscreen
  canvas.width = overlay.offsetWidth;
  canvas.height = overlay.offsetHeight;
}

function drawSystemStar(ctx, cx, cy, star, time) {
  const visual = STAR_VISUALS[star.card.type] || DETECTED_VISUAL;
  const lum = STAR_RENDER_LUMINOSITY[star.card.rarity] || 3;
  const scale = 3.5;
  const baseRadius = visual.baseSize * (1 + lum * 0.08) * scale;
  const pulse = 1 + Math.sin(time * 3) * 0.05;
  const radius = baseRadius * pulse;

  // Rarity aura
  if (star.card.rarity === "epic" || star.card.rarity === "legendary") {
    const auraColor = RARITY_COLORS[star.card.rarity];
    const auraRadius = radius * 3;
    const aura = ctx.createRadialGradient(cx, cy, radius, cx, cy, auraRadius);
    aura.addColorStop(0, auraColor + "40");
    aura.addColorStop(1, auraColor + "00");
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(cx, cy, auraRadius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Glow
  const glowRadius = radius * 3;
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowRadius);
  glow.addColorStop(0, visual.glowColor);
  glow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, cy, glowRadius, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = visual.color;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fill();

  // Core
  const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
  coreGrad.addColorStop(0, "rgba(255,255,255,0.6)");
  coreGrad.addColorStop(0.3, "rgba(255,255,255,0.15)");
  coreGrad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fill();

  // Binary companion
  if (star.card.type === "Binary System") {
    const offset = radius * 1.2;
    const angle2 = time * 0.5;
    ctx.fillStyle = "#90d0f0";
    ctx.beginPath();
    ctx.arc(cx + Math.cos(angle2) * offset, cy + Math.sin(angle2) * offset, radius * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Trinary companions
  if (star.card.type === "Trinary System") {
    for (let i = 0; i < 2; i++) {
      const offset = radius * 1.3;
      const angle2 = time * 0.4 + i * Math.PI * 0.67;
      ctx.fillStyle = i === 0 ? "#f0c060" : "#e09050";
      ctx.beginPath();
      ctx.arc(cx + Math.cos(angle2) * offset, cy + Math.sin(angle2) * offset, radius * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Pulsar beams
  if (star.card.type === "Pulsar") {
    const beamAngle = time * 2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(beamAngle);
    const beamLen = radius * 5;
    const beamGrad = ctx.createLinearGradient(0, 0, beamLen, 0);
    beamGrad.addColorStop(0, "rgba(128,224,224,0.4)");
    beamGrad.addColorStop(1, "rgba(128,224,224,0)");
    ctx.fillStyle = beamGrad;
    ctx.fillRect(0, -radius * 0.3, beamLen, radius * 0.6);
    ctx.rotate(Math.PI);
    ctx.fillRect(0, -radius * 0.3, beamLen, radius * 0.6);
    ctx.restore();
  }

  return radius; // return for orbit ring offset
}

function getPlanetScreenPos(planet, cx, cy, time) {
  const angle = planet.orbitPhase + planet.orbitSpeed * time;
  const scale = Math.min(cx, cy) / 250; // scale orbits to canvas size
  const r = planet.orbitRadius * scale;
  return {
    x: cx + Math.cos(angle) * r,
    y: cy + Math.sin(angle) * r,
  };
}

function getPlanetScreenRadius(planet) {
  const pv = PLANET_VISUALS[planet.card.type] || { baseSize: 5 };
  return pv.baseSize * 1.5;
}

function renderSystemView(time) {
  const star = systemViewStar;
  if (!star || !star.planets) return;

  const canvas = document.getElementById("system-canvas");
  const ctx = canvas.getContext("2d");
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background (slightly transparent — overlay bg shows through)
  ctx.fillStyle = "rgba(5,5,8,0.3)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Background star field (subtle)
  for (let i = 0; i < 120; i++) {
    const bx = ((i * 137.508 + 50) % canvas.width);
    const by = ((i * 97.231 + 30) % canvas.height);
    const brightness = 0.1 + (i % 5) * 0.04;
    ctx.fillStyle = `rgba(180,200,240,${brightness})`;
    ctx.fillRect(bx, by, 0.8, 0.8);
  }

  const scale = Math.min(cx, cy) / 250;

  // Orbital rings
  for (const planet of star.planets) {
    const r = planet.orbitRadius * scale;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(42,58,96,0.3)";
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Star
  drawSystemStar(ctx, cx, cy, star, time);

  // Planets
  star.planets.forEach((planet, idx) => {
    const pos = getPlanetScreenPos(planet, cx, cy, time);
    const pv = PLANET_VISUALS[planet.card.type] || { color:"#888", glowColor:"rgba(128,128,128,0.3)", baseSize:5 };
    const radius = getPlanetScreenRadius(planet);

    // Glow
    const glowR = radius * 2.5;
    const glow = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, glowR);
    glow.addColorStop(0, pv.glowColor);
    glow.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Rarity aura for epic/legendary
    if (planet.card.rarity === "epic" || planet.card.rarity === "legendary") {
      const auraColor = RARITY_COLORS[planet.card.rarity];
      const auraR = radius * 3;
      const aura = ctx.createRadialGradient(pos.x, pos.y, radius, pos.x, pos.y, auraR);
      aura.addColorStop(0, auraColor + "30");
      aura.addColorStop(1, auraColor + "00");
      ctx.fillStyle = aura;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, auraR, 0, Math.PI * 2);
      ctx.fill();
    }

    // Body
    ctx.fillStyle = pv.color;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
    ctx.fill();

    // Ring World Fragment — draw arc ring
    if (planet.card.type === "Ring World Fragment") {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius * 1.6, -0.8, 0.8);
      ctx.strokeStyle = "rgba(144,168,192,0.6)";
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Tidally Locked — half dark
    if (planet.card.type === "Tidally Locked World") {
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius, Math.PI * 0.5, Math.PI * 1.5);
      ctx.fill();
    }

    // Volcanic glow
    if (planet.card.type === "Volcanic World") {
      const vGlow = ctx.createRadialGradient(pos.x, pos.y, radius * 0.3, pos.x, pos.y, radius);
      vGlow.addColorStop(0, "rgba(255,100,20,0.3)");
      vGlow.addColorStop(1, "rgba(255,60,10,0)");
      ctx.fillStyle = vGlow;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    // Crystalline shimmer
    if (planet.card.type === "Crystalline World") {
      const shimmer = 0.3 + Math.sin(time * 4 + idx) * 0.15;
      ctx.fillStyle = `rgba(200,220,255,${shimmer})`;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }

    // Gas Giant bands
    if (planet.card.type === "Gas Giant") {
      for (let b = -3; b <= 3; b++) {
        const by = pos.y + b * (radius * 0.25);
        const bandW = Math.sqrt(Math.max(0, radius * radius - (b * radius * 0.25) ** 2));
        ctx.fillStyle = b % 2 === 0 ? "rgba(180,120,50,0.2)" : "rgba(200,150,70,0.15)";
        ctx.fillRect(pos.x - bandW, by - 1, bandW * 2, 2);
      }
    }

    // Precursor golden glow
    if (planet.card.type === "Precursor Homeworld") {
      const pGlow = ctx.createRadialGradient(pos.x, pos.y, radius * 0.5, pos.x, pos.y, radius * 1.5);
      pGlow.addColorStop(0, "rgba(200,180,60,0.2)");
      pGlow.addColorStop(1, "rgba(200,180,60,0)");
      ctx.fillStyle = pGlow;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius * 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Colonized highlight (permanent green glow ring)
    if (planet.colony) {
      const colR = radius + 6;
      const colGlow = ctx.createRadialGradient(pos.x, pos.y, radius, pos.x, pos.y, colR + 4);
      colGlow.addColorStop(0, "rgba(74,155,90,0.4)");
      colGlow.addColorStop(1, "rgba(74,155,90,0)");
      ctx.fillStyle = colGlow;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, colR + 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(74,155,90,0.6)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, colR, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Hover ring
    if (hoveredPlanetIdx === idx) {
      ctx.strokeStyle = "rgba(200,220,255,0.5)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius + 4, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Selection ring
    if (selectedPlanetIdx === idx) {
      ctx.strokeStyle = "#4a7ac0";
      ctx.lineWidth = 2;
      ctx.setLineDash([3, 3]);
      ctx.lineDashOffset = -time * 30;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius + 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.lineDashOffset = 0;
    }

    // Name label
    ctx.fillStyle = "rgba(200,210,230,0.6)";
    ctx.font = "10px 'Segoe UI', system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(planet.card.name, pos.x, pos.y + radius + 14);
  });
}

function systemLoop(timestamp) {
  const time = timestamp / 1000;
  renderSystemView(time);
  systemAnimFrame = requestAnimationFrame(systemLoop);
}

function showSystemOverlay(star) {
  selectedStarId = star.id;
  systemViewStar = star;
  hoveredPlanetIdx = null;
  selectedPlanetIdx = null;

  const overlay = document.getElementById("system-overlay");
  const backdrop = document.getElementById("system-backdrop");
  const detected = document.getElementById("system-detected");
  const starCard = document.getElementById("system-star-card");
  const planetCard = document.getElementById("system-planet-card");

  backdrop.classList.add("visible");
  overlay.style.display = "block";
  requestAnimationFrame(() => overlay.classList.add("visible", "fade-in"));

  planetCard.classList.remove("visible");

  if (star.visibility === "detected") {
    // Show mystery card + Explore
    detected.classList.add("visible");
    starCard.innerHTML = "";
    document.getElementById("detected-card-slot").innerHTML = `
      <div class="card-preview common" style="--rarity-color:#384868">
        <div class="card-bg"></div>
        <div class="card-mystery-face">
          <div class="mystery-icon"><svg class="ico lg"><use href="#i-star"/></svg></div>
          <div class="mystery-text">Unknown Star</div>
        </div>
      </div>`;
    const inSensor = isInPlayerSensorRange(star.x, star.y);
    const exploreBtn = inSensor
      ? `<button class="card-action-btn" onclick="exploreSelectedStar()">Explore</button>`
      : `<button class="card-action-btn" disabled title="A player ship or colony must have this star in sensor range to explore.">Explore</button>`;
    document.getElementById("detected-actions").innerHTML = exploreBtn;
    document.getElementById("detected-info").textContent = inSensor
      ? "Send a ship to explore this star."
      : "Move a fleet within sensor range to explore.";
    // No system canvas
    if (systemAnimFrame) { cancelAnimationFrame(systemAnimFrame); systemAnimFrame = null; }
  } else {
    // Explored — show system view
    detected.classList.remove("visible");
    generatePlanets(star);
    starCard.innerHTML = buildCardHtml(star.card);
    resizeSystemCanvas();
    if (systemAnimFrame) cancelAnimationFrame(systemAnimFrame);
    systemAnimFrame = requestAnimationFrame(systemLoop);
  }
}

function hideSystemOverlay() {
  systemViewStar = null;
  hoveredPlanetIdx = null;
  selectedPlanetIdx = null;
  const overlay = document.getElementById("system-overlay");
  const backdrop = document.getElementById("system-backdrop");
  overlay.classList.remove("visible", "fade-in");
  backdrop.classList.remove("visible");
  setTimeout(() => { overlay.style.display = "none"; }, 300);
  if (systemAnimFrame) { cancelAnimationFrame(systemAnimFrame); systemAnimFrame = null; }
  document.getElementById("system-detected").classList.remove("visible");
  document.getElementById("system-planet-card").classList.remove("visible");
}

function exploreSelectedStar() {
  const star = stars.get(selectedStarId);
  if (!star || star.visibility !== "detected") return;
  if (!isInPlayerSensorRange(star.x, star.y)) return;

  star.visibility = "explored";

  // Detect nearby stars within sensor range
  detectStarsInRange(star.x, star.y, BASE_SENSOR_RANGE);
  markSeenInRange(star.x, star.y, BASE_SENSOR_RANGE);

  // Transition to system view within overlay
  document.getElementById("system-detected").classList.remove("visible");
  generatePlanets(star);
  document.getElementById("system-star-card").innerHTML = buildCardHtml(star.card);
  resizeSystemCanvas();
  if (systemAnimFrame) cancelAnimationFrame(systemAnimFrame);
  systemAnimFrame = requestAnimationFrame(systemLoop);
}

function hidePlanetCard() {
  selectedPlanetIdx = null;
  const btn = document.getElementById("planet-action-btn");
  if (btn) btn.remove();
  document.getElementById("system-planet-card").classList.remove("visible");
}

// ═══════════════════════════════════════════
//  STAR SELECTION PANEL (single-click)
// ═══════════════════════════════════════════
function showSelectPanel(star) {
  selectedStarId = star.id;
  const panel = document.getElementById("select-panel");
  const slot = document.getElementById("select-card-slot");
  const actions = document.getElementById("select-actions");
  const info = document.getElementById("select-panel-info");
  const shipsEl = document.getElementById("select-panel-ships");
  if (shipsEl) shipsEl.innerHTML = "";

  panel.classList.add("visible");

  // Clear any previous data-card-id so the mystery/unknown placeholder isn't
  // treated as a clickable zoomable card.
  slot.removeAttribute("data-card-id");
  if (star.visibility === "detected") {
    slot.innerHTML = `
      <div class="card-preview common" style="--rarity-color:#384868">
        <div class="card-bg"></div>
        <div class="card-mystery-face">
          <div class="mystery-icon"><svg class="ico lg"><use href="#i-star"/></svg></div>
          <div class="mystery-text">Unknown Star</div>
        </div>
      </div>`;
    const inSensor = isInPlayerSensorRange(star.x, star.y);
    actions.innerHTML = inSensor
      ? `<button class="card-action-btn" onclick="exploreFromPanel()">Explore</button>`
      : `<button class="card-action-btn" disabled title="A player ship or colony must have this star in sensor range to explore.">Explore</button>`;
    info.textContent = inSensor
      ? "Send a ship to explore this star."
      : "Move a fleet within sensor range to explore.";
  } else {
    markCardSeen(star.card);
    slot.innerHTML = buildCardHtml(star.card);
    if (star.card && star.card.id) slot.setAttribute("data-card-id", star.card.id);
    // Generate planets to know count (but don't open system view)
    generatePlanets(star);
    const pCount = star.planets ? star.planets.length : 0;
    actions.innerHTML = `<button class="card-action-btn" onclick="openSystemFromPanel()">View System</button>`;
    info.innerHTML = `
      <div>${star.card.rarity.charAt(0).toUpperCase() + star.card.rarity.slice(1)} Star</div>
      <div class="planet-count">
        <svg class="ico count-icon"><use href="#i-planet"/></svg>
        <span class="count-value">${pCount}</span>
        <span>planet${pCount !== 1 ? 's' : ''}</span>
      </div>`;
  }
}

function showEntityPanel(idx) {
  const ent = mapEntities[idx];
  if (!ent) return;
  selectedStarId = null;
  const panel = document.getElementById("select-panel");
  const slot = document.getElementById("select-card-slot");
  const actions = document.getElementById("select-actions");
  const info = document.getElementById("select-panel-info");
  const shipsEl = document.getElementById("select-panel-ships");
  panel.classList.add("visible");

  // Show the primary card. Set data-card-id on the slot so the panel-wide
  // click delegation can open the magnified-zoom popup; clear it for the
  // bare-fleet text case so that empty area doesn't read as clickable.
  slot.removeAttribute("data-card-id");
  if (ent.type === "ship") {
    markCardSeen(ent.card);
    slot.innerHTML = buildCardHtml(ent.card);
    if (ent.card && ent.card.id) slot.setAttribute("data-card-id", ent.card.id);
  } else if (ent.type === "fleet" && ent.admiral) {
    markCardSeen(ent.admiral);
    if (ent.ships) for (const s of ent.ships) markCardSeen(s);
    slot.innerHTML = buildCardHtml(ent.admiral);
    if (ent.admiral.id) slot.setAttribute("data-card-id", ent.admiral.id);
  } else {
    if (ent.ships) for (const s of ent.ships) markCardSeen(s);
    slot.innerHTML = `<div style="padding:20px;text-align:center;color:#6a7a9b">Fleet (${ent.ships.length} ships)</div>`;
  }

  // Stance toggle + disband
  const stanceColor = ent.stance === "aggressive" ? "#e05050" : "#50a0e0";
  const stanceText = ent.stance === "aggressive" ? "Aggressive" : "Evasive";
  const atColony = getEntityColony(ent);
  let actionsHtml = `<button class="card-action-btn" onclick="toggleEntityStance(${idx})" style="color:${stanceColor}">${stanceText}</button>`;
  if (atColony) {
    actionsHtml += `<button class="card-action-btn" onclick="disbandEntityFromPanel(${idx})">Disband</button>`;
  }
  actions.innerHTML = actionsHtml;

  // Info summary
  let infoHtml = "";
  const row = (iconId, text) => `<div style="display:flex;align-items:center;gap:5px">${ico(iconId, "sm")}<span>${text}</span></div>`;
  if (ent.type === "fleet") {
    infoHtml += row("i-solo-ship", `${ent.ships.length} ship${ent.ships.length !== 1 ? "s" : ""}`);
  }
  infoHtml += `<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">`
    + `${ico("i-speed", "sm")}<span>Speed: ${ent.speed}</span>`
    + `<span style="width:8px"></span>`
    + `${ico("i-sensor", "sm")}<span>Sensor: ${ent.sensorRange}</span>`
    + `</div>`;
  if (ent.stealth > 0) infoHtml += row("i-stealth", `Stealth: ${ent.stealth}`);
  if (ent.destX !== null && ent.destY !== null && ent.speed > 0) {
    const dist = Math.sqrt((ent.destX - ent.x) ** 2 + (ent.destY - ent.y) ** 2);
    const etaSec = entityETARealSec(ent, dist);
    const pausedNote = gameSpeed === 0 ? " (at 1x)" : "";
    infoHtml += `<div style="color:#a0a0d0;margin-top:4px;display:flex;align-items:center;gap:5px">${ico("i-clock", "sm")}<span>ETA: ${formatETA(etaSec)}${pausedNote}</span></div>`;
  } else if (ent.inCombat) {
    infoHtml += `<div style="color:#e05050;margin-top:4px;display:flex;align-items:center;gap:5px">${ico("i-swords", "sm")}<span>In Combat</span></div>`;
  } else if (atColony) {
    infoHtml += `<div style="color:#4a9b5a;margin-top:4px">At colony</div>`;
  }
  info.innerHTML = infoHtml;

  // Fleet ships list — one card per ship, stacked vertically under the stats.
  // For solo ships the primary card above already shows the ship, so nothing
  // additional is needed here.
  if (shipsEl) {
    shipsEl.innerHTML = "";
    if (ent.type === "fleet" && ent.ships && ent.ships.length > 0) {
      for (const ship of ent.ships) {
        const wrap = document.createElement("div");
        wrap.className = "fleet-ship-card";
        if (ship && ship.id) wrap.setAttribute("data-card-id", ship.id);
        wrap.innerHTML = buildCardHtml(ship);
        shipsEl.appendChild(wrap);
      }
    }
  }
}

function toggleEntityStance(idx) {
  const ent = mapEntities[idx];
  if (!ent) return;
  ent.stance = ent.stance === "aggressive" ? "evasive" : "aggressive";
  showEntityPanel(idx);
}

function disbandEntityFromPanel(idx) {
  disbandEntity(idx);
  hideSelectPanel();
}

function hideSelectPanel() {
  selectedStarId = null;
  document.getElementById("select-panel").classList.remove("visible");
  const shipsEl = document.getElementById("select-panel-ships");
  if (shipsEl) shipsEl.innerHTML = "";
}

function exploreFromPanel() {
  const star = stars.get(selectedStarId);
  if (!star || star.visibility !== "detected") return;
  if (!isInPlayerSensorRange(star.x, star.y)) return;
  star.visibility = "explored";
  detectStarsInRange(star.x, star.y, BASE_SENSOR_RANGE);
  markSeenInRange(star.x, star.y, BASE_SENSOR_RANGE);
  showSelectPanel(star); // refresh panel with explored state
}

function openSystemFromPanel() {
  const star = stars.get(selectedStarId);
  if (!star || star.visibility !== "explored") return;
  hideSelectPanel();
  showSystemOverlay(star);
}

// ═══════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let dragCameraStart = { x: 0, y: 0 };
let dragMoved = false;

function getStarAtScreen(sx, sy) {
  const world = screenToWorld(sx, sy);
  let closest = null;
  let closestDist = Infinity;
  for (const star of stars.values()) {
    if (star.visibility === "unknown") continue;
    const d = distanceBetween(world, star);
    const hitRadius = star.visibility === "explored"
      ? (STAR_VISUALS[star.card.type]?.baseSize || 4) * 2
      : DETECTED_VISUAL.baseSize * 2;
    if (d < hitRadius && d < closestDist) {
      closest = star;
      closestDist = d;
    }
  }
  return closest;
}

const container = document.getElementById("map-container");
const canvasEl = document.getElementById("starmap");
const tooltip = document.getElementById("tooltip");

// Active pointer tracking — unifies mouse + touch + pen. Two pointers = pinch-zoom.
const activePointers = new Map();
let pinchState = null;

function isOverBlockingOverlay(target) {
  return target.closest("#system-overlay") || target.closest("#system-backdrop") ||
         target.closest("#select-panel") || target.closest("#colony-overlay") ||
         target.closest("#colony-backdrop") || target.closest("#colonies-list-overlay") ||
         target.closest("#colonies-backdrop") || target.closest("#fleets-list-overlay") ||
         target.closest("#fleets-backdrop") || target.closest("#card-select-backdrop") ||
         target.closest("#research-backdrop") || target.closest("#combat-overlay") ||
         target.closest("#combat-backdrop") || target.closest("#collection-overlay") ||
         target.closest("#collection-backdrop");
}

container.addEventListener("pointerdown", (e) => {
  if (isOverBlockingOverlay(e.target)) return;
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (activePointers.size === 1) {
    // First pointer: start panning
    isDragging = true;
    dragMoved = false;
    dragStart = { x: e.clientX, y: e.clientY };
    dragCameraStart = { x: camera.x, y: camera.y };
    container.classList.add("dragging");
    pinchState = null;
  } else if (activePointers.size === 2) {
    // Second pointer: switch from pan to pinch-zoom
    isDragging = false;
    dragMoved = true; // suppress click after pinch ends
    container.classList.remove("dragging");
    const pts = [...activePointers.values()];
    const dx = pts[0].x - pts[1].x;
    const dy = pts[0].y - pts[1].y;
    const mid = pointerToCanvas(canvasEl, (pts[0].x + pts[1].x) / 2, (pts[0].y + pts[1].y) / 2);
    const midX = mid.x;
    const midY = mid.y;
    pinchState = {
      startDist: Math.hypot(dx, dy),
      startZoom: camera.zoom,
      midX, midY,
      worldBefore: screenToWorld(midX, midY),
    };
  }
});

window.addEventListener("pointermove", (e) => {
  if (activePointers.has(e.pointerId)) {
    activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  }

  // Pinch-zoom: two active pointers, anchor to starting midpoint
  if (pinchState && activePointers.size >= 2) {
    const pts = [...activePointers.values()].slice(0, 2);
    const dx = pts[0].x - pts[1].x;
    const dy = pts[0].y - pts[1].y;
    const dist = Math.hypot(dx, dy);
    if (dist > 0 && pinchState.startDist > 0) {
      const newZoom = Math.max(camera.minZoom, Math.min(camera.maxZoom, pinchState.startZoom * (dist / pinchState.startDist)));
      camera.zoom = newZoom;
      const worldAfter = screenToWorld(pinchState.midX, pinchState.midY);
      camera.x -= (worldAfter.x - pinchState.worldBefore.x);
      camera.y -= (worldAfter.y - pinchState.worldBefore.y);
    }
    return;
  }

  if (isDragging) {
    const m = pointerToCanvas(canvasEl, e.clientX, e.clientY);
    const dx = (e.clientX - dragStart.x) * m.kx;
    const dy = (e.clientY - dragStart.y) * m.ky;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
    camera.x = dragCameraStart.x - dx / camera.zoom;
    camera.y = dragCameraStart.y - dy / camera.zoom;
    return;
  }

  // Hover detection below — only meaningful for mouse/pen (touch has no hover)
  if (e.pointerType === "touch") return;

  // Hover detection
  const m = pointerToCanvas(canvasEl, e.clientX, e.clientY);
  const rect = m.rect;
  const sx = m.x;
  const sy = m.y;

  // Check entities first
  const entIdx = getEntityAtScreen(sx, sy);
  const star = getStarAtScreen(sx, sy);

  if (entIdx !== null) {
    hoveredStarId = null;
    const hEnt = mapEntities[entIdx];
    const stanceLabel = hEnt.stance === "aggressive" ? "Aggressive" : "Evasive";
    const shipCount = hEnt.type === "fleet" ? ` (${hEnt.ships.length} ships)` : "";
    tooltip.textContent = `${hEnt.label}${shipCount} — ${stanceLabel}`;
    tooltip.style.left = (sx + 12) + "px";
    tooltip.style.top = (sy - 8) + "px";
    tooltip.style.display = "block";
    canvasEl.style.cursor = "pointer";
  } else if (selectedEntityIdx !== null) {
    // Entity selected — cursor indicates "set destination"
    hoveredStarId = star ? star.id : null;
    if (star) {
      tooltip.textContent = star.visibility === "explored" ? star.card.name : "Unknown Star";
      tooltip.style.left = (sx + 12) + "px";
      tooltip.style.top = (sy - 8) + "px";
      tooltip.style.display = "block";
    } else {
      tooltip.style.display = "none";
    }
    canvasEl.style.cursor = "crosshair";
  } else if (star) {
    hoveredStarId = star.id;
    const label = star.visibility === "explored" ? star.card.name : "Unknown Star";
    tooltip.textContent = label;
    tooltip.style.left = (sx + 12) + "px";
    tooltip.style.top = (sy - 8) + "px";
    tooltip.style.display = "block";
    canvasEl.style.cursor = "pointer";
  } else {
    hoveredStarId = null;
    tooltip.style.display = "none";
    canvasEl.style.cursor = isDragging ? "grabbing" : "grab";
  }
});

function handlePointerEnd(e) {
  if (!activePointers.has(e.pointerId)) return;
  activePointers.delete(e.pointerId);

  // Drop out of pinch once we're below two fingers. Don't auto-restart pan —
  // require a fresh pointerdown so the user doesn't accidentally fling the map.
  if (pinchState && activePointers.size < 2) {
    pinchState = null;
    isDragging = false;
    container.classList.remove("dragging");
    return;
  }

  if (activePointers.size > 0) return; // still another finger down, wait

  if (!isDragging) return;
  isDragging = false;
  container.classList.remove("dragging");

  // Click logic — primary button only (touch/pen are always button 0)
  if (!dragMoved && e.button === 0) {
    const m = pointerToCanvas(canvasEl, e.clientX, e.clientY);
    const sx = m.x;
    const sy = m.y;

    // Check combat icon click first
    const combatHit = getCombatAtScreen(sx, sy);
    if (combatHit) {
      showCombatOverlay(combatHit);
      return;
    }

    // Check if clicking an entity (ship/fleet)
    const entIdx = getEntityAtScreen(sx, sy);

    if (selectedEntityIdx !== null && entIdx !== selectedEntityIdx) {
      // Entity is selected — click sets destination. Gated to player-owned
      // non-combat entities; NPC fleets ignore player click commands.
      const selEnt = mapEntities[selectedEntityIdx];
      if (selEnt && selEnt.owner === "player" && !selEnt.inCombat) {
        const world = screenToWorld(sx, sy);
        selEnt.destX = world.x;
        selEnt.destY = world.y;
      }
    } else if (entIdx !== null) {
      // Clicking an entity — select it and show info
      selectedEntityIdx = entIdx;
      showEntityPanel(entIdx);
    } else {
      // No entity involved — normal star selection
      selectedEntityIdx = null;
      const star = getStarAtScreen(sx, sy);
      if (star) {
        showSelectPanel(star);
      } else {
        hideSelectPanel();
      }
    }
  }
}

window.addEventListener("pointerup", handlePointerEnd);
window.addEventListener("pointercancel", (e) => {
  // Treat cancel as a no-click end (dragMoved already true if we moved)
  dragMoved = true;
  handlePointerEnd(e);
});

// Suppress context menu on the map entirely
container.addEventListener("contextmenu", (e) => {
  if (e.target.closest("#system-overlay") || e.target.closest("#colony-overlay") || e.target.closest("#colonies-list-overlay") || e.target.closest("#fleets-list-overlay") || e.target.closest("#combat-overlay") || e.target.closest("#collection-overlay")) return;
  e.preventDefault();
  if (selectedEntityIdx !== null) {
    selectedEntityIdx = null;
    hideSelectPanel();
  }
});

// Double-click to enter system view
canvasEl.addEventListener("dblclick", (e) => {
  const m = pointerToCanvas(canvasEl, e.clientX, e.clientY);
  const sx = m.x;
  const sy = m.y;
  const star = getStarAtScreen(sx, sy);
  if (star && star.visibility === "explored") {
    hideSelectPanel();
    showSystemOverlay(star);
  }
});

container.addEventListener("wheel", (e) => {
  if (e.target.closest("#system-overlay") || e.target.closest("#select-panel") || e.target.closest("#colony-overlay") || e.target.closest("#colonies-list-overlay") || e.target.closest("#fleets-list-overlay") || e.target.closest("#card-select-backdrop") || e.target.closest("#research-backdrop") || e.target.closest("#combat-overlay") || e.target.closest("#collection-overlay")) return;
  e.preventDefault();
  const zoomFactor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  const newZoom = Math.max(camera.minZoom, Math.min(camera.maxZoom, camera.zoom * zoomFactor));

  // Zoom toward mouse position
  const m = pointerToCanvas(canvasEl, e.clientX, e.clientY);
  const mx = m.x;
  const my = m.y;
  const worldBefore = screenToWorld(mx, my);

  camera.zoom = newZoom;

  const worldAfter = screenToWorld(mx, my);
  camera.x -= (worldAfter.x - worldBefore.x);
  camera.y -= (worldAfter.y - worldBefore.y);
}, { passive: false });

document.getElementById("system-close").addEventListener("click", hideSystemOverlay);
document.getElementById("system-backdrop").addEventListener("click", hideSystemOverlay);
document.getElementById("planet-card-close").addEventListener("click", hidePlanetCard);
document.getElementById("select-panel-close").addEventListener("click", hideSelectPanel);

// System overlay mouse interaction
const systemCanvas = document.getElementById("system-canvas");

systemCanvas.addEventListener("mousemove", (e) => {
  if (!systemViewStar || !systemViewStar.planets) return;
  const m = pointerToCanvas(systemCanvas, e.clientX, e.clientY);
  const mx = m.x;
  const my = m.y;
  const cx = systemCanvas.width / 2;
  const cy = systemCanvas.height / 2;
  const time = animTime;

  let found = -1;
  for (let i = 0; i < systemViewStar.planets.length; i++) {
    const planet = systemViewStar.planets[i];
    const pos = getPlanetScreenPos(planet, cx, cy, time);
    const r = getPlanetScreenRadius(planet);
    const dx = mx - pos.x;
    const dy = my - pos.y;
    if (dx * dx + dy * dy < (r + 6) * (r + 6)) {
      found = i;
      break;
    }
  }
  hoveredPlanetIdx = found >= 0 ? found : null;
  systemCanvas.style.cursor = found >= 0 ? "pointer" : "default";
});

systemCanvas.addEventListener("click", (e) => {
  if (!systemViewStar || !systemViewStar.planets) return;
  const m = pointerToCanvas(systemCanvas, e.clientX, e.clientY);
  const mx = m.x;
  const my = m.y;
  const cx = systemCanvas.width / 2;
  const cy = systemCanvas.height / 2;
  const time = animTime;

  for (let i = 0; i < systemViewStar.planets.length; i++) {
    const planet = systemViewStar.planets[i];
    const pos = getPlanetScreenPos(planet, cx, cy, time);
    const r = getPlanetScreenRadius(planet);
    const dx = mx - pos.x;
    const dy = my - pos.y;
    if (dx * dx + dy * dy < (r + 6) * (r + 6)) {
      selectedPlanetIdx = i;
      showPlanetCard(planet);

    }

  // Clicked empty space in system view — deselect planet

});

// Resize system canvas when window resizes
window.addEventListener("resize", () => {
