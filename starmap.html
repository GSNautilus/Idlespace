<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IdleSpace — Star Map</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #050508;
  color: #c8d0e0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── Top Bar ── */
#top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 16px;
  background: #08090f;
  border-bottom: 1px solid #111828;
  flex-shrink: 0;
  z-index: 10;
}
#top-bar h1 { font-size: 13px; font-weight: 600; color: #8090b0; }
#top-bar h1 span { color: #4a7ac0; }
#resources {
  display: flex;
  gap: 14px;
}
.resource {
  display: flex;
  align-items: center;
  gap: 4px;
}
.resource-icon { font-size: 12px; }
.resource-value { font-size: 12px; font-weight: 600; color: #fff; }
.resource-rate { font-size: 9px; color: #6a7a9b; }
.resource-label { display: none; }
#speed-controls {
  display: flex;
  gap: 3px;
  align-items: center;
}
#speed-controls button {
  background: #1a2040;
  border: 1px solid #2a3460;
  color: #8090b0;
  padding: 3px 7px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 10px;
  transition: all 0.15s;
}
#speed-controls button:hover { background: #252f55; color: #c0d0f0; }
#speed-controls button.active {
  background: #2a4080;
  border-color: #4060c0;
  color: #fff;
}

/* ── Canvas Container ── */
#map-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: grab;
}
#map-container.dragging { cursor: grabbing; }
#starmap {
  display: block;
  width: 100%;
  height: 100%;
}

/* ── Tooltip ── */
#tooltip {
  position: absolute;
  pointer-events: none;
  background: rgba(8,9,15,0.92);
  border: 1px solid #1e2744;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 11px;
  color: #c8d0e0;
  white-space: nowrap;
  z-index: 20;
  display: none;
}

/* ── Star Selection Panel (right side, on single-click) ── */
#select-panel {
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: 280px;
  background: #06080c;
  border-left: 1px solid #111828;
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px;
  z-index: 15;
  overflow-y: auto;
}
#select-panel.visible { display: flex; }
#select-panel-close {
  position: absolute;
  top: 8px;
  right: 8px;
  background: none;
  border: none;
  color: #4a5a7b;
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
}
#select-panel-close:hover { color: #c8d0e0; background: #0c0e18; }
#select-panel-info {
  margin-top: 12px;
  width: 220px;
  font-size: 11px;
  color: #4a5a7b;
  text-align: center;
}
.planet-count {
  margin-top: 10px;
  font-size: 12px;
  color: #6a7a9b;
  display: flex;
  align-items: center;
  gap: 5px;
}
.planet-count .count-icon { font-size: 14px; }
.planet-count .count-value { font-weight: 600; color: #8090b0; }

/* ── System View Overlay (50% centered) ── */
#system-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 81%;
  height: 81%;
  background: rgba(5,5,8,0.95);
  border: 1px solid #1e2744;
  border-radius: 12px;
  z-index: 25;
  display: none;
  opacity: 0;
  transition: opacity 0.3s ease;
  overflow: hidden;
}
#system-overlay.visible {
  display: block;
  opacity: 1;
}
#system-overlay.fade-in {
  opacity: 1;
}
/* Dim backdrop behind the overlay */
#system-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 24;
  display: none;
}
#system-backdrop.visible { display: block; }

#system-canvas {
  display: block;
  width: 100%;
  height: 100%;
}
#system-close {
  position: absolute;
  top: 10px;
  right: 12px;
  background: rgba(12,14,24,0.7);
  border: 1px solid #1e2744;
  color: #4a5a7b;
  font-size: 10px;
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 4px;
  z-index: 26;
  transition: all 0.15s;
}
#system-close:hover { color: #c8d0e0; background: rgba(20,26,48,0.9); }

/* Star card in corner */
#system-star-card {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 26;
  transform: scale(0.86);
  transform-origin: top left;
}

/* Planet card popup */
#system-planet-card {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 26;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
#system-planet-card.visible {
  display: flex;
}
#planet-card-close {
  background: rgba(12,14,24,0.7);
  border: 1px solid #1e2744;
  color: #4a5a7b;
  font-size: 8px;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 3px;
  transition: all 0.15s;
}
#planet-card-close:hover { color: #c8d0e0; background: rgba(20,26,48,0.9); }

/* Detected state centered content */
#system-detected {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 26;
}
#system-detected.visible {
  display: flex;
}

/* ── Card Preview (ported from card-builder) ── */
.card-preview {
  width: 220px;
  height: 320px;
  border-radius: 10px;
  padding: 0;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.card-preview::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 10px;
  padding: 3px;
  background: var(--rarity-color);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}
.card-preview .card-bg {
  position: absolute;
  inset: 3px;
  border-radius: 7px;
  background: #141a30;
  z-index: 0;
}
.card-preview > * { position: relative; z-index: 1; }
.card-preview .card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 7px 8px 4px 8px;
}
.card-preview .card-name {
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  flex: 1;
  min-height: 16px;
  line-height: 1.2;
}
.card-preview .card-type {
  font-size: 9px;
  color: #4a5a7b;
  font-style: italic;
}
.card-preview .card-image {
  width: 205px;
  height: 175px;
  border-radius: 4px;
  background: #1a2040;
  margin: 0 auto 4px auto;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2a3460;
  font-size: 11px;
  flex-shrink: 0;
}
.card-preview .card-image img {
  width: 205px;
  height: 175px;
  object-fit: cover;
}
.card-preview .card-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 3px 8px;
  padding: 2px 8px;
  justify-content: center;
  align-items: center;
  align-content: center;
}
.card-preview .card-stats.expanded {
  flex: 1;
  gap: 4px 12px;
}
.card-preview .card-stat {
  display: flex;
  align-items: center;
  gap: 2px;
  font-size: 11px;
}
.card-preview .card-stats.expanded .card-stat { font-size: 13px; }
.card-preview .card-stat-icon { font-size: 12px; }
.card-preview .card-stats.expanded .card-stat-icon { font-size: 15px; }
.card-preview .card-stat-value { font-weight: 600; color: #fff; }
.card-preview .card-special {
  font-size: 11px;
  color: #a0b0d0;
  text-align: center;
  margin: 2px 7px 0 7px;
  padding: 3px 4px;
  background: rgba(40,60,120,0.2);
  border-radius: 3px;
  line-height: 1.2;
}
.card-preview .card-flavor {
  font-size: 10px;
  color: #4a5a7b;
  font-style: italic;
  text-align: center;
  padding: 2px 8px 7px 8px;
  line-height: 1.3;
  margin-top: auto;
}
.card-preview .card-watermark {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 60px;
  opacity: 0.08;
  z-index: 1;
  pointer-events: none;
  line-height: 1;
}

/* Rarity colors */
.card-preview.common    { --rarity-color: #6a7a9b; }
.card-preview.uncommon  { --rarity-color: #4a9b5a; }
.card-preview.rare      { --rarity-color: #4a7ac0; }
.card-preview.epic      { --rarity-color: #8a4ac0; }
.card-preview.legendary { --rarity-color: #c0a020; }

/* ── Mystery Card (detected/unexplored) ── */
.card-preview.mystery .card-bg {
  background: #0c0e18;
}
.card-mystery-face {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.card-mystery-face .mystery-icon {
  font-size: 48px;
  opacity: 0.3;
}
.card-mystery-face .mystery-text {
  font-size: 14px;
  color: #384868;
  font-weight: 600;
}

/* ── Action Buttons ── */
#detected-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 16px;
  width: 220px;
}
.card-action-btn {
  padding: 10px 20px;
  background: linear-gradient(135deg, #2a4080, #3a5ab0);
  border: 1px solid #4060c0;
  color: #fff;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.card-action-btn:hover { background: linear-gradient(135deg, #3050a0, #4a6ac0); }
.card-action-btn.secondary {
  background: linear-gradient(135deg, #1a2540, #243060);
  border-color: #2a3a60;
}
.card-action-btn.secondary:hover { background: linear-gradient(135deg, #243060, #2e4080); }

/* ── Detected Info Label ── */
#detected-info {
  margin-top: 12px;
  width: 220px;
  font-size: 11px;
  color: #4a5a7b;
  text-align: center;
}

/* ── Colonize Button (in planet card popup) ── */
#colonize-btn {
  margin-top: 8px;
}

/* ── Colonies Button (top bar) ── */
#colonies-btn {
  background: #1a2040;
  border: 1px solid #2a3460;
  color: #8090b0;
  padding: 3px 10px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  margin-left: 10px;
  transition: all 0.15s;
}
#colonies-btn:hover { background: #252f55; color: #c0d0f0; }

/* ── Colonies List Overlay ── */
#colonies-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 30;
  display: none;
}
#colonies-backdrop.visible { display: block; }
#colonies-list-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 340px;
  max-height: 70%;
  background: rgba(5,5,8,0.97);
  border: 1px solid #1e2744;
  border-radius: 12px;
  z-index: 31;
  display: none;
  flex-direction: column;
  padding: 16px;
  overflow: hidden;
}
#colonies-list-overlay.visible { display: flex; }
#colonies-list-overlay h2 {
  font-size: 14px;
  color: #8090b0;
  margin-bottom: 12px;
  font-weight: 600;
}
#colonies-list-close {
  position: absolute;
  top: 10px;
  right: 12px;
  background: none;
  border: none;
  color: #4a5a7b;
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
}
#colonies-list-close:hover { color: #c8d0e0; background: #0c0e18; }
#colonies-list-items {
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.colony-list-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: #0a0c14;
  border: 1px solid #151a2a;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.colony-list-item:hover { background: #111628; border-color: #2a3460; }
.colony-list-name {
  font-size: 12px;
  font-weight: 600;
  color: #c8d0e0;
  flex: 1;
}
.colony-list-type {
  font-size: 10px;
  color: #4a5a7b;
  font-style: italic;
}
.colony-list-rarity {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.colonies-empty {
  font-size: 12px;
  color: #384868;
  text-align: center;
  padding: 24px;
}

/* ── Colony Screen Overlay ── */
#colony-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 34;
  display: none;
}
#colony-backdrop.visible { display: block; }
#colony-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 81%;
  height: 81%;
  background: rgba(5,5,8,0.95);
  border: 1px solid #1e2744;
  border-radius: 12px;
  z-index: 35;
  display: none;
  opacity: 0;
  transition: opacity 0.3s ease;
  overflow: hidden;
}
#colony-overlay.visible { display: flex; flex-direction: column; opacity: 1; }
#colony-overlay.fade-in { opacity: 1; }

#colony-close {
  position: absolute;
  top: 10px;
  right: 12px;
  background: rgba(12,14,24,0.7);
  border: 1px solid #1e2744;
  color: #4a5a7b;
  font-size: 10px;
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 4px;
  z-index: 36;
  transition: all 0.15s;
}
#colony-close:hover { color: #c8d0e0; background: rgba(20,26,48,0.9); }

/* Colony header bar */
#colony-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 8px 16px;
  border-bottom: 1px solid #111828;
  flex-shrink: 0;
}
#colony-name {
  font-size: 18px;
  font-weight: 700;
  color: #c8d0e0;
}
#colony-resources {
  display: flex;
  gap: 12px;
  margin-right: 32px;
}
.colony-res {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 13px;
}
.colony-res-icon { font-size: 14px; }
.colony-res-value { font-weight: 600; color: #fff; }
.colony-res-rate { font-size: 10px; color: #6a7a9b; }

/* Colony body: left sidebar + right main area */
#colony-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Left column: leader slot + action buttons */
#colony-left {
  width: 230px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  padding: 14px;
  border-right: 1px solid #111828;
  gap: 14px;
}
#colony-left h3 {
  font-size: 13px;
  color: #4a5a7b;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 3px;
}

/* Leader card slot */
#leader-slot {
  width: 202px;
  height: 294px;
  border: 2px dashed #1e2744;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2a3460;
  font-size: 11px;
  background: rgba(10,12,20,0.5);
  flex-shrink: 0;
}

/* Action buttons panel */
#colony-actions {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
}
.colony-action-btn {
  padding: 8px 11px;
  background: #0a0c14;
  border: 1px solid #151a2a;
  color: #6a7a9b;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}
.colony-action-btn:hover { background: #111628; color: #8090b0; border-color: #2a3460; }
.colony-action-btn.active {
  background: #1a2540;
  border-color: #4060c0;
  color: #c0d0f0;
}

/* Right main area: building slots grid */
#colony-right {
  flex: 1;
  padding: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
#colony-right h3 {
  font-size: 13px;
  color: #4a5a7b;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
#building-slots {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 10px;
  flex: 1;
}
.building-slot {
  width: 100%;
  height: 100%;
  border: 2px dashed #1e2744;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2a3460;
  font-size: 20px;
  background: rgba(10,12,20,0.5);
  transition: all 0.15s;
  cursor: pointer;
}
.building-slot:hover { border-color: #2a3a60; background: rgba(15,18,30,0.6); }
.building-slot.drag-over { border-color: #4a7ac0; background: rgba(30,40,80,0.5); }
.building-slot.occupied { border-style: solid; border-color: #1e2744; cursor: grab; overflow: hidden; padding: 0; position: relative; }
.building-slot .card-preview {
  position: absolute;
  top: 0; left: 0;
  width: 220px; height: 320px;
  transform-origin: top left;
  pointer-events: none;
  border-radius: 6px;
}

#leader-slot.drag-over { border-color: #c0a020; background: rgba(60,50,20,0.4); }
#leader-slot.occupied { border-style: solid; border-color: #1e2744; cursor: grab; overflow: hidden; padding: 0; position: relative; }
#leader-slot .card-preview {
  position: absolute;
  top: 0; left: 0;
  width: 220px; height: 320px;
  transform-origin: top left;
  pointer-events: none;
  border-radius: 8px;
}

/* ── Deck Pile ── */
#colony-deck {
  position: relative;
  width: 138px;
  height: 200px;
  flex-shrink: 0;
  cursor: pointer;
  align-self: center;
}
#colony-deck:hover .deck-card-back { border-color: #2a3a60; }
.deck-pile {
  position: relative;
  width: 138px;
  height: 200px;
}
.deck-card-back {
  position: absolute;
  width: 138px;
  height: 200px;
  border-radius: 8px;
  border: 2px solid #1e2744;
  background: #0c0e18;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.deck-card-back .deck-logo {
  font-size: 18px;
  font-weight: 600;
  color: #8090b0;
  text-align: center;
  line-height: 1.3;
}
.deck-card-back .deck-logo span { color: #4a7ac0; }
.deck-count {
  position: absolute;
  top: -6px;
  right: -6px;
  background: #c04040;
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 10px;
  z-index: 2;
}
.deck-empty {
  width: 120px;
  height: 174px;
  border: 2px dashed #1e2744;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2a3460;
  font-size: 11px;
}

/* ── Colony Queue ── */
#colony-queue-section {
  border-top: 1px solid #111828;
  padding-top: 8px;
  margin-top: 8px;
  flex-shrink: 0;
}
#colony-queue-section h3 {
  font-size: 13px;
  color: #4a5a7b;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
#colony-queue {
  display: flex;
  gap: 0;
  overflow: hidden;
  min-height: 210px;
  padding: 4px 4px 4px 4px;
  background: rgba(6,8,12,0.5);
  border-radius: 6px;
  border: 1px dashed #151a2a;
  position: relative;
  flex-wrap: wrap;
  align-content: start;
}
#colony-queue.drag-over { border-color: #4a7ac0; background: rgba(20,30,60,0.3); }
.queue-card {
  flex-shrink: 0;
  cursor: grab;
  width: 138px;
  height: 200px;
  position: relative;
  transition: transform 0.15s, z-index 0s;
}
.queue-card:not(:first-child) { margin-left: -50px; }
.queue-card:hover { z-index: 5; transform: translateY(-6px); }
.queue-card .card-preview {

  const matches = pool.filter(t => t.rarity === rarity);

  return { ...template, stats: { ...template.stats }, cost: { ...template.cost } };
}

// ═══════════════════════════════════════════
//  RARITY ROLLER
// ═══════════════════════════════════════════
function rollRarity() {
  const total = Object.values(RARITY_WEIGHTS).reduce((s,w) => s+w, 0);
  let roll = Math.random() * total;
  for (const [rarity, weight] of Object.entries(RARITY_WEIGHTS)) {
    roll -= weight;
    if (roll <= 0) return rarity;
  }
  return "common";
}

function rollStarCard() {
  const rarity = rollRarity();
  const pool = STAR_TEMPLATES.filter(t => t.rarity === rarity);
  const template = pool[Math.floor(Math.random() * pool.length)];
  // Deep copy — assign a unique proper name, keep template name as `type`
  return { ...template, stats: { ...template.stats }, type: template.name, name: drawStarName() };
}

function rollPlanetCard() {
  const rarity = rollRarity();
  const pool = PLANET_TEMPLATES.filter(t => t.rarity === rarity);
  const template = pool[Math.floor(Math.random() * pool.length)];
  return { ...template, stats: { ...template.stats } };
}

const ROMAN = ["I","II","III","IV","V","VI","VII","VIII","IX","X"];

function generatePlanets(star) {
  if (star.planets) return; // already generated
  const maxP = star.card.stats.planets_max || 1;
  const count = 1 + Math.floor(Math.random() * maxP);
  star.planets = [];
  for (let i = 0; i < count; i++) {
    const card = rollPlanetCard();
    // Keep template name as `type` for visual lookup, name after parent star
    card.type = card.name;
    card.name = `${star.card.name} ${ROMAN[i] || (i + 1)}`;
    star.planets.push({
      card,
      orbitRadius: 80 + i * 50,
      orbitSpeed: 0.04 / (1 + i * 0.3),
      orbitPhase: Math.random() * Math.PI * 2,
    });
  }
}

// ═══════════════════════════════════════════
//  STAR NETWORK
// ═══════════════════════════════════════════
let nextStarId = 1;
const stars = new Map(); // id -> star node

function createStar(x, y, visibility, card) {
  const id = `star_${nextStarId++}`;
  const star = { id, x, y, visibility, lanes: [], card };
  stars.set(id, star);
  return star;
}

function addLane(starA, starB) {
  if (!starA.lanes.includes(starB.id)) starA.lanes.push(starB.id);
  if (!starB.lanes.includes(starA.id)) starB.lanes.push(starA.id);
}

function distanceBetween(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}

function isPositionValid(x, y, minDist) {
  for (const s of stars.values()) {
    if (distanceBetween({ x, y }, s) < minDist) return false;
  }
  return true;
}

// Generate new stars around a parent star (called when exploring)
function generateFrontierStars(parent) {
  const count = 1 + Math.floor(Math.random() * 3); // 1-3 new stars
  const newStars = [];
  for (let i = 0; i < count; i++) {
    let placed = false;
    for (let attempt = 0; attempt < 20; attempt++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 150 + Math.random() * 150; // 150-300 world units
      const x = parent.x + Math.cos(angle) * dist;
      const y = parent.y + Math.sin(angle) * dist;
      if (isPositionValid(x, y, 80)) {
        const card = rollStarCard();
        const star = createStar(x, y, "detected", card);
        addLane(parent, star);
        // Maybe connect to a nearby existing star too
        for (const other of stars.values()) {
          if (other.id === star.id || other.id === parent.id) continue;
          if (distanceBetween(star, other) < 200 && Math.random() < 0.3) {
            addLane(star, other);
            break;
          }
        }
        newStars.push(star);
        placed = true;
        break;
      }
    }
  }
  return newStars;
}

// Create initial seed cluster
function generateSeedCluster() {
  // Home star — always Yellow Main Sequence
  const homeCard = { ...STAR_TEMPLATES[1], stats: { ...STAR_TEMPLATES[1].stats }, type: STAR_TEMPLATES[1].name, name: drawStarName() };
  const home = createStar(0, 0, "explored", homeCard);

  // Generate 4-6 neighbors
  const neighborCount = 4 + Math.floor(Math.random() * 3);
  const neighbors = [];
  for (let i = 0; i < neighborCount; i++) {
    let placed = false;
    for (let attempt = 0; attempt < 30; attempt++) {
      const angle = (i / neighborCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.8;
      const dist = 160 + Math.random() * 120;
      const x = Math.cos(angle) * dist;
      const y = Math.sin(angle) * dist;
      if (isPositionValid(x, y, 80)) {
        const card = rollStarCard();
        const star = createStar(x, y, "detected", card);
        addLane(home, star);
        neighbors.push(star);
        placed = true;
        break;
      }
    }
  }
  // Add a few cross-lanes between neighbors for interesting topology
  for (let i = 0; i < neighbors.length; i++) {
    for (let j = i + 1; j < neighbors.length; j++) {
      if (distanceBetween(neighbors[i], neighbors[j]) < 250 && Math.random() < 0.35) {
        addLane(neighbors[i], neighbors[j]);
      }
    }
  }

  return home;
}

// ═══════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════
const camera = {
  x: 0, y: 0,       // world offset (center of view)
  zoom: 1.0,
  minZoom: 0.3,
  maxZoom: 3.0,
};

function worldToScreen(wx, wy) {
  const canvas = document.getElementById("starmap");
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  return {
    x: (wx - camera.x) * camera.zoom + cx,
    y: (wy - camera.y) * camera.zoom + cy,
  };
}

function screenToWorld(sx, sy) {
  const canvas = document.getElementById("starmap");
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  return {
    x: (sx - cx) / camera.zoom + camera.x,
    y: (sy - cy) / camera.zoom + camera.y,
  };
}

const BG_STARS = [];
function initBgStars(count = 400) {
  for (let i = 0; i < count; i++) {
    BG_STARS.push({
      x: Math.random() * 4000 - 2000,
      y: Math.random() * 4000 - 2000,
      size: Math.random() * 1.2 + 0.3,
      brightness: Math.random() * 0.4 + 0.1,
    });

// ═══════════════════════════════════════════
//  CANVAS RENDERING
// ═══════════════════════════════════════════
let animTime = 0;
let selectedStarId = null;
let hoveredStarId = null;

function resizeCanvas() {
  const canvas = document.getElementById("starmap");
  const container = document.getElementById("map-container");
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
}

function drawBgStars(ctx) {
  const canvas = ctx.canvas;
  const parallax = 0.15; // moves slower than main layer
  for (const bg of BG_STARS) {
    const sx = (bg.x - camera.x * parallax) * camera.zoom + canvas.width / 2;
    const sy = (bg.y - camera.y * parallax) * camera.zoom + canvas.height / 2;
    // Wrap around
    const wx = ((sx % canvas.width) + canvas.width) % canvas.width;
    const wy = ((sy % canvas.height) + canvas.height) % canvas.height;
    ctx.fillStyle = `rgba(180,200,240,${bg.brightness})`;
    ctx.fillRect(wx, wy, bg.size, bg.size);
  }
}

function drawLanes(ctx) {
  const drawn = new Set();
  for (const star of stars.values()) {
    if (star.visibility === "unknown") continue;
    for (const neighborId of star.lanes) {
      const key = [star.id, neighborId].sort().join("-");
      if (drawn.has(key)) continue;
      drawn.add(key);
      const neighbor = stars.get(neighborId);
      if (!neighbor || neighbor.visibility === "unknown") continue;

      const a = worldToScreen(star.x, star.y);
      const b = worldToScreen(neighbor.x, neighbor.y);

      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);

      if (star.visibility === "explored" && neighbor.visibility === "explored") {
        ctx.strokeStyle = "rgba(42,58,96,0.7)";
        ctx.lineWidth = 1.5 * camera.zoom;
        ctx.setLineDash([]);
      } else {
        ctx.strokeStyle = "rgba(26,37,48,0.5)";
        ctx.lineWidth = 1 * camera.zoom;
        ctx.setLineDash([6 * camera.zoom, 4 * camera.zoom]);
      }
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

function drawStar(ctx, star, time) {
  const isExplored = star.visibility === "explored";
  const isDetected = star.visibility === "detected";
  if (star.visibility === "unknown") return;

  const visual = isExplored ? (STAR_VISUALS[star.card.type] || DETECTED_VISUAL) : DETECTED_VISUAL;
  const lum = isExplored ? (star.card.stats.luminosity || 3) : 2;
  const baseRadius = visual.baseSize * (1 + lum * 0.08);

  // Pulse animation
  const pulse = 1 + Math.sin(time * 3 + star.x * 0.01 + star.y * 0.01) * 0.08;
  const radius = baseRadius * pulse * camera.zoom;

  const pos = worldToScreen(star.x, star.y);

  // Rarity aura for epic/legendary explored stars
  if (isExplored && (star.card.rarity === "epic" || star.card.rarity === "legendary")) {
    const auraColor = RARITY_COLORS[star.card.rarity];
    const auraRadius = radius * 3;
    const aura = ctx.createRadialGradient(pos.x, pos.y, radius, pos.x, pos.y, auraRadius);
    aura.addColorStop(0, auraColor + "40");
    aura.addColorStop(1, auraColor + "00");
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, auraRadius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Glow
  const glowRadius = radius * 2.5;
  const glow = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, glowRadius);
  glow.addColorStop(0, visual.glowColor);
  glow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, glowRadius, 0, Math.PI * 2);
  ctx.fill();

  // Star body
  ctx.fillStyle = visual.color;
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
  ctx.fill();

  // Bright core
  if (isExplored) {
    const coreGrad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, radius);
    coreGrad.addColorStop(0, "rgba(255,255,255,0.6)");
    coreGrad.addColorStop(0.3, "rgba(255,255,255,0.15)");
    coreGrad.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Binary system: draw second smaller star offset
  if (isExplored && star.card.type === "Binary System") {
    const offset = radius * 1.2;
    const angle2 = time * 0.5 + star.x;
    const bx = pos.x + Math.cos(angle2) * offset;
    const by = pos.y + Math.sin(angle2) * offset;
    ctx.fillStyle = "#90d0f0";
    ctx.beginPath();
    ctx.arc(bx, by, radius * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Trinary system: draw two extra stars
  if (isExplored && star.card.type === "Trinary System") {
    for (let i = 0; i < 2; i++) {
      const offset = radius * 1.3;
      const angle2 = time * 0.4 + star.x + i * Math.PI * 0.67;
      const bx = pos.x + Math.cos(angle2) * offset;
      const by = pos.y + Math.sin(angle2) * offset;
      ctx.fillStyle = i === 0 ? "#f0c060" : "#e09050";
      ctx.beginPath();
      ctx.arc(bx, by, radius * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Pulsar beams
  if (isExplored && star.card.type === "Pulsar") {
    const beamAngle = time * 2;
    ctx.save();
    ctx.translate(pos.x, pos.y);
    ctx.rotate(beamAngle);
    const beamLen = radius * 5;
    const beamGrad = ctx.createLinearGradient(0, 0, beamLen, 0);
    beamGrad.addColorStop(0, "rgba(128,224,224,0.4)");
    beamGrad.addColorStop(1, "rgba(128,224,224,0)");
    ctx.fillStyle = beamGrad;
    ctx.fillRect(0, -radius * 0.3, beamLen, radius * 0.6);
    ctx.rotate(Math.PI);
    ctx.fillRect(0, -radius * 0.3, beamLen, radius * 0.6);
    ctx.restore();
  }

  // Colonized star highlight (green glow if any planet colonized)
  if (isExplored && star.planets && star.planets.some(p => p.colony)) {
    const colR = radius + 8 * camera.zoom;
    const colGlow = ctx.createRadialGradient(pos.x, pos.y, radius, pos.x, pos.y, colR + 6 * camera.zoom);
    colGlow.addColorStop(0, "rgba(74,155,90,0.35)");
    colGlow.addColorStop(1, "rgba(74,155,90,0)");
    ctx.fillStyle = colGlow;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, colR + 6 * camera.zoom, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(74,155,90,0.5)";
    ctx.lineWidth = 2 * camera.zoom;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, colR, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Hover highlight
  if (hoveredStarId === star.id) {
    ctx.strokeStyle = "rgba(200,220,255,0.3)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, radius + 4 * camera.zoom, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Selection ring
  if (selectedStarId === star.id) {
    const ringRadius = radius + 6 * camera.zoom;
    const dashOffset = time * 30;
    ctx.strokeStyle = "#4a7ac0";
    ctx.lineWidth = 2;
    ctx.setLineDash([4 * camera.zoom, 3 * camera.zoom]);
    ctx.lineDashOffset = -dashOffset;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, ringRadius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.lineDashOffset = 0;
  }

  // Name label (explored only)
  if (isExplored && camera.zoom > 0.5) {
    ctx.fillStyle = "rgba(200,210,230,0.7)";
    ctx.font = `${Math.max(9, 11 * camera.zoom)}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = "center";
    ctx.fillText(star.card.name, pos.x, pos.y + radius + 14 * camera.zoom);
  }
}

function drawTerritoryContour(ctx) {
  // Collect screen positions of all colonized stars
  const colonizedPos = [];
  for (const star of stars.values()) {
    if (star.visibility === "explored" && star.planets && star.planets.some(p => p.colony)) {
      const sp = worldToScreen(star.x, star.y);
      colonizedPos.push(sp);
    }
  }
  if (colonizedPos.length === 0) return;

  const pad = 80 * camera.zoom;

  ctx.save();
  ctx.fillStyle = "rgba(60,120,200,0.03)";
  ctx.strokeStyle = "rgba(60,120,200,0.08)";
  ctx.lineWidth = 1.5 * camera.zoom;

  if (colonizedPos.length === 1) {
    const p = colonizedPos[0];
    const r = pad + Math.sin(animTime * 2) * 4 * camera.zoom;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  } else if (colonizedPos.length === 2) {
    const [a, b] = colonizedPos;
    const dx = b.x - a.x, dy = b.y - a.y;
    const angle = Math.atan2(dy, dx);
    ctx.beginPath();
    ctx.arc(a.x, a.y, pad, angle + Math.PI * 0.5, angle + Math.PI * 1.5);
    ctx.arc(b.x, b.y, pad, angle - Math.PI * 0.5, angle + Math.PI * 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  } else {
    // 3+ stars: convex hull expanded along edge normals
    const hull = convexHull(colonizedPos);
    const n = hull.length;
    const expanded = hull.map((p, i) => {
      const prev = hull[(i - 1 + n) % n];
      const next = hull[(i + 1) % n];
      // Average outward normal of the two adjacent edges
      let nx = (next.y - p.y) + (p.y - prev.y);
      let ny = -(next.x - p.x) - (p.x - prev.x);
      const len = Math.sqrt(nx * nx + ny * ny) || 1;
      nx /= len; ny /= len;
      return { x: p.x + nx * pad, y: p.y + ny * pad };
    });
    drawSmoothCurve(ctx, expanded);
    ctx.fill();
    ctx.stroke();
  }
  ctx.restore();
}

function convexHull(points) {
  const pts = [...points].sort((a, b) => a.x - b.x || a.y - b.y);
  if (pts.length <= 2) return pts;
  const cross = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
  const lower = [];
  for (const p of pts) {
    while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
    lower.push(p);
  }
  const upper = [];
  for (let i = pts.length - 1; i >= 0; i--) {
    const p = pts[i];
    while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
    upper.push(p);
  }
  upper.pop();
  lower.pop();
  return lower.concat(upper);
}

function drawSmoothCurve(ctx, points) {
  if (points.length < 3) return;
  const n = points.length;
  ctx.beginPath();
  ctx.moveTo(
    (points[n - 1].x + points[0].x) / 2,
    (points[n - 1].y + points[0].y) / 2
  );
  for (let i = 0; i < n; i++) {
    const p = points[i];
    const next = points[(i + 1) % n];
    const mx = (p.x + next.x) / 2;
    const my = (p.y + next.y) / 2;
    ctx.quadraticCurveTo(p.x, p.y, mx, my);
  }
  ctx.closePath();
}

function render() {
  const canvas = document.getElementById("starmap");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = "#050508";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawBgStars(ctx);
  drawLanes(ctx);
  drawTerritoryContour(ctx);

  // Draw stars (detected first, then explored so they're on top)
  const detectedStars = [];
  const exploredStars = [];
  for (const star of stars.values()) {
    if (star.visibility === "detected") detectedStars.push(star);
    else if (star.visibility === "explored") exploredStars.push(star);
  }
  for (const star of detectedStars) drawStar(ctx, star, animTime);
  for (const star of exploredStars) drawStar(ctx, star, animTime);
}

// ═══════════════════════════════════════════
//  CARD PREVIEW RENDERER (shared)
// ═══════════════════════════════════════════
function buildCardHtml(card, watermark) {
  const statsHtml = Object.entries(card.stats)
    .map(([key, val]) => {
      const icon = STAT_ICONS[key] || "◆";
      return `<div class="card-stat"><span class="card-stat-icon">${icon}</span><span class="card-stat-value">${val}</span></div>`;
    }).join("");
  const hasSpecial = card.special && card.special.length > 0;
  const expandedClass = !hasSpecial ? " expanded" : "";
  return `
    <div class="card-preview ${card.rarity}">
      <div class="card-bg"></div>
      <div class="card-header">
        <div class="card-name">${card.name}</div>
        ${card.type ? `<div class="card-type">${card.type}</div>` : ""}
      </div>
      <div class="card-image">
        ${card.image ? `<img src="${card.image}">` : (watermark || "☀️")}
      </div>
      <div class="card-stats${expandedClass}">${statsHtml}</div>
      ${hasSpecial ? `<div class="card-special">${card.special}</div>` : ""}
      <div class="card-flavor">${card.flavor}</div>
      <div class="card-watermark">${watermark || "☀️"}</div>
    </div>`;
}

// ═══════════════════════════════════════════
//  SYSTEM VIEW OVERLAY
// ═══════════════════════════════════════════
let systemAnimFrame = null;
let systemViewStar = null;
let hoveredPlanetIdx = null;
let selectedPlanetIdx = null;

function resizeSystemCanvas() {
  const canvas = document.getElementById("system-canvas");
  const overlay = document.getElementById("system-overlay");
  // Use offsetWidth/Height since the overlay is now a sized box, not fullscreen
  canvas.width = overlay.offsetWidth;
  canvas.height = overlay.offsetHeight;
}

function drawSystemStar(ctx, cx, cy, star, time) {
  const visual = STAR_VISUALS[star.card.type] || DETECTED_VISUAL;
  const lum = star.card.stats.luminosity || 3;
  const scale = 3.5;
  const baseRadius = visual.baseSize * (1 + lum * 0.08) * scale;
  const pulse = 1 + Math.sin(time * 3) * 0.05;
  const radius = baseRadius * pulse;

  // Rarity aura
  if (star.card.rarity === "epic" || star.card.rarity === "legendary") {
    const auraColor = RARITY_COLORS[star.card.rarity];
    const auraRadius = radius * 3;
    const aura = ctx.createRadialGradient(cx, cy, radius, cx, cy, auraRadius);
    aura.addColorStop(0, auraColor + "40");
    aura.addColorStop(1, auraColor + "00");
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(cx, cy, auraRadius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Glow
  const glowRadius = radius * 3;
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowRadius);
  glow.addColorStop(0, visual.glowColor);
  glow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, cy, glowRadius, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = visual.color;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fill();

  // Core
  const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
  coreGrad.addColorStop(0, "rgba(255,255,255,0.6)");
  coreGrad.addColorStop(0.3, "rgba(255,255,255,0.15)");
  coreGrad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fill();

  // Binary companion
  if (star.card.type === "Binary System") {
    const offset = radius * 1.2;
    const angle2 = time * 0.5;
    ctx.fillStyle = "#90d0f0";
    ctx.beginPath();
    ctx.arc(cx + Math.cos(angle2) * offset, cy + Math.sin(angle2) * offset, radius * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Trinary companions
  if (star.card.type === "Trinary System") {
    for (let i = 0; i < 2; i++) {
      const offset = radius * 1.3;
      const angle2 = time * 0.4 + i * Math.PI * 0.67;
      ctx.fillStyle = i === 0 ? "#f0c060" : "#e09050";
      ctx.beginPath();
      ctx.arc(cx + Math.cos(angle2) * offset, cy + Math.sin(angle2) * offset, radius * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Pulsar beams
  if (star.card.type === "Pulsar") {
    const beamAngle = time * 2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(beamAngle);
    const beamLen = radius * 5;
    const beamGrad = ctx.createLinearGradient(0, 0, beamLen, 0);
    beamGrad.addColorStop(0, "rgba(128,224,224,0.4)");
    beamGrad.addColorStop(1, "rgba(128,224,224,0)");
    ctx.fillStyle = beamGrad;
    ctx.fillRect(0, -radius * 0.3, beamLen, radius * 0.6);
    ctx.rotate(Math.PI);
    ctx.fillRect(0, -radius * 0.3, beamLen, radius * 0.6);
    ctx.restore();
  }

  return radius; // return for orbit ring offset
}

function getPlanetScreenPos(planet, cx, cy, time) {
  const angle = planet.orbitPhase + planet.orbitSpeed * time;
  const scale = Math.min(cx, cy) / 250; // scale orbits to canvas size
  const r = planet.orbitRadius * scale;
  return {
    x: cx + Math.cos(angle) * r,
    y: cy + Math.sin(angle) * r,
  };
}

function getPlanetScreenRadius(planet) {
  const pv = PLANET_VISUALS[planet.card.type] || { baseSize: 5 };
  return pv.baseSize * 1.5;
}

function renderSystemView(time) {
  const star = systemViewStar;
  if (!star || !star.planets) return;

  const canvas = document.getElementById("system-canvas");
  const ctx = canvas.getContext("2d");
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background (slightly transparent — overlay bg shows through)
  ctx.fillStyle = "rgba(5,5,8,0.3)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Background star field (subtle)
  for (let i = 0; i < 120; i++) {
    const bx = ((i * 137.508 + 50) % canvas.width);
    const by = ((i * 97.231 + 30) % canvas.height);
    const brightness = 0.1 + (i % 5) * 0.04;
    ctx.fillStyle = `rgba(180,200,240,${brightness})`;
    ctx.fillRect(bx, by, 0.8, 0.8);
  }

  const scale = Math.min(cx, cy) / 250;

  // Orbital rings
  for (const planet of star.planets) {
    const r = planet.orbitRadius * scale;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(42,58,96,0.3)";
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Star
  drawSystemStar(ctx, cx, cy, star, time);

  // Planets
  star.planets.forEach((planet, idx) => {
    const pos = getPlanetScreenPos(planet, cx, cy, time);
    const pv = PLANET_VISUALS[planet.card.type] || { color:"#888", glowColor:"rgba(128,128,128,0.3)", baseSize:5 };
    const radius = getPlanetScreenRadius(planet);

    // Glow
    const glowR = radius * 2.5;
    const glow = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, glowR);
    glow.addColorStop(0, pv.glowColor);
    glow.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Rarity aura for epic/legendary
    if (planet.card.rarity === "epic" || planet.card.rarity === "legendary") {
      const auraColor = RARITY_COLORS[planet.card.rarity];
      const auraR = radius * 3;
      const aura = ctx.createRadialGradient(pos.x, pos.y, radius, pos.x, pos.y, auraR);
      aura.addColorStop(0, auraColor + "30");
      aura.addColorStop(1, auraColor + "00");
      ctx.fillStyle = aura;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, auraR, 0, Math.PI * 2);
      ctx.fill();
    }

    // Body
    ctx.fillStyle = pv.color;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
    ctx.fill();

    // Ring World Fragment — draw arc ring
    if (planet.card.type === "Ring World Fragment") {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius * 1.6, -0.8, 0.8);
      ctx.strokeStyle = "rgba(144,168,192,0.6)";
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Tidally Locked — half dark
    if (planet.card.type === "Tidally Locked World") {
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius, Math.PI * 0.5, Math.PI * 1.5);
      ctx.fill();
    }

    // Volcanic glow
    if (planet.card.type === "Volcanic World") {
      const vGlow = ctx.createRadialGradient(pos.x, pos.y, radius * 0.3, pos.x, pos.y, radius);
      vGlow.addColorStop(0, "rgba(255,100,20,0.3)");
      vGlow.addColorStop(1, "rgba(255,60,10,0)");
      ctx.fillStyle = vGlow;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    // Crystalline shimmer
    if (planet.card.type === "Crystalline World") {
      const shimmer = 0.3 + Math.sin(time * 4 + idx) * 0.15;
      ctx.fillStyle = `rgba(200,220,255,${shimmer})`;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }

    // Gas Giant bands
    if (planet.card.type === "Gas Giant") {
      for (let b = -3; b <= 3; b++) {
        const by = pos.y + b * (radius * 0.25);
        const bandW = Math.sqrt(Math.max(0, radius * radius - (b * radius * 0.25) ** 2));
        ctx.fillStyle = b % 2 === 0 ? "rgba(180,120,50,0.2)" : "rgba(200,150,70,0.15)";
        ctx.fillRect(pos.x - bandW, by - 1, bandW * 2, 2);
      }
    }

    // Precursor golden glow
    if (planet.card.type === "Precursor Homeworld") {
      const pGlow = ctx.createRadialGradient(pos.x, pos.y, radius * 0.5, pos.x, pos.y, radius * 1.5);
      pGlow.addColorStop(0, "rgba(200,180,60,0.2)");
      pGlow.addColorStop(1, "rgba(200,180,60,0)");
      ctx.fillStyle = pGlow;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius * 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Colonized highlight (permanent green glow ring)
    if (planet.colony) {
      const colR = radius + 6;
      const colGlow = ctx.createRadialGradient(pos.x, pos.y, radius, pos.x, pos.y, colR + 4);
      colGlow.addColorStop(0, "rgba(74,155,90,0.4)");
      colGlow.addColorStop(1, "rgba(74,155,90,0)");
      ctx.fillStyle = colGlow;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, colR + 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(74,155,90,0.6)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, colR, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Hover ring
    if (hoveredPlanetIdx === idx) {
      ctx.strokeStyle = "rgba(200,220,255,0.5)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius + 4, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Selection ring
    if (selectedPlanetIdx === idx) {
      ctx.strokeStyle = "#4a7ac0";
      ctx.lineWidth = 2;
      ctx.setLineDash([3, 3]);
      ctx.lineDashOffset = -time * 30;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius + 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.lineDashOffset = 0;
    }

    // Name label
    ctx.fillStyle = "rgba(200,210,230,0.6)";
    ctx.font = "10px 'Segoe UI', system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(planet.card.name, pos.x, pos.y + radius + 14);
  });
}

function systemLoop(timestamp) {
  const time = timestamp / 1000;
  renderSystemView(time);
  systemAnimFrame = requestAnimationFrame(systemLoop);
}

function showSystemOverlay(star) {
  selectedStarId = star.id;
  systemViewStar = star;
  hoveredPlanetIdx = null;
  selectedPlanetIdx = null;

  const overlay = document.getElementById("system-overlay");
  const backdrop = document.getElementById("system-backdrop");
  const detected = document.getElementById("system-detected");
  const starCard = document.getElementById("system-star-card");
  const planetCard = document.getElementById("system-planet-card");

  backdrop.classList.add("visible");
  overlay.style.display = "block";
  requestAnimationFrame(() => overlay.classList.add("visible", "fade-in"));

      <div class="card-preview common" style="--rarity-color:#384868">

    detected.classList.remove("visible");

    starCard.innerHTML = buildCardHtml(star.card, "☀️");
    resizeSystemCanvas();
    if (systemAnimFrame) cancelAnimationFrame(systemAnimFrame);
    systemAnimFrame = requestAnimationFrame(systemLoop);

let isDragging = false;
let dragStart = { x: 0, y: 0 };
let dragCameraStart = { x: 0, y: 0 };
let dragMoved = false;

function getStarAtScreen(sx, sy) {
  const world = screenToWorld(sx, sy);
  let closest = null;
  let closestDist = Infinity;
  for (const star of stars.values()) {
    if (star.visibility === "unknown") continue;
    const d = distanceBetween(world, star);
    const hitRadius = star.visibility === "explored"
      ? (STAR_VISUALS[star.card.type]?.baseSize || 4) * 2
      : DETECTED_VISUAL.baseSize * 2;
    if (d < hitRadius && d < closestDist) {
      closest = star;
      closestDist = d;
    }
  }
  return closest;
}

const container = document.getElementById("map-container");
const canvasEl = document.getElementById("starmap");
const tooltip = document.getElementById("tooltip");

container.addEventListener("mousedown", (e) => {
  if (e.target.closest("#system-overlay") || e.target.closest("#system-backdrop") || e.target.closest("#select-panel") || e.target.closest("#colony-overlay") || e.target.closest("#colony-backdrop") || e.target.closest("#colonies-list-overlay") || e.target.closest("#colonies-backdrop") || e.target.closest("#card-select-backdrop")) return;
  isDragging = true;
  dragMoved = false;
  dragStart = { x: e.clientX, y: e.clientY };
  dragCameraStart = { x: camera.x, y: camera.y };
  container.classList.add("dragging");
});

window.addEventListener("mousemove", (e) => {
  if (isDragging) {
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
    camera.x = dragCameraStart.x - dx / camera.zoom;
    camera.y = dragCameraStart.y - dy / camera.zoom;
    return;
  }

  // Hover detection
  const rect = canvasEl.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const star = getStarAtScreen(sx, sy);

  if (star) {
    hoveredStarId = star.id;
    const label = star.visibility === "explored" ? star.card.name : "Unknown Star";
    tooltip.textContent = label;
    tooltip.style.left = (e.clientX - rect.left + 12) + "px";
    tooltip.style.top = (e.clientY - rect.top - 8) + "px";
    tooltip.style.display = "block";
    canvasEl.style.cursor = "pointer";
  } else {
    hoveredStarId = null;
    tooltip.style.display = "none";
    canvasEl.style.cursor = isDragging ? "grabbing" : "grab";
  }
});

window.addEventListener("mouseup", (e) => {
  if (isDragging) {
    isDragging = false;
    container.classList.remove("dragging");

    if (!dragMoved) {
      // Single click — select star or deselect
      const rect = canvasEl.getBoundingClientRect();
      const sx = e.clientX - rect.left;
      const sy = e.clientY - rect.top;
      const star = getStarAtScreen(sx, sy);
      if (star) {
        showSelectPanel(star);
      } else {
        hideSelectPanel();
      }
    }
  }
});

// Double-click to enter system view
canvasEl.addEventListener("dblclick", (e) => {
  const rect = canvasEl.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const star = getStarAtScreen(sx, sy);
  if (star && star.visibility === "explored") {
    hideSelectPanel();
    showSystemOverlay(star);
  }
});

container.addEventListener("wheel", (e) => {
  if (e.target.closest("#system-overlay") || e.target.closest("#select-panel") || e.target.closest("#colony-overlay") || e.target.closest("#colonies-list-overlay") || e.target.closest("#card-select-backdrop")) return;
  e.preventDefault();
  const zoomFactor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  const newZoom = Math.max(camera.minZoom, Math.min(camera.maxZoom, camera.zoom * zoomFactor));

  // Zoom toward mouse position
  const rect = canvasEl.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const worldBefore = screenToWorld(mx, my);

  camera.zoom = newZoom;

  const worldAfter = screenToWorld(mx, my);
  camera.x -= (worldAfter.x - worldBefore.x);
  camera.y -= (worldAfter.y - worldBefore.y);
}, { passive: false });

document.getElementById("system-close").addEventListener("click", hideSystemOverlay);
document.getElementById("system-backdrop").addEventListener("click", hideSystemOverlay);
document.getElementById("planet-card-close").addEventListener("click", hidePlanetCard);
document.getElementById("select-panel-close").addEventListener("click", hideSelectPanel);

// System overlay mouse interaction
const systemCanvas = document.getElementById("system-canvas");

systemCanvas.addEventListener("mousemove", (e) => {
  if (!systemViewStar || !systemViewStar.planets) return;
  const rect = systemCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const cx = systemCanvas.width / 2;
  const cy = systemCanvas.height / 2;
  const time = animTime;

  let found = -1;
  for (let i = 0; i < systemViewStar.planets.length; i++) {
    const planet = systemViewStar.planets[i];
    const pos = getPlanetScreenPos(planet, cx, cy, time);
    const r = getPlanetScreenRadius(planet);
    const dx = mx - pos.x;
    const dy = my - pos.y;
    if (dx * dx + dy * dy < (r + 6) * (r + 6)) {
      found = i;
      break;
    }
  }
  hoveredPlanetIdx = found >= 0 ? found : null;
  systemCanvas.style.cursor = found >= 0 ? "pointer" : "default";
});

systemCanvas.addEventListener("click", (e) => {
  if (!systemViewStar || !systemViewStar.planets) return;
  const rect = systemCanvas.getBoundingClientRect();

  const my = e.clientY - rect.top;
  const cx = systemCanvas.width / 2;
  const cy = systemCanvas.height / 2;

  for (let i = 0; i < systemViewStar.planets.length; i++) {

//  COLONIZATION & COLONY SCREEN

// ═══════════════════════════════════════════
//  GLOBAL RESOURCES & ECONOMY
// ═══════════════════════════════════════════
const resources = { energy: 5000, minerals: 5000, research: 5000, food: 5000 };
let gameSpeed = 1;
let lastTickTime = 0;
let tickAccumulator = 0;

function getColonyOutput(colony) {
  const out = { energy:0, minerals:0, research:0, food:0 };
  for (const b of colony.buildings) {
    if (b && b.stats) {
      for (const k of Object.keys(out)) out[k] += (b.stats[k] || 0);
    }
  }
  for (const l of colony.leaders) {
    if (l && l.stats) {
      for (const k of Object.keys(out)) out[k] += (l.stats[k] || 0);
    }
  }
  return out;
}

function tickEconomy(dt) {
  if (gameSpeed === 0) return;
  const scaledDt = dt * gameSpeed;
  tickAccumulator += scaledDt;

  // Card generation timers (every colony with activeAction)
  for (const c of colonies) {
    const col = c.planet.colony;
    if (!col || !col.activeAction) continue;
    const deckSize = col.deck.length;
    const genInterval = 10 * Math.pow(3, deckSize); // exponential: 10s, 30s, 90s, 270s...
    col.genTimer += scaledDt;
    if (col.genTimer >= genInterval) {
      col.genTimer -= genInterval;
      const cat = ACTION_TO_CATEGORY[col.activeAction];
      if (cat) col.deck.push({ category: cat, faceDown: true });
    }
  }

  // Resource ticks (1 second of game time each)
  while (tickAccumulator >= 1) {
    tickAccumulator -= 1;
    for (const c of colonies) {
      const col = c.planet.colony;
      if (!col) continue;
      const out = getColonyOutput(col);
      resources.energy += out.energy;
      resources.minerals += out.minerals;
      resources.research += out.research;
      resources.food += out.food;
    }
  }

  // Update top bar
  updateResourceDisplay();
}

function updateResourceDisplay() {
  document.getElementById("res-energy").textContent = Math.floor(resources.energy);
  document.getElementById("res-minerals").textContent = Math.floor(resources.minerals);
  document.getElementById("res-research").textContent = Math.floor(resources.research);
  document.getElementById("res-food").textContent = Math.floor(resources.food);

  // Compute global rates
  let totalOut = { energy:0, minerals:0, research:0, food:0 };
  for (const c of colonies) {
    const col = c.planet.colony;
    if (!col) continue;
    const out = getColonyOutput(col);
    for (const k of Object.keys(totalOut)) totalOut[k] += out[k];
  }
  document.getElementById("rate-energy").textContent = `+${totalOut.energy}/s`;
  document.getElementById("rate-minerals").textContent = `+${totalOut.minerals}/s`;
  document.getElementById("rate-research").textContent = `+${totalOut.research}/s`;
  document.getElementById("rate-food").textContent = `+${totalOut.food}/s`;
}

const colonies = []; // array of { starId, planetIdx, planet } references

function colonizePlanet(star, planetIdx) {
  const planet = star.planets[planetIdx];
  if (planet.colony) return; // already colonized
  planet.colony = {
    population: 10,
    maxPopulation: 10,
    buildings: new Array(10).fill(null), // building slots = population
    leaders: [],                          // leader slot (max 1)
    deck: [],                             // face-down cards awaiting selection
    queue: [],                            // face-up selected cards awaiting placement
    activeAction: null,                   // "buildings"|"captains"|"leaders"|"ships"
    genTimer: 0,                          // seconds toward next card
  };
  colonies.push({ starId: star.id, planetIdx, planet });
  // Refresh the planet card to show "Manage Colony" instead of "Colonize"
  showPlanetCard(planet);
}

function showPlanetCard(planet) {
  const slot = document.getElementById("planet-card-slot");
  slot.innerHTML = buildCardHtml(planet.card, "🪐");
  // Place button as sibling after the card slot, before the close button
  let existingBtn = document.getElementById("planet-action-btn");
  if (existingBtn) existingBtn.remove();
  const btn = document.createElement("button");
  btn.id = "planet-action-btn";
  btn.className = "card-action-btn";
  if (planet.colony) {
    btn.textContent = "Manage Colony";
    btn.onclick = () => openColonyFromSystem();
  } else {
    btn.textContent = "Colonize";
    btn.onclick = () => colonizeFromSystem();
  }
  const container = document.getElementById("system-planet-card");
  container.insertBefore(btn, document.getElementById("planet-card-close"));
  container.classList.add("visible");
}

function colonizeFromSystem() {
  if (!systemViewStar || selectedPlanetIdx == null) return;
  colonizePlanet(systemViewStar, selectedPlanetIdx);
}

function openColonyFromSystem() {
  if (!systemViewStar || selectedPlanetIdx == null) return;
  const planet = systemViewStar.planets[selectedPlanetIdx];
  if (!planet.colony) return;
  showColonyScreen(systemViewStar, selectedPlanetIdx);
}

// ── Colony Screen ──
let colonyViewStar = null;
let colonyViewPlanetIdx = null;
let draggedCard = null; // { source:"queue"|"building"|"leader", index, card }
let colonyDirty = false; // set true when colony state changes, cleared after refresh
let lastDeckCount = -1; // track deck size changes for minimal refresh

function getActiveColony() {
  if (!colonyViewStar || colonyViewPlanetIdx == null) return null;
  return colonyViewStar.planets[colonyViewPlanetIdx].colony;
}

function showColonyScreen(star, planetIdx) {
  const planet = star.planets[planetIdx];
  if (!planet.colony) return;
  colonyViewStar = star;
  colonyViewPlanetIdx = planetIdx;

  // Set active action button state
  document.querySelectorAll(".colony-action-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.action === planet.colony.activeAction);
  });

  lastDeckCount = -1; // force refresh
  // Hide system view cards behind colony screen
  document.getElementById("system-star-card").style.display = "none";
  document.getElementById("system-planet-card").style.display = "none";

  const backdrop = document.getElementById("colony-backdrop");
  const overlay = document.getElementById("colony-overlay");
  backdrop.classList.add("visible");
  overlay.style.display = "flex";
  requestAnimationFrame(() => overlay.classList.add("visible", "fade-in"));

  refreshColonyScreen();
}

function hideColonyScreen() {
  dismissMagnifiedCard();
  colonyViewStar = null;
  colonyViewPlanetIdx = null;
  const overlay = document.getElementById("colony-overlay");
  const backdrop = document.getElementById("colony-backdrop");
  overlay.classList.remove("visible", "fade-in");
  backdrop.classList.remove("visible");
  setTimeout(() => { overlay.style.display = "none"; }, 300);
  // Restore system view cards
  document.getElementById("system-star-card").style.display = "";
  document.getElementById("system-planet-card").style.display = "";
}

function refreshDeckDisplay(col) {
  const deckEl = document.getElementById("colony-deck");
  if (!deckEl) return;
  if (col.deck.length === 0) {
    deckEl.innerHTML = `<div class="deck-empty">${col.activeAction ? "Generating..." : "Select an action"}</div>`;
  } else {
    const maxShow = Math.min(col.deck.length, 5);
    let html = `<div class="deck-pile">`;
    for (let i = 0; i < maxShow; i++) {
      html += `<div class="deck-card-back" style="top:${i * 2}px;left:${i}px"><div class="deck-logo">Idle<br><span>Space</span></div></div>`;
    }
    html += `<div class="deck-count">${col.deck.length}</div></div>`;
    deckEl.innerHTML = html;
  }
}

function refreshColonyScreen() {
  const col = getActiveColony();
  if (!col) return;
  const planet = colonyViewStar.planets[colonyViewPlanetIdx];

  document.getElementById("colony-name").textContent = planet.card.name;
  document.getElementById("colony-pop").textContent = `👤 ${col.population}/${col.maxPopulation}`;

  // Colony resource output
  const out = getColonyOutput(col);
  document.getElementById("col-energy").textContent = out.energy;
  document.getElementById("col-rate-energy").textContent = `+${out.energy}/t`;
  document.getElementById("col-minerals").textContent = out.minerals;
  document.getElementById("col-rate-minerals").textContent = `+${out.minerals}/t`;
  document.getElementById("col-research").textContent = out.research;
  document.getElementById("col-rate-research").textContent = `+${out.research}/t`;
  document.getElementById("col-food").textContent = out.food;
  document.getElementById("col-rate-food").textContent = `+${out.food}/t`;

  // ── Building slots ──
  const slotsEl = document.getElementById("building-slots");
  slotsEl.innerHTML = "";
  for (let i = 0; i < col.buildings.length; i++) {
    const slot = document.createElement("div");
    const card = col.buildings[i];
    if (card) {
      slot.className = "building-slot occupied";
      slot.innerHTML = buildCardHtml(card, CATEGORY_WATERMARKS[card.category] || "🏗️");
      slot.draggable = true;
      slot.addEventListener("dragstart", (e) => {
        draggedCard = { source: "building", index: i, card };
        e.dataTransfer.effectAllowed = "move";
        slot.classList.add("dragging");
      });
      slot.addEventListener("dragend", () => { slot.classList.remove("dragging"); draggedCard = null; });
      // Click to magnify with return-to-queue option
      slot.addEventListener("click", (e) => {
        e.stopPropagation();
        showSlotMagnifiedCard(card, "building", i, slot);
      });
    } else {
      slot.className = "building-slot";
      slot.textContent = "+";
    }
    // Drop target
    slot.addEventListener("dragover", (e) => {
      if (!draggedCard) return;
      if (draggedCard.card.category === "building" && !col.buildings[i]) {
        e.preventDefault();
        slot.classList.add("drag-over");
      }
    });
    slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"));
    slot.addEventListener("drop", (e) => {
      e.preventDefault();
      slot.classList.remove("drag-over");
      if (!draggedCard || draggedCard.card.category !== "building" || col.buildings[i]) return;
      // Place card
      if (draggedCard.source === "queue") {
        col.queue.splice(draggedCard.index, 1);
      } else if (draggedCard.source === "building") {
        col.buildings[draggedCard.index] = null;
      }
      col.buildings[i] = draggedCard.card;
      draggedCard = null;
      refreshColonyScreen();
    });
    slotsEl.appendChild(slot);
  }

  // ── Leader slot (replace element to avoid listener accumulation) ──
  const oldLeader = document.getElementById("leader-slot");
  const leaderEl = oldLeader.cloneNode(false);
  leaderEl.id = "leader-slot";
  oldLeader.parentNode.replaceChild(leaderEl, oldLeader);

  const currentLeader = col.leaders[0] || null;
  if (currentLeader) {
    leaderEl.className = "occupied";
    leaderEl.innerHTML = buildCardHtml(currentLeader, "👑");
    leaderEl.draggable = true;
    leaderEl.addEventListener("dragstart", (e) => {
      draggedCard = { source: "leader", index: 0, card: currentLeader };
      e.dataTransfer.effectAllowed = "move";
    });
    leaderEl.addEventListener("click", (e) => {
      e.stopPropagation();
      showSlotMagnifiedCard(currentLeader, "leader", 0, leaderEl);
    });
  } else {
    leaderEl.className = "";
    leaderEl.innerHTML = "No Leader";
    leaderEl.draggable = false;
  }
  // Leader drop target
  leaderEl.addEventListener("dragover", (e) => {
    if (!draggedCard || draggedCard.card.category !== "leader" || col.leaders.length > 0) return;
    e.preventDefault();
    leaderEl.classList.add("drag-over");
  });
  leaderEl.addEventListener("dragleave", () => leaderEl.classList.remove("drag-over"));
  leaderEl.addEventListener("drop", (e) => {
    e.preventDefault();
    leaderEl.classList.remove("drag-over");
    if (!draggedCard || draggedCard.card.category !== "leader" || col.leaders.length > 0) return;
    if (draggedCard.source === "queue") col.queue.splice(draggedCard.index, 1);
    col.leaders.push(draggedCard.card);
    draggedCard = null;
    refreshColonyScreen();
  });

  // ── Deck pile ──
  refreshDeckDisplay(col);

  // ── Queue (replace element to avoid listener accumulation) ──
  const oldQueue = document.getElementById("colony-queue");
  const queueEl = document.createElement("div");
  queueEl.id = "colony-queue";
  oldQueue.parentNode.replaceChild(queueEl, oldQueue);

  col.queue.forEach((card, qi) => {
    const wrap = document.createElement("div");
    wrap.className = "queue-card";
    wrap.innerHTML = buildCardHtml(card, CATEGORY_WATERMARKS[card.category] || "🏗️");
    wrap.draggable = true;
    wrap.addEventListener("dragstart", (e) => {
      dismissMagnifiedCard();
      draggedCard = { source: "queue", index: qi, card };
      e.dataTransfer.effectAllowed = "move";
      wrap.classList.add("dragging");
    });
    wrap.addEventListener("dragend", () => { wrap.classList.remove("dragging"); draggedCard = null; });
    wrap.addEventListener("click", (e) => {
      e.stopPropagation();
      showMagnifiedCard(card, qi, wrap);
    });
    queueEl.appendChild(wrap);
  });

  // Queue as drop target (return cards here)
  queueEl.addEventListener("dragover", (e) => {
    if (!draggedCard) return;
    if (draggedCard.source === "building" || draggedCard.source === "leader") {
      e.preventDefault();
      queueEl.classList.add("drag-over");
    }
  });
  queueEl.addEventListener("dragleave", () => queueEl.classList.remove("drag-over"));
  queueEl.addEventListener("drop", (e) => {
    e.preventDefault();
    queueEl.classList.remove("drag-over");
    if (!draggedCard) return;
    if (draggedCard.source === "building") {
      col.queue.push(draggedCard.card);
      col.buildings[draggedCard.index] = null;
    } else if (draggedCard.source === "leader") {
      col.queue.push(draggedCard.card);
      col.leaders.splice(draggedCard.index, 1);
    }
    draggedCard = null;
    refreshColonyScreen();
  });

  // Scale cards to fill their slots after layout
  requestAnimationFrame(() => {
    document.querySelectorAll(".building-slot.occupied .card-preview").forEach(cp => {
      const slot = cp.closest(".building-slot");
      if (!slot) return;
      const s = Math.min(slot.clientWidth / 220, slot.clientHeight / 320);
      cp.style.transform = `scale(${s})`;
    });
    const leaderCP = document.querySelector("#leader-slot.occupied .card-preview");
    if (leaderCP) {
      const ls = document.getElementById("leader-slot");
      const s = Math.min(ls.clientWidth / 220, ls.clientHeight / 320);
      leaderCP.style.transform = `scale(${s})`;
    }
  });
}

// ── Deck click → Card Selection ──
document.getElementById("colony-deck").addEventListener("click", () => {
  const col = getActiveColony();
  if (!col || col.deck.length === 0) return;
  const faceDown = col.deck[0];
  const cat = faceDown.category;
  // Roll 3 cards
  const choices = [rollCardFromCategory(cat), rollCardFromCategory(cat), rollCardFromCategory(cat)];
  const optionsEl = document.getElementById("card-select-options");
  optionsEl.innerHTML = "";
  choices.forEach((card, i) => {
    const wrap = document.createElement("div");
    wrap.className = "card-select-option";
    wrap.innerHTML = buildCardHtml(card, CATEGORY_WATERMARKS[cat] || "🏗️");
    wrap.addEventListener("click", () => {
      col.deck.shift(); // remove one face-down card
      col.queue.push(card);
      hideCardSelect();
      refreshColonyScreen();
    });
    optionsEl.appendChild(wrap);
  });
  document.getElementById("card-select-backdrop").classList.add("visible");
});

function hideCardSelect() {
  document.getElementById("card-select-backdrop").classList.remove("visible");
}
document.getElementById("card-select-discard-all").addEventListener("click", () => {
  const col = getActiveColony();
  if (col && col.deck.length > 0) {
    col.deck.shift(); // remove the face-down card being drawn
  }
  hideCardSelect();
  refreshColonyScreen();
});
document.getElementById("card-select-backdrop").addEventListener("click", (e) => {
  if (e.target === document.getElementById("card-select-backdrop")) hideCardSelect();
});

// ── Magnified card popup (click queue card to inspect + discard) ──
let magnifiedEl = null;

function showMagnifiedCard(card, queueIndex, anchorEl) {
  dismissMagnifiedCard();
  const col = getActiveColony();
  if (!col) return;

  const mag = document.createElement("div");
  mag.className = "queue-card-magnified";
  mag.innerHTML = buildCardHtml(card, CATEGORY_WATERMARKS[card.category] || "🏗️") +
    `<div class="magnify-actions">
      <button class="magnify-discard-btn">Discard</button>
      <button class="magnify-close-btn">Close</button>
    </div>`;

  // Position near the anchor card but above it
  const colRight = document.getElementById("colony-right");
  const crRect = colRight.getBoundingClientRect();
  const aRect = anchorEl.getBoundingClientRect();
  mag.style.left = Math.max(0, Math.min(aRect.left - crRect.left, crRect.width - 230)) + "px";
  mag.style.bottom = (crRect.bottom - aRect.top + 8) + "px";

  mag.querySelector(".magnify-discard-btn").addEventListener("click", () => {
    col.queue.splice(queueIndex, 1);
    dismissMagnifiedCard();
    refreshColonyScreen();
  });
  mag.querySelector(".magnify-close-btn").addEventListener("click", () => {
    dismissMagnifiedCard();
  });

  colRight.style.position = "relative";
  colRight.appendChild(mag);
  magnifiedEl = mag;
}

function showSlotMagnifiedCard(card, slotType, slotIndex, anchorEl) {
  dismissMagnifiedCard();
  const col = getActiveColony();
  if (!col) return;

  const mag = document.createElement("div");
  mag.className = "queue-card-magnified";
  mag.innerHTML = buildCardHtml(card, CATEGORY_WATERMARKS[card.category] || "🏗️") +
    `<div class="magnify-actions">
      <button class="magnify-discard-btn" style="background:#4a7ac0;">Return to Queue</button>
      <button class="magnify-close-btn">Close</button>
    </div>`;

  const colRight = document.getElementById("colony-right");
  const crRect = colRight.getBoundingClientRect();
  const aRect = anchorEl.getBoundingClientRect();
  mag.style.left = Math.max(0, Math.min(aRect.left - crRect.left, crRect.width - 230)) + "px";
  mag.style.bottom = (crRect.bottom - aRect.top + 8) + "px";

  mag.querySelector(".magnify-discard-btn").addEventListener("click", () => {
    if (slotType === "building") {
      col.queue.push(col.buildings[slotIndex]);
      col.buildings[slotIndex] = null;
    } else if (slotType === "leader") {
      col.queue.push(col.leaders.shift());
    }
    dismissMagnifiedCard();
    refreshColonyScreen();
  });
  mag.querySelector(".magnify-close-btn").addEventListener("click", () => {
    dismissMagnifiedCard();
  });

  colRight.style.position = "relative";
  colRight.appendChild(mag);
  magnifiedEl = mag;
}

function dismissMagnifiedCard() {
  if (magnifiedEl) { magnifiedEl.remove(); magnifiedEl = null; }
}

// Dismiss magnified card on click outside
document.getElementById("colony-overlay").addEventListener("click", (e) => {
  if (magnifiedEl && !e.target.closest(".queue-card-magnified") && !e.target.closest(".queue-card") && !e.target.closest(".building-slot.occupied") && !e.target.closest("#colony-leader")) {
    dismissMagnifiedCard();
  }
});

document.getElementById("colony-close").addEventListener("click", hideColonyScreen);
document.getElementById("colony-backdrop").addEventListener("click", hideColonyScreen);

// Action button wiring — sets activeAction on colony
document.querySelectorAll(".colony-action-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const col = getActiveColony();
    if (!col) return;
    const action = btn.dataset.action;
    const isGenerating = ["buildings", "captains", "leaders", "ships"].includes(action);
    if (col.activeAction === action) {
      // Deactivate
      col.activeAction = null;
      col.genTimer = 0;
      btn.classList.remove("active");
    } else {
      document.querySelectorAll(".colony-action-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      if (isGenerating) {
        col.activeAction = action;
        col.genTimer = 0;
      } else {
        col.activeAction = null;
        col.genTimer = 0;
      }
    }
    refreshColonyScreen();
  });
});

// Double-click planet in system view to open colony screen
systemCanvas.addEventListener("dblclick", (e) => {
  if (!systemViewStar || !systemViewStar.planets) return;
  const rect = systemCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const cx = systemCanvas.width / 2;
  const cy = systemCanvas.height / 2;
  const time = animTime;

  for (let i = 0; i < systemViewStar.planets.length; i++) {
    const planet = systemViewStar.planets[i];
    const pos = getPlanetScreenPos(planet, cx, cy, time);
    const r = getPlanetScreenRadius(planet);
    const dx = mx - pos.x;
    const dy = my - pos.y;
    if (dx * dx + dy * dy < (r + 6) * (r + 6)) {
      if (planet.colony) {
        showColonyScreen(systemViewStar, i);
      }
      return;
    }
  }
});

// Speed controls
document.querySelectorAll("#speed-controls button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#speed-controls button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    gameSpeed = parseFloat(btn.dataset.speed);
  });
});

// ═══════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════
function gameLoop(timestamp) {
  const now = timestamp / 1000;
  const dt = lastTickTime > 0 ? Math.min(now - lastTickTime, 0.1) : 0;
  lastTickTime = now;
  animTime = now;
  tickEconomy(dt);
  // Lightweight updates when colony screen is open (no full DOM rebuild)
  if (colonyViewStar && colonyViewPlanetIdx != null) {
    const col = getActiveColony();
    if (col) {
      if (col.deck.length !== lastDeckCount) {
        lastDeckCount = col.deck.length;
        refreshDeckDisplay(col);
      }
      // Update colony resource header without full refresh
      const out = getColonyOutput(col);
      document.getElementById("col-energy").textContent = out.energy;
      document.getElementById("col-rate-energy").textContent = `+${out.energy}/t`;
      document.getElementById("col-minerals").textContent = out.minerals;
      document.getElementById("col-rate-minerals").textContent = `+${out.minerals}/t`;
      document.getElementById("col-research").textContent = out.research;
      document.getElementById("col-rate-research").textContent = `+${out.research}/t`;
      document.getElementById("col-food").textContent = out.food;
      document.getElementById("col-rate-food").textContent = `+${out.food}/t`;
    }
    if (colonyDirty) {
      colonyDirty = false;
      refreshColonyScreen();
    }
  }
  render();
  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
resizeCanvas();
window.addEventListener("resize", resizeCanvas);
const homeStar = generateSeedCluster();
camera.x = homeStar.x;
camera.y = homeStar.y;
updateResourceDisplay();
requestAnimationFrame(gameLoop);
</script>
