<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IdleSpace — Star Map</title>
<link rel="stylesheet" href="ui/colors_and_type.css">
<link rel="stylesheet" href="ui/chrome.css">
<link rel="stylesheet" href="ui/topbar.css">
<link rel="stylesheet" href="ui/card-chrome.css">
<link rel="stylesheet" href="ui/ship-card.css">
<link rel="stylesheet" href="ui/star-card.css">
<link rel="stylesheet" href="ui/planet-card.css">
<link rel="stylesheet" href="ui/building-card.css">
<link rel="stylesheet" href="ui/leader-card.css">
<link rel="stylesheet" href="ui/admiral-card.css">
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #050508; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #050508;
  color: #c8d0e0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}
/* Global UI scaling for sub-design screens. The UI fits naturally at ~1920px
   wide (a half-window on a 3440 monitor sits well below that), so 1920 is the
   floor: screens at or above it render natively, smaller screens get
   transform-scaled to fit. Keep this width in sync with DESIGN_W in JS. */
body.scaled {
  position: absolute;
  top: 0; left: 0;
  width: 1920px;
  height: 1080px;
  transform-origin: top left;
  transform: scale(var(--ui-scale, 1));
}

/* ── Top Bar (restyled — see ui/topbar.css for the structural vocabulary) ── */
#top-bar {
  flex-shrink: 0;
  z-index: 10;
  /* .metal class supplies background, border, shadow.
     .tb-root class (ui/topbar.css) supplies flex layout + height. */
}
#save-controls {
  display: flex;
  gap: 4px;
  align-items: center;
  padding-left: 8px;
  margin-left: 2px;
  border-left: 1px solid var(--metal-edge);
}
#save-menu-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: none;
  align-items: center; justify-content: center;
}
#save-menu-backdrop.visible { display: flex; }
#save-menu {
  background: #08090f;
  border: 1px solid #2a3460;
  border-radius: 8px;
  padding: 18px 20px;
  min-width: 340px;
  max-width: 420px;
  color: #c0d0e0;
  font-size: 12px;
}
#save-menu h2 { margin: 0 0 12px 0; color: #c0d0e0; font-size: 15px; font-weight: 600; }
#save-menu .menu-btn {
  display: block; width: 100%; text-align: left;
  background: #1a2040; border: 1px solid #2a3460;
  color: #c0d0e0; padding: 8px 12px; margin-bottom: 6px;
  border-radius: 4px; cursor: pointer; font-size: 12px;
  transition: all 0.15s;
}
#save-menu .menu-btn:hover { background: #252f55; border-color: #4060c0; }
#save-menu .menu-btn.secondary { background: transparent; color: #6a7a9b; margin-top: 8px; }
#save-menu .menu-btn.danger:hover { border-color: #c04040; color: #ffa0a0; }
#save-menu .save-meta {
  background: #0d1128;
  border: 1px solid #1a2040;
  border-radius: 4px;
  padding: 8px 10px;
  margin: 6px 0 10px 0;
  font-size: 11px;
  color: #8090b0;
  line-height: 1.5;
}
#save-menu .save-meta .meta-title { color: #c0d0e0; font-weight: 600; margin-bottom: 2px; }
#save-menu .save-status { font-size: 11px; color: #8090b0; margin-top: 8px; min-height: 14px; }
#save-menu .save-status.err { color: #ffa0a0; }
#save-menu .save-status.ok { color: #a4e4a4; }

/* ── Card-source badge (live override indicator) ── */
#card-source-badge {
  position: fixed;
  top: 10px; right: 12px;
  z-index: 9000;
  display: none;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  background: linear-gradient(135deg, #3a2a10, #503a15);
  border: 1px solid #c0a020;
  border-radius: 6px;
  color: #ffe8a0;
  font-size: 11px;
  font-weight: 600;
  box-shadow: 0 2px 10px rgba(192,160,32,0.25);
  pointer-events: auto;
}
#card-source-badge.visible { display: flex; }
#card-source-badge .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #ffd040;
  box-shadow: 0 0 6px #ffd040;
  animation: badge-pulse 1.8s ease-in-out infinite;
}
@keyframes badge-pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}
#card-source-badge button {
  background: transparent;
  border: 1px solid #c0a020;
  color: #ffe8a0;
  border-radius: 4px;
  font-size: 10px;
  padding: 2px 6px;
  cursor: pointer;
}
#card-source-badge button:hover { background: rgba(192,160,32,0.25); }

/* ── Canvas Container ── */
#map-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: grab;
  touch-action: none; /* let us handle pan/pinch ourselves */
}
#map-container.dragging { cursor: grabbing; }
#starmap {
  display: block;
  width: 100%;
  height: 100%;
}

/* ── Tooltip ── */
#tooltip {
  position: absolute;
  pointer-events: none;
  background: rgba(8,9,15,0.92);
  border: 1px solid #1e2744;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 11px;
  color: #c8d0e0;
  white-space: nowrap;
  z-index: 20;
  display: none;
}

/* ── Star Selection Panel (right side, on single-click) ── */
#select-panel {
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: 280px;
  background: #06080c;
  border-left: 1px solid #111828;
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px;
  z-index: 15;
  overflow-y: auto;
}
#select-panel.visible { display: flex; }
#select-panel-close {
  position: absolute;
  top: 8px;
  right: 8px;
  background: none;
  border: none;
  color: #4a5a7b;
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
}
#select-panel-close:hover { color: #c8d0e0; background: #0c0e18; }
#select-panel-ships {
  margin-top: 14px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
#select-panel-ships .fleet-ship-card {
  width: 165px;
  height: 240px;
  position: relative;
  flex-shrink: 0;
}
#select-panel-ships .fleet-ship-card .card-preview {
  transform: scale(0.75);
  transform-origin: top left;
  position: absolute;
  top: 0;
  left: 0;
}
#select-panel-info {
  margin-top: 12px;
  width: 220px;
  font-size: 11px;
  color: #4a5a7b;
  text-align: center;
}
.planet-count {
  margin-top: 10px;
  font-size: 12px;
  color: #6a7a9b;
  display: flex;
  align-items: center;
  gap: 5px;
}
.planet-count .count-icon { font-size: 14px; }
.planet-count .count-value { font-weight: 600; color: #8090b0; }

/* ── System View Overlay (50% centered) ── */
#system-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 81%;
  height: 81%;
  max-width: 1400px;
  max-height: 900px;
  background: rgba(5,5,8,0.95);
  border: 1px solid #1e2744;
  border-radius: 12px;
  z-index: 25;
  display: none;
  opacity: 0;
  transition: opacity 0.3s ease;
  overflow: hidden;
}
#system-overlay.visible {
  display: block;
  opacity: 1;
}
#system-overlay.fade-in {
  opacity: 1;
}
/* Dim backdrop behind the overlay */
#system-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 24;
  display: none;
}
#system-backdrop.visible { display: block; }

#system-canvas {
  display: block;
  width: 100%;
  height: 100%;
}
#system-close {
  position: absolute;
  top: 10px;
  right: 12px;
  background: rgba(12,14,24,0.7);
  border: 1px solid #1e2744;
  color: #4a5a7b;
  font-size: 10px;
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 4px;
  z-index: 26;
  transition: all 0.15s;
}
#system-close:hover { color: #c8d0e0; background: rgba(20,26,48,0.9); }

/* Star card in corner */
#system-star-card {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 26;
  transform: scale(0.86);
  transform-origin: top left;
}

/* Planet card popup */
#system-planet-card {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 26;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
#system-planet-card.visible {
  display: flex;
}
#planet-card-close {
  background: rgba(12,14,24,0.7);
  border: 1px solid #1e2744;
  color: #4a5a7b;
  font-size: 8px;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 3px;
  transition: all 0.15s;
}
#planet-card-close:hover { color: #c8d0e0; background: rgba(20,26,48,0.9); }

/* Detected state centered content */
#system-detected {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 26;
}
#system-detected.visible {
  display: flex;
}

/* ── Card Preview (ported from card-builder) ── */
.card-preview {
  width: 220px;
  height: 320px;
  border-radius: 10px;
  padding: 0;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.card-preview::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 10px;
  padding: 3px;
  background: var(--rarity-color);
  -webkit-mask-image: linear-gradient(#fff 0 0), linear-gradient(#fff 0 0);
          mask-image: linear-gradient(#fff 0 0), linear-gradient(#fff 0 0);
  -webkit-mask-clip: content-box, border-box;
          mask-clip: content-box, border-box;
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  pointer-events: none;
}
.card-preview .card-bg {
  position: absolute;
  inset: 3px;
  border-radius: 7px;
  background: #141a30;
  z-index: 0;
}
.card-preview > * { position: relative; z-index: 1; }

/* The only thing still rendered with the legacy `.card-preview common` /
   `.card-bg` structure is the mystery card below (unknown/detected stars).
   All six playable card types go through buildCardHtml → the metallic
   template in ui/card-chrome.css. Rarity colors for the mystery border: */
.card-preview.common    { --rarity-color: #6a7a9b; }
.card-preview.uncommon  { --rarity-color: #4a9b5a; }
.card-preview.rare      { --rarity-color: #4a7ac0; }
.card-preview.epic      { --rarity-color: #8a4ac0; }
.card-preview.legendary { --rarity-color: #c0a020; }
/* ── Mystery Card (detected/unexplored) ── */
.card-preview.mystery .card-bg {
  background: #0c0e18;
}
.card-mystery-face {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.card-mystery-face .mystery-icon {
  font-size: 48px;
  opacity: 0.3;
}
.card-mystery-face .mystery-text {
  font-size: 14px;
  color: #384868;
  font-weight: 600;
}

/* ── Action Buttons ── */
#detected-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 16px;
  width: 220px;
}
.card-action-btn {
  padding: 10px 20px;
  background: linear-gradient(135deg, #2a4080, #3a5ab0);
  border: 1px solid #4060c0;
  color: #fff;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.card-action-btn:hover:not(:disabled) { background: linear-gradient(135deg, #3050a0, #4a6ac0); }
.card-action-btn:disabled,
.card-action-btn[disabled] {
  background: linear-gradient(135deg, #1a2030, #20283a);
  border-color: #303848;
  color: #6a7080;
  cursor: not-allowed;
  opacity: 0.6;
}
.card-action-btn.secondary {
  background: linear-gradient(135deg, #1a2540, #243060);
  border-color: #2a3a60;
}
.card-action-btn.secondary:hover:not(:disabled) { background: linear-gradient(135deg, #243060, #2e4080); }

/* ── Detected Info Label ── */
#detected-info {
  margin-top: 12px;
  width: 220px;
  font-size: 11px;
  color: #4a5a7b;
  text-align: center;
}

/* ── Colonize Button (in planet card popup) ── */
#colonize-btn {
  margin-top: 8px;
}

/* ── Research Button idle-highlight (overrides .metal-btn base) ── */
#research-btn {
  position: relative;
  overflow: hidden;
  --research-progress: 0%;
}
#research-btn::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: var(--research-progress);
  background: linear-gradient(90deg, rgba(74,223,122,0.10), rgba(74,223,122,0.28));
  pointer-events: none;
  transition: width 0.15s linear;
  z-index: 0;
}
#research-btn > * { position: relative; z-index: 1; }
#research-btn.idle {
  background: linear-gradient(145deg, rgba(74,160,106,0.22), rgba(74,160,106,0.10));
  border-color: #4aa06a;
  color: #a4e4a4;
  animation: research-pulse 1.6s ease-in-out infinite;
}
@keyframes research-pulse {
  0%, 100% { box-shadow: 0 0 4px rgba(164, 228, 164, 0.3); }
  50%      { box-shadow: 0 0 12px rgba(164, 228, 164, 0.7); }
}

/* ── Colonies List Overlay ── */
#colonies-backdrop,
#fleets-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 30;
  display: none;
}
#colonies-backdrop.visible,
#fleets-backdrop.visible { display: block; }
#colonies-list-overlay,
#fleets-list-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 340px;
  max-height: 70%;
  background: rgba(5,5,8,0.97);
  border: 1px solid #1e2744;
  border-radius: 12px;
  z-index: 31;
  display: none;
  flex-direction: column;
  padding: 16px;
  overflow: hidden;
}
#colonies-list-overlay.visible,
#fleets-list-overlay.visible { display: flex; }
#colonies-list-overlay h2,
#fleets-list-overlay h2 {
  font-size: 14px;
  color: #8090b0;
  margin-bottom: 12px;
  font-weight: 600;
}
#colonies-list-close,
#fleets-list-close {
  position: absolute;
  top: 10px;
  right: 12px;
  background: none;
  border: none;
  color: #4a5a7b;
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
}
#colonies-list-close:hover,
#fleets-list-close:hover { color: #c8d0e0; background: #0c0e18; }
#colonies-list-items,
#fleets-list-items {
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.colony-list-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: #0a0c14;
  border: 1px solid #151a2a;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.colony-list-item:hover { background: #111628; border-color: #2a3460; }
.colony-list-name {
  font-size: 12px;
  font-weight: 600;
  color: #c8d0e0;
  flex: 1;
}
.colony-list-type {
  font-size: 10px;
  color: #4a5a7b;
  font-style: italic;
}
.colony-list-rarity {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.colonies-empty {
  font-size: 12px;
  color: #384868;
  text-align: center;
  padding: 24px;
}

/* ── Colony Screen Overlay ── */
#colony-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 34;
  display: none;
}
#colony-backdrop.visible { display: block; }
#colony-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 81%;
  height: 81%;
  max-width: 1400px;
  max-height: 900px;
  background: rgba(5,5,8,0.95);
  border: 1px solid #1e2744;
  border-radius: 12px;
  z-index: 35;
  display: none;
  opacity: 0;
  transition: opacity 0.3s ease;
  overflow: hidden;
}
#colony-overlay.visible { display: flex; flex-direction: column; opacity: 1; }
#colony-overlay.fade-in { opacity: 1; }

/* ── Collection Overlay ── */
#collection-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 34; display: none;
}
#collection-backdrop.visible { display: block; }
#collection-overlay {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 88%; height: 88%;
  max-width: 1500px; max-height: 1000px;
  background: rgba(5,5,8,0.96);
  border: 1px solid #1e2744;
  border-radius: 12px;
  z-index: 35;
  display: none;
  flex-direction: column;
  padding: 16px 20px 20px;
  overflow: hidden;
}
#collection-overlay.visible { display: flex; }
#collection-close {
  position: absolute; top: 10px; right: 12px;
  background: none; border: none; color: #6a7a9b; cursor: pointer;
  width: 28px; height: 28px;
}
#collection-close:hover { color: #c0d0e0; }
#collection-header { flex-shrink: 0; margin-bottom: 12px; }
#collection-header h2 {
  font-size: 16px; color: #c0d0e0;
  margin: 0 0 10px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
#collection-tabs {
  display: flex; gap: 6px; flex-wrap: wrap;
  border-bottom: 1px solid #1e2744;
  padding-bottom: 8px;
}
.col-tab {
  padding: 6px 12px; font-size: 12px;
  background: rgba(20,28,48,0.6); border: 1px solid #1e2744;
  color: #8090b0; border-radius: 4px;
  cursor: pointer; user-select: none;
  display: inline-flex; align-items: center; gap: 4px;
}
.col-tab:hover { background: rgba(40,56,96,0.7); color: #c0d0e0; }
.col-tab.active {
  background: rgba(60,90,180,0.35); border-color: #4a6ac0;
  color: #ffffff;
}
.col-tab .col-tab-count { font-size: 10px; color: #6a7a9b; }
.col-tab.active .col-tab-count { color: #b0c0e0; }
#collection-summary {
  font-size: 11px; color: #6a7a9b;
  margin-top: 6px;
}
#collection-grid {
  --col-card-scale: 0.7;
  --col-card-w: calc(220px * var(--col-card-scale));
  --col-card-h: calc(320px * var(--col-card-scale));
  flex: 1; overflow-y: auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, var(--col-card-w));
  gap: 18px 14px;
  padding: 14px 4px 16px;
  justify-content: start;
}
.col-card-cell {
  position: relative;
  width: var(--col-card-w);
  height: var(--col-card-h);
  cursor: pointer;
  transition: transform 0.12s ease;
}
.col-card-cell:not(.undiscovered):hover { transform: translateY(-2px); }
.col-card-cell .card-preview {
  transform: scale(var(--col-card-scale));
  transform-origin: top left;
}
.col-card-cell.seen .card-preview {
  filter: grayscale(0.85) brightness(0.75);
  opacity: 0.75;
}
.col-card-cell.undiscovered { cursor: default; }
.col-card-cell.undiscovered .card-back {
  width: var(--col-card-w);
  height: var(--col-card-h);
  background: linear-gradient(135deg, #0a0d18 0%, #181f30 60%, #0a0d18 100%);
  border: 1px solid #2a3658;
  border-radius: 10px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: #485878; font-size: 12px;
  letter-spacing: 1px; text-transform: uppercase;
}
.col-card-cell.undiscovered .card-back .qmark {
  font-size: 48px; color: #2a3658; margin-bottom: 10px; font-weight: 700;
}
.col-owned-badge {
  position: absolute; top: 4px; right: 6px;
  background: rgba(60,160,90,0.95);
  color: #fff; font-size: 11px; font-weight: 700;
  padding: 2px 7px; border-radius: 4px;
  z-index: 2;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.col-state-label {
  position: absolute; bottom: 4px; left: 50%;
  transform: translateX(-50%);
  font-size: 9px; letter-spacing: 1px;
  text-transform: uppercase; color: #485878;
  pointer-events: none;
}

/* Magnified card popup — opened from any context (Collection grid, fleet
   selection panel, etc.). Fixed 2.1x natural-size scale so the zoom feels
   consistent regardless of where the click came from. */
#card-zoom-backdrop {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.78);
  display: none;
  align-items: center; justify-content: center;
}
#card-zoom-backdrop.visible { display: flex; }
#card-zoom-card {
  --zoom-scale: 2.1;
  width: calc(220px * var(--zoom-scale));
  height: calc(320px * var(--zoom-scale));
  position: relative;
}
#card-zoom-card .card-preview {
  transform: scale(var(--zoom-scale));
  transform-origin: top left;
}
#card-zoom-card.seen .card-preview {
  filter: grayscale(0.85) brightness(0.75);
  opacity: 0.85;
}
/* Cards in the right-side select panel (star or fleet-ship cards) get a
   pointer cursor + tiny lift on hover to advertise the click-to-zoom. */
#select-card-slot[data-card-id],
#select-panel-ships .fleet-ship-card[data-card-id] {
  cursor: pointer;
  transition: transform 0.12s ease;
}
#select-card-slot[data-card-id]:hover,
#select-panel-ships .fleet-ship-card[data-card-id]:hover {
  transform: translateY(-2px);
}

/* ── Combat Overlay ── */
#combat-backdrop {
  position: absolute; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 34; display: none;
}
#combat-backdrop.visible { display: block; }
#combat-overlay {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 81%; height: 81%; max-width: 1400px; max-height: 900px;
  background: rgba(5,5,8,0.75); border: 1px solid #1e2744; border-radius: 12px;
  z-index: 35; display: none; opacity: 0; transition: opacity 0.3s ease;
  overflow: hidden; flex-direction: column;
}
#combat-overlay.visible { display: flex; opacity: 1; }
#combat-close {
  position: absolute; top: 10px; right: 12px;
  background: rgba(12,14,24,0.7); border: 1px solid #1e2744; color: #4a5a7b;
  font-size: 10px; cursor: pointer; padding: 2px 5px; border-radius: 4px; z-index: 36;
  transition: all 0.15s;
}
#combat-close:hover { color: #c8d0e0; background: rgba(20,26,48,0.9); }
#combat-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 16px 20px; border-bottom: 1px solid #111828; flex-shrink: 0; gap: 12px;
}
.combat-side { width: 35%; }
.combat-side h3 {
  font-size: 13px; color: #b0c0e0; margin: 0 0 8px 0; font-weight: 600;
}
/* Per-ship tiles in combat overlay: rarity stripe + name + HP bar.
   Click opens a magnified card view. */
.combat-ship-tile {
  display: flex; align-items: stretch; gap: 0;
  margin-bottom: 4px;
  background: #0a0c14; border: 1px solid #151a2a; border-radius: 4px;
  overflow: hidden; cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.combat-ship-tile:hover { background: #111628; border-color: #2a3460; }
.combat-ship-tile.dead { opacity: 0.35; filter: grayscale(0.6); }
.combat-ship-tile.dead:hover { background: #0a0c14; }
.combat-ship-tile-stripe {
  width: 5px; flex-shrink: 0;
}
.combat-ship-tile-body {
  flex: 1; padding: 5px 8px; display: flex; flex-direction: column;
  gap: 3px; min-width: 0;
}
.combat-ship-tile-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 6px; font-size: 11px;
}
.combat-ship-tile-name {
  color: #c8d0e0; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0; flex: 1;
}
.combat-ship-tile-hp {
  color: #6a7a9b; font-size: 9.5px; flex-shrink: 0;
  font-family: 'Consolas', 'Courier New', monospace;
}
.combat-hp-bar {
  height: 5px; background: rgba(20,26,48,0.8); border-radius: 2px;
  overflow: hidden; display: flex; flex: none;
}
.combat-hp-shields {
  height: 100%; background: #4a7ac0; transition: width 0.3s;
}
.combat-hp-armor {
  height: 100%; background: #c08040; transition: width 0.3s;
}
#combat-status {
  width: 25%; text-align: center; flex-shrink: 0;
}
#combat-phase {
  font-size: 14px; color: #e05050; font-weight: 600; margin-bottom: 8px;
}
#combat-distance-bar {
  width: 100%; height: 6px; background: rgba(20,26,48,0.8); border-radius: 3px;
  overflow: hidden; margin-bottom: 6px;
}
#combat-distance-fill {
  height: 100%; background: #e05050; transition: width 0.3s;
}
#combat-round { font-size: 11px; color: #6a7a9b; }
#combat-log {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  font-family: 'Consolas', 'Courier New', monospace; font-size: 11px;
  color: #8090b0;
}
#combat-log .log-hit { color: #e0a050; }
#combat-log .log-miss { color: #505870; }
#combat-log .log-kill { color: #e05050; font-weight: 600; }
#combat-log .log-intercept { color: #50a0e0; }
#combat-log .log-range { color: #404860; font-style: italic; }
#combat-log .log-engage { color: #b0c0e0; font-weight: 600; }
#combat-log .log-resolve { color: #50c080; font-weight: 600; }
#combat-log .log-disengage { color: #c0a020; font-weight: 600; }

#colony-close {
  position: absolute;
  top: 10px;
  right: 12px;
  background: rgba(12,14,24,0.7);
  border: 1px solid #1e2744;
  color: #4a5a7b;
  font-size: 10px;
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 4px;
  z-index: 36;
  transition: all 0.15s;
}
#colony-close:hover { color: #c8d0e0; background: rgba(20,26,48,0.9); }

/* Colony header bar */
#colony-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 8px 16px;
  border-bottom: 1px solid #111828;
  flex-shrink: 0;
}
#colony-name {
  font-size: 18px;
  font-weight: 700;
  color: #c8d0e0;
}
#colony-resources {
  display: flex;
  gap: 12px;
  margin-right: 32px;
}
.colony-res {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 13px;
}
.colony-res-icon { font-size: 14px; }
.colony-res-value { font-weight: 600; color: #fff; }
.colony-res-rate { font-size: 10px; color: #6a7a9b; }

/* Colony body: left sidebar + right main area */
#colony-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Left column: leader slot + action buttons */
#colony-left {
  width: 230px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  padding: 14px;
  border-right: 1px solid #111828;
  gap: 14px;
}
#colony-left h3 {
  font-size: 13px;
  color: #4a5a7b;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 3px;
}

/* Leader card slot */
#leader-slot {
  width: 202px;
  height: 294px;
  border: 2px dashed #1e2744;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2a3460;
  font-size: 11px;
  background: rgba(10,12,20,0.5);
  flex-shrink: 0;
}

/* Action buttons panel */
#colony-actions {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
}
.colony-action-btn {
  position: relative;
  overflow: hidden;
  padding: 8px 11px;
  background: #0a0c14;
  border: 1px solid #151a2a;
  color: #6a7a9b;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 6px;
}
.colony-action-btn:hover { background: #111628; color: #8090b0; border-color: #2a3460; }
.colony-action-btn.active {
  background: #1a2540;
  border-color: #4060c0;
  color: #c0d0f0;
}
.action-progress {
  position: absolute;
  top: 0; bottom: 0; left: 0;
  width: 0%;
  background: linear-gradient(90deg, rgba(74,155,90,0.08), rgba(74,155,90,0.28));
  pointer-events: none;
  transition: width 0.1s linear;
}
.action-label {
  position: relative;
  z-index: 1;
  flex: 1;
}
.action-eta {
  position: relative;
  z-index: 1;
  color: #4a5a7b;
  font-size: 9px;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.5px;
  opacity: 0.85;
}

/* Right main area: building slots grid */
#colony-right {
  flex: 1;
  padding: 14px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
#colony-right h3 {
  font-size: 13px;
  color: #4a5a7b;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
#building-slots {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: 1fr 1fr;
  gap: 10px;
  flex: 1;
}
.building-slot {
  /* Slot matches the card's aspect ratio (220×320) plus a small margin, so
     the dashed border sits just outside the card rather than leaving wide
     empty columns on each side. */
  aspect-ratio: 230 / 320;
  max-width: 100%;
  justify-self: center;
  height: 100%;
  min-height: 0;
  border: 2px dashed #1e2744;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2a3460;
  font-size: 20px;
  background: rgba(10,12,20,0.5);
  transition: all 0.15s;
  cursor: pointer;
}
.building-slot:hover { border-color: #2a3a60; background: rgba(15,18,30,0.6); }
.building-slot.drag-over { border-color: #4a7ac0; background: rgba(30,40,80,0.5); }
.building-slot.occupied { border-style: solid; border-color: #1e2744; cursor: grab; overflow: hidden; padding: 0; position: relative; }
.building-slot .card-preview {
  position: absolute;
  top: 0; left: 50%;
  width: 220px; height: 320px;
  transform-origin: top center;
  pointer-events: none;
  border-radius: 6px;
}

#leader-slot.drag-over { border-color: #c0a020; background: rgba(60,50,20,0.4); }
#leader-slot.occupied { border-style: solid; border-color: #1e2744; cursor: grab; overflow: hidden; padding: 0; position: relative; }
#leader-slot .card-preview {
  position: absolute;
  top: 0; left: 0;
  width: 220px; height: 320px;
  transform-origin: top left;
  pointer-events: none;
  border-radius: 8px;
}

/* ── Deck Pile ── */
#colony-deck {
  position: relative;
  width: 138px;
  height: 200px;
  flex-shrink: 0;
  cursor: pointer;
  align-self: center;
  margin-top: -15px;
}
#colony-deck:hover .deck-card-back { border-color: #2a3a60; }
.deck-pile {
  position: relative;
  width: 138px;
  height: 200px;
}
.deck-card-back {
  position: absolute;
  width: 138px;
  height: 200px;
  border-radius: 8px;
  border: 2px solid #1e2744;
  background: #0c0e18;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.deck-card-back .deck-logo {
  font-size: 18px;
  font-weight: 600;
  color: #8090b0;
  text-align: center;
  line-height: 1.3;
}
.deck-card-back .deck-logo span { color: #4a7ac0; }
.deck-count {
  position: absolute;
  top: -6px;
  right: -6px;
  background: #c04040;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  z-index: 2;
}
.deck-draw-cost {
  position: absolute;
  bottom: -8px;
  right: -6px;
  background: rgba(20,20,40,0.9);
  border: 1px solid #d4af37;
  color: #d4af37;
  font-size: 9px;
  font-weight: 600;
  padding: 2px 5px;
  border-radius: 6px;
  z-index: 2;
  white-space: nowrap;
}
.deck-empty {
  width: 120px;
  height: 174px;
  border: 2px dashed #1e2744;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2a3460;
  font-size: 11px;
}

/* ── Colony Queue ── */
#colony-queue-section {
  border-top: 1px solid #111828;
  padding-top: 8px;
  margin-top: 8px;
  flex-shrink: 0;
}
#colony-queue-section h3 {
  font-size: 13px;
  color: #4a5a7b;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
#colony-queue {
  display: flex;
  gap: 0;
  overflow: hidden;
  min-height: 210px;
  padding: 4px 4px 4px 4px;
  background: rgba(6,8,12,0.5);
  border-radius: 6px;
  border: 1px dashed #151a2a;
  position: relative;
  flex-wrap: wrap;
  align-content: start;
}
#colony-queue.drag-over { border-color: #4a7ac0; background: rgba(20,30,60,0.3); }
.queue-card {
  flex-shrink: 0;
  cursor: grab;
  width: 138px;
  height: 200px;
  position: relative;
  transition: transform 0.15s, z-index 0s;
}
.queue-card:not(:first-child) { margin-left: -50px; }
.queue-card:hover { z-index: 5; transform: translateY(-6px); }
.queue-card .card-preview {
  transform: scale(0.625);
  transform-origin: top left;
  width: 220px;
  height: 320px;
}
.queue-card.dragging { opacity: 0.4; }
/* Magnified card on click — absolute overlay, no layout shift */
.queue-card-magnified {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 100;
  pointer-events: none;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.7));
  transition: opacity 0.15s;
}
.queue-card-magnified .card-preview {
  transform: scale(1);
  width: 220px;
  height: 320px;
}
.queue-card-magnified .magnify-actions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  pointer-events: auto;
}
.magnify-discard-btn {
  padding: 5px 14px;
  background: linear-gradient(135deg, #602020, #803030);
  border: 1px solid #a04040;
  color: #fff;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
}
.magnify-discard-btn:hover { background: linear-gradient(135deg, #803030, #a04040); }
.magnify-close-btn {
  padding: 5px 14px;
  background: linear-gradient(135deg, #1a2540, #243060);
  border: 1px solid #2a3a60;
  color: #8090b0;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
}
.magnify-close-btn:hover { background: linear-gradient(135deg, #243060, #2e4080); color: #c0d0f0; }

/* ── Colony Tabs ── */
#colony-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 10px;
  flex-shrink: 0;
}
.colony-tab {
  flex: 1;
  padding: 6px 12px;
  background: rgba(10,12,20,0.5);
  border: 1px solid #1e2744;
  color: #4a5a7b;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.15s;
}
.colony-tab:first-child { border-radius: 6px 0 0 6px; }
.colony-tab:last-child { border-radius: 0 6px 6px 0; }
.colony-tab.active {
  background: rgba(30,40,70,0.6);
  color: #c8d0e0;
  border-color: #2a3a60;
}
.colony-tab:hover:not(.active) { background: rgba(20,25,40,0.5); color: #6a7a9b; }
.colony-tab-content { flex: 1; overflow-y: auto; min-height: 0; display: flex; flex-direction: column; }
.colony-tab-content:not(.active) { display: none !important; }

/* ── Fleet Tab ── */
#fleet-ship-slots {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}
.fleet-ship-slot {
  width: 100%;
  aspect-ratio: 220/320;
  border: 2px dashed #1e2744;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2a3460;
  font-size: 16px;
  background: rgba(10,12,20,0.5);
  transition: all 0.15s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.fleet-ship-slot:hover { border-color: #2a3a60; background: rgba(15,18,30,0.6); }
.fleet-ship-slot.drag-over { border-color: #4a7ac0; background: rgba(30,40,80,0.5); }
.fleet-ship-slot.occupied { border-style: solid; border-color: #1e2744; cursor: grab; padding: 0; }
.fleet-ship-slot .card-preview {
  position: absolute;
  top: 0; left: 0;
  width: 220px; height: 320px;
  transform-origin: top left;
  pointer-events: none;
  border-radius: 6px;
}
/* Admiral slot is first fleet slot — stylized border */
.fleet-ship-slot.admiral-slot {
  border-color: #c0a02060;
  border-width: 2px;
}
.fleet-ship-slot.admiral-slot:hover { border-color: #c0a020; }
.fleet-ship-slot.admiral-slot.drag-over { border-color: #c0a020; background: rgba(60,50,20,0.3); }
.fleet-ship-slot.admiral-slot .admiral-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: #c0a02080;
  font-size: 11px;
  text-align: center;
}
.fleet-ship-slot.admiral-slot .admiral-placeholder span:first-child { font-size: 20px; }
#fleet-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  flex-shrink: 0;
  padding-top: 6px;
  border-top: 1px solid #111828;
}
#fleet-stance-toggle {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  background: rgba(224, 80, 80, 0.15);
  border: 1px solid rgba(224, 80, 80, 0.4);
  border-radius: 4px;
  color: #e05050;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
#fleet-stance-toggle.evasive {
  background: rgba(80, 160, 224, 0.15);
  border-color: rgba(80, 160, 224, 0.4);
  color: #50a0e0;
}
#fleet-info {
  font-size: 10px;
  color: #4a5a7b;
  flex: 1;
}
#fleet-deploy-buttons { display: flex; gap: 4px; }
#deploy-btn, #deploy-solo-btn {
  padding: 5px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid #2a3a60;
  background: linear-gradient(135deg, #1a2540, #243060);
  color: #8090b0;
}
#deploy-btn:not(:disabled):hover, #deploy-solo-btn:not(:disabled):hover {
  background: linear-gradient(135deg, #243060, #2e4080);
  color: #c0d0f0;
}
#deploy-btn:disabled, #deploy-solo-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* ── Card Selection Modal ── */
#card-select-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 40;
  display: none;
}
#card-select-backdrop.visible { display: flex; align-items: center; justify-content: center; }
#card-select-modal {
  background: rgba(5,5,8,0.97);
  border: 1px solid #1e2744;
  border-radius: 12px;
  padding: 20px;

  flex-direction: column;
  align-items: center;
  gap: 16px;
}
#card-select-modal h3 {
  font-size: 14px;
  color: #8090b0;
  font-weight: 600;
}
#card-select-options {
  display: flex;
  gap: 16px;
}
.card-select-option {
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  border-radius: 10px;
}
.card-select-option:hover { transform: translateY(-6px); box-shadow: 0 8px 24px rgba(74,122,192,0.3); }
#card-select-discard-all {
  background: rgba(140,40,40,0.6);
  border: 1px solid #6a2a2a;
  color: #c08080;
  padding: 8px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}
#card-select-discard-all:hover { background: rgba(160,40,40,0.8); color: #e0a0a0; }

/* Research Panel */
#research-backdrop {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 50;
}
#research-backdrop.visible { display: flex; align-items: center; justify-content: center; }
#research-overlay {

  border: 1px solid #1a2040;

#research-header {

  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}
#research-header h2 { margin: 0; color: #a0b4d0; font-size: 18px; }
#research-header .close-btn {
  background: none; border: none; color: #6a7a9b; font-size: 16px; cursor: pointer;
}
#research-active {

.research-item {

  gap: 12px;

  border-radius: 6px;

  cursor: pointer;
  transition: background 0.15s;
}

.research-item .ri-cost { color: #a4e4a4; font-size: 12px; white-space: nowrap; }
.research-item .ri-category { color: #6a7a9b; font-size: 11px; }

  height: 6px;
  background: #1a2040;
  border-radius: 3px;
  overflow: hidden;
  margin-top: 8px;
}
.research-progress-bar {
  height: 100%;
  background: #4a9b5a;
  transition: width 0.3s;
}

/* Research reveal animations */
@keyframes revealFlip {
  0% { transform: scale(0.3) rotateY(180deg); opacity: 0; }
  50% { transform: scale(1.1) rotateY(90deg); opacity: 0.5; }
  100% { transform: scale(1) rotateY(0deg); opacity: 1; }
}
@keyframes revealGlow {
  0% { transform: scale(0.2); opacity: 0; }
  50% { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1); opacity: 0.6; }
}
@keyframes revealFadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Combat salvage screen — shown when the player wins a fight against a
   pirate fleet. Flips in any dropped cards (loot-box flair), then lists
   resources gained. Single Continue button to dismiss. */
#salvage-backdrop {
  position: fixed; inset: 0; z-index: 9998;
  background: rgba(0,0,0,0.88);
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 20px;
  overflow-y: auto;
}
#salvage-backdrop.visible { display: flex; }
#salvage-title {
  font-size: 28px; font-weight: 700; letter-spacing: 4px;
  color: #4a9b5a; text-transform: uppercase;
  margin-bottom: 4px;
  animation: revealFadeIn 0.4s ease-out;
}
#salvage-subtitle {
  font-size: 13px; color: #6a7a9b; letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 24px;
  animation: revealFadeIn 0.5s ease-out 0.1s both;
}
#salvage-cards {
  display: flex; gap: 18px; flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 28px;
}
.salvage-card-cell {
  width: calc(220px * 1.3);
  height: calc(320px * 1.3);
  position: relative;
  animation: revealFlip 0.7s ease-out forwards;
  transform-origin: center;
}
.salvage-card-cell .card-preview {
  transform: scale(1.3);
  transform-origin: top left;
}
.salvage-card-glow {
  position: absolute; inset: -40px;
  background: radial-gradient(ellipse at center, var(--rc, #c04040) 0%, transparent 65%);
  opacity: 0.25;
  pointer-events: none; z-index: -1;

}
#salvage-resources {

}
.salvage-res-pill {

<script>
// ═══════════════════════════════════════════
//  CARD DATA LOADER
// ═══════════════════════════════════════════
// Runtime card templates come from data/game-cards.json, or an IndexedDB
// override set by the card builder's "Apply to Live" button. Falls back to
// the embedded template arrays below if both are unavailable (file:// load,
// first-open, fetch error). Embedded fallback is Phase-1 temporary and
// goes away in Phase 5.
//
// Storage choice: IndexedDB (not localStorage). localStorage caps at
// ~5–10 MB per origin which can't hold a catalog with base64 card art.
// The card builder migrates legacy localStorage payloads into IDB on load.
//
// Schema, precedence, and rules live in CARDS_PIPELINE_PLAN.md.

// Legacy localStorage key — kept only for one-time migration into IndexedDB.
const LEGACY_CARDS_OVERRIDE_LS_KEY = "idlespace_gameCards_override";
// IndexedDB keys — must match CARDS_IDB_* in card-builder.html.
const CARDS_IDB_NAME = "idlespace_cards";
const CARDS_IDB_STORE = "kv";
const CARDS_IDB_OVERRIDE_KEY = "gameCardsOverride";
let CARD_TEMPLATES = {};       // category -> Card[]
let CARD_INDEX = new Map();    // id -> Card
let CARD_SOURCE = "embedded";  // "override" | "file" | "embedded"

// ── Minimal IndexedDB helper (get/put/delete for one kv store) ──────
// Keep in sync with the identically-named helper in card-builder.html.
function cardsIdbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(CARDS_IDB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(CARDS_IDB_STORE)) db.createObjectStore(CARDS_IDB_STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function cardsIdbGet(key) {
  const db = await cardsIdbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(CARDS_IDB_STORE, "readonly");
    const req = tx.objectStore(CARDS_IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function cardsIdbPut(key, value) {
  const db = await cardsIdbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(CARDS_IDB_STORE, "readwrite");
    tx.objectStore(CARDS_IDB_STORE).put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function cardsIdbDelete(key) {
  const db = await cardsIdbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(CARDS_IDB_STORE, "readwrite");
    tx.objectStore(CARDS_IDB_STORE).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// One-time migration: promote a legacy localStorage override into IDB so
// existing users don't lose their in-flight edits on first load post-upgrade.
async function migrateLegacyOverride() {
  try {
    if (await cardsIdbGet(CARDS_IDB_OVERRIDE_KEY)) return; // IDB already has it
    const raw = localStorage.getItem(LEGACY_CARDS_OVERRIDE_LS_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (parsed && Array.isArray(parsed.cards)) {
      await cardsIdbPut(CARDS_IDB_OVERRIDE_KEY, parsed);
      console.info(`[cards] migrated localStorage override (${parsed.cards.length} cards) to IndexedDB`);
    }
    try { localStorage.removeItem(LEGACY_CARDS_OVERRIDE_LS_KEY); } catch (_) {}
  } catch (e) {
    console.warn("[cards] legacy override migration failed:", e);
  }
}

function getTemplates(category) {
  return CARD_TEMPLATES[category] || [];
}
function getCardById(id) {
  return CARD_INDEX.get(id);
}

function normalizeCard(raw) {
  if (!raw || typeof raw !== "object") return null;
  // Legacy embedded PLANET_TEMPLATES uses `type` instead of `category`.
  const category = raw.category || raw.type;
  if (!raw.id || !category || !raw.rarity) return null;

  const c = {
    id: raw.id,
    name: raw.name || "",
    category,
    rarity: raw.rarity,
    weight: (typeof raw.weight === "number") ? raw.weight : 1,
    image: raw.image || "",
    stats: { ...(raw.stats || {}) },
    cost: { ...(raw.cost || {}) },
    upkeep: { ...(raw.upkeep || {}) },
    special: raw.special || "",
    flavor: raw.flavor || "",
    tags: Array.isArray(raw.tags) ? raw.tags.slice() : [],
    attributes: { ...(raw.attributes || {}) },
    categoryData: { ...(raw.categoryData || {}) },
  };

  // Back-compat mirrors. Canonical home for category-specific fields is
  // `categoryData`, but existing consumers read top-level `planetGen` /
  // `bonuses`. Keep both in sync until those call sites are migrated.
  if (c.category === "star") {
    if (raw.planetGen && !c.categoryData.planetGen) c.categoryData.planetGen = raw.planetGen;
    if (c.categoryData.planetGen) c.planetGen = c.categoryData.planetGen;
  }
  if (c.category === "planet") {
    if (raw.bonuses && !c.categoryData.bonuses) c.categoryData.bonuses = raw.bonuses;
    if (c.categoryData.bonuses) c.bonuses = c.categoryData.bonuses;
  }

  // Forward-compat: preserve unknown top-level fields.
  for (const k of Object.keys(raw)) {
    if (!(k in c)) c[k] = raw[k];
  }

  return c;
}

function buildTemplateIndex(rawCards) {
  const byCat = {};
  const byId = new Map();
  let skipped = 0;
  for (const raw of rawCards) {
    const c = normalizeCard(raw);
    if (!c) { skipped++; continue; }
    (byCat[c.category] ||= []).push(c);
    byId.set(c.id, c);
  }
  if (skipped > 0) console.warn(`[cards] skipped ${skipped} malformed cards`);
  return { byCat, byId };
}

function applyCardBundle(rawCards, source) {
  const { byCat, byId } = buildTemplateIndex(rawCards);
  if (byId.size === 0) return false;
  CARD_TEMPLATES = byCat;
  CARD_INDEX = byId;
  CARD_SOURCE = source;
  const cats = Object.keys(byCat).sort().join(", ");
  console.info(`[cards] loaded ${byId.size} cards from ${source} (${cats})`);
  preloadCardImages();
  return true;
}

// Warm the HTTP cache for every card's art at load time so the first
// render of a card doesn't pay fetch latency. We deliberately don't hold
// the Image refs — that would keep decoded RGBA pixels in memory
// (~3.7 MB per 1216x768 image, ~360 MB across the catalog). The bytes
// stay in the HTTP cache regardless of GC, and decoding="async" on the
// <img> tag handles decode off-thread when the card actually renders.
const __preloadedCardArt = new Set();
function preloadCardImages() {
  let count = 0;
  for (const card of CARD_INDEX.values()) {
    const src = card && card.image;
    if (!src || typeof src !== "string" || !src.startsWith("assets/")) continue;
    if (__preloadedCardArt.has(src)) continue;
    __preloadedCardArt.add(src);
    const img = new Image();
    img.decoding = "async";
    img.src = src;
    count++;
  }
  if (count > 0) console.info(`[cards] prefetching ${count} card images`);
}

async function loadCardData() {
  // 1. IndexedDB override (live-edit loop from card builder). Migrate any
  //    pre-upgrade localStorage payload before reading.
  await migrateLegacyOverride();
  try {
    const bundle = await cardsIdbGet(CARDS_IDB_OVERRIDE_KEY);
    if (bundle && Array.isArray(bundle.cards)) {
      if (applyCardBundle(bundle.cards, "override")) return;
      console.warn("[cards] IDB override malformed, falling through to file");
    }
  } catch (e) {
    console.warn("[cards] IDB override read failed, falling through to file", e);
  }

  // 2. fetch data/game-cards.json
  let reason;
  try {
    const res = await fetch("data/game-cards.json", { cache: "no-cache" });
    if (!res.ok) {
      reason = `HTTP ${res.status} ${res.statusText}`;
    } else {
      const bundle = await res.json();
      if (bundle && Array.isArray(bundle.cards) && applyCardBundle(bundle.cards, "file")) return;
      reason = "file contained no usable cards";
    }
  } catch (e) {
    reason = (e && e.message) || String(e);
  }

  // Hard failure — no more embedded fallback. Show an error screen and halt.
  showCardLoadError(reason);
  throw new Error("card data load failed: " + reason);
}

// ── Hot reload: pick up new cards from a running card-builder push. ──
// reloadCardData is tolerant: a failed pull keeps the current templates
// in place so live gameplay isn't knocked offline by a bad override.
async function reloadCardData() {
  const prevSource = CARD_SOURCE;
  try {
    await loadCardData();
  } catch (e) {
    console.warn("[cards] hot reload failed, keeping previous templates:", e.message);
    return;
  }
  // Auto-unlock any newly-added common cards; existing unlocks stay.
  if (typeof initResearch === "function") initResearch();
  updateCardSourceBadge();
  if (prevSource !== CARD_SOURCE) {
    console.info(`[cards] source changed: ${prevSource} → ${CARD_SOURCE}`);
  }
}

function updateCardSourceBadge() {
  const el = document.getElementById("card-source-badge");
  if (!el) return;
  el.classList.toggle("visible", CARD_SOURCE === "override");
}

async function revertCardOverride() {
  try { await cardsIdbDelete(CARDS_IDB_OVERRIDE_KEY); } catch (_) {}
  // Also wipe any stale legacy localStorage override so a refresh doesn't
  // resurrect it via the migration path.
  try { localStorage.removeItem(LEGACY_CARDS_OVERRIDE_LS_KEY); } catch (_) {}
  // Clear the error screen too (harmless no-op if not present).
  const err = document.getElementById("card-load-error");
  if (err) err.remove();
  try {
    await reloadCardData();
    if (typeof setSaveStatus === "function") setSaveStatus("Reverted to shipped cards.", "ok");
  } catch (_) {}
  // Tell any open card-builder tab to refresh its live-link status.
  if (typeof CARDS_BROADCAST !== "undefined" && CARDS_BROADCAST) {
    CARDS_BROADCAST.postMessage({ type: "override-cleared" });
  }
}

// Cross-tab notification so card-builder → starmap hot reload works in the
// same browser. A null value means BroadcastChannel isn't available (very
// old browsers); the override still works on page reload either way.
const CARDS_BROADCAST = (typeof BroadcastChannel !== "undefined")
  ? new BroadcastChannel("idlespace-cards")
  : null;
if (CARDS_BROADCAST) {
  CARDS_BROADCAST.onmessage = (ev) => {
    const msg = ev && ev.data;
    if (!msg || typeof msg !== "object") return;
    if (msg.type === "cards-updated" || msg.type === "override-cleared") {
      reloadCardData();
    }
  };
}

// Pirate power tier 0..1 based on distance from home (origin). The ratio
// (dist/RANGE) is raised to TIER_EXPONENT > 1 so power ramps slowly near
// home and only reaches max at the far edge — finding legendary pirates
// should be a long-distance journey, not a few screens out.
const PIRATE_TIER_RANGE = 80000;     // was 18000 — 4.4x slower linear ramp
const PIRATE_TIER_EXPONENT = 1.5;    // > 1 = slower near home, sharper near edge
// No pirate spawns within this radius of the home star (origin).
const PIRATE_HOME_SAFE_RADIUS = 1500;
function getPirateTier(x, y) {
  const r = Math.min(1, Math.hypot(x, y) / PIRATE_TIER_RANGE);
  return Math.pow(r, PIRATE_TIER_EXPONENT);
}
function rollPirateRarity(rng, tier) {
  // Near home: almost all common. Far: epic/legendary become plausible.
  const weights = {
    common:    Math.max(0, 60 - 55 * tier),
    uncommon:  Math.max(0, 35 - 10 * tier),
    rare:      5  + 25 * tier,
    epic:      0  + 20 * tier,
    legendary: 0  + 20 * tier,
  };
  const total = weights.common + weights.uncommon + weights.rare + weights.epic + weights.legendary;
  let r = rng() * total;
  for (const [k, v] of Object.entries(weights)) {
    if (r < v) return k;
    r -= v;
  }
  return "common";
}
// Pick a random element using each item's `weight` field (default 1).
// weight 0 excludes the item; returns null if the array is empty or every
// item has weight 0. Optional rng for deterministic procgen.
function pickWeighted(arr, rng) {
  if (!arr || arr.length === 0) return null;
  const rand = rng || Math.random;
  let total = 0;
  for (const item of arr) {
    const w = (typeof item.weight === "number") ? Math.max(0, item.weight) : 1;
    total += w;
  }
  if (total <= 0) return null;
  let roll = rand() * total;
  for (const item of arr) {
    const w = (typeof item.weight === "number") ? Math.max(0, item.weight) : 1;
    roll -= w;
    if (roll <= 0) return item;
  }
  return arr[arr.length - 1];
}

function rollPirateShip(rng, tier) {
  const rarity = rollPirateRarity(rng, tier);
  const pirates = getTemplates("pirate");
  const pool = pirates.filter(s => s.rarity === rarity);
  return pickWeighted(pool, rng) || pickWeighted(pirates, rng);
}

// ═══════════════════════════════════════════
//  RARITY / STAT ROLLING
// ═══════════════════════════════════════════
// Runtime constants the engine uses to roll cards. These live in code (not
// the cards file) because they're engine-wide tuning, not per-card data —
// consumers always iterate RARITY_WEIGHTS/RESOURCE_DEFS dynamically so
// moving them into game-cards.json later is a lift-and-shift.

// Star rendering luminosity, derived from rarity so stars scale visually.
const STAR_RENDER_LUMINOSITY = { common:3, uncommon:5, rare:7, epic:9, legendary:14 };

const RARITY_WEIGHTS = { common:60, uncommon:25, rare:10, epic:4, legendary:1 };
const RARITY_COLORS  = { common:"#6a7a9b", uncommon:"#4a9b5a", rare:"#4a7ac0", epic:"#8a4ac0", legendary:"#c0a020" };

// Stat rolling: ±25% variance around template value, higher rarity biases toward top of range
const STAT_ROLL_VARIANCE = 0.25;
const RARITY_ROLL_BIAS   = { common:0.5, uncommon:0.55, rare:0.6, epic:0.7, legendary:0.8 };

function biasedRandom(bias) {
  // 0..1 skewed toward 1 when bias > 0.5. bias=0.5 → uniform; bias=0.8 → heavily top-weighted.
  return Math.pow(Math.random(), 1 / (bias * 2));
}

function rollStats(template) {
  const bias = RARITY_ROLL_BIAS[template.rarity] || 0.5;
  const rolled = {};
  const ranges = {};
  for (const [key, val] of Object.entries(template.stats || {})) {
    if (typeof val !== "number") {
      rolled[key] = val;  // pass through non-numeric stats (e.g., weapon range strings)
      continue;
    }
    const min = Math.max(1, Math.round(val * (1 - STAT_ROLL_VARIANCE)));
    const max = Math.max(min + 1, Math.round(val * (1 + STAT_ROLL_VARIANCE)));
    rolled[key] = min + Math.round((max - min) * biasedRandom(bias));
    ranges[key] = [min, max];
  }
  return { stats: rolled, statRanges: ranges };
}

// Tooltip color coding for rolled stats: where a value lands in its ±25% range.
function getStatQualityColor(value, min, max) {
  if (min >= max) return "#c0a020";
  const pct = (value - min) / (max - min);
  if (pct >= 0.8) return "#c0a020";  // gold (legendary)
  if (pct >= 0.6) return "#8a4ac0";  // purple (epic)
  if (pct >= 0.4) return "#4a7ac0";  // blue (rare)
  if (pct >= 0.2) return "#4a9b5a";  // green (uncommon)
  return "#6a7a9b";                   // gray (common)
}

function rollCardFromCategory(category) {
  const pool = getTemplates(category);
  if (!pool) return null;
  // Filter to only researched cards for gated categories
  const available = RESEARCH_GATED_CATEGORIES.includes(category)
    ? pool.filter(t => researchedCards.has(t.id))
    : pool;
  if (available.length === 0) return null;
  const rarity = rollRarity();
  const matches = available.filter(t => t.rarity === rarity);
  const template = pickWeighted(matches) || pickWeighted(available);
  if (!template) return null;
  // Roll stats within ±25% range, biased by rarity
  const { stats: rolledStats, statRanges } = rollStats(template);
  return { ...template, stats: rolledStats, statRanges, cost: { ...(template.cost || {}) }, upkeep: { ...(template.upkeep || {}) } };
}

//  RARITY ROLLER
// ═══════════════════════════════════════════
function rollRarity(rng) {
  const rand = rng || Math.random;
  const total = Object.values(RARITY_WEIGHTS).reduce((s,w) => s+w, 0);
  let roll = rand() * total;
  for (const [rarity, weight] of Object.entries(RARITY_WEIGHTS)) {
    roll -= weight;
    if (roll <= 0) return rarity;
  }
  return "common";
}

// Roll rarity with a bonus that shifts weight from common into higher tiers
function rollRarityWithBonus(bonus) {
  if (!bonus) return rollRarity();
  const w = { ...RARITY_WEIGHTS };
  // Shift weight: remove from common, distribute to higher rarities
  const shift = Math.min(w.common * 0.5, bonus * 8);
  w.common -= shift;
  w.uncommon += shift * 0.35;
  w.rare += shift * 0.30;
  w.epic += shift * 0.20;
  w.legendary += shift * 0.15;
  const total = Object.values(w).reduce((s, v) => s + v, 0);
  let roll = Math.random() * total;
  for (const [rarity, weight] of Object.entries(w)) {
    roll -= weight;
    if (roll <= 0) return rarity;
  }
  return "common";
}

// Roll the rarity list for a star's planet slots.
// Guaranteed slots are filled first, remaining slots roll via rollRarityWithBonus.
function rollStarPlanetSlots(template, rand) {
  rand = rand || Math.random;
  const gen = template.planetGen || { count:[1,1], guaranteed:[], bonus:0 };
  const [min, max] = gen.count;
  const count = min + Math.floor(rand() * (max - min + 1));
  const slots = (gen.guaranteed || []).slice(0, count);
  while (slots.length < count) slots.push(rollRarityWithBonus(gen.bonus || 0));
  return slots;
}

function rollStarCard(rng) {
  const rand = rng || Math.random;
  const rarity = rollRarity(rng);
  const allStars = getTemplates("star");
  const pool = allStars.filter(t => t.rarity === rarity);
  const template = pickWeighted(pool, rand) || pickWeighted(allStars, rand);
  if (!template) return null;
  // Pre-roll planet slots so the card can display them. Sort by rarity index desc (best first).
  const slots = rollStarPlanetSlots(template, rand);
  slots.sort((a,b) => RARITY_ORDER.indexOf(b) - RARITY_ORDER.indexOf(a));
  return { ...template, planetSlots: slots, type: template.name, name: drawStarName() };
}

const RARITY_ORDER = ["common","uncommon","rare","epic","legendary"];

// Roll a planet of a specific rarity with its bonuses varied ±25%.
function rollPlanetCardOfRarity(rarity) {
  const planetPool = getTemplates("planet");
  const pool = planetPool.filter(t => t.rarity === rarity);
  const template = pickWeighted(pool) || pickWeighted(planetPool);
  if (!template) return null;
  const bias = RARITY_ROLL_BIAS[template.rarity] || 0.5;
  const bonuses = {};
  const bonusRanges = {};
  for (const [key, val] of Object.entries(template.bonuses || {})) {
    const min = Math.max(1, Math.round(val * (1 - STAT_ROLL_VARIANCE)));
    const max = Math.max(min + 1, Math.round(val * (1 + STAT_ROLL_VARIANCE)));
    bonuses[key] = min + Math.round((max - min) * biasedRandom(bias));
    bonusRanges[key] = [min, max];
  }
  return { ...template, bonuses, bonusRanges };
}

const ROMAN = ["I","II","III","IV","V","VI","VII","VIII","IX","X"];

function generatePlanets(star) {
  if (star.planets) return; // already generated
  const slots = star.card.planetSlots || [];
  star.planets = [];
  for (let i = 0; i < slots.length; i++) {
    const card = rollPlanetCardOfRarity(slots[i]);
    card.type = card.name;
    card.name = `${star.card.name} ${ROMAN[i] || (i + 1)}`;
    star.planets.push({
      card,
      orbitRadius: 80 + i * 50,
      orbitSpeed: 0.04 / (1 + i * 0.3),
      orbitPhase: Math.random() * Math.PI * 2,
    });
  }
}

// ═══════════════════════════════════════════
//  SEEDED PRNG & NOISE
// ═══════════════════════════════════════════
const GALAXY_SEED = Math.floor(Math.random() * 2147483647);

// Mulberry32 — fast seeded 32-bit PRNG
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Hash a chunk coordinate pair to a deterministic seed
function chunkSeed(cx, cy) {
  let h = GALAXY_SEED;
  h = Math.imul(h ^ cx, 0x9E3779B9);
  h = Math.imul(h ^ cy, 0x517CC1B7);
  h = h ^ (h >>> 16);
  return h;
}

// Simple 2D value noise using seeded hashing (no gradient table needed)
function noiseHash(ix, iy) {
  let h = GALAXY_SEED;
  h = Math.imul(h ^ (ix * 374761393), 0x85EBCA6B);
  h = Math.imul(h ^ (iy * 668265263), 0xC2B2AE35);
  h = h ^ (h >>> 13);
  h = Math.imul(h, 0x27D4EB2D);
  return ((h ^ (h >>> 15)) >>> 0) / 4294967296;
}

// Smooth 2D noise with bilinear interpolation
function smoothNoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  // Smoothstep
  const sx = fx * fx * (3 - 2 * fx);
  const sy = fy * fy * (3 - 2 * fy);
  const n00 = noiseHash(ix, iy);
  const n10 = noiseHash(ix + 1, iy);
  const n01 = noiseHash(ix, iy + 1);
  const n11 = noiseHash(ix + 1, iy + 1);
  return n00 * (1 - sx) * (1 - sy) + n10 * sx * (1 - sy) +
         n01 * (1 - sx) * sy + n11 * sx * sy;
}

// Multi-octave fractal noise for richer density maps
function fractalNoise(x, y, octaves = 3) {
  let val = 0, amp = 1, freq = 1, max = 0;
  for (let i = 0; i < octaves; i++) {
    val += smoothNoise(x * freq, y * freq) * amp;
    max += amp;
    amp *= 0.5;
    freq *= 2;
  }
  return val / max;
}

// ═══════════════════════════════════════════
//  PROCEDURAL STAR GENERATION (chunk-based)
// ═══════════════════════════════════════════
const CHUNK_SIZE = 400;             // world units per chunk
const NOISE_SCALE = 0.0015;         // controls cluster size (lower = bigger clusters)
const MIN_STAR_SEPARATION = 240;    // minimum distance between stars
const DENSITY_THRESHOLD = 0.45;     // noise below this = empty void
const MAX_STARS_PER_CHUNK = 1;      // at peak density

const generatedChunks = new Map();  // "cx,cy" -> true (already processed)
let nextStarId = 1;
const stars = new Map();            // id -> star node

// ── Memory fog (per-chunk bitmap of "seen tiles") ──
// Each chunk is divided into TILES_PER_CHUNK × TILES_PER_CHUNK tiles; each
// tile's "has ever been in active sight" flag is one bit of a 16-bit integer
// stored in chunkSeenBits. Any area within sensor range of a player ship or
// colony marks its tiles here permanently, producing a persistent trail.
const TILE_SIZE = 100;
const TILES_PER_CHUNK = CHUNK_SIZE / TILE_SIZE; // = 4 → 16 bits per chunk
const chunkSeenBits = new Map();

function markSeenInRange(wx, wy, range) {
  const r2 = range * range;
  const minCx = Math.floor((wx - range) / CHUNK_SIZE);
  const maxCx = Math.floor((wx + range) / CHUNK_SIZE);
  const minCy = Math.floor((wy - range) / CHUNK_SIZE);
  const maxCy = Math.floor((wy + range) / CHUNK_SIZE);
  for (let cx = minCx; cx <= maxCx; cx++) {
    for (let cy = minCy; cy <= maxCy; cy++) {
      const key = `${cx},${cy}`;
      let bits = chunkSeenBits.get(key) || 0;
      if (bits === 0xFFFF) continue; // fully seen already
      const origBits = bits;
      for (let ty = 0; ty < TILES_PER_CHUNK; ty++) {
        for (let tx = 0; tx < TILES_PER_CHUNK; tx++) {
          const bitIdx = ty * TILES_PER_CHUNK + tx;
          if (bits & (1 << bitIdx)) continue;
          const centerX = cx * CHUNK_SIZE + (tx + 0.5) * TILE_SIZE;
          const centerY = cy * CHUNK_SIZE + (ty + 0.5) * TILE_SIZE;
          const ddx = centerX - wx, ddy = centerY - wy;
          if (ddx * ddx + ddy * ddy <= r2) bits |= (1 << bitIdx);
        }
      }
      if (bits !== origBits) chunkSeenBits.set(key, bits);
    }
  }
}

function createStar(x, y, visibility, card) {
  const id = `star_${nextStarId++}`;
  const star = { id, x, y, visibility, card };
  stars.set(id, star);
  return star;
}

function distanceBetween(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}

// Generate stars for a single chunk (deterministic)
function generateChunk(cx, cy) {
  const key = `${cx},${cy}`;
  if (generatedChunks.has(key)) return;
  generatedChunks.set(key, true);

  const rng = mulberry32(chunkSeed(cx, cy));

  // Sample density at chunk center
  const centerX = (cx + 0.5) * CHUNK_SIZE;
  const centerY = (cy + 0.5) * CHUNK_SIZE;
  const density = fractalNoise(centerX * NOISE_SCALE, centerY * NOISE_SCALE);

  // Pirate fleet spawning — base rate is the previous "rate / 5" times 4.
  // The base is then multiplied by (1 + 4 * tier) so density scales linearly
  // with distance from home: 1x near home, up to 5x at PIRATE_TIER_RANGE.
  const baseChance = density >= DENSITY_THRESHOLD ? 0.08 : 0.024;
  const distMult   = 1 + 4 * getPirateTier(centerX, centerY);
  const pirateChance = baseChance * distMult;
  if (rng() < pirateChance) {
    const px = cx * CHUNK_SIZE + rng() * CHUNK_SIZE;
    const py = cy * CHUNK_SIZE + rng() * CHUNK_SIZE;
    // No pirate spawns too close to the player's home star.
    if (Math.hypot(px, py) < PIRATE_HOME_SAFE_RADIUS) {
      // fall through — skip pirate spawn for this chunk
    } else {
      const tier = getPirateTier(px, py);
      // Heavy-tail fleet size: most spawns are tiny, but the right tail can
      // produce occasional large fleets, with the tail growing wider at high
      // tier. Sampled from an exponential with mean = 1 + tier*5 (so ~1 ship
      // near home, ~6 at max tier), then floored and clamped.
      const meanFleetSize = 1 + tier * 5;
      const u = Math.max(1e-6, rng());
      const shipCount = Math.max(1, Math.min(30, Math.floor(1 + (-Math.log(u)) * meanFleetSize)));
      const pirateShips = [];
      for (let pi = 0; pi < shipCount; pi++) {
        const tpl = rollPirateShip(rng, tier);
        pirateShips.push({ ...tpl, stats: { ...tpl.stats } });
      }
      mapEntities.push({
        type: "fleet", owner: "npc", ships: pirateShips, admiral: null,
        stance: "aggressive", x: px, y: py, destX: null, destY: null,
        speed: Math.min(...pirateShips.map(s => s.stats.speed || 1)),
        sensorRange: Math.max(...pirateShips.map(s => s.stats.sensorRange || 0)),
        stealth: 0, label: "Pirates", inCombat: null,
      });
    }
  }

  if (density < DENSITY_THRESHOLD) return; // void — no stars here

  // Number of stars scales with density
  const normalizedDensity = (density - DENSITY_THRESHOLD) / (1 - DENSITY_THRESHOLD);
  const starCount = Math.round(normalizedDensity * MAX_STARS_PER_CHUNK);
  if (starCount <= 0) return;

  const chunkStars = [];
  for (let i = 0; i < starCount; i++) {
    for (let attempt = 0; attempt < 15; attempt++) {
      const x = cx * CHUNK_SIZE + rng() * CHUNK_SIZE;
      const y = cy * CHUNK_SIZE + rng() * CHUNK_SIZE;

      // Check separation within this chunk's new stars
      let tooClose = false;
      for (const s of chunkStars) {
        if (distanceBetween({ x, y }, s) < MIN_STAR_SEPARATION) { tooClose = true; break; }
      }
      if (tooClose) { rng(); continue; } // burn a roll to stay deterministic

      // Check against existing stars near this position
      for (const s of stars.values()) {
        if (distanceBetween({ x, y }, s) < MIN_STAR_SEPARATION) { tooClose = true; break; }
      }
      if (tooClose) continue;

      const card = rollStarCard(rng);
      const star = createStar(x, y, "unknown", card);
      chunkStars.push(star);
      break;
    }
  }

}

// Reveal all chunks within a radius of a world point
function revealChunksInRadius(wx, wy, radius) {
  const minCx = Math.floor((wx - radius) / CHUNK_SIZE);
  const maxCx = Math.floor((wx + radius) / CHUNK_SIZE);
  const minCy = Math.floor((wy - radius) / CHUNK_SIZE);
  const maxCy = Math.floor((wy + radius) / CHUNK_SIZE);
  for (let cx = minCx; cx <= maxCx; cx++) {
    for (let cy = minCy; cy <= maxCy; cy++) {
      generateChunk(cx, cy);
    }
  }
}

// Detect stars within sensor range — unknown → detected
const BASE_SENSOR_RANGE = 500;  // default reveal radius for colonies / exploration

// True iff (wx, wy) is currently covered by any player-controlled sensor
// zone — colonies (radius BASE_SENSOR_RANGE) or player map entities (radius
// ent.sensorRange * 50). Mirrors the activeZones the fog renderer uses, so
// "you can see fog clear here" implies "Explore is available."
function isInPlayerSensorRange(wx, wy) {
  for (const star of stars.values()) {
    if (star.planets && star.planets.some(p => p.colony)) {
      const dx = wx - star.x, dy = wy - star.y;
      if (dx * dx + dy * dy <= BASE_SENSOR_RANGE * BASE_SENSOR_RANGE) return true;
    }
  }
  for (const ent of mapEntities) {
    if (ent.owner === "npc") continue;
    const r = (ent.sensorRange || 0) * 50;
    if (r <= 0) continue;
    const dx = wx - ent.x, dy = wy - ent.y;
    if (dx * dx + dy * dy <= r * r) return true;
  }
  return false;
}

// Find the player fleet/ship best positioned to colonize `star` — must
// hold a Colony Ship (special === "colonize") AND have the star within its
// own sensor range. Returns the closest qualifying entity, or null.
function findColonyShipFleet(star) {
  let best = null;
  let bestD2 = Infinity;
  for (const ent of mapEntities) {
    if (ent.owner !== "player") continue;
    if (ent.inCombat) continue;
    let hasColonyShip = false;
    if (ent.type === "ship") {
      hasColonyShip = ent.card && ent.card.special === "colonize";
    } else if (ent.ships) {
      hasColonyShip = ent.ships.some(s => s && s.special === "colonize");
    }
    if (!hasColonyShip) continue;
    const range = (ent.sensorRange || 0) * 50;
    if (range <= 0) continue;
    const dx = star.x - ent.x, dy = star.y - ent.y;
    const d2 = dx * dx + dy * dy;
    if (d2 > range * range) continue;
    if (d2 < bestD2) { bestD2 = d2; best = ent; }
  }
  return best;
}

// Remove one Colony Ship from the given entity. Solo Colony Ships delete the
// entity outright; fleet members get spliced and the fleet's derived stats
// are recomputed. If splicing empties a fleet, the fleet entity is removed.
// Returns true on success.
function consumeColonyShip(ent) {
  if (!ent) return false;
  const idx = mapEntities.indexOf(ent);
  if (idx < 0) return false;
  if (ent.type === "ship") {
    if (!ent.card || ent.card.special !== "colonize") return false;
    mapEntities.splice(idx, 1);
    if (selectedEntityIdx === idx) selectedEntityIdx = null;
    else if (selectedEntityIdx !== null && selectedEntityIdx > idx) selectedEntityIdx--;
    return true;
  }
  if (!ent.ships) return false;
  const shipIdx = ent.ships.findIndex(s => s && s.special === "colonize");
  if (shipIdx < 0) return false;
  ent.ships.splice(shipIdx, 1);
  if (ent.ships.length === 0) {
    mapEntities.splice(idx, 1);
    if (selectedEntityIdx === idx) selectedEntityIdx = null;
    else if (selectedEntityIdx !== null && selectedEntityIdx > idx) selectedEntityIdx--;
  } else {
    ent.speed = Math.min(...ent.ships.map(s => s.stats.speed || 1));
    ent.sensorRange = Math.max(...ent.ships.map(s => s.stats.sensorRange || 0));
  }
  return true;
}

function detectStarsInRange(wx, wy, sensorRange) {
  revealChunksInRadius(wx, wy, sensorRange);
  for (const star of stars.values()) {
    if (star.visibility !== "unknown") continue;
    if (distanceBetween({ x: wx, y: wy }, star) <= sensorRange) {
      star.visibility = "detected";
    }
  }
}

// Initialize galaxy — home star at origin + detect neighbors
function generateGalaxy() {
  // Home star — always Yellow Main Sequence, placed at origin
  // Home star is always Yellow Main Sequence — look up by id, not array index.
  const homeTpl = getCardById("str_002") || getTemplates("star")[0];
  const homeSlots = rollStarPlanetSlots(homeTpl);
  homeSlots.sort((a,b) => RARITY_ORDER.indexOf(b) - RARITY_ORDER.indexOf(a));
  const homeCard = { ...homeTpl, planetSlots: homeSlots, type: homeTpl.name, name: drawStarName() };

  // Force-generate the home chunk and place home star at origin
  const homeCx = Math.floor(0 / CHUNK_SIZE);
  const homeCy = Math.floor(0 / CHUNK_SIZE);
  generatedChunks.set(`${homeCx},${homeCy}`, true);
  const home = createStar(0, 0, "explored", homeCard);

  // Detect nearby stars around home
  detectStarsInRange(0, 0, BASE_SENSOR_RANGE);
  markSeenInRange(0, 0, BASE_SENSOR_RANGE);

  return home;
}

// ═══════════════════════════════════════════
//  SHIPS / FLEETS (movable map entities)
// ═══════════════════════════════════════════
function lightenColor(hex, amt) {
  let r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
  r = Math.min(255, r + amt); g = Math.min(255, g + amt); b = Math.min(255, b + amt);
  return `rgb(${r},${g},${b})`;
}
function formatETA(gameSec) {
  if (gameSec < 60) return `${Math.ceil(gameSec)}s`;
  if (gameSec < 3600) return `${Math.floor(gameSec / 60)}m ${Math.ceil(gameSec % 60)}s`;
  const h = Math.floor(gameSec / 3600);
  const m = Math.ceil((gameSec % 3600) / 60);
  return `${h}h ${m}m`;
}
// Real-seconds an entity needs to traverse `dist` world-units at the current
// game speed. Movement per real-second = ent.speed * BASE_GAME_SPEED *
// gameSpeed * WORLD_SPEED_MULT (matches tickEntities). When paused we fall
// back to the 1x rate so the display still has a meaningful number rather
// than Infinity, suffixed with a pause indicator at the call site.
function entityETARealSec(ent, dist) {
  if (!ent || !ent.speed || dist <= 0) return 0;
  const speedScale = BASE_GAME_SPEED * (gameSpeed > 0 ? gameSpeed : 1) * WORLD_SPEED_MULT;
  const unitsPerRealSec = ent.speed * speedScale;
  if (unitsPerRealSec <= 0) return 0;
  return dist / unitsPerRealSec;
}
const mapEntities = [];  // array of ships/fleets on the starmap
let selectedEntityIdx = null;  // index into mapEntities, or null

function createSoloShip(card, x, y, owner) {
  const ent = {
    type: "ship",
    owner: owner || "player",
    card,
    stance: "aggressive",
    x, y,
    destX: null, destY: null,
    speed: card.stats.speed || 1,
    sensorRange: card.stats.sensorRange || 0,
    stealth: card.stats.stealth || 0,
    label: card.name,
    inCombat: null,
  };
  mapEntities.push(ent);
  return ent;
}

function createFleet(admiral, ships, x, y, owner) {
  const ent = {
    type: "fleet",
    owner: owner || "player",
    admiral,   // admiral card or null
    ships,     // array of ship cards
    stance: "aggressive",
    x, y,
    destX: null, destY: null,
    speed: 1, sensorRange: 0, stealth: 0,
    label: admiral ? admiral.name : "Fleet",
    inCombat: null,
  };
  recalcFleetStats(ent);
  mapEntities.push(ent);
  return ent;
}

function recalcFleetStats(ent) {
  if (ent.type !== "fleet" || ent.ships.length === 0) return;
  let minSpeed = Infinity, maxSensor = 0, minStealth = Infinity;
  for (const s of ent.ships) {
    minSpeed = Math.min(minSpeed, s.stats.speed || 1);
    maxSensor = Math.max(maxSensor, s.stats.sensorRange || 0);
    minStealth = Math.min(minStealth, s.stats.stealth || 0);
  }
  ent.speed = minSpeed;
  ent.sensorRange = maxSensor;
  ent.stealth = minStealth;
  // Apply admiral command bonus
  if (ent.admiral && ent.admiral.stats.commandBonus) {
    const bonus = 1 + ent.admiral.stats.commandBonus / 100;
    ent.speed = Math.round(ent.speed * bonus);
    ent.sensorRange = Math.round(ent.sensorRange * bonus);
  }
}

// ── Fleet formation layout ──
// Per-ship polar offsets from the fleet center. Used to place miniature
// ship icons around the main fleet mark and to source weapon-origin
// positions for combat visuals. Offsets are in WORLD units so they stay
// consistent across zoom. Lazy-computed and cached on the entity; derived
// from ships.length so it doesn't need to round-trip through save files.
const FORMATION_RING_CAPS  = [6, 12, 18, 24];   // max ships per ring
const FORMATION_RING_RADII = [18, 32, 46, 60];  // world units per ring

// Miniature ship triangle size (at zoom 1.0), by rarity. Wide spread so a
// legendary flagship in the formation visually dominates common escorts.
const MINI_SHIP_SIZES = {
  common:    2.5,
  uncommon:  3.5,
  rare:      5.0,
  epic:      7.0,
  legendary: 9.0,
};

function _formationHash(i, salt) {
  // Deterministic per-ship jitter; returns 0..1.
  let x = (i * 374761393 + salt * 668265263) | 0;
  x = (x ^ (x >>> 13)) * 1274126177;
  return ((x ^ (x >>> 16)) >>> 0) / 4294967296;
}

function computeFormation(n) {
  const offsets = [];
  let idx = 0;
  for (let ring = 0; ring < FORMATION_RING_CAPS.length && idx < n; ring++) {
    const count = Math.min(FORMATION_RING_CAPS[ring], n - idx);
    const baseRadius = FORMATION_RING_RADII[ring];
    const ringPhase = ring * 0.35;
    for (let k = 0; k < count; k++) {
      const evenAngle = (k / count) * Math.PI * 2 + ringPhase;
      const jitterA = (_formationHash(idx, 1) - 0.5) * (Math.PI * 2 / count) * 0.25;
      const jitterR = (_formationHash(idx, 2) - 0.5) * 0.18;
      offsets.push({
        angle: evenAngle + jitterA,
        radius: baseRadius * (1 + jitterR),
      });
      idx++;
    }
  }
  return offsets;
}

function getFormation(ent) {
  if (ent.type !== "fleet") return null;
  const n = ent.ships ? ent.ships.length : 0;
  if (!ent._formation || ent._formationN !== n) {
    ent._formation = computeFormation(n);
    ent._formationN = n;
  }
  return ent._formation;
}

// World coordinates for a given ship. For solo ships, returns the entity's
// position. For fleets, adds the ship's formation offset to the fleet
// center. The `_time` argument is reserved for future formation sway.
function getShipWorldPos(ent, shipIdx, _time) {
  if (ent.type !== "fleet") {
    return { x: ent.x, y: ent.y };
  }
  const formation = getFormation(ent);
  const slot = formation[shipIdx];
  if (!slot) return { x: ent.x, y: ent.y };
  return {
    x: ent.x + Math.cos(slot.angle) * slot.radius,
    y: ent.y + Math.sin(slot.angle) * slot.radius,
  };
}

function getMaxFleetShips(admiral) {
  return admiral ? (admiral.stats.maxFleetSize || 4) : 3;
}

// Check if entity is at a colony star (within snap distance)
function getEntityColony(ent) {
  const snapDist = 30;
  for (const c of colonies) {
    const star = stars.get(c.starId);
    if (!star) continue;
    const d = Math.sqrt((ent.x - star.x) ** 2 + (ent.y - star.y) ** 2);
    if (d < snapDist) return c;
  }
  return null;
}

function disbandEntity(idx) {
  const ent = mapEntities[idx];
  if (!ent || ent.inCombat) return;
  const col = getEntityColony(ent);
  if (!col) return; // can only disband at a colony
  const colony = col.planet.colony;
  if (ent.type === "ship") {
    colony.queue.push(ent.card);
  } else if (ent.type === "fleet") {
    for (const s of ent.ships) colony.queue.push(s);
    if (ent.admiral) colony.queue.push(ent.admiral);
  }
  mapEntities.splice(idx, 1);
  if (selectedEntityIdx === idx) selectedEntityIdx = null;
  else if (selectedEntityIdx > idx) selectedEntityIdx--;
}

function tickEntities(dt) {
  for (const ent of mapEntities) {
    if (ent.inCombat) continue;
    if (ent.destX === null || ent.destY === null) continue;

    const dx = ent.destX - ent.x;
    const dy = ent.destY - ent.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const move = ent.speed * dt * WORLD_SPEED_MULT;

    if (move >= dist) {
      // Arrived
      ent.x = ent.destX;
      ent.y = ent.destY;
      ent.destX = null;
      ent.destY = null;
    } else {
      ent.x += (dx / dist) * move;
      ent.y += (dy / dist) * move;
    }

    // Continuous fog reveal along travel path (player only)
    if (ent.owner !== "npc") {
      const range = ent.sensorRange * 50;
      detectStarsInRange(ent.x, ent.y, range);
      markSeenInRange(ent.x, ent.y, range);
    }
  }

  // NPC patrol behavior — idle NPCs wander randomly
  for (const ent of mapEntities) {
    if (ent.owner !== "npc" || ent.inCombat || ent.destX !== null) continue;
    if (Math.random() < 0.002 * dt) {
      ent.destX = ent.x + (Math.random() - 0.5) * 300;
      ent.destY = ent.y + (Math.random() - 0.5) * 300;
    }
  }

  // Detection & engagement scan
  checkCombatEngagements();

  // Drop a stale pirate selection if it's slipped out of sensor coverage,
  // otherwise the select panel keeps showing data for an entity the player
  // can no longer see on the map.
  if (selectedEntityIdx !== null) {
    const sel = mapEntities[selectedEntityIdx];
    if (sel && !isEntityVisibleToPlayer(sel)) {
      selectedEntityIdx = null;
      hideSelectPanel();
    }
  }
}

function shouldEngage(a, b, aDetects, bDetects) {
  const aAggro = a.stance === "aggressive";
  const bAggro = b.stance === "aggressive";
  if (!aAggro && !bAggro) return false;
  if (aAggro && bAggro) return aDetects || bDetects;
  // One aggressive, one evasive — aggressor must detect, then speed check
  const aggressor = aAggro ? a : b;
  const evader = aAggro ? b : a;
  const aggroDetects = aAggro ? aDetects : bDetects;
  if (!aggroDetects) return false;
  const evasionChance = Math.max(0, Math.min(1,
    (evader.speed - aggressor.speed) / Math.max(1, evader.speed)));
