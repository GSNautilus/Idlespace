<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IdleSpace — Star Map</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #050508;
  color: #c8d0e0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── Top Bar ── */
#top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 16px;
  background: #08090f;
  border-bottom: 1px solid #111828;
  flex-shrink: 0;
  z-index: 10;
}
#top-bar h1 { font-size: 13px; font-weight: 600; color: #8090b0; }
#top-bar h1 span { color: #4a7ac0; }
#resources {
  display: flex;
  gap: 14px;
}
.resource {
  display: flex;
  align-items: center;
  gap: 4px;
}
.resource-icon { font-size: 12px; }
.resource-value { font-size: 12px; font-weight: 600; color: #fff; }
.resource-rate { font-size: 9px; color: #6a7a9b; }
.resource-label { display: none; }
#speed-controls {
  display: flex;
  gap: 3px;
  align-items: center;
}
#speed-controls button {
  background: #1a2040;
  border: 1px solid #2a3460;
  color: #8090b0;
  padding: 3px 7px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 10px;
  transition: all 0.15s;
}
#speed-controls button:hover { background: #252f55; color: #c0d0f0; }
#speed-controls button.active {
  background: #2a4080;
  border-color: #4060c0;
  color: #fff;
}

/* ── Canvas Container ── */
#map-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: grab;
}
#map-container.dragging { cursor: grabbing; }
#starmap {
  display: block;
  width: 100%;
  height: 100%;
}

/* ── Tooltip ── */
#tooltip {
  position: absolute;
  pointer-events: none;
  background: rgba(8,9,15,0.92);
  border: 1px solid #1e2744;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 11px;
  color: #c8d0e0;
  white-space: nowrap;
  z-index: 20;
  display: none;
}

/* ── Star Selection Panel (right side, on single-click) ── */
#select-panel {
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: 280px;
  background: #06080c;
  border-left: 1px solid #111828;
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px;
  z-index: 15;
  overflow-y: auto;
}
#select-panel.visible { display: flex; }
#select-panel-close {
  position: absolute;
  top: 8px;
  right: 8px;
  background: none;
  border: none;
  color: #4a5a7b;
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
}
#select-panel-close:hover { color: #c8d0e0; background: #0c0e18; }
#select-panel-info {
  margin-top: 12px;
  width: 220px;
  font-size: 11px;
  color: #4a5a7b;
  text-align: center;
}
.planet-count {
  margin-top: 10px;
  font-size: 12px;
  color: #6a7a9b;
  display: flex;
  align-items: center;
  gap: 5px;
}
.planet-count .count-icon { font-size: 14px; }
.planet-count .count-value { font-weight: 600; color: #8090b0; }

/* ── System View Overlay (50% centered) ── */
#system-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 81%;
  height: 81%;
  max-width: 1400px;
  max-height: 900px;
  background: rgba(5,5,8,0.95);
  border: 1px solid #1e2744;
  border-radius: 12px;
  z-index: 25;
  display: none;
  opacity: 0;
  transition: opacity 0.3s ease;
  overflow: hidden;
}
#system-overlay.visible {
  display: block;
  opacity: 1;
}
#system-overlay.fade-in {
  opacity: 1;
}
/* Dim backdrop behind the overlay */
#system-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 24;
  display: none;
}
#system-backdrop.visible { display: block; }

#system-canvas {
  display: block;
  width: 100%;
  height: 100%;
}
#system-close {
  position: absolute;
  top: 10px;
  right: 12px;
  background: rgba(12,14,24,0.7);
  border: 1px solid #1e2744;
  color: #4a5a7b;
  font-size: 10px;
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 4px;
  z-index: 26;
  transition: all 0.15s;
}
#system-close:hover { color: #c8d0e0; background: rgba(20,26,48,0.9); }

/* Star card in corner */
#system-star-card {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 26;
  transform: scale(0.86);
  transform-origin: top left;
}

/* Planet card popup */
#system-planet-card {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 26;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
#system-planet-card.visible {
  display: flex;
}
#planet-card-close {
  background: rgba(12,14,24,0.7);
  border: 1px solid #1e2744;
  color: #4a5a7b;
  font-size: 8px;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 3px;
  transition: all 0.15s;
}
#planet-card-close:hover { color: #c8d0e0; background: rgba(20,26,48,0.9); }

/* Detected state centered content */
#system-detected {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 26;
}
#system-detected.visible {
  display: flex;
}

/* ── Card Preview (ported from card-builder) ── */
.card-preview {
  width: 220px;
  height: 320px;
  border-radius: 10px;
  padding: 0;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.card-preview::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 10px;
  padding: 3px;
  background: var(--rarity-color);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}
.card-preview .card-bg {
  position: absolute;
  inset: 3px;
  border-radius: 7px;
  background: #141a30;
  z-index: 0;
}
.card-preview > * { position: relative; z-index: 1; }
.card-preview .card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 7px 8px 4px 8px;
}
.card-preview .card-name {
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  flex: 1;
  min-height: 16px;
  line-height: 1.2;
}
.card-preview .card-type {
  font-size: 9px;
  color: #4a5a7b;
  font-style: italic;
}
.card-preview .card-cost-badge {
  position: absolute;
  top: 4px;
  right: 6px;
  z-index: 3;
  background: rgba(10,10,20,0.85);
  border: 1px solid #4a5a7b;
  border-radius: 4px;
  padding: 2px 5px;
  font-size: 9px;
  color: #d4af37;
  white-space: nowrap;
}
.card-preview .card-image {
  width: 205px;
  height: 175px;
  border-radius: 4px;
  background: #1a2040;
  margin: 0 auto 4px auto;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2a3460;
  font-size: 11px;
  flex-shrink: 0;
}
.card-preview .card-image img {
  width: 205px;
  height: 175px;
  object-fit: cover;
}
.card-preview .card-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 3px 8px;
  padding: 2px 8px;
  justify-content: center;
  align-items: center;
  align-content: center;
}
.card-preview .card-stats.expanded {
  flex: 1;
  gap: 4px 12px;
}
.card-preview .card-stat {
  display: flex;
  align-items: center;
  gap: 2px;
  font-size: 11px;
}
.card-preview .card-stats.expanded .card-stat { font-size: 13px; }
.card-preview .card-stat-icon { font-size: 12px; }
.card-preview .card-stats.expanded .card-stat-icon { font-size: 15px; }
.card-preview .card-stat-value { font-weight: 600; color: #fff; }
.card-preview .card-special {
  font-size: 11px;
  color: #a0b0d0;
  text-align: center;
  margin: 2px 7px 0 7px;
  padding: 3px 4px;
  background: rgba(40,60,120,0.2);
  border-radius: 3px;
  line-height: 1.2;
}
.card-preview .card-flavor {
  font-size: 10px;
  color: #4a5a7b;
  font-style: italic;
  text-align: center;
  padding: 2px 8px 7px 8px;
  line-height: 1.3;
  margin-top: auto;
}
.card-preview .card-watermark {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 60px;
  opacity: 0.08;
  z-index: 1;
  pointer-events: none;
  line-height: 1;
}

/* Rarity colors */
.card-preview.common    { --rarity-color: #6a7a9b; }
.card-preview.uncommon  { --rarity-color: #4a9b5a; }
.card-preview.rare      { --rarity-color: #4a7ac0; }
.card-preview.epic      { --rarity-color: #8a4ac0; }
.card-preview.legendary { --rarity-color: #c0a020; }

/* ── Mystery Card (detected/unexplored) ── */
.card-preview.mystery .card-bg {
  background: #0c0e18;
}
.card-mystery-face {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.card-mystery-face .mystery-icon {
  font-size: 48px;
  opacity: 0.3;
}
.card-mystery-face .mystery-text {
  font-size: 14px;
  color: #384868;
  font-weight: 600;
}

/* ── Action Buttons ── */
#detected-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 16px;
  width: 220px;
}
.card-action-btn {
  padding: 10px 20px;
  background: linear-gradient(135deg, #2a4080, #3a5ab0);
  border: 1px solid #4060c0;
  color: #fff;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.card-action-btn:hover { background: linear-gradient(135deg, #3050a0, #4a6ac0); }
.card-action-btn.secondary {
  background: linear-gradient(135deg, #1a2540, #243060);
  border-color: #2a3a60;
}
.card-action-btn.secondary:hover { background: linear-gradient(135deg, #243060, #2e4080); }

/* ── Detected Info Label ── */
#detected-info {
  margin-top: 12px;
  width: 220px;
  font-size: 11px;
  color: #4a5a7b;
  text-align: center;
}

/* ── Colonize Button (in planet card popup) ── */
#colonize-btn {
  margin-top: 8px;
}

/* ── Colonies Button (top bar) ── */
#colonies-btn {
  background: #1a2040;
  border: 1px solid #2a3460;
  color: #8090b0;
  padding: 3px 10px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  margin-left: 10px;
  transition: all 0.15s;
}
#colonies-btn:hover { background: #252f55; color: #c0d0f0; }

/* ── Colonies List Overlay ── */
#colonies-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 30;
  display: none;
}
#colonies-backdrop.visible { display: block; }
#colonies-list-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 340px;
  max-height: 70%;
  background: rgba(5,5,8,0.97);
  border: 1px solid #1e2744;
  border-radius: 12px;
  z-index: 31;
  display: none;
  flex-direction: column;
  padding: 16px;
  overflow: hidden;
}
#colonies-list-overlay.visible { display: flex; }
#colonies-list-overlay h2 {
  font-size: 14px;
  color: #8090b0;
  margin-bottom: 12px;
  font-weight: 600;
}
#colonies-list-close {
  position: absolute;
  top: 10px;
  right: 12px;
  background: none;
  border: none;
  color: #4a5a7b;
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
}
#colonies-list-close:hover { color: #c8d0e0; background: #0c0e18; }
#colonies-list-items {
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.colony-list-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: #0a0c14;
  border: 1px solid #151a2a;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.colony-list-item:hover { background: #111628; border-color: #2a3460; }
.colony-list-name {
  font-size: 12px;
  font-weight: 600;
  color: #c8d0e0;
  flex: 1;
}
.colony-list-type {
  font-size: 10px;
  color: #4a5a7b;
  font-style: italic;
}
.colony-list-rarity {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.colonies-empty {
  font-size: 12px;
  color: #384868;
  text-align: center;
  padding: 24px;
}

/* ── Colony Screen Overlay ── */
#colony-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 34;
  display: none;
}
#colony-backdrop.visible { display: block; }
#colony-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 81%;
  height: 81%;
  max-width: 1400px;
  max-height: 900px;
  background: rgba(5,5,8,0.95);
  border: 1px solid #1e2744;
  border-radius: 12px;
  z-index: 35;
  display: none;
  opacity: 0;
  transition: opacity 0.3s ease;
  overflow: hidden;
}
#colony-overlay.visible { display: flex; flex-direction: column; opacity: 1; }
#colony-overlay.fade-in { opacity: 1; }

#colony-close {
  position: absolute;
  top: 10px;
  right: 12px;
  background: rgba(12,14,24,0.7);
  border: 1px solid #1e2744;
  color: #4a5a7b;
  font-size: 10px;
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 4px;
  z-index: 36;
  transition: all 0.15s;
}
#colony-close:hover { color: #c8d0e0; background: rgba(20,26,48,0.9); }

/* Colony header bar */
#colony-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 8px 16px;
  border-bottom: 1px solid #111828;
  flex-shrink: 0;
}
#colony-name {
  font-size: 18px;
  font-weight: 700;
  color: #c8d0e0;
}
#colony-resources {
  display: flex;
  gap: 12px;
  margin-right: 32px;
}
.colony-res {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 13px;
}
.colony-res-icon { font-size: 14px; }
.colony-res-value { font-weight: 600; color: #fff; }
.colony-res-rate { font-size: 10px; color: #6a7a9b; }

/* Colony body: left sidebar + right main area */
#colony-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Left column: leader slot + action buttons */
#colony-left {
  width: 230px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  padding: 14px;
  border-right: 1px solid #111828;
  gap: 14px;
}
#colony-left h3 {
  font-size: 13px;
  color: #4a5a7b;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 3px;
}

/* Leader card slot */
#leader-slot {
  width: 202px;
  height: 294px;
  border: 2px dashed #1e2744;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2a3460;
  font-size: 11px;
  background: rgba(10,12,20,0.5);
  flex-shrink: 0;
}

/* Action buttons panel */
#colony-actions {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
}
.colony-action-btn {
  padding: 8px 11px;
  background: #0a0c14;
  border: 1px solid #151a2a;
  color: #6a7a9b;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}
.colony-action-btn:hover { background: #111628; color: #8090b0; border-color: #2a3460; }
.colony-action-btn.active {
  background: #1a2540;
  border-color: #4060c0;
  color: #c0d0f0;
}

/* Right main area: building slots grid */
#colony-right {
  flex: 1;
  padding: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
#colony-right h3 {
  font-size: 13px;
  color: #4a5a7b;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
#building-slots {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 10px;
  flex: 1;
}
.building-slot {
  width: 100%;
  height: 100%;
  border: 2px dashed #1e2744;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2a3460;
  font-size: 20px;
  background: rgba(10,12,20,0.5);
  transition: all 0.15s;
  cursor: pointer;
}
.building-slot:hover { border-color: #2a3a60; background: rgba(15,18,30,0.6); }
.building-slot.drag-over { border-color: #4a7ac0; background: rgba(30,40,80,0.5); }
.building-slot.occupied { border-style: solid; border-color: #1e2744; cursor: grab; overflow: hidden; padding: 0; position: relative; }
.building-slot .card-preview {
  position: absolute;
  top: 0; left: 0;
  width: 220px; height: 320px;
  transform-origin: top left;
  pointer-events: none;
  border-radius: 6px;
}

#leader-slot.drag-over { border-color: #c0a020; background: rgba(60,50,20,0.4); }
#leader-slot.occupied { border-style: solid; border-color: #1e2744; cursor: grab; overflow: hidden; padding: 0; position: relative; }
#leader-slot .card-preview {
  position: absolute;
  top: 0; left: 0;
  width: 220px; height: 320px;
  transform-origin: top left;
  pointer-events: none;
  border-radius: 8px;
}

/* ── Deck Pile ── */
#colony-deck {
  position: relative;
  width: 138px;
  height: 200px;
  flex-shrink: 0;
  cursor: pointer;
  align-self: center;
}
#colony-deck:hover .deck-card-back { border-color: #2a3a60; }
.deck-pile {
  position: relative;
  width: 138px;
  height: 200px;
}
.deck-card-back {
  position: absolute;
  width: 138px;
  height: 200px;
  border-radius: 8px;
  border: 2px solid #1e2744;
  background: #0c0e18;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.deck-card-back .deck-logo {
  font-size: 18px;
  font-weight: 600;
  color: #8090b0;
  text-align: center;
  line-height: 1.3;
}
.deck-card-back .deck-logo span { color: #4a7ac0; }
.deck-count {
  position: absolute;
  top: -6px;
  right: -6px;
  background: #c04040;
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 10px;
  z-index: 2;
}
.deck-draw-cost {
  position: absolute;
  bottom: -8px;
  right: -6px;
  background: rgba(20,20,40,0.9);
  border: 1px solid #d4af37;
  color: #d4af37;
  font-size: 9px;
  font-weight: 600;
  padding: 2px 5px;
  border-radius: 6px;
  z-index: 2;
  white-space: nowrap;
}
.deck-empty {
  width: 120px;
  height: 174px;
  border: 2px dashed #1e2744;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2a3460;
  font-size: 11px;
}

/* ── Colony Queue ── */
#colony-queue-section {
  border-top: 1px solid #111828;
  padding-top: 8px;
  margin-top: 8px;
  flex-shrink: 0;
}
#colony-queue-section h3 {
  font-size: 13px;
  color: #4a5a7b;
  text-transform: uppercase;

const RARITY_ROLL_BIAS = { common:0.5, uncommon:0.55, rare:0.6, epic:0.7, legendary:0.8 };

function biasedRandom(bias) {
  // Returns 0-1 skewed toward 1 when bias > 0.5
  // bias=0.5 → uniform, bias=0.8 → heavily top-weighted
  return Math.pow(Math.random(), 1 / (bias * 2));
}

  const rarity = template.rarity;
  const bias = RARITY_ROLL_BIAS[rarity] || 0.5;
  const rolled = {};
  const ranges = {};
  for (const [key, val] of Object.entries(template.stats)) {
    const min = Math.max(1, Math.round(val * (1 - STAT_ROLL_VARIANCE)));
    const max = Math.max(min + 1, Math.round(val * (1 + STAT_ROLL_VARIANCE)));

    ranges[key] = [min, max];

  return { stats: rolled, statRanges: ranges };

function rollCardFromCategory(category) {
  const pool = CATEGORY_TEMPLATES[category];
  if (!pool) return null;
  // Filter to only researched cards for gated categories
  const available = RESEARCH_GATED_CATEGORIES.includes(category)
    ? pool.filter(t => researchedCards.has(t.id))
    : pool;
  if (available.length === 0) return null;
  const rarity = rollRarity();
  const matches = available.filter(t => t.rarity === rarity);
  const fallback = matches.length > 0 ? matches : available;
  const template = fallback[Math.floor(Math.random() * fallback.length)];
  // Roll stats within ±25% range, biased by rarity
  const { stats: rolledStats, statRanges } = rollStats(template);
  return { ...template, stats: rolledStats, statRanges, cost: { ...(template.cost || {}) }, upkeep: { ...(template.upkeep || {}) } };
}

// ═══════════════════════════════════════════
//  RARITY ROLLER
// ═══════════════════════════════════════════
function rollRarity(rng) {
  const rand = rng || Math.random;
  const total = Object.values(RARITY_WEIGHTS).reduce((s,w) => s+w, 0);
  let roll = rand() * total;
  for (const [rarity, weight] of Object.entries(RARITY_WEIGHTS)) {
    roll -= weight;
    if (roll <= 0) return rarity;
  }
  return "common";
}

// Roll rarity with a bonus that shifts weight from common into higher tiers
function rollRarityWithBonus(bonus) {
  if (!bonus) return rollRarity();
  const w = { ...RARITY_WEIGHTS };
  // Shift weight: remove from common, distribute to higher rarities
  const shift = Math.min(w.common * 0.5, bonus * 8);
  w.common -= shift;
  w.uncommon += shift * 0.35;
  w.rare += shift * 0.30;
  w.epic += shift * 0.20;
  w.legendary += shift * 0.15;
  const total = Object.values(w).reduce((s, v) => s + v, 0);
  let roll = Math.random() * total;
  for (const [rarity, weight] of Object.entries(w)) {
    roll -= weight;
    if (roll <= 0) return rarity;
  }
  return "common";
}

function rollStarCard(rng) {
  const rand = rng || Math.random;
  const rarity = rollRarity(rng);
  const pool = STAR_TEMPLATES.filter(t => t.rarity === rarity);
  const template = pool[Math.floor(rand() * pool.length)];
  // Deep copy — assign a unique proper name, keep template name as `type`
  return { ...template, stats: { ...template.stats }, type: template.name, name: drawStarName() };
}

function rollPlanetCard(rarityBonus) {
  const rarity = rollRarityWithBonus(rarityBonus || 0);
  const pool = PLANET_TEMPLATES.filter(t => t.rarity === rarity);
  const fallback = pool.length > 0 ? pool : PLANET_TEMPLATES;
  const template = fallback[Math.floor(Math.random() * fallback.length)];
  // Roll planet stats within ±25% range, biased by rarity
  const { stats: rolledStats, statRanges } = rollStats(template);
  return { ...template, stats: rolledStats, statRanges };
}

const ROMAN = ["I","II","III","IV","V","VI","VII","VIII","IX","X"];
const STAR_RARITY_BONUS = { common:0, uncommon:1, rare:2, epic:3, legendary:5 };

function generatePlanets(star) {
  if (star.planets) return; // already generated
  const maxP = star.card.stats.planets_max || 1;
  const bonus = STAR_RARITY_BONUS[star.card.rarity] || 0;
  // Higher rarity stars produce more planets (biased toward max)
  const minP = Math.min(1 + Math.floor(bonus / 2), maxP);
  const count = minP + Math.floor(Math.random() * (maxP - minP + 1));
  star.planets = [];
  for (let i = 0; i < count; i++) {
    const card = rollPlanetCard(bonus);
    // Keep template name as `type` for visual lookup, name after parent star
    card.type = card.name;
    card.name = `${star.card.name} ${ROMAN[i] || (i + 1)}`;
    star.planets.push({
      card,
      orbitRadius: 80 + i * 50,
      orbitSpeed: 0.04 / (1 + i * 0.3),
      orbitPhase: Math.random() * Math.PI * 2,
    });
  }
}

// ═══════════════════════════════════════════
//  SEEDED PRNG & NOISE
// ═══════════════════════════════════════════
const GALAXY_SEED = Math.floor(Math.random() * 2147483647);

// Mulberry32 — fast seeded 32-bit PRNG
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Hash a chunk coordinate pair to a deterministic seed
function chunkSeed(cx, cy) {
  let h = GALAXY_SEED;
  h = Math.imul(h ^ cx, 0x9E3779B9);
  h = Math.imul(h ^ cy, 0x517CC1B7);
  h = h ^ (h >>> 16);
  return h;
}

// Simple 2D value noise using seeded hashing (no gradient table needed)
function noiseHash(ix, iy) {
  let h = GALAXY_SEED;
  h = Math.imul(h ^ (ix * 374761393), 0x85EBCA6B);
  h = Math.imul(h ^ (iy * 668265263), 0xC2B2AE35);
  h = h ^ (h >>> 13);
  h = Math.imul(h, 0x27D4EB2D);
  return ((h ^ (h >>> 15)) >>> 0) / 4294967296;
}

// Smooth 2D noise with bilinear interpolation
function smoothNoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  // Smoothstep
  const sx = fx * fx * (3 - 2 * fx);
  const sy = fy * fy * (3 - 2 * fy);
  const n00 = noiseHash(ix, iy);
  const n10 = noiseHash(ix + 1, iy);
  const n01 = noiseHash(ix, iy + 1);
  const n11 = noiseHash(ix + 1, iy + 1);
  return n00 * (1 - sx) * (1 - sy) + n10 * sx * (1 - sy) +
         n01 * (1 - sx) * sy + n11 * sx * sy;
}

// Multi-octave fractal noise for richer density maps
function fractalNoise(x, y, octaves = 3) {
  let val = 0, amp = 1, freq = 1, max = 0;
  for (let i = 0; i < octaves; i++) {
    val += smoothNoise(x * freq, y * freq) * amp;
    max += amp;
    amp *= 0.5;
    freq *= 2;
  }
  return val / max;
}

// ═══════════════════════════════════════════
//  PROCEDURAL STAR GENERATION (chunk-based)
// ═══════════════════════════════════════════
const CHUNK_SIZE = 400;             // world units per chunk
const NOISE_SCALE = 0.0015;         // controls cluster size (lower = bigger clusters)
const MIN_STAR_SEPARATION = 120;    // minimum distance between stars
const DENSITY_THRESHOLD = 0.25;     // noise below this = empty void
const MAX_STARS_PER_CHUNK = 4;      // at peak density

const generatedChunks = new Map();  // "cx,cy" -> true (already processed)
let nextStarId = 1;
const stars = new Map();            // id -> star node

function createStar(x, y, visibility, card) {
  const id = `star_${nextStarId++}`;
  const star = { id, x, y, visibility, card };
  stars.set(id, star);
  return star;
}

function distanceBetween(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}

// Generate stars for a single chunk (deterministic)
function generateChunk(cx, cy) {
  const key = `${cx},${cy}`;
  if (generatedChunks.has(key)) return;
  generatedChunks.set(key, true);

  const rng = mulberry32(chunkSeed(cx, cy));

  // Sample density at chunk center
  const centerX = (cx + 0.5) * CHUNK_SIZE;
  const centerY = (cy + 0.5) * CHUNK_SIZE;
  const density = fractalNoise(centerX * NOISE_SCALE, centerY * NOISE_SCALE);

  if (density < DENSITY_THRESHOLD) return; // void — no stars here

  // Number of stars scales with density
  const normalizedDensity = (density - DENSITY_THRESHOLD) / (1 - DENSITY_THRESHOLD);
  const starCount = Math.round(normalizedDensity * MAX_STARS_PER_CHUNK);
  if (starCount <= 0) return;

  const chunkStars = [];
  for (let i = 0; i < starCount; i++) {
    for (let attempt = 0; attempt < 15; attempt++) {
      const x = cx * CHUNK_SIZE + rng() * CHUNK_SIZE;
      const y = cy * CHUNK_SIZE + rng() * CHUNK_SIZE;

      // Check separation within this chunk's new stars
      let tooClose = false;
      for (const s of chunkStars) {
        if (distanceBetween({ x, y }, s) < MIN_STAR_SEPARATION) { tooClose = true; break; }
      }
      if (tooClose) { rng(); continue; } // burn a roll to stay deterministic

      // Check against existing stars near this position
      for (const s of stars.values()) {
        if (distanceBetween({ x, y }, s) < MIN_STAR_SEPARATION) { tooClose = true; break; }
      }
      if (tooClose) continue;

      const card = rollStarCard(rng);
      const star = createStar(x, y, "unknown", card);
      chunkStars.push(star);
      break;
    }
  }
}

// Reveal all chunks within a radius of a world point
function revealChunksInRadius(wx, wy, radius) {
  const minCx = Math.floor((wx - radius) / CHUNK_SIZE);
  const maxCx = Math.floor((wx + radius) / CHUNK_SIZE);
  const minCy = Math.floor((wy - radius) / CHUNK_SIZE);
  const maxCy = Math.floor((wy + radius) / CHUNK_SIZE);
  for (let cx = minCx; cx <= maxCx; cx++) {
    for (let cy = minCy; cy <= maxCy; cy++) {
      generateChunk(cx, cy);
    }
  }
}

// Detect stars within sensor range — unknown → detected
const BASE_SENSOR_RANGE = 500;  // default reveal radius for colonies / exploration

function detectStarsInRange(wx, wy, sensorRange) {
  revealChunksInRadius(wx, wy, sensorRange);
  for (const star of stars.values()) {
    if (star.visibility !== "unknown") continue;
    if (distanceBetween({ x: wx, y: wy }, star) <= sensorRange) {
      star.visibility = "detected";
    }
  }
}

// Initialize galaxy — home star at origin + detect neighbors
function generateGalaxy() {
  // Home star — always Yellow Main Sequence, placed at origin
  const homeCard = { ...STAR_TEMPLATES[1], stats: { ...STAR_TEMPLATES[1].stats }, type: STAR_TEMPLATES[1].name, name: drawStarName() };

  // Force-generate the home chunk and place home star at origin
  const homeCx = Math.floor(0 / CHUNK_SIZE);
  const homeCy = Math.floor(0 / CHUNK_SIZE);
  generatedChunks.set(`${homeCx},${homeCy}`, true);
  const home = createStar(0, 0, "explored", homeCard);

  // Detect nearby stars around home
  detectStarsInRange(0, 0, BASE_SENSOR_RANGE);

  return home;
}

// ═══════════════════════════════════════════
//  PROBES / FLEETS (movable map entities)
// ═══════════════════════════════════════════
const mapEntities = [];  // array of probes/fleets on the starmap
let selectedEntityIdx = null;  // index into mapEntities, or null

function createProbe(x, y) {
  const probe = {
    type: "probe",
    x, y,
    destX: null, destY: null,
    speed: 60,           // world units per game-second
    sensorRange: 300,    // reveal radius while traveling
    label: "Scout Probe",
  };
  mapEntities.push(probe);
  return probe;
}

function tickEntities(dt) {
  for (const ent of mapEntities) {
    if (ent.destX === null || ent.destY === null) continue;

    const dx = ent.destX - ent.x;
    const dy = ent.destY - ent.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const move = ent.speed * dt;

    if (move >= dist) {
      // Arrived
      ent.x = ent.destX;
      ent.y = ent.destY;
      ent.destX = null;
      ent.destY = null;
    } else {
      ent.x += (dx / dist) * move;
      ent.y += (dy / dist) * move;
    }

    // Continuous fog reveal along travel path
    detectStarsInRange(ent.x, ent.y, ent.sensorRange);
  }
}

function drawEntities(ctx, time) {
  for (let i = 0; i < mapEntities.length; i++) {
    const ent = mapEntities[i];
    const pos = worldToScreen(ent.x, ent.y);
    const isSelected = selectedEntityIdx === i;

    // Draw travel line to destination
    if (ent.destX !== null && ent.destY !== null) {
      const destPos = worldToScreen(ent.destX, ent.destY);
      ctx.save();
      ctx.strokeStyle = "rgba(74, 122, 192, 0.4)";
      ctx.lineWidth = 1.5 * camera.zoom;
      ctx.setLineDash([8 * camera.zoom, 5 * camera.zoom]);
      // Animate dash in movement direction
      ctx.lineDashOffset = -time * 40;
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      ctx.lineTo(destPos.x, destPos.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();

      // Small dot at destination
      ctx.fillStyle = "rgba(74, 122, 192, 0.3)";
      ctx.beginPath();
      ctx.arc(destPos.x, destPos.y, 3 * camera.zoom, 0, Math.PI * 2);
      ctx.fill();
    }

    // Probe icon — small diamond shape
    const size = 6 * camera.zoom;
    ctx.save();
    ctx.translate(pos.x, pos.y);

    // Selection highlight
    if (isSelected) {
      ctx.strokeStyle = "#4a7ac0";
      ctx.lineWidth = 2;
      ctx.setLineDash([3 * camera.zoom, 2 * camera.zoom]);
      ctx.lineDashOffset = -time * 20;
      ctx.beginPath();
      ctx.arc(0, 0, size + 4 * camera.zoom, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Diamond body
    ctx.fillStyle = isSelected ? "#6a9ae0" : "#4a7ac0";
    ctx.beginPath();
    ctx.moveTo(0, -size);
    ctx.lineTo(size * 0.7, 0);
    ctx.lineTo(0, size);
    ctx.lineTo(-size * 0.7, 0);
    ctx.closePath();
    ctx.fill();

    // Bright core
    ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.25, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Label
    if (camera.zoom > 0.5) {
      ctx.fillStyle = isSelected ? "rgba(200,210,230,0.9)" : "rgba(200,210,230,0.6)";
      ctx.font = `${Math.max(8, 10 * camera.zoom)}px 'Segoe UI', system-ui, sans-serif`;
      ctx.textAlign = "center";
      ctx.fillText(ent.label, pos.x, pos.y + size + 12 * camera.zoom);
    }
  }
}

function getEntityAtScreen(sx, sy) {
  const world = screenToWorld(sx, sy);
  const hitRadius = 15 / camera.zoom;  // generous click target
  for (let i = 0; i < mapEntities.length; i++) {
    const ent = mapEntities[i];
    const d = Math.sqrt((world.x - ent.x) ** 2 + (world.y - ent.y) ** 2);
    if (d < hitRadius) return i;
  }
  return null;
}

// ═══════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════
const camera = {
  x: 0, y: 0,       // world offset (center of view)
  zoom: 1.0,
  minZoom: 0.3,
  maxZoom: 3.0,
};

function worldToScreen(wx, wy) {
  const canvas = document.getElementById("starmap");
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  return {
    x: (wx - camera.x) * camera.zoom + cx,
    y: (wy - camera.y) * camera.zoom + cy,
  };
}

function screenToWorld(sx, sy) {
  const canvas = document.getElementById("starmap");
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  return {
    x: (sx - cx) / camera.zoom + camera.x,
    y: (sy - cy) / camera.zoom + camera.y,
  };
}

// ═══════════════════════════════════════════
//  BACKGROUND STAR FIELD
// ═══════════════════════════════════════════
const BG_STARS = [];
function initBgStars(count = 400) {
  for (let i = 0; i < count; i++) {
    BG_STARS.push({
      x: Math.random() * 4000 - 2000,
      y: Math.random() * 4000 - 2000,
      size: Math.random() * 1.2 + 0.3,
      brightness: Math.random() * 0.4 + 0.1,
    });
  }
}
initBgStars();

// ═══════════════════════════════════════════
//  CANVAS RENDERING
// ═══════════════════════════════════════════
let animTime = 0;
let selectedStarId = null;
let hoveredStarId = null;

function resizeCanvas() {
  const canvas = document.getElementById("starmap");
  const container = document.getElementById("map-container");
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
}

function drawBgStars(ctx) {
  const canvas = ctx.canvas;
  const parallax = 0.15; // moves slower than main layer
  for (const bg of BG_STARS) {
    const sx = (bg.x - camera.x * parallax) * camera.zoom + canvas.width / 2;
    const sy = (bg.y - camera.y * parallax) * camera.zoom + canvas.height / 2;
    // Wrap around
    const wx = ((sx % canvas.width) + canvas.width) % canvas.width;
    const wy = ((sy % canvas.height) + canvas.height) % canvas.height;
    ctx.fillStyle = `rgba(180,200,240,${bg.brightness})`;
    ctx.fillRect(wx, wy, bg.size, bg.size);
  }
}


function drawStar(ctx, star, time) {
  const isExplored = star.visibility === "explored";
  const isDetected = star.visibility === "detected";
  if (star.visibility === "unknown") return;

  const visual = isExplored ? (STAR_VISUALS[star.card.type] || DETECTED_VISUAL) : DETECTED_VISUAL;
  const lum = isExplored ? (star.card.stats.luminosity || 3) : 2;
  const baseRadius = visual.baseSize * (1 + lum * 0.08);

  // Pulse animation
  const pulse = 1 + Math.sin(time * 3 + star.x * 0.01 + star.y * 0.01) * 0.08;
  const radius = baseRadius * pulse * camera.zoom;

  const pos = worldToScreen(star.x, star.y);

  // Rarity aura for epic/legendary explored stars
  if (isExplored && (star.card.rarity === "epic" || star.card.rarity === "legendary")) {
    const auraColor = RARITY_COLORS[star.card.rarity];
    const auraRadius = radius * 3;
    const aura = ctx.createRadialGradient(pos.x, pos.y, radius, pos.x, pos.y, auraRadius);
    aura.addColorStop(0, auraColor + "40");
    aura.addColorStop(1, auraColor + "00");
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, auraRadius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Glow
  const glowRadius = radius * 2.5;
  const glow = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, glowRadius);
  glow.addColorStop(0, visual.glowColor);
  glow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, glowRadius, 0, Math.PI * 2);
  ctx.fill();

  // Star body
  ctx.fillStyle = visual.color;
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
  ctx.fill();

  // Bright core
  if (isExplored) {
    const coreGrad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, radius);
    coreGrad.addColorStop(0, "rgba(255,255,255,0.6)");
    coreGrad.addColorStop(0.3, "rgba(255,255,255,0.15)");
    coreGrad.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Binary system: draw second smaller star offset
  if (isExplored && star.card.type === "Binary System") {
    const offset = radius * 1.2;
    const angle2 = time * 0.5 + star.x;
    const bx = pos.x + Math.cos(angle2) * offset;
    const by = pos.y + Math.sin(angle2) * offset;
    ctx.fillStyle = "#90d0f0";
    ctx.beginPath();
    ctx.arc(bx, by, radius * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Trinary system: draw two extra stars
  if (isExplored && star.card.type === "Trinary System") {
    for (let i = 0; i < 2; i++) {
      const offset = radius * 1.3;
      const angle2 = time * 0.4 + star.x + i * Math.PI * 0.67;
      const bx = pos.x + Math.cos(angle2) * offset;
      const by = pos.y + Math.sin(angle2) * offset;
      ctx.fillStyle = i === 0 ? "#f0c060" : "#e09050";
      ctx.beginPath();
      ctx.arc(bx, by, radius * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Pulsar beams
  if (isExplored && star.card.type === "Pulsar") {
    const beamAngle = time * 2;
    ctx.save();
    ctx.translate(pos.x, pos.y);
    ctx.rotate(beamAngle);
    const beamLen = radius * 5;
    const beamGrad = ctx.createLinearGradient(0, 0, beamLen, 0);
    beamGrad.addColorStop(0, "rgba(128,224,224,0.4)");
    beamGrad.addColorStop(1, "rgba(128,224,224,0)");
    ctx.fillStyle = beamGrad;
    ctx.fillRect(0, -radius * 0.3, beamLen, radius * 0.6);
    ctx.rotate(Math.PI);
    ctx.fillRect(0, -radius * 0.3, beamLen, radius * 0.6);
    ctx.restore();
  }

  // Colonized star highlight (green glow if any planet colonized)
  if (isExplored && star.planets && star.planets.some(p => p.colony)) {
    const colR = radius + 8 * camera.zoom;
    const colGlow = ctx.createRadialGradient(pos.x, pos.y, radius, pos.x, pos.y, colR + 6 * camera.zoom);
    colGlow.addColorStop(0, "rgba(74,155,90,0.35)");
    colGlow.addColorStop(1, "rgba(74,155,90,0)");
    ctx.fillStyle = colGlow;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, colR + 6 * camera.zoom, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(74,155,90,0.5)";
    ctx.lineWidth = 2 * camera.zoom;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, colR, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Hover highlight
  if (hoveredStarId === star.id) {
    ctx.strokeStyle = "rgba(200,220,255,0.3)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, radius + 4 * camera.zoom, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Selection ring
  if (selectedStarId === star.id) {
    const ringRadius = radius + 6 * camera.zoom;
    const dashOffset = time * 30;
    ctx.strokeStyle = "#4a7ac0";
    ctx.lineWidth = 2;
    ctx.setLineDash([4 * camera.zoom, 3 * camera.zoom]);
    ctx.lineDashOffset = -dashOffset;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, ringRadius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.lineDashOffset = 0;
  }

  // Name label (explored only)
  if (isExplored && camera.zoom > 0.5) {
    ctx.fillStyle = "rgba(200,210,230,0.7)";
    ctx.font = `${Math.max(9, 11 * camera.zoom)}px 'Segoe UI', system-ui, sans-serif`;
    ctx.textAlign = "center";
    ctx.fillText(star.card.name, pos.x, pos.y + radius + 14 * camera.zoom);
  }
}

function drawTerritoryContour(ctx) {
  // Collect screen positions of all colonized stars
  const colonizedPos = [];
  for (const star of stars.values()) {
    if (star.visibility === "explored" && star.planets && star.planets.some(p => p.colony)) {
      const sp = worldToScreen(star.x, star.y);
      colonizedPos.push(sp);
    }
  }
  if (colonizedPos.length === 0) return;

  const pad = 80 * camera.zoom;

  ctx.save();
  ctx.fillStyle = "rgba(60,120,200,0.03)";
  ctx.strokeStyle = "rgba(60,120,200,0.08)";
  ctx.lineWidth = 1.5 * camera.zoom;

  if (colonizedPos.length === 1) {
    const p = colonizedPos[0];
    const r = pad + Math.sin(animTime * 2) * 4 * camera.zoom;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  } else if (colonizedPos.length === 2) {
    const [a, b] = colonizedPos;
    const dx = b.x - a.x, dy = b.y - a.y;
    const angle = Math.atan2(dy, dx);
    ctx.beginPath();
    ctx.arc(a.x, a.y, pad, angle + Math.PI * 0.5, angle + Math.PI * 1.5);
    ctx.arc(b.x, b.y, pad, angle - Math.PI * 0.5, angle + Math.PI * 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  } else {
    // 3+ stars: convex hull expanded along edge normals
    const hull = convexHull(colonizedPos);
    const n = hull.length;
    const expanded = hull.map((p, i) => {
      const prev = hull[(i - 1 + n) % n];
      const next = hull[(i + 1) % n];
      // Average outward normal of the two adjacent edges
      let nx = (next.y - p.y) + (p.y - prev.y);
      let ny = -(next.x - p.x) - (p.x - prev.x);
      const len = Math.sqrt(nx * nx + ny * ny) || 1;
      nx /= len; ny /= len;
      return { x: p.x + nx * pad, y: p.y + ny * pad };
    });
    drawSmoothCurve(ctx, expanded);
    ctx.fill();
    ctx.stroke();
  }
  ctx.restore();
}

function convexHull(points) {
  const pts = [...points].sort((a, b) => a.x - b.x || a.y - b.y);
  if (pts.length <= 2) return pts;
  const cross = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
  const lower = [];
  for (const p of pts) {
    while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
    lower.push(p);
  }
  const upper = [];
  for (let i = pts.length - 1; i >= 0; i--) {
    const p = pts[i];
    while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
    upper.push(p);
  }
  upper.pop();
  lower.pop();
  return lower.concat(upper);
}

function drawSmoothCurve(ctx, points) {
  if (points.length < 3) return;
  const n = points.length;
  ctx.beginPath();
  ctx.moveTo(
    (points[n - 1].x + points[0].x) / 2,
    (points[n - 1].y + points[0].y) / 2
  );
  for (let i = 0; i < n; i++) {
    const p = points[i];
    const next = points[(i + 1) % n];
    const mx = (p.x + next.x) / 2;
    const my = (p.y + next.y) / 2;
    ctx.quadraticCurveTo(p.x, p.y, mx, my);
  }
  ctx.closePath();
}

// Offscreen canvas for fog — created once, resized as needed
let fogCanvas = null;
let fogCtx = null;

function drawFogOfWar(ctx) {
  const w = ctx.canvas.width, h = ctx.canvas.height;

  // Create or resize offscreen fog canvas
  if (!fogCanvas || fogCanvas.width !== w || fogCanvas.height !== h) {
    fogCanvas = document.createElement("canvas");
    fogCanvas.width = w;
    fogCanvas.height = h;
    fogCtx = fogCanvas.getContext("2d");
  }

  // Fill fog canvas fully opaque black
  fogCtx.clearRect(0, 0, w, h);
  fogCtx.fillStyle = "#000";
  fogCtx.fillRect(0, 0, w, h);

  // Collect all reveal zones — explored stars + entities with sensor range
  const revealZones = [];
  for (const star of stars.values()) {
    if (star.visibility !== "explored") continue;
    revealZones.push({ wx: star.x, wy: star.y, range: BASE_SENSOR_RANGE });
  }
  for (const ent of mapEntities) {
    revealZones.push({ wx: ent.x, wy: ent.y, range: ent.sensorRange });
  }

  // Punch soft circular holes using destination-out on the opaque surface
  fogCtx.globalCompositeOperation = "destination-out";
  for (const zone of revealZones) {
    const pos = worldToScreen(zone.wx, zone.wy);
    const radius = zone.range * camera.zoom;

    const grad = fogCtx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, radius);
    grad.addColorStop(0, "rgba(0, 0, 0, 1)");
    grad.addColorStop(0.7, "rgba(0, 0, 0, 1)");
    grad.addColorStop(1, "rgba(0, 0, 0, 0)");

    fogCtx.fillStyle = grad;
    fogCtx.beginPath();
    fogCtx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
    fogCtx.fill();
  }
  fogCtx.globalCompositeOperation = "source-over";

  // Draw fog onto main canvas with reduced opacity
  ctx.save();
  ctx.globalAlpha = 0.88;
  ctx.drawImage(fogCanvas, 0, 0);
  ctx.globalAlpha = 1;
  ctx.restore();
}

function render() {
  const canvas = document.getElementById("starmap");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = "#050508";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawBgStars(ctx);
  drawTerritoryContour(ctx);

  // Draw stars (detected first, then explored so they're on top)
  const detectedStars = [];
  const exploredStars = [];
  for (const star of stars.values()) {
    if (star.visibility === "detected") detectedStars.push(star);
    else if (star.visibility === "explored") exploredStars.push(star);
  }
  for (const star of detectedStars) drawStar(ctx, star, animTime);
  for (const star of exploredStars) drawStar(ctx, star, animTime);

  // Probes/fleets drawn above stars but below fog
  drawEntities(ctx, animTime);

  // Fog of war on top — covers unexplored areas, detected stars peek through
  drawFogOfWar(ctx);
}

// ═══════════════════════════════════════════
//  CARD PREVIEW RENDERER (shared)
// ═══════════════════════════════════════════
function buildCardHtml(card, watermark) {
  const statsHtml = Object.entries(card.stats)
    .map(([key, val]) => {
      const icon = STAT_ICONS[key] || "◆";
      const color = card.statRanges && card.statRanges[key]
        ? getStatQualityColor(val, card.statRanges[key][0], card.statRanges[key][1])
        : "#fff";
      return `<div class="card-stat"><span class="card-stat-icon">${icon}</span><span class="card-stat-value" style="color:${color}">${formatResourceValue(val)}</span></div>`;
    }).join("");
  // Upkeep display (shown as red consumption stats)
  const upkeepHtml = card.upkeep ? Object.entries(card.upkeep)
    .map(([key, val]) => {
      const icon = STAT_ICONS[key] || "◆";
      return `<div class="card-stat upkeep"><span class="card-stat-icon">${icon}</span><span class="card-stat-value" style="color:#e05050">-${formatResourceValue(val)}</span></div>`;
    }).join("") : "";
  // Cost badge (top-right)
  const costHtml = card.cost ? Object.entries(card.cost)
    .map(([key, val]) => `${STAT_ICONS[key] || ""}${formatResourceValue(val)}`)
    .join(" ") : "";
  const hasSpecial = card.special && card.special.length > 0;
  const expandedClass = !hasSpecial ? " expanded" : "";
  return `
    <div class="card-preview ${card.rarity}">
      <div class="card-bg"></div>
      <div class="card-header">
        <div class="card-name">${card.name}</div>
        ${card.type ? `<div class="card-type">${card.type}</div>` : ""}
      </div>
      ${costHtml ? `<div class="card-cost-badge">${costHtml}</div>` : ""}
      <div class="card-image">
        ${card.image ? `<img src="${card.image}">` : (watermark || "☀️")}
      </div>
      <div class="card-stats${expandedClass}">${statsHtml}${upkeepHtml}</div>
      ${hasSpecial ? `<div class="card-special">${card.special}</div>` : ""}
      <div class="card-flavor">${card.flavor}</div>
      <div class="card-watermark">${watermark || "☀️"}</div>
    </div>`;
}

// ═══════════════════════════════════════════
//  SYSTEM VIEW OVERLAY
// ═══════════════════════════════════════════
let systemAnimFrame = null;
let systemViewStar = null;
let hoveredPlanetIdx = null;
let selectedPlanetIdx = null;

function resizeSystemCanvas() {
  const canvas = document.getElementById("system-canvas");
  const overlay = document.getElementById("system-overlay");
  // Use offsetWidth/Height since the overlay is now a sized box, not fullscreen
  canvas.width = overlay.offsetWidth;
  canvas.height = overlay.offsetHeight;
}

function drawSystemStar(ctx, cx, cy, star, time) {
  const visual = STAR_VISUALS[star.card.type] || DETECTED_VISUAL;
  const lum = star.card.stats.luminosity || 3;
  const scale = 3.5;
  const baseRadius = visual.baseSize * (1 + lum * 0.08) * scale;
  const pulse = 1 + Math.sin(time * 3) * 0.05;
  const radius = baseRadius * pulse;

  // Rarity aura
  if (star.card.rarity === "epic" || star.card.rarity === "legendary") {
    const auraColor = RARITY_COLORS[star.card.rarity];
    const auraRadius = radius * 3;
    const aura = ctx.createRadialGradient(cx, cy, radius, cx, cy, auraRadius);
    aura.addColorStop(0, auraColor + "40");
    aura.addColorStop(1, auraColor + "00");
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(cx, cy, auraRadius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Glow
  const glowRadius = radius * 3;
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowRadius);
  glow.addColorStop(0, visual.glowColor);
  glow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, cy, glowRadius, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = visual.color;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fill();

  // Core
  const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
  coreGrad.addColorStop(0, "rgba(255,255,255,0.6)");
  coreGrad.addColorStop(0.3, "rgba(255,255,255,0.15)");
  coreGrad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fill();

  // Binary companion
  if (star.card.type === "Binary System") {
    const offset = radius * 1.2;
    const angle2 = time * 0.5;
    ctx.fillStyle = "#90d0f0";
    ctx.beginPath();
    ctx.arc(cx + Math.cos(angle2) * offset, cy + Math.sin(angle2) * offset, radius * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Trinary companions
  if (star.card.type === "Trinary System") {
    for (let i = 0; i < 2; i++) {
      const offset = radius * 1.3;
      const angle2 = time * 0.4 + i * Math.PI * 0.67;
      ctx.fillStyle = i === 0 ? "#f0c060" : "#e09050";
      ctx.beginPath();
      ctx.arc(cx + Math.cos(angle2) * offset, cy + Math.sin(angle2) * offset, radius * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Pulsar beams
  if (star.card.type === "Pulsar") {
    const beamAngle = time * 2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(beamAngle);
    const beamLen = radius * 5;
    const beamGrad = ctx.createLinearGradient(0, 0, beamLen, 0);
    beamGrad.addColorStop(0, "rgba(128,224,224,0.4)");
    beamGrad.addColorStop(1, "rgba(128,224,224,0)");
    ctx.fillStyle = beamGrad;
    ctx.fillRect(0, -radius * 0.3, beamLen, radius * 0.6);
    ctx.rotate(Math.PI);
    ctx.fillRect(0, -radius * 0.3, beamLen, radius * 0.6);
    ctx.restore();
  }

  return radius; // return for orbit ring offset
}

function getPlanetScreenPos(planet, cx, cy, time) {
  const angle = planet.orbitPhase + planet.orbitSpeed * time;
  const scale = Math.min(cx, cy) / 250; // scale orbits to canvas size
  const r = planet.orbitRadius * scale;
  return {
    x: cx + Math.cos(angle) * r,
    y: cy + Math.sin(angle) * r,
  };
}

function getPlanetScreenRadius(planet) {
  const pv = PLANET_VISUALS[planet.card.type] || { baseSize: 5 };
  return pv.baseSize * 1.5;
}

function renderSystemView(time) {
  const star = systemViewStar;
  if (!star || !star.planets) return;

  const canvas = document.getElementById("system-canvas");
  const ctx = canvas.getContext("2d");
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background (slightly transparent — overlay bg shows through)
  ctx.fillStyle = "rgba(5,5,8,0.3)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Background star field (subtle)
  for (let i = 0; i < 120; i++) {
    const bx = ((i * 137.508 + 50) % canvas.width);
    const by = ((i * 97.231 + 30) % canvas.height);
    const brightness = 0.1 + (i % 5) * 0.04;
    ctx.fillStyle = `rgba(180,200,240,${brightness})`;
    ctx.fillRect(bx, by, 0.8, 0.8);
  }

  const scale = Math.min(cx, cy) / 250;

  // Orbital rings
  for (const planet of star.planets) {
    const r = planet.orbitRadius * scale;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(42,58,96,0.3)";
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Star
  drawSystemStar(ctx, cx, cy, star, time);

  // Planets
  star.planets.forEach((planet, idx) => {
    const pos = getPlanetScreenPos(planet, cx, cy, time);
    const pv = PLANET_VISUALS[planet.card.type] || { color:"#888", glowColor:"rgba(128,128,128,0.3)", baseSize:5 };
    const radius = getPlanetScreenRadius(planet);

    // Glow
    const glowR = radius * 2.5;
    const glow = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, glowR);
    glow.addColorStop(0, pv.glowColor);
    glow.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Rarity aura for epic/legendary
    if (planet.card.rarity === "epic" || planet.card.rarity === "legendary") {
      const auraColor = RARITY_COLORS[planet.card.rarity];
      const auraR = radius * 3;
      const aura = ctx.createRadialGradient(pos.x, pos.y, radius, pos.x, pos.y, auraR);
      aura.addColorStop(0, auraColor + "30");
      aura.addColorStop(1, auraColor + "00");
      ctx.fillStyle = aura;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, auraR, 0, Math.PI * 2);
      ctx.fill();
    }

    // Body
    ctx.fillStyle = pv.color;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
    ctx.fill();

    // Ring World Fragment — draw arc ring
    if (planet.card.type === "Ring World Fragment") {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius * 1.6, -0.8, 0.8);
      ctx.strokeStyle = "rgba(144,168,192,0.6)";
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Tidally Locked — half dark
    if (planet.card.type === "Tidally Locked World") {
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius, Math.PI * 0.5, Math.PI * 1.5);
      ctx.fill();
    }

    // Volcanic glow
    if (planet.card.type === "Volcanic World") {
      const vGlow = ctx.createRadialGradient(pos.x, pos.y, radius * 0.3, pos.x, pos.y, radius);
      vGlow.addColorStop(0, "rgba(255,100,20,0.3)");
      vGlow.addColorStop(1, "rgba(255,60,10,0)");
      ctx.fillStyle = vGlow;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    // Crystalline shimmer
    if (planet.card.type === "Crystalline World") {
      const shimmer = 0.3 + Math.sin(time * 4 + idx) * 0.15;
      ctx.fillStyle = `rgba(200,220,255,${shimmer})`;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }

    // Gas Giant bands
    if (planet.card.type === "Gas Giant") {
      for (let b = -3; b <= 3; b++) {
        const by = pos.y + b * (radius * 0.25);
        const bandW = Math.sqrt(Math.max(0, radius * radius - (b * radius * 0.25) ** 2));
        ctx.fillStyle = b % 2 === 0 ? "rgba(180,120,50,0.2)" : "rgba(200,150,70,0.15)";
        ctx.fillRect(pos.x - bandW, by - 1, bandW * 2, 2);
      }
    }

    // Precursor golden glow
    if (planet.card.type === "Precursor Homeworld") {
      const pGlow = ctx.createRadialGradient(pos.x, pos.y, radius * 0.5, pos.x, pos.y, radius * 1.5);
      pGlow.addColorStop(0, "rgba(200,180,60,0.2)");
      pGlow.addColorStop(1, "rgba(200,180,60,0)");
      ctx.fillStyle = pGlow;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius * 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Colonized highlight (permanent green glow ring)
    if (planet.colony) {
      const colR = radius + 6;
      const colGlow = ctx.createRadialGradient(pos.x, pos.y, radius, pos.x, pos.y, colR + 4);
      colGlow.addColorStop(0, "rgba(74,155,90,0.4)");
      colGlow.addColorStop(1, "rgba(74,155,90,0)");
      ctx.fillStyle = colGlow;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, colR + 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(74,155,90,0.6)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, colR, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Hover ring
    if (hoveredPlanetIdx === idx) {
      ctx.strokeStyle = "rgba(200,220,255,0.5)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius + 4, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Selection ring
    if (selectedPlanetIdx === idx) {
      ctx.strokeStyle = "#4a7ac0";
      ctx.lineWidth = 2;
      ctx.setLineDash([3, 3]);
      ctx.lineDashOffset = -time * 30;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius + 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.lineDashOffset = 0;
    }

    // Name label
    ctx.fillStyle = "rgba(200,210,230,0.6)";
    ctx.font = "10px 'Segoe UI', system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(planet.card.name, pos.x, pos.y + radius + 14);
  });
}

function systemLoop(timestamp) {
  const time = timestamp / 1000;
  renderSystemView(time);
  systemAnimFrame = requestAnimationFrame(systemLoop);
}

function showSystemOverlay(star) {
  selectedStarId = star.id;
  systemViewStar = star;
  hoveredPlanetIdx = null;
  selectedPlanetIdx = null;

  const overlay = document.getElementById("system-overlay");
  const backdrop = document.getElementById("system-backdrop");
  const detected = document.getElementById("system-detected");
  const starCard = document.getElementById("system-star-card");
  const planetCard = document.getElementById("system-planet-card");

  backdrop.classList.add("visible");
  overlay.style.display = "block";
  requestAnimationFrame(() => overlay.classList.add("visible", "fade-in"));

  planetCard.classList.remove("visible");

  if (star.visibility === "detected") {
    // Show mystery card + Explore
    detected.classList.add("visible");
    starCard.innerHTML = "";
    document.getElementById("detected-card-slot").innerHTML = `
      <div class="card-preview common" style="--rarity-color:#384868">
        <div class="card-bg"></div>
        <div class="card-mystery-face">
          <div class="mystery-icon">✦</div>
          <div class="mystery-text">Unknown Star</div>
        </div>
      </div>`;
    document.getElementById("detected-actions").innerHTML =
      `<button class="card-action-btn" onclick="exploreSelectedStar()">Explore</button>`;
    document.getElementById("detected-info").textContent = "Send a probe to discover this star.";
    // No system canvas
    if (systemAnimFrame) { cancelAnimationFrame(systemAnimFrame); systemAnimFrame = null; }
  } else {
    // Explored — show system view
    detected.classList.remove("visible");
    generatePlanets(star);
    starCard.innerHTML = buildCardHtml(star.card, "☀️");
    resizeSystemCanvas();
    if (systemAnimFrame) cancelAnimationFrame(systemAnimFrame);
    systemAnimFrame = requestAnimationFrame(systemLoop);
  }
}

function hideSystemOverlay() {
  systemViewStar = null;
  hoveredPlanetIdx = null;
  selectedPlanetIdx = null;
  const overlay = document.getElementById("system-overlay");
  const backdrop = document.getElementById("system-backdrop");
  overlay.classList.remove("visible", "fade-in");
  backdrop.classList.remove("visible");
  setTimeout(() => { overlay.style.display = "none"; }, 300);
  if (systemAnimFrame) { cancelAnimationFrame(systemAnimFrame); systemAnimFrame = null; }
  document.getElementById("system-detected").classList.remove("visible");
  document.getElementById("system-planet-card").classList.remove("visible");
}

function exploreSelectedStar() {
  const star = stars.get(selectedStarId);
  if (!star || star.visibility !== "detected") return;

  star.visibility = "explored";

  // Detect nearby stars within sensor range
  detectStarsInRange(star.x, star.y, BASE_SENSOR_RANGE);

  // Transition to system view within overlay
  document.getElementById("system-detected").classList.remove("visible");
  generatePlanets(star);
  document.getElementById("system-star-card").innerHTML = buildCardHtml(star.card, "☀️");
  resizeSystemCanvas();
  if (systemAnimFrame) cancelAnimationFrame(systemAnimFrame);
  systemAnimFrame = requestAnimationFrame(systemLoop);
}

function hidePlanetCard() {
  selectedPlanetIdx = null;
  const btn = document.getElementById("planet-action-btn");
  if (btn) btn.remove();
  document.getElementById("system-planet-card").classList.remove("visible");
}

// ═══════════════════════════════════════════
//  STAR SELECTION PANEL (single-click)
// ═══════════════════════════════════════════
function showSelectPanel(star) {
  selectedStarId = star.id;
  const panel = document.getElementById("select-panel");
  const slot = document.getElementById("select-card-slot");
  const actions = document.getElementById("select-actions");
  const info = document.getElementById("select-panel-info");

  panel.classList.add("visible");

  if (star.visibility === "detected") {
    slot.innerHTML = `
      <div class="card-preview common" style="--rarity-color:#384868">
        <div class="card-bg"></div>
        <div class="card-mystery-face">
          <div class="mystery-icon">✦</div>
          <div class="mystery-text">Unknown Star</div>
        </div>
      </div>`;
    actions.innerHTML = `<button class="card-action-btn" onclick="exploreFromPanel()">Explore</button>`;
    info.textContent = "Send a probe to discover this star.";
  } else {
    slot.innerHTML = buildCardHtml(star.card, "☀️");
    // Generate planets to know count (but don't open system view)
    generatePlanets(star);
    const pCount = star.planets ? star.planets.length : 0;
    actions.innerHTML = `<button class="card-action-btn" onclick="openSystemFromPanel()">View System</button>`;
    info.innerHTML = `
      <div>${star.card.rarity.charAt(0).toUpperCase() + star.card.rarity.slice(1)} Star</div>
      <div class="planet-count">
        <span class="count-icon">🪐</span>
        <span class="count-value">${pCount}</span>
        <span>planet${pCount !== 1 ? 's' : ''}</span>
      </div>`;
  }
}

function hideSelectPanel() {
  selectedStarId = null;
  document.getElementById("select-panel").classList.remove("visible");
}

function exploreFromPanel() {
  const star = stars.get(selectedStarId);
  if (!star || star.visibility !== "detected") return;
  star.visibility = "explored";
  detectStarsInRange(star.x, star.y, BASE_SENSOR_RANGE);
  showSelectPanel(star); // refresh panel with explored state
}

function openSystemFromPanel() {
  const star = stars.get(selectedStarId);
  if (!star || star.visibility !== "explored") return;
  hideSelectPanel();
  showSystemOverlay(star);
}

// ═══════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let dragCameraStart = { x: 0, y: 0 };
let dragMoved = false;

function getStarAtScreen(sx, sy) {
  const world = screenToWorld(sx, sy);
  let closest = null;
  let closestDist = Infinity;
  for (const star of stars.values()) {
    if (star.visibility === "unknown") continue;
    const d = distanceBetween(world, star);
    const hitRadius = star.visibility === "explored"
      ? (STAR_VISUALS[star.card.type]?.baseSize || 4) * 2
      : DETECTED_VISUAL.baseSize * 2;
    if (d < hitRadius && d < closestDist) {
      closest = star;
      closestDist = d;
    }
  }
  return closest;
}

const container = document.getElementById("map-container");
const canvasEl = document.getElementById("starmap");
const tooltip = document.getElementById("tooltip");

container.addEventListener("mousedown", (e) => {
  if (e.target.closest("#system-overlay") || e.target.closest("#system-backdrop") || e.target.closest("#select-panel") || e.target.closest("#colony-overlay") || e.target.closest("#colony-backdrop") || e.target.closest("#colonies-list-overlay") || e.target.closest("#colonies-backdrop") || e.target.closest("#card-select-backdrop") || e.target.closest("#research-backdrop")) return;
  isDragging = true;
  dragMoved = false;
  dragStart = { x: e.clientX, y: e.clientY };
  dragCameraStart = { x: camera.x, y: camera.y };
  container.classList.add("dragging");
});

window.addEventListener("mousemove", (e) => {
  if (isDragging) {
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true;
    camera.x = dragCameraStart.x - dx / camera.zoom;
    camera.y = dragCameraStart.y - dy / camera.zoom;
    return;
  }

  // Hover detection
  const rect = canvasEl.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  // Check entities first
  const entIdx = getEntityAtScreen(sx, sy);
  const star = getStarAtScreen(sx, sy);

  if (entIdx !== null) {
    hoveredStarId = null;
    tooltip.textContent = mapEntities[entIdx].label;
    tooltip.style.left = (e.clientX - rect.left + 12) + "px";
    tooltip.style.top = (e.clientY - rect.top - 8) + "px";
    tooltip.style.display = "block";
    canvasEl.style.cursor = "pointer";
  } else if (selectedEntityIdx !== null) {
    // Entity selected — cursor indicates "set destination"
    hoveredStarId = star ? star.id : null;
    if (star) {
      tooltip.textContent = star.visibility === "explored" ? star.card.name : "Unknown Star";
      tooltip.style.left = (e.clientX - rect.left + 12) + "px";
      tooltip.style.top = (e.clientY - rect.top - 8) + "px";
      tooltip.style.display = "block";
    } else {
      tooltip.style.display = "none";
    }
    canvasEl.style.cursor = "crosshair";
  } else if (star) {
    hoveredStarId = star.id;
    const label = star.visibility === "explored" ? star.card.name : "Unknown Star";
    tooltip.textContent = label;
    tooltip.style.left = (e.clientX - rect.left + 12) + "px";
    tooltip.style.top = (e.clientY - rect.top - 8) + "px";
    tooltip.style.display = "block";
    canvasEl.style.cursor = "pointer";
  } else {
    hoveredStarId = null;
    tooltip.style.display = "none";
    canvasEl.style.cursor = isDragging ? "grabbing" : "grab";
  }
});

window.addEventListener("mouseup", (e) => {
  if (isDragging) {
    isDragging = false;
    container.classList.remove("dragging");

    if (!dragMoved && e.button === 0) {
      const rect = canvasEl.getBoundingClientRect();
      const sx = e.clientX - rect.left;
      const sy = e.clientY - rect.top;

      // Check if clicking an entity (probe/fleet)
      const entIdx = getEntityAtScreen(sx, sy);

      if (selectedEntityIdx !== null && entIdx !== selectedEntityIdx) {
        // Entity is selected — click sets destination
        const world = screenToWorld(sx, sy);
        mapEntities[selectedEntityIdx].destX = world.x;
        mapEntities[selectedEntityIdx].destY = world.y;
      } else if (entIdx !== null) {
        // Clicking an entity — select it
        selectedEntityIdx = entIdx;
        hideSelectPanel();
      } else {
        // No entity involved — normal star selection
        selectedEntityIdx = null;
        const star = getStarAtScreen(sx, sy);
        if (star) {
          showSelectPanel(star);
        } else {
          hideSelectPanel();
        }
      }
    }
  }
});

// Suppress context menu on the map entirely
container.addEventListener("contextmenu", (e) => {
  if (e.target.closest("#system-overlay") || e.target.closest("#colony-overlay") || e.target.closest("#colonies-list-overlay")) return;
  e.preventDefault();
  if (selectedEntityIdx !== null) {
    selectedEntityIdx = null;
  }
});

// Double-click to enter system view
canvasEl.addEventListener("dblclick", (e) => {
  const rect = canvasEl.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const star = getStarAtScreen(sx, sy);
  if (star && star.visibility === "explored") {
    hideSelectPanel();
    showSystemOverlay(star);
  }
});

container.addEventListener("wheel", (e) => {
  if (e.target.closest("#system-overlay") || e.target.closest("#select-panel") || e.target.closest("#colony-overlay") || e.target.closest("#colonies-list-overlay") || e.target.closest("#card-select-backdrop") || e.target.closest("#research-backdrop")) return;
  e.preventDefault();
  const zoomFactor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  const newZoom = Math.max(camera.minZoom, Math.min(camera.maxZoom, camera.zoom * zoomFactor));

  // Zoom toward mouse position
  const rect = canvasEl.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const worldBefore = screenToWorld(mx, my);

  camera.zoom = newZoom;

  const worldAfter = screenToWorld(mx, my);
  camera.x -= (worldAfter.x - worldBefore.x);
  camera.y -= (worldAfter.y - worldBefore.y);
}, { passive: false });

document.getElementById("system-backdrop").addEventListener("click", hideSystemOverlay);
