});

// ═══════════════════════════════════════════
//  COLONIZATION & COLONY SCREEN
// ═══════════════════════════════════════════
// ═══════════════════════════════════════════
//  GLOBAL RESOURCES & ECONOMY
// ═══════════════════════════════════════════
const RESOURCE_DEFS = [
  { id: "credits",  name: "Credits",  sprite: "i-credits",  color: "var(--res-credits)",  category: "base" },
  { id: "energy",   name: "Energy",   sprite: "i-energy",   color: "var(--res-energy)",   category: "base" },
  { id: "minerals", name: "Minerals", sprite: "i-minerals", color: "var(--res-minerals)", category: "base" },
  { id: "research", name: "Research", sprite: "i-research", color: "var(--res-research)", category: "base" },
  { id: "food",     name: "Food",     sprite: "i-food",     color: "var(--res-food)",     category: "base" },
];
const RESOURCE_IDS = RESOURCE_DEFS.map(r => r.id);
const resources = {};
// Starting resources: credits/research per Phase-1 tuning, others kept at legacy 5000 baseline.
const STARTING_RESOURCES = { credits: 5000, energy: 5000, minerals: 5000, research: 0, food: 5000 };
for (const r of RESOURCE_DEFS) resources[r.id] = STARTING_RESOURCES[r.id] != null ? STARTING_RESOURCES[r.id] : 0;
// 1x game-time = 1x real-time. Constants below are written in real-seconds.
// Movement and combat have their own secondary multipliers (WORLD_SPEED_MULT,
// COMBAT_TIME_SCALE) so they can be tuned independently of the global base.
const BASE_GAME_SPEED = 1.0;
let gameSpeed = 1;             // player-facing multiplier (1x, 2x, 4x, …)
let lastTickTime = 0;
let tickAccumulator = 0;
// Resource ticks fire once every TICK_PERIOD game-seconds. Building/leader stats
// in templates are denoted "per tick"; with TICK_PERIOD=1 that's per-real-second.
const TICK_PERIOD = 1;

// ── Combat constants ──
const SHOT_INTERVAL = 0.5;       // game-seconds between each shot in a volley
const COMBAT_TIME_SCALE = 1 / 100; // combat runs 100x slower than wall-clock — preserves the pre-real-time-rebase combat tempo
// Map-movement secondary scale: ent.x += dir * (ent.speed * scaledDt * WORLD_SPEED_MULT).
// 0.8 is 4x the previous 0.2; ETAs read from this same constant so they update
// automatically. Combat closing speed lives on a different path (tickCombats
// with COMBAT_TIME_SCALE) so combat tempo is unaffected.
const WORLD_SPEED_MULT = 0.8;
// Particles and weapon-flash visuals tick at scaledDt * VISUAL_DT_FACTOR so
// their on-screen tempo is unchanged across BASE_GAME_SPEED rebases. Any
// formula that converts combat-time to "visual-tick-time" (e.g. VOLLEY in
// spawnWeaponVisual) must include this factor.
const VISUAL_DT_FACTOR = 0.1;
const COMBAT_HP_SCALE = 5;       // multiplier on shields/armor for combat durability
const RANGE_THRESHOLDS = { long: 1000, medium: 650, short: 350 };  // world-unit distance for weapon activation
const ENGAGED_DISTANCE = 200;    // world units — entities stop closing at this distance
const COMBAT_TRIANGLE = {
  energy:  { vsShields: 2.0, vsArmor: 0.5 },
  kinetic: { vsShields: 0.5, vsArmor: 2.0 },
  missile: { vsShields: 1.0, vsArmor: 1.0 },
};
const activeCombats = [];
let nextCombatId = 1;

// ── Card draw scaling ──────────────────────────────────────────────────────
// Cost and interval per draw both scale on two axes:
//   loadC = (cards of category in THIS colony)  / EXPECTED_PER_COLONY[cat]
//   loadE = (cards of category EMPIRE-WIDE)     / EXPECTED_PER_COLONY[cat]
//   multiplier = (1 + loadC)^DRAW_K_C * (1 + loadE)^DRAW_K_E
// Per-colony dominant (a fresh colony resets satC); empire pressure compounds
// with total holdings and is what makes 30-colony empires expensive to grow.
// Replaces the old per-draw 1.5x stacking + 60s decay system.
const BASE_DRAW_COST     = 500;  // credits, brand-new colony first draw
const BASE_DRAW_INTERVAL = 30;   // real-seconds, brand-new colony first draw
const DRAW_K_C = 2.5;            // per-colony exponent
const DRAW_K_E = 1.5;            // empire-wide exponent
const EXPECTED_PER_COLONY = { building: 10, ship: 5, captain: 3, admiral: 3, leader: 1 };

// Population system
const POP_LEVELS = [
  { level: 1,  label: "100K", people: 100000,            foodMaint: 1 },
  { level: 2,  label: "1M",   people: 1000000,           foodMaint: 3 },
  { level: 3,  label: "10M",  people: 10000000,          foodMaint: 6 },
  { level: 4,  label: "100M", people: 100000000,         foodMaint: 10 },
  { level: 5,  label: "500M", people: 500000000,         foodMaint: 15 },
  { level: 6,  label: "1B",   people: 1000000000,        foodMaint: 22 },
  { level: 7,  label: "5B",   people: 5000000000,        foodMaint: 30 },
  { level: 8,  label: "50B",  people: 50000000000,       foodMaint: 42 },
  { level: 9,  label: "200B", people: 200000000000,      foodMaint: 58 },
  { level: 10, label: "1T",   people: 1000000000000,     foodMaint: 80 },
];

function getPopLabel(pop) {
  const entry = POP_LEVELS[Math.min(pop, POP_LEVELS.length) - 1];
  return entry ? entry.label : pop.toString();
}

function getFoodMaintenance(pop) {
  const entry = POP_LEVELS[Math.min(pop, POP_LEVELS.length) - 1];
  return entry ? entry.foodMaint : 0;
}

function getPopGrowthCost(nextLevel) {
  return {
    credits: Math.ceil(200 * Math.pow(3.5, nextLevel - 1)),
    food:    Math.ceil(100 * Math.pow(3.0, nextLevel - 1)),
  };
}

function buyPopulation() {
  const col = getActiveColony();
  if (!col || col.population >= col.maxPopulation) return;
  const cost = getPopGrowthCost(col.population + 1);
  if (!canAfford(cost)) {
    const btn = document.getElementById("buy-pop-btn");
    if (btn) showCostTooltip(btn, cost);
    return;
  }
  deductCost(cost);
  col.population = Math.min(col.population + 1, col.maxPopulation);
  colonyDirty = true;
  refreshColonyScreen();
}

// Research system — category-based with escalating cost and random card reveal
const RESEARCH_BASE_COST = 500;
const RESEARCH_COST_MULTIPLIER = 2.0;
const RESEARCH_SPEND_RATE = 5; // max points consumed per game-second
const researchCounts = { building: 0, ship: 0, admiral: 0, leader: 0 };
const researchedCards = new Set(); // card IDs that have been researched
// Card template IDs the player has ever viewed (full card render). Drives
// the Collection overlay's "Seen" state for cards not currently owned.
const seenCards = new Set();
// Inventory of pirate cards looted from destroyed enemy fleets. Keyed by
// template id, value = count owned. These DO show as Owned in Collection
// but are NOT placed into any colony queue / map entity — they're trophies
// only for v0.1.0; deployable-pirate-ships is a possible future phase.
const pirateLoot = {};
function markCardSeen(card) {
  if (!card) return;
  const id = typeof card === "string" ? card : card.id;
  if (id) seenCards.add(id);
}

// Walk every place a player-owned card lives and tally counts by template
// id. Used by the Collection overlay to show "x N" ownership badges.
function computeOwnedCounts() {
  const counts = {};
  const inc = id => { if (id) counts[id] = (counts[id] || 0) + 1; };
  for (const c of colonies) {
    const col = c.planet.colony;
    if (!col) continue;
    for (const b of col.buildings || []) if (b) inc(b.id);
    for (const l of col.leaders  || []) if (l) inc(l.id);
    for (const q of col.queue    || []) if (q) inc(q.id);
    // Planet templates are "owned" once any planet of that template has a colony.
    if (c.planet && c.planet.card) inc(c.planet.card.id);
  }
  for (const e of mapEntities) {
    if (e.owner !== "player") continue;
    if (e.type === "ship" && e.card) inc(e.card.id);
    if (e.ships) for (const s of e.ships) if (s) inc(s.id);
    if (e.admiral) inc(e.admiral.id);
  }
  // Loot trophies count toward Collection ownership.
  for (const id of Object.keys(pirateLoot)) {
    counts[id] = (counts[id] || 0) + pirateLoot[id];
  }
  return counts;
}
let activeResearch = null;         // { category, cost, progress }

// All 4 card categories require research (stars/planets discovered via exploration)
const RESEARCH_GATED_CATEGORIES = ["building", "ship", "admiral", "leader"];

function getResearchCost(category) {
  const count = researchCounts[category] || 0;
  return Math.ceil(RESEARCH_BASE_COST * Math.pow(RESEARCH_COST_MULTIPLIER, count));
}

function startResearch(category) {
  if (activeResearch) return;
  const cost = getResearchCost(category);
  activeResearch = { category, cost, progress: 0 };
  refreshResearchPanel();
}

function rollResearchResult(category) {
  const pool = getTemplates(category);
  if (!pool) return null;
  const candidates = pool.filter(t => !researchedCards.has(t.id));
  if (candidates.length === 0) return null;
  // Non-starter commons (tag "non-starter") are weighted to roll first;
  // legendaries astronomically rare. Per-card `weight` (from card-builder)
  // multiplies the rarity weight, so individual cards can be tuned up/down
  // within their rarity class.
  const weights = { common:200, uncommon:60, rare:15, epic:3, legendary:0.3 };
  let totalWeight = 0;
  const weighted = candidates.map(t => {
    const rarityW = weights[t.rarity] || 10;
    const cardW = (typeof t.weight === "number") ? Math.max(0, t.weight) : 1;
    const w = rarityW * cardW;
    totalWeight += w;
    return { template: t, weight: w };
  });
  if (totalWeight <= 0) return null;
  let roll = Math.random() * totalWeight;
  for (const entry of weighted) {
    roll -= entry.weight;
    if (roll <= 0) return entry.template;
  }
  return candidates[candidates.length - 1];
}

function initResearch() {
  // Auto-unlock all common cards across all gated categories EXCEPT those
  // tagged "non-starter" (which require research like uncommon+).
  for (const catName of RESEARCH_GATED_CATEGORIES) {
    const templates = getTemplates(catName);
    for (const t of templates) {
      if (t.rarity === "common" && !(t.tags || []).includes("non-starter")) {
        researchedCards.add(t.id);
      }
    }
  }
  // Stars and planets are never gated
  for (const t of getTemplates("star")) researchedCards.add(t.id);
  for (const t of getTemplates("planet")) researchedCards.add(t.id);
}

// Count cards of `category` held at a single colony — placed slots + queue + face-down deck.
function countColonyCards(col, category) {
  if (!col) return 0;
  let n = 0;
  if (category === "building") {
    for (const b of col.buildings || []) if (b) n++;
  } else if (category === "leader") {
    for (const l of col.leaders || []) if (l) n++;
  }
  // Queue and deck hold cards regardless of where they end up (ships/captains
  // never enter a slot, so for those categories queue+deck *is* the colony's
  // holding). Face-down deck cards record their category at gen time.
  for (const q of col.queue || []) if (q && q.category === category) n++;
  for (const d of col.deck  || []) if (d && (d.category || (col.activeAction && ACTION_TO_CATEGORY[col.activeAction])) === category) n++;
  return n;
}

// Empire-wide count of `category` cards: sum across all colonies' holdings,
// plus any player-owned ships currently deployed as map entities.
function countEmpireCards(category) {
  let n = 0;
  for (const c of colonies) n += countColonyCards(c.planet.colony, category);
  if (category === "ship") {
    for (const e of mapEntities) {
      if (e.owner !== "player") continue;
      if (e.type === "ship") n += 1;
      else if (e.ships) n += e.ships.length;
    }
  } else if (category === "admiral") {
    for (const e of mapEntities) {
      if (e.owner === "player" && e.admiral) n += 1;
    }
  }
  return n;
}

function getDrawScaling(col, category) {
  const expected = EXPECTED_PER_COLONY[category] || 5;
  const cC = countColonyCards(col, category);
  const cE = countEmpireCards(category);
  const loadC = cC / expected;
  const loadE = cE / expected;
  const mult  = Math.pow(1 + loadC, DRAW_K_C) * Math.pow(1 + loadE, DRAW_K_E);
  return {
    cost:     Math.ceil(BASE_DRAW_COST * mult),
    interval: BASE_DRAW_INTERVAL * mult,
    cC, cE, mult,
  };
}

// Stack penalty on the gen-tick interval: every face-down card already on
// the pile multiplies the wait for the next one by 5x. Encourages spending
// cards instead of stockpiling. Cost paid at click-time is unaffected — only
// the timer gates pile growth.
const DRAW_STACK_PENALTY = 5;
function getColonyGenInterval(col, category) {
  const base = getDrawScaling(col, category).interval;
  const stack = (col && col.deck) ? col.deck.length : 0;
  return base * Math.pow(DRAW_STACK_PENALTY, stack);
}

// Back-compat shim — current call sites pass no args and assume buildings.
// New scaling needs colony+category, so this resolves them from the active colony.
function getDrawCost() {
  const col = getActiveColony();
  if (!col) return BASE_DRAW_COST;
  // Match the click handler's pricing: when the deck has cards, the charge
  // is keyed off the topmost card's category, not col.activeAction (which
  // can differ if the player switched action buttons after cards were
  // generated). Without this, the displayed cost diverges from what gets
  // deducted on click.
  const cat = (col.deck[0] && col.deck[0].category)
    || (col.activeAction && ACTION_TO_CATEGORY[col.activeAction])
    || "building";
  return getDrawScaling(col, cat).cost;
}

function getTradeIncome(colony, output) {
  if (!colony.activeAction || colony.activeAction !== "trade") return 0;
  let total = 0;
  for (const id of RESOURCE_IDS) {
    if (id === "credits") continue;
    total += Math.max(0, output[id] || 0);
  }
  return total / 4;
}

function getColonyOutput(colony, planet) {
  const raw = {};
  for (const id of RESOURCE_IDS) raw[id] = 0;
  // Only count buildings in unlocked slots (up to population)
  for (let i = 0; i < colony.population; i++) {
    const b = colony.buildings[i];
    if (b && b.stats) {
      for (const id of RESOURCE_IDS) raw[id] += (b.stats[id] || 0);
    }
    if (b && b.upkeep) {
      for (const id of RESOURCE_IDS) raw[id] -= (b.upkeep[id] || 0);
    }
  }
  for (const l of colony.leaders) {
    if (l && l.stats) {
      for (const id of RESOURCE_IDS) raw[id] += (l.stats[id] || 0);
    }
    if (l && l.upkeep) {
      for (const id of RESOURCE_IDS) raw[id] -= (l.upkeep[id] || 0);
    }
  }
  // Planet bonuses: multiplicative on top of building+leader totals (stacks on leader bonuses).
  const bonuses = planet && planet.card && planet.card.bonuses ? planet.card.bonuses : null;
  if (bonuses) {
    for (const id of RESOURCE_IDS) {
      if (bonuses[id]) raw[id] *= (1 + bonuses[id] / 100);
    }
  }
  // Starvation: non-food production at 1/5 while food rate is negative. Food itself stays
  // full so players can recover by building food producers.
  const maintenance = getFoodMaintenance(colony.population);
  const starving = (raw.food - maintenance) < 0;
  const out = {};
  for (const id of RESOURCE_IDS) out[id] = raw[id] * (starving && id !== "food" ? 0.2 : 1);
  out.food -= maintenance;
  return out;
}

function tickEconomy(dt) {
  if (dt === 0) return;
  tickAccumulator += dt;

  // Card generation timers (every colony with activeAction, except Trade)
  for (const c of colonies) {
    const col = c.planet.colony;
    if (!col || !col.activeAction) continue;
    if (col.activeAction === "trade") continue; // Trade generates credits, not cards
    const cat = ACTION_TO_CATEGORY[col.activeAction];
    if (!cat) continue;
    const genInterval = getColonyGenInterval(col, cat);
    col.genTimer += dt;
    if (col.genTimer >= genInterval) {
      col.genTimer -= genInterval;
      {
        col.deck.push({ category: cat, faceDown: true });
        // Keep the deck pile's visual in sync with state the instant a card
        // is generated. Without this the pile lags behind, so players see
        // an "empty" pile but the click handler (which checks deck.length)
        // happily draws, producing the "clicked when nothing to draw" bug.
        if (col === getActiveColony() &&
            document.getElementById("colony-backdrop").classList.contains("visible")) {
          refreshDeckDisplay(col);
        }
      }
    }
  }

  // Resource ticks (one tick every TICK_PERIOD game-seconds; templates state
  // production "per tick" — that's per-real-second at TICK_PERIOD=1, 1x speed).
  while (tickAccumulator >= TICK_PERIOD) {
    tickAccumulator -= TICK_PERIOD;
    for (const c of colonies) {
      const col = c.planet.colony;
      if (!col) continue;
      const out = getColonyOutput(col, c.planet);
      for (const id of RESOURCE_IDS) resources[id] += (out[id] || 0);
      // Trade income
      resources.credits += getTradeIncome(col, out);
      // Population growth is buy-only; starvation only reduces production (see getColonyOutput)
    }

    // Research spending — capped rate per game-second so research takes real time
    if (activeResearch && resources.research > 0) {
      const spend = Math.min(RESEARCH_SPEND_RATE, resources.research, activeResearch.cost - activeResearch.progress);
      if (spend > 0) {
        resources.research -= spend;
        activeResearch.progress += spend;
        if (activeResearch.progress >= activeResearch.cost) {
          // Roll a random card from the researched category — the "card pack opening" moment
          const cat = activeResearch.category;
          const result = rollResearchResult(cat);
          if (result) {
            researchedCards.add(result.id);
            researchCounts[cat] = (researchCounts[cat] || 0) + 1;
            showResearchReveal(result, cat);
          }
          activeResearch = null;
          // Refresh research panel if visible
          if (document.getElementById("research-backdrop").classList.contains("visible")) {
            refreshResearchPanel();
          }
        }
      }
    }
  }

  // Update top bar
  updateResourceDisplay();
}

function updateResourceDisplay() {
  const totalOut = {};
  for (const id of RESOURCE_IDS) totalOut[id] = 0;
  for (const c of colonies) {
    const col = c.planet.colony;
    if (!col) continue;
    const out = getColonyOutput(col, c.planet);
    for (const id of RESOURCE_IDS) totalOut[id] += (out[id] || 0);
    totalOut.credits += getTradeIncome(col, out);
  }
  for (const id of RESOURCE_IDS) {
    const valEl = document.getElementById(`res-${id}`);
    const rateEl = document.getElementById(`rate-${id}`);
    if (valEl) valEl.textContent = formatResourceValue(resources[id]);
    if (rateEl) {
      const rate = totalOut[id];
      const rateStr = rate < 0 ? "-" + formatResourceValue(Math.abs(rate)) : "+" + formatResourceValue(rate);
      rateEl.textContent = `${rateStr}/s`;
      rateEl.style.color = rate < 0 ? "#e05050" : "";
    }
  }
  // Research button: highlight when no research is active (idle or just-completed).
  // When active, a semi-transparent green overlay inside the button fills from
  // left to right in proportion to research progress.
  const researchBtn = document.getElementById("research-btn");
  const pctExact = activeResearch && activeResearch.cost > 0
    ? Math.max(0, Math.min(100, (activeResearch.progress / activeResearch.cost) * 100))
    : 0;
  if (researchBtn) {
    researchBtn.classList.toggle("idle", !activeResearch);
    researchBtn.style.setProperty("--research-progress", pctExact + "%");
  }

  // Live update of the research panel while it's open — touch only the
  // progress bar width and the numeric text so category-list hover state
  // and scroll position aren't disturbed by a full refreshResearchPanel().
  const researchBackdrop = document.getElementById("research-backdrop");
  if (activeResearch && researchBackdrop && researchBackdrop.classList.contains("visible")) {
    const pctInt = Math.floor(pctExact);
    const fill = document.getElementById("research-progress-bar-fill");
    if (fill) fill.style.width = pctInt + "%";
    const num = document.getElementById("research-progress-numeric");
    if (num) num.textContent = `${formatResourceValue(Math.floor(activeResearch.progress))} / ${formatResourceValue(activeResearch.cost)}`;
    const pctEl = document.getElementById("research-progress-pct");
    if (pctEl) pctEl.textContent = `(${pctInt}%)`;
  }
}

function canAfford(cost) {
  if (!cost) return true;
  for (const [k, v] of Object.entries(cost)) {
    if ((resources[k] || 0) < v) return false;
  }
  return true;
}

function deductCost(cost) {
  if (!cost) return;
  for (const [k, v] of Object.entries(cost)) {
    resources[k] = (resources[k] || 0) - v;
  }
  flashResourceCost(cost);
}

function flashResourceCost(cost) {
  for (const k of Object.keys(cost)) {
    const el = document.getElementById(`res-${k}`);
    if (el) {
      el.style.color = "#e05050";
      el.style.transition = "color 0.3s";
      setTimeout(() => { el.style.color = ""; }, 600);
    }
  }
}

function showCostTooltip(anchorEl, cost) {
  const msg = getAffordabilityTooltip(cost);
  if (!msg) return;
  const tip = document.createElement("div");
  tip.textContent = msg;
  tip.style.cssText = "position:absolute;background:#1a0000;color:#e05050;border:1px solid #e05050;padding:6px 12px;border-radius:6px;font-size:12px;z-index:9999;pointer-events:none;white-space:nowrap;";
  const rect = anchorEl.getBoundingClientRect();
  tip.style.left = rect.left + "px";
  tip.style.top = (rect.top - 30) + "px";
  document.body.appendChild(tip);
  setTimeout(() => tip.remove(), 2000);
}

// Plain-text tooltip — returned as a string for `title` attributes, so it can't
// contain SVG. Uses the resource name instead of an icon.
function getAffordabilityTooltip(cost) {
  const missing = [];
  for (const [k, v] of Object.entries(cost)) {
    const have = resources[k] || 0;
    if (have < v) {
      const def = RESOURCE_DEFS.find(r => r.id === k);
      missing.push(`${Math.ceil(v - have)} more ${def ? def.name.toLowerCase() : k}`);
    }
  }
  return missing.length ? "Need " + missing.join(", ") : "";
}

function updateColonyResourceDisplay(out) {
  for (const id of RESOURCE_IDS) {
    const valEl = document.getElementById(`col-${id}`);
    const rateEl = document.getElementById(`col-rate-${id}`);
    const rate = out[id] || 0;
    if (valEl) valEl.textContent = formatResourceValue(Math.abs(rate));
    if (rateEl) {
      const rateStr = rate < 0 ? "-" + formatResourceValue(Math.abs(rate)) : "+" + formatResourceValue(rate);
      rateEl.textContent = `${rateStr}/s`;
      rateEl.style.color = rate < 0 ? "#e05050" : "";
    }
  }
}

function formatResourceValue(val) {
  const v = Math.floor(val);
  // Strip trailing ".0" so round values render as "5K" not "5.0K".
  const strip = (s) => s.replace(/\.0$/, "");
  if (v >= 1e12) return strip((v / 1e12).toFixed(1)) + "T";
  if (v >= 1e9)  return strip((v / 1e9).toFixed(1))  + "B";
  if (v >= 1e6)  return strip((v / 1e6).toFixed(1))  + "M";
  if (v >= 1e4)  return Math.round(v / 1e3) + "K";   // 10K+ drops decimals entirely
  if (v >= 1e3)  return strip((v / 1e3).toFixed(1))  + "K";
  return v.toString();
}

const colonies = []; // array of { starId, planetIdx, planet } references

function getColonizationCost(colonyCount) {
  if (colonyCount === 0) return {}; // first colony is free
  // Phase-1.1 colonization curve. Softer exponent than the legacy 4^n so
  // late-game expansion stays achievable; 2nd colony (n=1) lands as a real
  // gate but not a wall, scaling at 2.2^(n-1) from the base.
  const n = colonyCount;
  const k = Math.pow(2.2, n - 1);
  return {
    credits:  Math.ceil(30000 * k),
    minerals: Math.ceil( 6000 * k),
    food:     Math.ceil( 3000 * k),
  };
}

function colonizePlanet(star, planetIdx) {
  const planet = star.planets[planetIdx];
  if (planet.colony) return; // already colonized
  const cost = getColonizationCost(colonies.length);
  // Re-check the colony-ship gate at function entry so a stale UI button
  // can't bypass it (mirrors the explore gate pattern).
  const colonyFleet = findColonyShipFleet(star);
  if (!colonyFleet) return;
  if (!canAfford(cost)) {
    const btn = document.getElementById("planet-action-btn");
    if (btn) showCostTooltip(btn, cost);
    return;
  }
  if (!consumeColonyShip(colonyFleet)) return;
  if (Object.keys(cost).length > 0) deductCost(cost);
  planet.colony = {
    population: 1,                        // starts at pop 1 (100K people, 1 building slot)
    maxPopulation: 10,
    buildings: new Array(10).fill(null),   // 10 slots max, but only `population` are unlocked
    leaders: [],                          // leader slot (max 1)
    deck: [],                             // face-down cards awaiting selection
    queue: [],                            // face-up selected cards awaiting placement
    activeAction: null,                   // "trade"|"buildings"|"admirals"|"leaders"|"ships"
    genTimer: 0,                          // seconds toward next card
    pendingDraw: null,                    // in-flight 3-choice draw: { category, choices }
  };
  colonies.push({ starId: star.id, planetIdx, planet });
  // Refresh the planet card to show "Manage Colony" instead of "Colonize"
  showPlanetCard(planet);
}

function showPlanetCard(planet) {
  markCardSeen(planet && planet.card);
  const slot = document.getElementById("planet-card-slot");
  slot.innerHTML = buildCardHtml(planet.card);
  // Place button as sibling after the card slot, before the close button
  let existingBtn = document.getElementById("planet-action-btn");
  if (existingBtn) existingBtn.remove();
  const btn = document.createElement("button");
  btn.id = "planet-action-btn";
  btn.className = "card-action-btn";
  if (planet.colony) {
    btn.textContent = "Manage Colony";
    btn.onclick = () => openColonyFromSystem();
  } else {
    const cost = getColonizationCost(colonies.length);
    const costKeys = Object.keys(cost);
    const colonyFleet = systemViewStar ? findColonyShipFleet(systemViewStar) : null;
    if (costKeys.length > 0) {
      const costStr = Object.entries(cost).map(([k,v]) => {
        const iconId = RES_ICON_BY_KEY[k];
        const iconHtml = iconId ? ico(iconId, `sm ${k}`) : "";
        return `${iconHtml}${formatResourceValue(v)}`;
      }).join(" ");
      btn.innerHTML = `<span style="display:inline-flex;align-items:center;gap:4px">Colonize (${costStr})</span>`;
    } else {
      btn.textContent = "Colonize";
    }
    if (!colonyFleet) {
      btn.disabled = true;
      btn.title = "Move a fleet with a Colony Ship into sensor range of this star.";
    } else {
      btn.onclick = () => colonizeFromSystem();
    }
  }
  const container = document.getElementById("system-planet-card");
  container.insertBefore(btn, document.getElementById("planet-card-close"));
  container.classList.add("visible");
}

function colonizeFromSystem() {
  if (!systemViewStar || selectedPlanetIdx == null) return;
  colonizePlanet(systemViewStar, selectedPlanetIdx);
}

function openColonyFromSystem() {
  if (!systemViewStar || selectedPlanetIdx == null) return;
  const planet = systemViewStar.planets[selectedPlanetIdx];
  if (!planet.colony) return;
  showColonyScreen(systemViewStar, selectedPlanetIdx);
}

// ── Colonies List ──
function showColoniesList() {
  const backdrop = document.getElementById("colonies-backdrop");
  const overlay = document.getElementById("colonies-list-overlay");
  const items = document.getElementById("colonies-list-items");

  backdrop.classList.add("visible");
  overlay.classList.add("visible");

  if (colonies.length === 0) {
    items.innerHTML = `<div class="colonies-empty">No colonies yet. Colonize a planet to get started.</div>`;
    return;
  }

  items.innerHTML = colonies.map((c, i) => {
    const rarityColor = RARITY_COLORS[c.planet.card.rarity] || "#6a7a9b";
    return `<div class="colony-list-item" onclick="selectColonyFromList(${i})">
      <div class="colony-list-rarity" style="background:${rarityColor}"></div>
      <div class="colony-list-name">${c.planet.card.name}</div>
      <div class="colony-list-type">${c.planet.card.type}</div>
    </div>`;
  }).join("");
}

function hideColoniesList() {
  document.getElementById("colonies-backdrop").classList.remove("visible");
  document.getElementById("colonies-list-overlay").classList.remove("visible");
}

function selectColonyFromList(idx) {
  const c = colonies[idx];
  if (!c) return;
  hideColoniesList();
  const star = stars.get(c.starId);
  if (!star) return;
  // Close any open overlays first
  hideSystemOverlay();
  showColonyScreen(star, c.planetIdx);
}

document.getElementById("colonies-list-close").addEventListener("click", hideColoniesList);
document.getElementById("colonies-backdrop").addEventListener("click", hideColoniesList);

// ── Fleets List ──
// Mirrors the Colonies list pattern. Includes every player-owned entity
// (both multi-ship fleets and solo ships). Clicking an entry centers the
// camera on the entity and selects it. Cached array is rebuilt on every
// show so it reflects current fleet composition.
let _fleetsListCache = [];

function showFleetsList() {
  const backdrop = document.getElementById("fleets-backdrop");
  const overlay = document.getElementById("fleets-list-overlay");
  const items = document.getElementById("fleets-list-items");

  backdrop.classList.add("visible");
  overlay.classList.add("visible");

  _fleetsListCache = mapEntities.filter(e => e.owner === "player");

  if (_fleetsListCache.length === 0) {
    items.innerHTML = `<div class="colonies-empty">No fleets or ships deployed. Build and deploy ships from a colony.</div>`;
    return;
  }

  items.innerHTML = _fleetsListCache.map((ent, i) => {
    let rarityColor, subtype;
    if (ent.type === "fleet") {
      rarityColor = ent.admiral ? (RARITY_COLORS[ent.admiral.rarity] || "#6a7a9b") : "#6a7a9b";
      const shipCount = ent.ships.length;
      subtype = `Fleet — ${shipCount} ship${shipCount === 1 ? "" : "s"}`;
    } else {
      rarityColor = RARITY_COLORS[ent.card.rarity] || "#4a7ac0";
      subtype = ent.card.type || "Ship";
    }
    const traveling = (ent.destX !== null && ent.destY !== null && ent.speed > 0);
    let etaStr = "";
    if (traveling) {
      const dist = Math.sqrt((ent.destX - ent.x) ** 2 + (ent.destY - ent.y) ** 2);
      etaStr = ` · ${formatETA(entityETARealSec(ent, dist))}`;
    } else if (ent.inCombat) {
      etaStr = " · in combat";
    }
    return `<div class="colony-list-item" onclick="selectFleetFromList(${i})">
      <div class="colony-list-rarity" style="background:${rarityColor}"></div>
      <div class="colony-list-name">${ent.label}</div>
      <div class="colony-list-type">${subtype}${etaStr}</div>
    </div>`;
  }).join("");
}

function hideFleetsList() {
  document.getElementById("fleets-backdrop").classList.remove("visible");
  document.getElementById("fleets-list-overlay").classList.remove("visible");
}

function selectFleetFromList(idx) {
  const ent = _fleetsListCache[idx];
  if (!ent) return;
  hideFleetsList();
  const entIdx = mapEntities.indexOf(ent);
  if (entIdx < 0) return;
  selectedEntityIdx = entIdx;
  camera.x = ent.x;
  camera.y = ent.y;
  showEntityPanel(entIdx);
}

document.getElementById("fleets-list-close").addEventListener("click", hideFleetsList);
document.getElementById("fleets-backdrop").addEventListener("click", hideFleetsList);

// ── Collection Overlay ──
// Renders every card template grouped by category, with each template in
// one of three states: undiscovered (card back), seen (greyed-out preview),
// or owned (full preview + count badge). Owned counts are derived live from
// colonies + map entities; "seen" comes from the persistent seenCards Set.
const COLLECTION_TABS = [
  { id: "ship",     label: "Ships",     icon: "i-fleet" },
  { id: "building", label: "Buildings", icon: "i-building" },
  { id: "leader",   label: "Leaders",   icon: "i-leader" },
  { id: "admiral",  label: "Admirals",  icon: "i-command" },
  { id: "planet",   label: "Planets",   icon: "i-planet-verdant" },
  { id: "star",     label: "Stars",     icon: "i-spark" },
  { id: "pirate",   label: "Pirates",   icon: "i-swords" },
];
let _activeCollectionTab = "ship";

function showCollection() {
  document.getElementById("collection-backdrop").classList.add("visible");
  document.getElementById("collection-overlay").classList.add("visible");
  renderCollection();
}
function hideCollection() {
  document.getElementById("collection-backdrop").classList.remove("visible");
  document.getElementById("collection-overlay").classList.remove("visible");
}

function renderCollection() {
  const tabsEl = document.getElementById("collection-tabs");
  const gridEl = document.getElementById("collection-grid");
  const summaryEl = document.getElementById("collection-summary");
  const owned = computeOwnedCounts();

  // Build tab strip with per-category seen/total counts.
  tabsEl.innerHTML = COLLECTION_TABS.map(t => {
    const tpls = getTemplates(t.id) || [];
    const total = tpls.length;
    const known = tpls.reduce((n, tpl) => n + ((seenCards.has(tpl.id) || owned[tpl.id]) ? 1 : 0), 0);
    const cls = t.id === _activeCollectionTab ? "col-tab active" : "col-tab";
    return `<button class="${cls}" onclick="setCollectionTab('${t.id}')">`
         + `<svg class="ico sm"><use href="#${t.icon}"/></svg>`
         + `<span>${t.label}</span>`
         + `<span class="col-tab-count">${known}/${total}</span>`
         + `</button>`;
  }).join("");

  const tpls = getTemplates(_activeCollectionTab) || [];
  // Sort by rarity (legendary->common), then name, so the strongest of each
  // category sit at the top of the page.
  const RARITY_ORDER = { legendary: 0, epic: 1, rare: 2, uncommon: 3, common: 4 };
  const sorted = tpls.slice().sort((a, b) => {
    const dr = (RARITY_ORDER[a.rarity] ?? 5) - (RARITY_ORDER[b.rarity] ?? 5);
    if (dr !== 0) return dr;
    return (a.name || "").localeCompare(b.name || "");
  });

  // Stars never get an "owned" state — colonies don't grant ownership of
  // a star template, only stars whose card has been viewed are "seen".
  const allowOwned = _activeCollectionTab !== "star";

  let seenN = 0, ownedN = 0, undiscN = 0;
  gridEl.innerHTML = sorted.map(tpl => {
    const count = allowOwned ? (owned[tpl.id] || 0) : 0;
    const isOwned = count > 0;
    const isSeen = !isOwned && seenCards.has(tpl.id);
    if (isOwned) ownedN++;
    else if (isSeen) seenN++;
    else undiscN++;
    if (isOwned || isSeen) {
      const stateClass = isOwned ? "owned" : "seen";
      const badge = isOwned ? `<div class="col-owned-badge">x${count}</div>` : "";
      const label = isOwned ? "" : `<div class="col-state-label">Seen</div>`;
      return `<div class="col-card-cell ${stateClass}" data-card-id="${tpl.id}">${badge}${buildCardHtml(tpl)}${label}</div>`;
    }
    // Undiscovered — card back placeholder, no data-card-id (not clickable)
    return `<div class="col-card-cell undiscovered">`
         + `<div class="card-back"><div class="qmark">?</div><div>Undiscovered</div></div>`
         + `</div>`;
  }).join("");

  summaryEl.textContent = `${ownedN} owned · ${seenN} seen · ${undiscN} undiscovered`;
}

function setCollectionTab(tabId) {
  _activeCollectionTab = tabId;
  renderCollection();
}

// Open the magnified-card popup. Used by the Collection grid AND the
// right-side select panel (star/fleet card + per-ship cards). The popup
// renders the card at a fixed 2.1x natural scale so the zoom size is
// consistent regardless of the source's rendered scale. `cardOrId` may be
// a card object or a template id; `opts.seen` greys the card to mirror
// the Collection grid's "seen" state.
function showCardZoom(cardOrId, opts) {
  const card = (typeof cardOrId === "string") ? getCardById(cardOrId) : cardOrId;
  if (!card) return;
  const cardEl = document.getElementById("card-zoom-card");
  cardEl.className = (opts && opts.seen) ? "seen" : "";
  cardEl.innerHTML = buildCardHtml(card);
  document.getElementById("card-zoom-backdrop").classList.add("visible");
}
function hideCardZoom() {
  document.getElementById("card-zoom-backdrop").classList.remove("visible");
  document.getElementById("card-zoom-card").innerHTML = "";
}

document.getElementById("collection-grid").addEventListener("click", (e) => {
  const cell = e.target.closest(".col-card-cell");
  if (!cell || cell.classList.contains("undiscovered")) return;
  const id = cell.getAttribute("data-card-id");
  if (!id) return;
  showCardZoom(id, { seen: cell.classList.contains("seen") });
});
document.getElementById("card-zoom-backdrop").addEventListener("click", () => {
  // Click anywhere on the backdrop dismisses; clicks on the card itself
  // bubble up here too (no inner handler) so the whole region closes.
  hideCardZoom();
});

// Right-side select panel — clicking the primary card slot or any
// per-ship card in a fleet's roster opens the same magnified popup.
// Delegated so it survives showEntityPanel rebuilding the inner HTML.
document.getElementById("select-panel").addEventListener("click", (e) => {
  const target = e.target.closest("[data-card-id]");
  if (!target) return;
  if (!target.matches("#select-card-slot, .fleet-ship-card")) return;
  // Don't swallow clicks on action buttons that happen to live in the panel.
  if (e.target.closest("button")) return;
  showCardZoom(target.getAttribute("data-card-id"));
});

document.getElementById("collection-backdrop").addEventListener("click", hideCollection);

// ── Colony Screen ──
let colonyViewStar = null;
let colonyViewPlanetIdx = null;
let activeColonyTab = "buildings"; // "buildings" | "fleet"
let draggedCard = null; // { source:"queue"|"building"|"leader"|"fleet-ship"|"fleet-admiral", index, card }

// ── Fleet assembly state ──
let deployStance = "aggressive";
let deployAdmiral = null;   // admiral card or null
let deployShips = [];       // array of ship cards staged for deployment

function switchColonyTab(tab) {
  activeColonyTab = tab;
  document.querySelectorAll(".colony-tab").forEach(t => t.classList.toggle("active", t.dataset.tab === tab));
  document.getElementById("tab-buildings").classList.toggle("active", tab === "buildings");
  document.getElementById("tab-buildings").style.display = tab === "buildings" ? "" : "none";
  document.getElementById("tab-fleet").classList.toggle("active", tab === "fleet");
  document.getElementById("tab-fleet").style.display = tab === "fleet" ? "" : "none";
  refreshColonyScreen();
}

// Wire up tab clicks
document.querySelectorAll(".colony-tab").forEach(t => {
  t.addEventListener("click", () => switchColonyTab(t.dataset.tab));
});
let colonyDirty = false; // set true when colony state changes, cleared after refresh
let lastDeckCount = -1; // track deck size changes for minimal refresh

function getActiveColony() {
  if (!colonyViewStar || colonyViewPlanetIdx == null) return null;
  return colonyViewStar.planets[colonyViewPlanetIdx].colony;
}

function returnDeployCardsToQueue() {
  const col = getActiveColony();
  if (!col) return;
  if (deployAdmiral) { col.queue.push(deployAdmiral); deployAdmiral = null; }
  while (deployShips.length > 0) col.queue.push(deployShips.pop());
}

function showColonyScreen(star, planetIdx) {
  const planet = star.planets[planetIdx];
  if (!planet.colony) return;
  colonyViewStar = star;
  colonyViewPlanetIdx = planetIdx;
  // Reset deploy state for this colony
  returnDeployCardsToQueue();
  deployStance = "aggressive";
  activeColonyTab = "buildings";
  document.querySelectorAll(".colony-tab").forEach(t => t.classList.toggle("active", t.dataset.tab === "buildings"));
  document.getElementById("tab-buildings").style.display = "";
  document.getElementById("tab-buildings").classList.add("active");
  document.getElementById("tab-fleet").style.display = "none";
  document.getElementById("tab-fleet").classList.remove("active");

  // Set active action button state
  document.querySelectorAll(".colony-action-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.action === planet.colony.activeAction);
  });

  lastDeckCount = -1; // force refresh
  // Hide system view cards behind colony screen
  document.getElementById("system-star-card").style.display = "none";
  document.getElementById("system-planet-card").style.display = "none";

  const backdrop = document.getElementById("colony-backdrop");
  const overlay = document.getElementById("colony-overlay");
  // Stretch the planet card art across the overlay background, dimmed so
  // foreground UI stays legible. Falls back to the default solid bg if the
  // planet card has no image attached.
  if (planet.card && planet.card.image) {
    overlay.style.backgroundImage =
      `linear-gradient(rgba(5,5,8,0.78), rgba(5,5,8,0.78)), url("${planet.card.image}")`;
    overlay.style.backgroundSize = "cover";
    overlay.style.backgroundPosition = "center";
  } else {
    overlay.style.backgroundImage = "";
  }
  backdrop.classList.add("visible");
  overlay.style.display = "flex";
  requestAnimationFrame(() => overlay.classList.add("visible", "fade-in"));

  refreshColonyScreen();
}

function hideColonyScreen() {
  dismissMagnifiedCard();
  returnDeployCardsToQueue();
  colonyViewStar = null;
  colonyViewPlanetIdx = null;
  const overlay = document.getElementById("colony-overlay");
  const backdrop = document.getElementById("colony-backdrop");
  overlay.classList.remove("visible", "fade-in");
  backdrop.classList.remove("visible");
  setTimeout(() => {
    overlay.style.display = "none";
    overlay.style.backgroundImage = "";
  }, 300);
  // Restore system view cards
  document.getElementById("system-star-card").style.display = "";
  document.getElementById("system-planet-card").style.display = "";
}

// Update the progress fill + ETA on the active colony action button each frame.
function updateActionButtonProgress(col) {
  const btns = document.querySelectorAll(".colony-action-btn");
  for (const btn of btns) {
    const action = btn.dataset.action;
    const fill = btn.querySelector(".action-progress");
    const eta = btn.querySelector(".action-eta");
    if (!fill || !eta) continue; // trade/terraform have no progress elements
    if (col.activeAction === action && ACTION_TO_CATEGORY[action]) {
      const cat = ACTION_TO_CATEGORY[action];
      const genInterval = getColonyGenInterval(col, cat);
      const pct = genInterval > 0 ? Math.min(100, (col.genTimer / genInterval) * 100) : 0;
      fill.style.width = pct + "%";
      const gameSecLeft = Math.max(0, genInterval - col.genTimer);
      const realRate = BASE_GAME_SPEED * gameSpeed;
      if (realRate > 0) {
        eta.textContent = formatETA(gameSecLeft / realRate);
      } else {
        eta.innerHTML = `<svg class="ico sm"><use href="#i-pause"/></svg>`;
      }
    } else {
      fill.style.width = "0%";
      eta.textContent = "";
    }
  }
}

function refreshDeckDisplay(col) {
  const deckEl = document.getElementById("colony-deck");
  if (!deckEl) return;
  if (col.deck.length === 0) {
    deckEl.innerHTML = `<div class="deck-empty">${col.activeAction ? "Generating..." : "Select an action"}</div>`;
  } else {
    const maxShow = Math.min(col.deck.length, 5);
    let html = `<div class="deck-pile">`;
    for (let i = 0; i < maxShow; i++) {
      html += `<div class="deck-card-back" style="top:${i * 2}px;left:${i}px"><div class="deck-logo">Idle<br><span>Space</span></div></div>`;
    }
    html += `<div class="deck-count">${col.deck.length}</div>`;
    html += `<div class="deck-draw-cost">${ico("i-credits", "sm credits")} ${getDrawCost()}</div></div>`;
    deckEl.innerHTML = html;
  }
}

function refreshColonyScreen() {
  const col = getActiveColony();
  if (!col) return;
  const planet = colonyViewStar.planets[colonyViewPlanetIdx];

  document.getElementById("colony-name").textContent = planet.card.name;
  // Population display + buy-to-grow button (no passive growth)
  const popLabel = getPopLabel(col.population);
  let popHtml = `${ico("i-pop", "sm")} <span>${popLabel} (${col.population}/${col.maxPopulation})</span>`;
  if (col.population < col.maxPopulation) {
    const growCost = getPopGrowthCost(col.population + 1);
    const affordable = canAfford(growCost);
    popHtml += ` <button id="buy-pop-btn" onclick="buyPopulation()" style="margin-left:8px;padding:2px 8px;font-size:10px;border-radius:4px;cursor:pointer;border:1px solid ${affordable ? '#4a9b5a' : '#3a3a5a'};background:${affordable ? 'rgba(74,155,90,0.2)' : 'rgba(30,30,50,0.5)'};color:${affordable ? '#4a9b5a' : '#3a3a5a'};display:inline-flex;align-items:center;gap:3px">+ Grow (${ico("i-credits", "sm credits")}${growCost.credits} ${ico("i-food", "sm food")}${growCost.food})</button>`;
  }
  const out2 = getColonyOutput(col, planet);
  if (out2.food < 0) {
    popHtml += ` <span style="color:#e05050;display:inline-flex;align-items:center;gap:3px">${ico("i-warning", "sm")}<span>Starving — production at 1/5</span></span>`;
  }
  document.getElementById("colony-pop").innerHTML = popHtml;

  // Colony resource output
  const out = getColonyOutput(col, planet);
  updateColonyResourceDisplay(out);

  // ── Building slots ──
  const slotsEl = document.getElementById("building-slots");
  slotsEl.innerHTML = "";
  for (let i = 0; i < col.buildings.length; i++) {
    const slot = document.createElement("div");
    const isLocked = i >= col.population;
    const card = col.buildings[i];
    if (isLocked) {
      slot.className = "building-slot locked";
      slot.innerHTML = `<svg class="ico lg" style="color:#3a3a5a"><use href="#i-lock"/></svg><span style="color:#3a3a5a;font-size:9px">Pop ${i+1}</span>`;
      slot.style.opacity = "0.4";
      slot.style.cursor = "not-allowed";
    } else if (card) {
      slot.className = "building-slot occupied";
      slot.innerHTML = buildCardHtml(card);
      slot.draggable = true;
      slot.addEventListener("dragstart", (e) => {
        draggedCard = { source: "building", index: i, card };
        e.dataTransfer.effectAllowed = "move";
        slot.classList.add("dragging");
      });
      slot.addEventListener("dragend", () => { slot.classList.remove("dragging"); draggedCard = null; });
      // Click to magnify with return-to-queue option
      slot.addEventListener("click", (e) => {
        e.stopPropagation();
        showSlotMagnifiedCard(card, "building", i, slot);
      });
    } else {
      slot.className = "building-slot";
      slot.textContent = "+";
    }
    // Drop target
    slot.addEventListener("dragover", (e) => {
      if (!draggedCard || isLocked) return;
      if (draggedCard.card.category === "building" && !col.buildings[i]) {
        e.preventDefault();
        slot.classList.add("drag-over");
      }
    });
    slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"));
    slot.addEventListener("drop", (e) => {
      e.preventDefault();
      slot.classList.remove("drag-over");
      if (!draggedCard || draggedCard.card.category !== "building" || col.buildings[i]) return;
      // Cost check (only when placing from queue, not rearranging from another slot)
      if (draggedCard.source === "queue" && draggedCard.card.cost) {
        if (!canAfford(draggedCard.card.cost)) {
          showCostTooltip(slot, draggedCard.card.cost);
          return;
        }
        deductCost(draggedCard.card.cost);
      }
      // Place card
      if (draggedCard.source === "queue") {
        col.queue.splice(draggedCard.index, 1);
      } else if (draggedCard.source === "building") {
        col.buildings[draggedCard.index] = null;
      }
      col.buildings[i] = draggedCard.card;
      draggedCard = null;
      refreshColonyScreen();
    });
    slotsEl.appendChild(slot);
  }

  // ── Leader slot (replace element to avoid listener accumulation) ──
  const oldLeader = document.getElementById("leader-slot");
  const leaderEl = oldLeader.cloneNode(false);
  leaderEl.id = "leader-slot";
  oldLeader.parentNode.replaceChild(leaderEl, oldLeader);

  const currentLeader = col.leaders[0] || null;
  if (currentLeader) {
    leaderEl.className = "occupied";
    leaderEl.innerHTML = buildCardHtml(currentLeader);
    leaderEl.draggable = true;
    leaderEl.addEventListener("dragstart", (e) => {
      draggedCard = { source: "leader", index: 0, card: currentLeader };
      e.dataTransfer.effectAllowed = "move";
    });
    leaderEl.addEventListener("click", (e) => {
      e.stopPropagation();
      showSlotMagnifiedCard(currentLeader, "leader", 0, leaderEl);
    });
  } else {
    leaderEl.className = "";
    leaderEl.innerHTML = "No Leader";
    leaderEl.draggable = false;
  }
  // Leader drop target
  leaderEl.addEventListener("dragover", (e) => {
    if (!draggedCard || draggedCard.card.category !== "leader" || col.leaders.length > 0) return;
    e.preventDefault();
    leaderEl.classList.add("drag-over");
  });
  leaderEl.addEventListener("dragleave", () => leaderEl.classList.remove("drag-over"));
  leaderEl.addEventListener("drop", (e) => {
    e.preventDefault();
    leaderEl.classList.remove("drag-over");
    if (!draggedCard || draggedCard.card.category !== "leader" || col.leaders.length > 0) return;
    // Cost check (only from queue)
    if (draggedCard.source === "queue" && draggedCard.card.cost) {
      if (!canAfford(draggedCard.card.cost)) {
        showCostTooltip(leaderEl, draggedCard.card.cost);
        return;
      }
      deductCost(draggedCard.card.cost);
    }
    if (draggedCard.source === "queue") col.queue.splice(draggedCard.index, 1);
    col.leaders.push(draggedCard.card);
    draggedCard = null;
    refreshColonyScreen();
  });

  // ── Deck pile ──
  refreshDeckDisplay(col);

  // ── Queue (replace element to avoid listener accumulation) ──
  const oldQueue = document.getElementById("colony-queue");
  const queueEl = document.createElement("div");
  queueEl.id = "colony-queue";
  oldQueue.parentNode.replaceChild(queueEl, oldQueue);

  col.queue.forEach((card, qi) => {
    const wrap = document.createElement("div");
    wrap.className = "queue-card";
    wrap.innerHTML = buildCardHtml(card);
    wrap.draggable = true;
    wrap.addEventListener("dragstart", (e) => {
      dismissMagnifiedCard();
      draggedCard = { source: "queue", index: qi, card };
      e.dataTransfer.effectAllowed = "move";
      wrap.classList.add("dragging");
    });
    wrap.addEventListener("dragend", () => { wrap.classList.remove("dragging"); draggedCard = null; });
    wrap.addEventListener("click", (e) => {
      e.stopPropagation();
      showMagnifiedCard(card, qi, wrap);
    });
    queueEl.appendChild(wrap);
  });

  // Queue as drop target (return cards here)
  queueEl.addEventListener("dragover", (e) => {
    if (!draggedCard) return;
    if (["building", "leader", "fleet-ship"].includes(draggedCard.source)) {
      e.preventDefault();
      queueEl.classList.add("drag-over");
    }
  });
  queueEl.addEventListener("dragleave", () => queueEl.classList.remove("drag-over"));
  queueEl.addEventListener("drop", (e) => {
    e.preventDefault();
    queueEl.classList.remove("drag-over");
    if (!draggedCard) return;
    if (draggedCard.source === "building") {
      col.queue.push(draggedCard.card);
      col.buildings[draggedCard.index] = null;
    } else if (draggedCard.source === "leader") {
      col.queue.push(draggedCard.card);
      col.leaders.splice(draggedCard.index, 1);
    } else if (draggedCard.source === "fleet-ship") {
      col.queue.push(draggedCard.card);
      deployShips.splice(draggedCard.index, 1);
    }
    draggedCard = null;
    refreshColonyScreen();
  });

  // ── Fleet tab ──
  if (activeColonyTab === "fleet") refreshFleetTab(col);

  // Scale cards to fill their slots after layout
  requestAnimationFrame(() => {
    document.querySelectorAll(".building-slot.occupied .card-preview").forEach(cp => {
      const slot = cp.closest(".building-slot");
      if (!slot) return;
      const s = Math.min(slot.clientWidth / 220, slot.clientHeight / 320);
      cp.style.transform = `translateX(-50%) scale(${s})`;
    });
    const leaderCP = document.querySelector("#leader-slot.occupied .card-preview");
    if (leaderCP) {
      const ls = document.getElementById("leader-slot");
      const s = Math.min(ls.clientWidth / 220, ls.clientHeight / 320);
      leaderCP.style.transform = `scale(${s})`;
    }
  });
}

function refreshFleetTab(col) {
  const maxShips = getMaxFleetShips(deployAdmiral);
  const slotsEl = document.getElementById("fleet-ship-slots");
  slotsEl.innerHTML = "";

  // ── Slot 0: Admiral slot (first in grid) ──
  const admSlot = document.createElement("div");
  if (deployAdmiral) {
    admSlot.className = "fleet-ship-slot admiral-slot occupied";
    admSlot.innerHTML = buildCardHtml(deployAdmiral);
    admSlot.addEventListener("click", (e) => {
      e.stopPropagation();
      col.queue.push(deployAdmiral);
      deployAdmiral = null;
      const max = getMaxFleetShips(null);
      while (deployShips.length > max) col.queue.push(deployShips.pop());
      refreshColonyScreen();
    });
  } else {
    admSlot.className = "fleet-ship-slot admiral-slot";
    admSlot.innerHTML = `<div class="admiral-placeholder"><svg class="ico lg"><use href="#i-admiral"/></svg>Admiral<br>(optional)</div>`;
  }
  admSlot.addEventListener("dragover", (e) => {
    if (!draggedCard || draggedCard.card.category !== "admiral") return;
    e.preventDefault();
    admSlot.classList.add("drag-over");
  });
  admSlot.addEventListener("dragleave", () => admSlot.classList.remove("drag-over"));
  admSlot.addEventListener("drop", (e) => {
    e.preventDefault();
    admSlot.classList.remove("drag-over");
    if (!draggedCard || draggedCard.card.category !== "admiral") return;
    if (deployAdmiral) col.queue.push(deployAdmiral);
    deployAdmiral = draggedCard.card;
    if (draggedCard.source === "queue") col.queue.splice(draggedCard.index, 1);
    const max = getMaxFleetShips(deployAdmiral);
    while (deployShips.length > max) col.queue.push(deployShips.pop());
    draggedCard = null;
    refreshColonyScreen();
  });
  slotsEl.appendChild(admSlot);

  // ── Ship slots ──
  for (let i = 0; i < maxShips; i++) {
    const card = deployShips[i] || null;
    const slot = document.createElement("div");
    if (card) {
      slot.className = "fleet-ship-slot occupied";
      slot.innerHTML = buildCardHtml(card);
      slot.draggable = true;
      slot.addEventListener("dragstart", (e) => {
        draggedCard = { source: "fleet-ship", index: i, card };
        e.dataTransfer.effectAllowed = "move";
        slot.classList.add("dragging");
      });
      slot.addEventListener("dragend", () => { slot.classList.remove("dragging"); draggedCard = null; });
      slot.addEventListener("click", (e) => {
        e.stopPropagation();
        col.queue.push(deployShips.splice(i, 1)[0]);
        refreshColonyScreen();
      });
    } else {
      slot.className = "fleet-ship-slot";
      slot.textContent = "+";
    }
    // Drop target for ships
    slot.addEventListener("dragover", (e) => {
      if (!draggedCard || draggedCard.card.category !== "ship") return;
      if (card) return;
      e.preventDefault();
      slot.classList.add("drag-over");
    });
    slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"));
    slot.addEventListener("drop", (e) => {
      e.preventDefault();
      slot.classList.remove("drag-over");
      if (!draggedCard || draggedCard.card.category !== "ship") return;
      if (deployShips.length >= maxShips) return;
      deployShips.push(draggedCard.card);
      if (draggedCard.source === "queue") col.queue.splice(draggedCard.index, 1);
      else if (draggedCard.source === "fleet-ship") deployShips.splice(draggedCard.index, 1);
      draggedCard = null;
      refreshColonyScreen();
    });
    slotsEl.appendChild(slot);
  }

  // ── Controls: stance, cost, deploy buttons ──
  // Stance toggle
  const stanceToggle = document.getElementById("fleet-stance-toggle");
  const newToggle = stanceToggle.cloneNode(true);
  stanceToggle.parentNode.replaceChild(newToggle, stanceToggle);
  newToggle.querySelector("#fleet-stance-label").textContent = deployStance === "aggressive" ? "Aggressive" : "Evasive";
  newToggle.className = deployStance === "evasive" ? "evasive" : "";
  newToggle.id = "fleet-stance-toggle";
  newToggle.addEventListener("click", () => {
    deployStance = deployStance === "aggressive" ? "evasive" : "aggressive";
    refreshFleetTab(col);
  });

  // Cost info
  const infoEl = document.getElementById("fleet-info");
  const allCards = [...deployShips];
  if (deployAdmiral) allCards.push(deployAdmiral);
  if (allCards.length > 0) {
    const totalCost = {};
    for (const c of allCards) {
      if (c.cost) for (const [k,v] of Object.entries(c.cost)) totalCost[k] = (totalCost[k]||0) + v;
    }
    const costStr = Object.entries(totalCost).map(([k,v]) => {
      const iconId = RES_ICON_BY_KEY[k];
      const iconHtml = iconId ? ico(iconId, `sm ${k}`) : "";
      return `${iconHtml}${v}`;
    }).join(" ");
    infoEl.innerHTML = `<span style="display:inline-flex;align-items:center;gap:4px">Cost: ${costStr}</span>`;
  } else {
    infoEl.textContent = "Drag ships from queue";
  }

  // Deploy fleet button
  const deployBtn = document.getElementById("deploy-btn");
  const newDeployBtn = deployBtn.cloneNode(true);
  deployBtn.parentNode.replaceChild(newDeployBtn, deployBtn);
  const canFleet = deployShips.length >= 2 || (deployShips.length >= 1 && deployAdmiral);
  newDeployBtn.disabled = !canFleet;
  newDeployBtn.addEventListener("click", () => {
    if (deployShips.length === 0) return;
    const allDeploy = [...deployShips];
    if (deployAdmiral) allDeploy.push(deployAdmiral);
    const totalCost = {};
    for (const c of allDeploy) {
      if (c.cost) for (const [k,v] of Object.entries(c.cost)) totalCost[k] = (totalCost[k]||0) + v;
    }
    if (!canAfford(totalCost)) { showCostTooltip(newDeployBtn, totalCost); return; }
    deductCost(totalCost);
    const star = colonyViewStar;
    const deployAngle = Math.random() * Math.PI * 2;
    createFleet(deployAdmiral, [...deployShips], star.x + Math.cos(deployAngle) * 40, star.y + Math.sin(deployAngle) * 40);
    mapEntities[mapEntities.length - 1].stance = deployStance;
    deployAdmiral = null;
    deployShips = [];
    refreshColonyScreen();
  });

  // Deploy solo button
  const soloBtn = document.getElementById("deploy-solo-btn");
  const newSoloBtn = soloBtn.cloneNode(true);
  soloBtn.parentNode.replaceChild(newSoloBtn, soloBtn);
  newSoloBtn.disabled = !(deployShips.length === 1 && !deployAdmiral);
  newSoloBtn.addEventListener("click", () => {
    if (deployShips.length !== 1 || deployAdmiral) return;
    const shipCard = deployShips[0];
    if (shipCard.cost && !canAfford(shipCard.cost)) { showCostTooltip(newSoloBtn, shipCard.cost); return; }
    if (shipCard.cost) deductCost(shipCard.cost);
    const star = colonyViewStar;
    const soloAngle = Math.random() * Math.PI * 2;
    createSoloShip(shipCard, star.x + Math.cos(soloAngle) * 40, star.y + Math.sin(soloAngle) * 40);
    mapEntities[mapEntities.length - 1].stance = deployStance;
    deployShips = [];
    refreshColonyScreen();
  });

  // Scale ship cards to fit slots (same pattern as buildings)
  requestAnimationFrame(() => {
    document.querySelectorAll(".fleet-ship-slot.occupied .card-preview").forEach(cp => {
      const slot = cp.closest(".fleet-ship-slot");
      if (!slot) return;
      const s = Math.min(slot.clientWidth / 220, slot.clientHeight / 320);
      cp.style.transform = `scale(${s})`;
    });
  });
}

// ── Deck click → Card Selection ──
// Once a draw has been started (cost charged, 3 choices rolled), the draw
// is committed to col.pendingDraw. Dismissing the modal (backdrop click)
// leaves pendingDraw intact, so reopening the deck shows the SAME choices
// without re-rolling or re-charging. Picking a card or Discard All resolves
// and clears pendingDraw.
function openCardSelectModal(col) {
  const { choices } = col.pendingDraw;
  // All three options are revealed to the player — count them seen even
  // if the player picks one and discards the others.
  for (const c of choices) markCardSeen(c);
  const optionsEl = document.getElementById("card-select-options");
  optionsEl.innerHTML = "";
  choices.forEach((card) => {
    const wrap = document.createElement("div");
    wrap.className = "card-select-option";
    wrap.innerHTML = buildCardHtml(card);
    wrap.addEventListener("click", () => {
      col.deck.shift();
      col.queue.push(card);
      col.pendingDraw = null;
      hideCardSelect();
      refreshColonyScreen();
    });
    optionsEl.appendChild(wrap);
  });
  document.getElementById("card-select-backdrop").classList.add("visible");
}

document.getElementById("colony-deck").addEventListener("click", () => {
  const col = getActiveColony();
  if (!col) return;

  // Resume an in-flight draw (no new charge, same three choices).
  if (col.pendingDraw) {
    openCardSelectModal(col);
    return;
  }

  if (col.deck.length === 0) return;

  // Check draw cost — priced from current empire/colony holdings of this card's category
  const cat = col.deck[0].category;
  const drawCost = getDrawScaling(col, cat).cost;
  if (resources.credits < drawCost) {
    const deckEl = document.getElementById("colony-deck");
    showCostTooltip(deckEl, { credits: drawCost });
    return;
  }
  resources.credits -= drawCost;
  flashResourceCost({ credits: drawCost });
  col.pendingDraw = {
    category: cat,
    choices: [rollCardFromCategory(cat), rollCardFromCategory(cat), rollCardFromCategory(cat)],
  };
  openCardSelectModal(col);
});

function hideCardSelect() {
  document.getElementById("card-select-backdrop").classList.remove("visible");
}
document.getElementById("card-select-discard-all").addEventListener("click", () => {
  const col = getActiveColony();
  if (col) {
    if (col.deck.length > 0) col.deck.shift(); // remove the face-down card being drawn
    col.pendingDraw = null;
  }
  hideCardSelect();
  refreshColonyScreen();
});
document.getElementById("card-select-backdrop").addEventListener("click", (e) => {
  // Dismissing via backdrop click closes the modal but PRESERVES pendingDraw,
  // so the next deck click reopens the same three choices rather than re-rolling.
  if (e.target === document.getElementById("card-select-backdrop")) hideCardSelect();
});

// Double-click planet in system view to open colony screen
systemCanvas.addEventListener("dblclick", (e) => {
  if (!systemViewStar || !systemViewStar.planets) return;
  const m = pointerToCanvas(systemCanvas, e.clientX, e.clientY);
  const mx = m.x;
  const my = m.y;
  const cx = systemCanvas.width / 2;
  const cy = systemCanvas.height / 2;
  const time = animTime;

  for (let i = 0; i < systemViewStar.planets.length; i++) {
    const planet = systemViewStar.planets[i];
    const pos = getPlanetScreenPos(planet, cx, cy, time);
    const r = getPlanetScreenRadius(planet);
    const dx = mx - pos.x;
    const dy = my - pos.y;
    if (dx * dx + dy * dy < (r + 6) * (r + 6)) {
      if (planet.colony) {
        showColonyScreen(systemViewStar, i);
      }
      return;
    }
  }
});

// ═══════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════
function gameLoop(timestamp) {
  const now = timestamp / 1000;
  const dt = lastTickTime > 0 ? Math.min(now - lastTickTime, 0.1) : 0;
  lastTickTime = now;
  animTime = now;
  const scaledDt = dt * BASE_GAME_SPEED * gameSpeed;
  tickEconomy(scaledDt);
  tickEntities(scaledDt);
  tickCombats(scaledDt);
  // Combat particles and weapon-flash visuals were tuned for the pre-rebase
  // 0.1x base; keep them at that effective tempo so flashes/trails read the
  // same regardless of the BASE_GAME_SPEED switch to 1.0.
  const visualDt = scaledDt * VISUAL_DT_FACTOR;
  tickParticles(visualDt);
  tickWeaponVisuals(visualDt);
  if (viewedCombat) refreshCombatOverlay();
  // Lightweight updates when colony screen is open (no full DOM rebuild)
  if (colonyViewStar && colonyViewPlanetIdx != null) {
    const col = getActiveColony();
    if (col) {
      if (col.deck.length !== lastDeckCount) {
        lastDeckCount = col.deck.length;
        refreshDeckDisplay(col);
      }
      // Update colony resource header without full refresh
      const viewedPlanet = colonyViewStar.planets[colonyViewPlanetIdx];
      const out = getColonyOutput(col, viewedPlanet);
      updateColonyResourceDisplay(out);
      updateActionButtonProgress(col);
    }
    if (colonyDirty) {
      colonyDirty = false;
      refreshColonyScreen();
    }
  }
  render();
  requestAnimationFrame(gameLoop);
}
